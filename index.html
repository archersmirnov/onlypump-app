    const exerciseIndex = (selectedWorkout.exercises || []).findIndex(exercise => exercise.id === input.exerciseId);
    const exercise = exerciseIndex >= 0 ? selectedWorkout.exercises[exerciseIndex] : null;
    const setIndex = (exercise?.sets || []).findIndex(set => set.id === input.setId);
    const set = setIndex >= 0 ? exercise.sets[setIndex] : null;
    if (!exercise || !set) return null;
    return { workout: selectedWorkout, exercise, exerciseIndex, set, setIndex, field: input.field };
  };

  const scrollCustomSetInputIntoView = (input = activeSetInput) => {
    if (!input) return;
    requestAnimationFrame(() => {
      const field = document.querySelector(`[data-custom-set-field-id="${getCustomSetFieldId(input.setId, input.field)}"]`);
      field?.scrollIntoView?.({ block: "center", inline: "nearest", behavior: "smooth" });
    });
  };

  const openCustomSetInput = (exercise, set, field) => {
    if (!selectedWorkout || !exercise || !set || !["weight", "reps"].includes(field)) return;
    const input = { workoutId: selectedWorkout.id, exerciseId: exercise.id, setId: set.id, field };
    setActiveSetId(set.id);
    setActiveSetInput(input);
    setSetDrafts(prev => ({
      ...prev,
      [set.id]: {
        ...(prev[set.id] || {}),
        [field]: getSetDraftValue(set, field, exercise),
      },
    }));
    scrollCustomSetInputIntoView(input);
  };

  const closeCustomSetKeyboard = () => {
    setActiveSetInput(null);
  };

  const sanitizeCustomSetInputValue = (field, value) => {
    const raw = String(value ?? "");
    if (field === "reps") return raw.replace(/[^\d]/g, "").replace(/^0+(?=\d)/, "");
    const parts = raw.replace(/[^\d.]/g, "").split(".");
    const integer = (parts[0] || "").replace(/^0+(?=\d)/, "");
    const decimal = parts.slice(1).join("");
    return parts.length > 1 ? `${integer || "0"}.${decimal}` : integer;
  };

  const setCustomSetInputValue = (value) => {
    const context = getActiveSetInputContext();
    if (!context) return;
    const cleanValue = sanitizeCustomSetInputValue(context.field, value);
    setSetDrafts(prev => ({
      ...prev,
      [context.set.id]: {
        ...(prev[context.set.id] || {}),
        [context.field]: cleanValue,
      },
    }));
    updateWorkoutSet(context.workout.id, context.exercise.id, context.set.id, context.field, cleanValue);
    scrollCustomSetInputIntoView(activeSetInput);
  };

  const getCustomSetInputDisplayValue = () => {
    const context = getActiveSetInputContext();
    if (!context) return "";
    return String(getSetDraftValue(context.set, context.field, context.exercise) ?? "");
  };

  const pressCustomSetInputKey = (key) => {
    const context = getActiveSetInputContext();
    if (!context) return;
    const current = getCustomSetInputDisplayValue();
    if (key === "backspace") {
      setCustomSetInputValue(current.slice(0, -1));
      return;
    }
    if (key === "." && context.field !== "weight") return;
    if (key === "." && current.includes(".")) return;
    const next = key === "."
      ? `${current || "0"}.`
      : (!current || current === "0" ? key : `${current}${key}`);
    setCustomSetInputValue(next);
  };

  const getCustomSetInputOrder = (exercise) => {
    const settings = normalizeExerciseMeasurementSettings(exercise || {});
    const fields = [
      settings.measureWeightEnabled ? "weight" : null,
      settings.measureRepsEnabled ? "reps" : null,
    ].filter(Boolean);
    return (exercise?.sets || []).flatMap(set => fields.map(field => ({
      workoutId: selectedWorkout?.id,
      exerciseId: exercise.id,
      setId: set.id,
      field,
    })));
  };

  const moveToNextCustomSetInput = () => {
    const context = getActiveSetInputContext();
    if (!context) return closeCustomSetKeyboard();
    const order = getCustomSetInputOrder(context.exercise);
    const currentIndex = order.findIndex(item => item.setId === context.set.id && item.field === context.field);
    const next = order[currentIndex + 1];
    if (!next) {
      closeCustomSetKeyboard();
      return;
    }
    setActiveSetId(next.setId);
    setActiveSetInput(next);
    scrollCustomSetInputIntoView(next);
  };

  const copyCustomSetInputDown = () => {
    const context = getActiveSetInputContext();
    if (!context) return;
    const displayValue = sanitizeCustomSetInputValue(context.field, getCustomSetInputDisplayValue());
    const storedValue = coerceSetFieldValue(context.field, displayValue, context.exercise);
    const belowSets = (context.exercise.sets || []).slice(context.setIndex + 1);
    if (!belowSets.length) return;
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).map(exercise => exercise.id === context.exercise.id ? {
        ...exercise,
        sets: (exercise.sets || []).map((set, setIndex) => setIndex > context.setIndex ? applySetFieldValue(set, context.field, storedValue) : set),
      } : exercise),
      updatedAt: new Date().toISOString(),
    }));
    setSetDrafts(prev => {
      const next = { ...prev };
      belowSets.forEach(set => {
        next[set.id] = { ...(next[set.id] || {}), [context.field]: displayValue };
      });
      return next;
    });
  };

  const updateWorkoutSet = (workoutId, exerciseId, setId, field, value) => {
    const workoutForSettings = workouts.find(item => item.id === workoutId) || selectedWorkout;
    const exerciseForSettings = (workoutForSettings?.exercises || []).find(item => item.id === exerciseId);
    const nextValue = coerceSetFieldValue(field, value, exerciseForSettings);
    const patch = (workout) => ({
      ...workout,
      exercises: (workout.exercises || []).map(exercise => exercise.id === exerciseId ? {
        ...exercise,
        sets: (exercise.sets || []).map(set => set.id === setId ? applySetFieldValue(set, field, nextValue) : set),
      } : exercise),
      updatedAt: new Date().toISOString(),
    });

    setWorkouts(prev => prev.map(workout => workout.id === workoutId ? patch(workout) : workout));
    setSelectedWorkout(prev => prev?.id === workoutId ? patch(prev) : prev);
    const workout = workouts.find(item => item.id === workoutId) || selectedWorkout;
    if (!workout) return;
    const nextWorkout = patch(workout);
    const exercise = (nextWorkout.exercises || []).find(item => item.id === exerciseId);
    const set = (exercise?.sets || []).find(item => item.id === setId);
    if (set?.supabaseId) {
      queueWorkoutPatch(workoutId, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
        set_updates: [buildSetPatchPayload(set)],
      });
    }
  };

  const updateSelectedWorkoutModel = (updater, options = {}) => {
    if (!selectedWorkout) return;
    const applyUpdate = (workout) => normalizeWorkoutSupersetMetadata(updater(workout));
    const nextSelectedWorkout = applyUpdate(selectedWorkout);
    setWorkouts(prev => prev.map(workout => workout.id === selectedWorkout.id ? applyUpdate(workout) : workout));
    setSelectedWorkout(nextSelectedWorkout);
    if (options.sync !== false) {
      const patch = buildWorkoutTreePatch(nextSelectedWorkout);
      if (patch) queueWorkoutPatch(nextSelectedWorkout.id, patch, options);
    }
  };

  const toggleWorkoutEditMode = () => {
    const next = !isEditingWorkout;
    setIsEditingWorkout(next);
    if (!next) {
      setSelectedExerciseIds([]);
      setRestMenuOpen(false);
      setRestEditor(null);
      setEditError(null);
    }
  };

  const toggleExerciseSelection = (exerciseId) => {
    const scroller = workoutScrollRef.current;
    const previousScrollTop = scroller?.scrollTop ?? 0;
    console.log("Exercise checkbox changed:", { exerciseId });
    console.log("Preserving scroll position:", previousScrollTop);
    setSelectedExerciseIds(prev => prev.includes(exerciseId)
      ? prev.filter(id => id !== exerciseId)
      : [...prev, exerciseId]);
    requestAnimationFrame(() => {
      if (!scroller) return;
      scroller.scrollTop = previousScrollTop;
      console.log("Restored scroll position:", previousScrollTop);
    });
  };

  const createSupersetFromSelection = () => {
    if (selectedExerciseIds.length < 2) {
      const selectedExercise = (selectedWorkout?.exercises || []).find(exercise => selectedExerciseIds.includes(exercise.id));
      const groupId = getExerciseSupersetGroupId(selectedExercise);
      if (groupId) {
        setSupersetCancelPrompt({ groupId, selectedIds: selectedExerciseIds, wholeGroup: false });
      } else {
        setEditError({
          title: "невозможно создать суперсет",
          description: "Выбери минимум два упражнения пустыми кружками, затем нажми кнопку суперсета ещё раз.",
        });
      }
      return;
    }

    const selectedExercises = (selectedWorkout?.exercises || []).filter(exercise => selectedExerciseIds.includes(exercise.id));
    const selectedGroupIds = Array.from(new Set(selectedExercises.map(getExerciseSupersetGroupId).filter(Boolean)));
    if (selectedGroupIds.length === 1 && selectedExercises.every(exercise => getExerciseSupersetGroupId(exercise) === selectedGroupIds[0])) {
      const groupId = selectedGroupIds[0];
      const groupIds = (selectedWorkout?.exercises || []).filter(exercise => getExerciseSupersetGroupId(exercise) === groupId).map(exercise => exercise.id);
      const wholeGroup = groupIds.every(id => selectedExerciseIds.includes(id));
      setSupersetCancelPrompt({ groupId, selectedIds: selectedExerciseIds, wholeGroup });
      return;
    }

    const supersetGroupId = createOnlyPumpUuid();
    console.log("Creating superset group:", { superset_group_id: supersetGroupId, exercise_ids: selectedExerciseIds });
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (() => {
        const selectedSet = new Set(selectedExerciseIds);
        const ordered = [...(workout.exercises || [])].sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
        const firstSelectedIndex = ordered.findIndex(exercise => selectedSet.has(exercise.id));
        const insertIndex = ordered.slice(0, Math.max(0, firstSelectedIndex)).filter(exercise => !selectedSet.has(exercise.id)).length;
        const selectedBlock = ordered.filter(exercise => selectedSet.has(exercise.id)).map((exercise, supersetIndex) => ({
          ...exercise,
          supersetId: supersetGroupId,
          supersetGroupId,
          supersetOrder: supersetIndex + 1,
          isSuperset: true,
        }));
        const remaining = ordered.filter(exercise => !selectedSet.has(exercise.id));
        return [
          ...remaining.slice(0, insertIndex),
          ...selectedBlock,
          ...remaining.slice(insertIndex),
        ].map((exercise, index) => ({ ...exercise, order: index + 1 }));
      })(),
      updatedAt: new Date().toISOString(),
    }));
    setSelectedExerciseIds([]);
    setEditError(null);
  };

  const clearSupersetFields = (exercise) => ({
    ...exercise,
    supersetId: null,
    supersetGroupId: null,
    supersetOrder: null,
    isSuperset: false,
  });

  const applySupersetCancel = (scope = "selected") => {
    if (!supersetCancelPrompt) return;
    const { groupId, selectedIds = [] } = supersetCancelPrompt;
    const selectedSet = new Set(selectedIds);
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).map(exercise => {
        const exerciseGroupId = getExerciseSupersetGroupId(exercise);
        if (scope === "group" && exerciseGroupId === groupId) return clearSupersetFields(exercise);
        if (scope === "selected" && selectedSet.has(exercise.id)) return clearSupersetFields(exercise);
        return exercise;
      }),
      updatedAt: new Date().toISOString(),
    }), { immediate: true });
    setSupersetCancelPrompt(null);
    setSelectedExerciseIds([]);
  };

  const openRestEditor = (type) => {
    setRestMenuOpen(false);
    setRestDraft({ minutes: "2", seconds: "0" });
    setRestEditor(type);
  };

  const applyRestInterval = () => {
    if (!restEditor) return;
    const seconds = Math.max(0, Number(restDraft.minutes || 0) * 60 + Number(restDraft.seconds || 0));
    updateSelectedWorkoutModel(workout => {
      const targetIds = selectedExerciseIds.length ? selectedExerciseIds : (workout.exercises || []).map(exercise => exercise.id);
      return {
        ...workout,
        exercises: (workout.exercises || []).map(exercise => {
          if (!targetIds.includes(exercise.id)) return exercise;
          const nextExercise = { ...exercise };
          if (restEditor === "between" || restEditor === "all") {
            nextExercise.restSeconds = seconds;
            nextExercise.sets = (exercise.sets || []).map(set => ({ ...set, restSeconds: seconds }));
          }
          if (restEditor === "after" || restEditor === "all") {
            nextExercise.restAfterSeconds = seconds;
            const sourceSets = nextExercise.sets || exercise.sets || [];
            const lastSetIndex = sourceSets.length - 1;
            nextExercise.sets = sourceSets.map((set, setIndex) => {
              if (restEditor === "all") return { ...set, restAfterSeconds: seconds };
              return setIndex === lastSetIndex ? { ...set, restAfterSeconds: seconds } : set;
            });
          }
          return nextExercise;
        }),
        updatedAt: new Date().toISOString(),
      };
    });
    setRestEditor(null);
  };

  const reorderExerciseInSelectedWorkout = (sourceId, targetId, insertAfter = false) => {
    if (!sourceId || !targetId || sourceId === targetId) return;
    updateSelectedWorkoutModel(workout => {
      const ordered = [...(workout.exercises || [])].sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
      const source = ordered.find(exercise => exercise.id === sourceId);
      const target = ordered.find(exercise => exercise.id === targetId);
      if (!source || !target) return workout;

      const sourceSupersetId = getExerciseSupersetGroupId(source);
      const targetSupersetId = getExerciseSupersetGroupId(target);
      const movingIds = sourceSupersetId
        ? ordered.filter(exercise => getExerciseSupersetGroupId(exercise) === sourceSupersetId).map(exercise => exercise.id)
        : [source.id];
      if (movingIds.includes(target.id)) return workout;

      const targetIds = targetSupersetId
        ? ordered.filter(exercise => getExerciseSupersetGroupId(exercise) === targetSupersetId).map(exercise => exercise.id)
        : [target.id];
      const movingBlock = ordered.filter(exercise => movingIds.includes(exercise.id));
      const remaining = ordered.filter(exercise => !movingIds.includes(exercise.id));
      const targetStart = Math.max(0, remaining.findIndex(exercise => targetIds.includes(exercise.id)));
      const targetSize = remaining.filter(exercise => targetIds.includes(exercise.id)).length;
      const insertIndex = insertAfter ? targetStart + targetSize : targetStart;
      const next = [
        ...remaining.slice(0, insertIndex),
        ...movingBlock,
        ...remaining.slice(insertIndex),
      ];
      return {
        ...workout,
        exercises: next.map((exercise, index) => ({ ...exercise, order: index + 1 })),
        updatedAt: new Date().toISOString(),
      };
    });
  };

  const getExerciseDropTarget = (clientY, movingIds = []) => {
    const movingSet = new Set(movingIds);
    const rows = Array.from(document.querySelectorAll("[data-workout-exercise-id]"))
      .map(row => ({ row, id: row.getAttribute("data-workout-exercise-id"), rect: row.getBoundingClientRect() }))
      .filter(item => item.id && !movingSet.has(item.id));
    if (!rows.length) return null;

    const direct = rows.find(item => clientY >= item.rect.top && clientY <= item.rect.bottom);
    const target = direct || rows.reduce((best, item) => {
      const distance = Math.abs(clientY - (item.rect.top + item.rect.height / 2));
      return !best || distance < best.distance ? { ...item, distance } : best;
    }, null);
    if (!target) return null;
    return {
      targetId: target.id,
      insertAfter: clientY > target.rect.top + target.rect.height / 2,
    };
  };

  const beginExerciseReorder = (exerciseId, clientY) => {
    const ordered = [...(selectedWorkout?.exercises || [])].sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
    const source = ordered.find(exercise => exercise.id === exerciseId);
    const sourceSupersetId = getExerciseSupersetGroupId(source);
    const movingIds = sourceSupersetId
      ? ordered.filter(exercise => getExerciseSupersetGroupId(exercise) === sourceSupersetId).map(exercise => exercise.id)
      : [exerciseId];
    reorderExerciseRef.current = { exerciseId, movingIds, startY: clientY };
    reorderTargetRef.current = null;
    setReorderVisual({ movingIds, dy: 0, targetId: null, insertAfter: false });
  };

  const updateExerciseReorder = (clientY) => {
    const drag = reorderExerciseRef.current;
    if (!drag) return;
    const dy = clientY - drag.startY;
    const target = getExerciseDropTarget(clientY, drag.movingIds);
    reorderTargetRef.current = target;
    setReorderVisual({ movingIds: drag.movingIds, dy, targetId: target?.targetId || null, insertAfter: Boolean(target?.insertAfter) });
  };

  const finishExerciseReorder = (clientY) => {
    const drag = reorderExerciseRef.current;
    if (!drag) return;
    const target = reorderTargetRef.current || getExerciseDropTarget(clientY, drag.movingIds);
    reorderExerciseInSelectedWorkout(drag.exerciseId, target?.targetId, Boolean(target?.insertAfter));
    reorderExerciseRef.current = null;
    reorderTargetRef.current = null;
    setReorderVisual(null);
  };

  const startExerciseReorder = (event, exerciseId) => {
    if (!isEditingWorkout) return;
    event.preventDefault();
    event.stopPropagation();
    beginExerciseReorder(exerciseId, event.clientY);
    event.currentTarget.setPointerCapture?.(event.pointerId);
    const pointerId = event.pointerId;
    const handleMove = (moveEvent) => {
      if (pointerId != null && moveEvent.pointerId !== pointerId) return;
      moveEvent.preventDefault();
      updateExerciseReorder(moveEvent.clientY);
    };
    const handleUp = (upEvent) => {
      if (pointerId != null && upEvent.pointerId !== pointerId) return;
      upEvent.preventDefault();
      finishExerciseReorder(upEvent.clientY);
      document.removeEventListener("pointermove", handleMove);
      document.removeEventListener("pointerup", handleUp);
      document.removeEventListener("pointercancel", handleUp);
    };
    document.addEventListener("pointermove", handleMove, { passive: false });
    document.addEventListener("pointerup", handleUp, { passive: false });
    document.addEventListener("pointercancel", handleUp, { passive: false });
  };

  const moveExerciseReorder = (event) => {
    const drag = reorderExerciseRef.current;
    if (!drag) return;
    event.preventDefault();
    event.stopPropagation();
    updateExerciseReorder(event.clientY);
  };

  const endExerciseReorder = (event) => {
    const drag = reorderExerciseRef.current;
    if (!drag) return;
    event.preventDefault();
    event.stopPropagation();
    finishExerciseReorder(event.clientY);
  };

  const startExerciseMouseReorder = (event, exerciseId) => {
    if (!isEditingWorkout || reorderExerciseRef.current) return;
    event.preventDefault();
    event.stopPropagation();
    beginExerciseReorder(exerciseId, event.clientY);
    const handleMove = (moveEvent) => {
      moveEvent.preventDefault();
      updateExerciseReorder(moveEvent.clientY);
    };
    const handleUp = (upEvent) => {
      upEvent.preventDefault();
      finishExerciseReorder(upEvent.clientY);
      document.removeEventListener("mousemove", handleMove);
      document.removeEventListener("mouseup", handleUp);
    };
    document.addEventListener("mousemove", handleMove);
    document.addEventListener("mouseup", handleUp);
  };

  const applyExercisePatchWithRest = (exercise, patch) => {
    const nextExercise = { ...exercise, ...patch };
    if (patch.restSeconds !== undefined) {
      nextExercise.restSeconds = safeWorkoutNumber(patch.restSeconds, 120);
      nextExercise.sets = (exercise.sets || []).map(set => ({ ...set, restSeconds: nextExercise.restSeconds }));
    }
    if (patch.restAfterSeconds !== undefined) {
      nextExercise.restAfterSeconds = safeWorkoutNumber(patch.restAfterSeconds, 0);
      const sourceSets = nextExercise.sets || exercise.sets || [];
      const lastSetIndex = sourceSets.length - 1;
      nextExercise.sets = sourceSets.map((set, setIndex) => setIndex === lastSetIndex ? { ...set, restAfterSeconds: nextExercise.restAfterSeconds } : set);
    }
    return nextExercise;
  };

  const updateActiveSet = (setId, patch) => {
    const currentExercise = (selectedWorkout?.exercises || [])[activeExerciseIndex];
    const currentSet = (currentExercise?.sets || []).find(set => set.id === setId);
    const applyPatchToSet = (set) => {
      const next = Object.entries(patch || {}).reduce((item, [field, value]) => applySetFieldValue(item, field, value), set);
      return { ...next, isCompleted: (patch.status || set.status) === "completed" };
    };
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).map((exercise, exerciseIndex) => exerciseIndex === activeExerciseIndex ? {
        ...exercise,
        sets: (exercise.sets || []).map(set => set.id === setId ? applyPatchToSet(set) : set),
      } : exercise),
      updatedAt: new Date().toISOString(),
    }));
  };

  const updateActiveExercise = (patch) => {
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).map((exercise, exerciseIndex) => exerciseIndex === activeExerciseIndex ? applyExercisePatchWithRest(exercise, patch) : exercise),
      updatedAt: new Date().toISOString(),
    }));
  };

  const updateExerciseById = (exerciseId, patchOrUpdater, options = {}) => {
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).map(exercise => {
        if (exercise.id !== exerciseId) return exercise;
        const patch = typeof patchOrUpdater === "function" ? patchOrUpdater(exercise) : patchOrUpdater;
        return applyExercisePatchWithRest(exercise, patch);
      }),
      updatedAt: new Date().toISOString(),
    }), options);
  };

  const openExerciseMeasurementEditor = (exercise) => {
    if (!exercise) return;
    setExerciseMeasurementSheet({ exerciseId: exercise.id, draft: normalizeExerciseMeasurementSettings(exercise) });
    setOpenMenu(null);
  };

  const updateExerciseMeasurementDraft = (updater) => {
    setExerciseMeasurementSheet(prev => {
      if (!prev) return prev;
      const draft = typeof updater === "function" ? updater(prev.draft || exerciseMeasurementDefaults) : updater;
      return { ...prev, draft: normalizeExerciseMeasurementSettings({ ...(prev.draft || {}), ...draft }) };
    });
  };

  const setExerciseMeasurementMode = (mode) => {
    const normalized = normalizeMeasurementMode(mode);
    updateExerciseMeasurementDraft({
      ...measurementSettingsFromMode(normalized),
      measureDistanceEnabled: normalized === "distance" || normalized === "weight_distance",
      measurementMode: normalized,
    });
  };

  const toggleExerciseMeasurementSetting = (field) => {
    updateExerciseMeasurementDraft(draft => ({ [field]: !Boolean(draft?.[field]) }));
  };

  const setExerciseWeightUnit = (weightUnit) => {
    updateExerciseMeasurementDraft({ weightUnit: normalizeWeightUnit(weightUnit) });
  };

  const saveExerciseMeasurementSettings = () => {
    if (!exerciseMeasurementSheet?.exerciseId) return;
    const draft = normalizeExerciseMeasurementSettings(exerciseMeasurementSheet.draft || {});
    const exerciseId = exerciseMeasurementSheet.exerciseId;
    const currentWorkout = selectedWorkout;
    const currentExercise = (currentWorkout?.exercises || []).find(exercise => exercise.id === exerciseId);
    if (!currentWorkout || !currentExercise) {
      setExerciseMeasurementSheet(null);
      return;
    }
    const nextWorkout = normalizeWorkoutSupersetMetadata({
      ...currentWorkout,
      exercises: (currentWorkout.exercises || []).map(exercise => exercise.id === exerciseId
        ? applyExercisePatchWithRest(exercise, draft)
        : exercise),
      updatedAt: new Date().toISOString(),
    });
    const nextExercise = (nextWorkout.exercises || []).find(exercise => exercise.id === exerciseId);
    const measurementPayload = buildExerciseMeasurementSettingsPatchPayload(nextExercise, draft);

    setWorkouts(prev => prev.map(workout => workout.id === currentWorkout.id ? nextWorkout : workout));
    setSelectedWorkout(nextWorkout);

    if (measurementPayload && nextWorkout.supabaseId) {
      queueWorkoutPatch(nextWorkout.id, {
        workout_updates: [buildWorkoutTotalsPatchPayload(nextWorkout)].filter(Boolean),
        exercise_updates: [measurementPayload],
        set_updates: [],
        deleted_workout_ids: [],
        deleted_exercise_ids: [],
        deleted_set_ids: [],
      }, { immediate: true });
    }
    setExerciseMeasurementSheet(null);
  };

  const openExerciseNotesEditor = (exercise) => {
    if (!exercise) return;
    setExerciseNotesSheet({ exerciseId: exercise.id, draft: exercise.note || exercise.notes || "" });
  };

  const saveExerciseNote = () => {
    if (!exerciseNotesSheet?.exerciseId) return;
    updateExerciseById(exerciseNotesSheet.exerciseId, { note: exerciseNotesSheet.draft || "" }, { immediate: true });
    setExerciseNotesSheet(null);
  };

  const buildLocalExerciseHistory = (exercise) => {
    if (!exercise) return [];
    return [...workouts]
      .flatMap(workout => (workout.exercises || [])
        .filter(item => item.name === exercise.name && (!exercise.muscleGroup || item.muscleGroup === exercise.muscleGroup))
        .map(item => ({
          workout_date: workout.date,
          workout_title: workout.title,
          workout_status: workout.status,
          exercise_name: item.name,
          muscle_group: item.muscleGroup,
          notes: item.note || item.notes || "",
          ...normalizeExerciseMeasurementSettings(item),
          sets: item.sets || [],
        })))
      .sort((a, b) => String(b.workout_date || "").localeCompare(String(a.workout_date || "")));
  };

  const getHistoryRecordSettings = (record = {}) => normalizeExerciseMeasurementSettings(record);
  const getHistorySetWeightKg = (set = {}) => safeWorkoutNumber(set.weight ?? set.weight_kg, 0);
  const formatHistorySetWeight = (set = {}, record = {}) => {
    const settings = getHistoryRecordSettings(record);
    const displayWeight = settings.weightUnit === "lb" ? kgToLb(getHistorySetWeightKg(set)) : getHistorySetWeightKg(set);
    return `${formatWorkoutInputNumber(displayWeight)} ${settings.weightUnit === "lb" ? "lb" : "кг"}`;
  };
  const getHistorySetVolumeKg = (set = {}, record = {}) => getSetVolumeForExercise({
    ...set,
    weight: getHistorySetWeightKg(set),
  }, getHistoryRecordSettings(record));

  const openExerciseStats = async (exercise) => {
    if (!exercise) return;
    setExerciseStatsSheet({ exercise, loading: true, records: [] });
    try {
      let records = [];
      if (canUseWorkoutApi) {
        const result = await callWorkoutsApi("exercise_history", {
          exercise_name: exercise.name,
          muscle_group: exercise.muscleGroup,
        });
        records = readApiArray(result, "history", ["exercise_history", "records", "items"]);
      }
      if (!records.length) records = buildLocalExerciseHistory(exercise);
      setExerciseStatsSheet({ exercise, loading: false, records });
    } catch (error) {
      console.error("Supabase workout error", { action: "exercise_history", error });
      setExerciseStatsSheet({ exercise, loading: false, records: buildLocalExerciseHistory(exercise), error: true });
    }
  };

  const saveExerciseNameDraft = () => {
    const currentExercise = (selectedWorkout?.exercises || [])[activeExerciseIndex];
    if (!currentExercise) return;
    const name = exerciseNameDraft.trim() || currentExercise.name || "Упражнение";
    updateActiveExercise({ name });
  };

  const removeActiveExercise = async () => {
    if (!selectedWorkout) return;
    const removedExercise = (selectedWorkout.exercises || [])[activeExerciseIndex];
    if (canUseWorkoutApi && removedExercise?.supabaseId) {
      console.log("Delete exercise clicked:", removedExercise);
      const previousWorkouts = workoutsRef.current;
      const previousSelectedWorkout = selectedWorkout;
      const nextExercises = (selectedWorkout.exercises || []).filter((_, index) => index !== activeExerciseIndex);
      const nextIndex = Math.max(0, Math.min(activeExerciseIndex, nextExercises.length - 1));
      setActiveExerciseIndex(nextIndex);
      setActiveSetId(getFirstActiveSetId(nextExercises[nextIndex]));
      setOpenMenu(null);
      const nextWorkout = {
        ...selectedWorkout,
        exercises: nextExercises.map((exercise, index) => ({ ...exercise, order: index + 1 })),
        updatedAt: new Date().toISOString(),
      };
      setWorkouts(prev => prev.map(workout => workout.id === selectedWorkout.id ? nextWorkout : workout));
      setSelectedWorkout(nextWorkout);
      const patchResult = await sendWorkoutPatch(selectedWorkout.id, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
        exercise_updates: nextWorkout.exercises.map(buildExercisePatchPayload).filter(Boolean),
        deleted_exercise_ids: [removedExercise.supabaseId],
      });
      const deleted = patchResult || await deleteExerciseViaApi(removedExercise);
      if (!deleted) {
        setWorkouts(previousWorkouts);
        setSelectedWorkout(previousSelectedWorkout);
      }
      return;
    }
    const nextIndex = Math.max(0, activeExerciseIndex - 1);
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).filter((_, index) => index !== activeExerciseIndex).map((exercise, index) => ({ ...exercise, order: index + 1 })),
      updatedAt: new Date().toISOString(),
    }));
    const nextExercise = (selectedWorkout.exercises || []).filter((_, index) => index !== activeExerciseIndex)[nextIndex];
    setActiveExerciseIndex(nextIndex);
    setActiveSetId(getFirstActiveSetId(nextExercise));
    setOpenMenu(null);
  };

  const removeExerciseFromSelectedWorkout = async (exerciseId) => {
    if (!selectedWorkout) return;
    const currentExercises = selectedWorkout.exercises || [];
    const removedIndex = currentExercises.findIndex(exercise => exercise.id === exerciseId);
    const removedExercise = currentExercises.find(exercise => exercise.id === exerciseId);
    const nextExercises = currentExercises.filter(exercise => exercise.id !== exerciseId);
    if (canUseWorkoutApi && removedExercise?.supabaseId) {
      console.log("Delete exercise clicked:", removedExercise);
      const previousWorkouts = workoutsRef.current;
      const previousSelectedWorkout = selectedWorkout;
      const nextIndex = Math.max(0, Math.min(removedIndex, nextExercises.length - 1));
      setActiveExerciseIndex(nextIndex);
      setActiveSetId(getFirstActiveSetId(nextExercises[nextIndex]));
      setSelectedExerciseIds(prev => prev.filter(id => id !== exerciseId));
      setOpenMenu(null);
      const nextWorkout = {
        ...selectedWorkout,
        exercises: nextExercises.map((exercise, index) => ({ ...exercise, order: index + 1 })),
        updatedAt: new Date().toISOString(),
      };
      setWorkouts(prev => prev.map(workout => workout.id === selectedWorkout.id ? nextWorkout : workout));
      setSelectedWorkout(nextWorkout);
      const patchResult = await sendWorkoutPatch(selectedWorkout.id, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
        exercise_updates: nextWorkout.exercises.map(buildExercisePatchPayload).filter(Boolean),
        deleted_exercise_ids: [removedExercise.supabaseId],
      });
      const deleted = patchResult || await deleteExerciseViaApi(removedExercise);
      if (!deleted) {
        setWorkouts(previousWorkouts);
        setSelectedWorkout(previousSelectedWorkout);
      }
      return;
    }
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).filter(exercise => exercise.id !== exerciseId).map((exercise, index) => ({ ...exercise, order: index + 1 })),
      updatedAt: new Date().toISOString(),
    }));
    const nextIndex = Math.max(0, Math.min(removedIndex, nextExercises.length - 1));
    setActiveExerciseIndex(nextIndex);
    setActiveSetId(getFirstActiveSetId(nextExercises[nextIndex]));
    setSelectedExerciseIds(prev => prev.filter(id => id !== exerciseId));
    setOpenMenu(null);
  };

  const openReplaceForExercise = (exerciseId) => {
    const index = (selectedWorkout?.exercises || []).findIndex(exercise => exercise.id === exerciseId);
    if (index >= 0) setActiveExerciseIndex(index);
    openExerciseBase("replace");
  };

  const skipRemainingSets = () => {
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).map((exercise, exerciseIndex) => exerciseIndex === activeExerciseIndex ? {
        ...exercise,
        sets: (exercise.sets || []).map(set => getSetStatus(set) === "pending" ? { ...set, status: "skipped", isCompleted: false } : set),
      } : exercise),
      updatedAt: new Date().toISOString(),
    }));
    setOpenMenu(null);
  };

  const addSetToActiveExercise = (type = "working", afterSetId = null) => {
    if (!selectedWorkout) return;
    const currentExercise = (selectedWorkout.exercises || [])[activeExerciseIndex];
    const sets = currentExercise?.sets || [];
    const afterIndex = afterSetId ? sets.findIndex(set => set.id === afterSetId) : sets.length - 1;
    const base = afterIndex >= 0 ? sets[afterIndex] : sets[sets.length - 1];
    const insertIndexForStorage = afterSetId ? Math.max(0, afterIndex + 1) : sets.length;
    const completedByDefault = normalizeWorkoutStatus(selectedWorkout.status) === "completed";
    const newSet = {
      ...makeSet(Number(base?.weight || 0), Number(base?.reps || 0), sets.length, completedByDefault, type),
      order: insertIndexForStorage + 1,
      completedAt: completedByDefault ? new Date().toISOString() : null,
      pending: canUseWorkoutApi,
      isSaving: canUseWorkoutApi,
      isSyncing: canUseWorkoutApi,
    };

    const getWorkoutWithInsertedSet = (workout) => ({
      ...workout,
      exercises: (workout.exercises || []).map((exercise, exerciseIndex) => {
        if (exerciseIndex !== activeExerciseIndex) return exercise;
        const sourceSets = exercise.sets || [];
        const insertIndex = afterSetId ? Math.max(0, sourceSets.findIndex(set => set.id === afterSetId) + 1) : sourceSets.length;
        const nextSets = [...sourceSets.slice(0, insertIndex), newSet, ...sourceSets.slice(insertIndex)].map((set, index) => ({ ...set, order: index + 1 }));
        return { ...exercise, sets: nextSets };
      }),
      updatedAt: new Date().toISOString(),
    });

    updateSelectedWorkoutModel(workout => ({
      ...getWorkoutWithInsertedSet(workout),
    }), { sync: false });
    setActiveSetId(newSet.id);
    setOpenMenu(null);
    if (canUseWorkoutApi && currentExercise?.supabaseId) {
      createSetViaApi(selectedWorkout.id, currentExercise.id, currentExercise.supabaseId, { ...newSet, pending: true, isSaving: true, isSyncing: true }).then(id => {
        if (!id) patchSetInState(selectedWorkout.id, currentExercise.id, newSet.id, item => ({ ...item, isSaving: false, isSyncing: false, syncError: true }));
        const nextWorkout = getWorkoutWithInsertedSet(selectedWorkout);
        const nextExercise = (nextWorkout.exercises || []).find(exercise => exercise.id === currentExercise.id);
        queueWorkoutPatch(selectedWorkout.id, {
          workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
          set_updates: (nextExercise?.sets || []).map(buildSetPatchPayload).filter(Boolean),
        }, { immediate: true });
      });
    }
  };

  const removeSetFromActiveExercise = async (setId) => {
    const currentExercise = (selectedWorkout?.exercises || [])[activeExerciseIndex];
    const removedSet = (currentExercise?.sets || []).find(set => set.id === setId);
    const remaining = (currentExercise?.sets || []).filter(set => set.id !== setId);
    if (canUseWorkoutApi && removedSet?.supabaseId) {
      const previousWorkouts = workoutsRef.current;
      const previousSelectedWorkout = selectedWorkout;
      setActiveSetId((remaining.find(set => getSetStatus(set) === "pending") || remaining[0] || null)?.id || null);
      setOpenMenu(null);
      const nextWorkout = {
        ...selectedWorkout,
        exercises: (selectedWorkout.exercises || []).map((exercise, exerciseIndex) => exerciseIndex === activeExerciseIndex ? {
          ...exercise,
          sets: (exercise.sets || []).filter(set => set.id !== setId).map((set, index) => ({ ...set, order: index + 1 })),
        } : exercise),
        updatedAt: new Date().toISOString(),
      };
      setWorkouts(prev => prev.map(workout => workout.id === selectedWorkout.id ? nextWorkout : workout));
      setSelectedWorkout(nextWorkout);
      const nextExercise = (nextWorkout.exercises || [])[activeExerciseIndex];
      const patchResult = await sendWorkoutPatch(selectedWorkout.id, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
        exercise_updates: [buildExercisePatchPayload(nextExercise)].filter(Boolean),
        set_updates: (nextExercise?.sets || []).map(buildSetPatchPayload).filter(Boolean),
        deleted_set_ids: [removedSet.supabaseId],
      });
      const deleted = patchResult || await deleteSetViaApi(removedSet);
      if (!deleted) {
        setWorkouts(previousWorkouts);
        setSelectedWorkout(previousSelectedWorkout);
      }
      return;
    }
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).map((exercise, exerciseIndex) => exerciseIndex === activeExerciseIndex ? {
        ...exercise,
        sets: (exercise.sets || []).filter(set => set.id !== setId).map((set, index) => ({ ...set, order: index + 1 })),
      } : exercise),
      updatedAt: new Date().toISOString(),
    }));
    setActiveSetId((remaining.find(set => getSetStatus(set) === "pending") || remaining[0] || null)?.id || null);
    setOpenMenu(null);
  };

  const goToExercise = (nextIndex) => {
    if (!selectedWorkout) return;
    const exercises = selectedWorkout.exercises || [];
    const clamped = Math.max(0, Math.min(exercises.length - 1, nextIndex));
    const nextExercise = exercises[clamped];
    setActiveExerciseIndex(clamped);
    setActiveSetId(getFirstActiveSetId(nextExercise));
    closeCustomSetKeyboard();
    setOpenMenu(null);
  };

  const goToNextExerciseOrOverview = (fromIndex = activeExerciseIndex) => {
    const exerciseCount = (selectedWorkout?.exercises || []).length;
    closeCustomSetKeyboard();
    if (!exerciseCount || fromIndex >= exerciseCount - 1) {
      setWorkoutViewMode("overview");
      setOpenMenu(null);
      return;
    }
    goToExercise(fromIndex + 1);
  };

  const findNextPendingSetTarget = (workout, exerciseIndex, currentSetId = null) => {
    const exercises = workout?.exercises || [];
    for (let index = exerciseIndex; index < exercises.length; index += 1) {
      const exercise = exercises[index];
      const sets = exercise?.sets || [];
      const startSetIndex = index === exerciseIndex && currentSetId
        ? Math.max(0, sets.findIndex(set => set.id === currentSetId) + 1)
        : 0;
      const nextSet = sets.slice(startSetIndex).find(set => getSetStatus(set) === "pending");
      if (nextSet) return { workoutId: workout.id, exerciseIndex: index, setId: nextSet.id };
    }
    return null;
  };

  const completeCurrentSet = () => {
    if (!selectedWorkout) return;
    const currentExercise = (selectedWorkout.exercises || [])[activeExerciseIndex];
    if (!currentExercise) return;
    const sets = currentExercise.sets || [];
    const currentSet = sets.find(set => set.id === activeSetId) || sets.find(set => getSetStatus(set) === "pending") || sets[0];

    if (!currentSet) {
      goToNextExerciseOrOverview(activeExerciseIndex);
      return;
    }

    if (getSetStatus(currentSet) !== "completed") {
      const nextTarget = findNextPendingSetTarget(selectedWorkout, activeExerciseIndex, currentSet.id);
      const nextIsSameExercise = nextTarget?.exerciseIndex === activeExerciseIndex;
      const restSeconds = nextTarget
        ? safeWorkoutNumber(nextIsSameExercise
          ? (currentSet.restSeconds ?? currentExercise.restSeconds ?? 120)
          : (currentSet.restAfterSeconds || currentExercise.restAfterSeconds || currentSet.restSeconds || currentExercise.restSeconds || 120), 0)
        : 0;
      updateActiveSet(currentSet.id, { status: "completed", completedAt: new Date().toISOString() });
      if (nextTarget && restSeconds > 0) {
        restAdvanceRef.current = nextTarget;
        setRestTimer(restSeconds);
        return;
      }
      restAdvanceRef.current = null;
      setRestTimer(null);
      if (nextTarget) {
        setActiveExerciseIndex(nextTarget.exerciseIndex);
        setActiveSetId(nextTarget.setId);
      }
      return;
    }

    const nextTarget = findNextPendingSetTarget(selectedWorkout, activeExerciseIndex, currentSet.id);
    if (nextTarget) {
      setActiveExerciseIndex(nextTarget.exerciseIndex);
      setActiveSetId(nextTarget.setId);
      return;
    }

    goToNextExerciseOrOverview(activeExerciseIndex);
  };

  const formatSecondsTimer = (seconds) => {
    const safe = Math.max(0, Number(seconds || 0));
    const h = Math.floor(safe / 3600);
    const m = Math.floor((safe % 3600) / 60);
    const sec = safe % 60;
    if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    return `${m}:${String(sec).padStart(2, "0")}`;
  };

  const MAX_ACTIVE_WORKOUT_SECONDS = 24 * 60 * 60;
  const getWorkoutStartedAtMs = (workout) => {
    const raw = workout?.startedAt || workout?.started_at || (normalizeWorkoutStatus(workout?.status) === "active" ? (workout?.createdAt || workout?.created_at) : null);
    const parsed = raw ? new Date(raw).getTime() : NaN;
    return Number.isFinite(parsed) ? parsed : Date.now();
  };

  const getWorkoutElapsedSeconds = (workout, fallbackSeconds = 0) => {
    const startedAt = getWorkoutStartedAtMs(workout);
    const elapsed = Math.floor((Date.now() - startedAt) / 1000);
    return Math.min(MAX_ACTIVE_WORKOUT_SECONDS, Math.max(0, Number.isFinite(elapsed) ? elapsed : fallbackSeconds));
  };

  const getWorkoutDurationSeconds = (workout) => {
    if (normalizeWorkoutStatus(workout?.status) === "active") return getWorkoutElapsedSeconds(workout);
    return Math.max(0, safeWorkoutNumber(workout?.durationMinutes, 0) * 60);
  };

  const getStrengthMetForMuscleGroup = (muscleGroup = "") => {
    const text = String(muscleGroup || "").toLowerCase();
    if (/(ног|бедр|квад|икр|ягод|glute|leg|quad|hamstring|calf)/i.test(text)) return 4.8;
    if (/(спин|широч|тяг|back|pull)/i.test(text)) return 4.2;
    if (/(груд|chest|жим)/i.test(text)) return 3.8;
    if (/(плеч|дельт|shoulder)/i.test(text)) return 3.5;
    if (/(рук|биц|триц|предплеч|arm|bicep|tricep)/i.test(text)) return 3.2;
    return 3.6;
  };

  const estimateWorkoutCalories = (durationSeconds, workout = null) => {
    const minutes = Math.max(0, safeWorkoutNumber(durationSeconds, 0) / 60);
    const profileWeightKg = safeWorkoutNumber(profile?.weight_kg, 0);
    if (!profileWeightKg || !minutes) return 0;
    const workoutType = normalizeWorkoutType(workout?.workoutType);
    if (workoutType !== "strength") {
      const met = getWorkoutTypeMeta(workoutType).met || 3;
      return Math.max(0, Math.round((met * 3.5 * profileWeightKg / 200) * minutes));
    }
    const completedEntries = workout ? getCompletedSetsFromWorkout(workout) : [];
    const exercises = workout?.exercises || [];
    const weightedMet = completedEntries.length
      ? completedEntries.reduce((acc, set) => {
        const exercise = set.__exercise || {};
        const weight = Math.max(1, safeWorkoutNumber(set.reps, 1));
        return { total: acc.total + getStrengthMetForMuscleGroup(exercise.muscleGroup) * weight, weight: acc.weight + weight };
      }, { total: 0, weight: 0 })
      : exercises.reduce((acc, exercise) => {
        const weight = Math.max(1, (exercise.sets || []).length || 1);
        return { total: acc.total + getStrengthMetForMuscleGroup(exercise.muscleGroup) * weight, weight: acc.weight + weight };
      }, { total: 0, weight: 0 });
    const baseMet = weightedMet.weight ? weightedMet.total / weightedMet.weight : 3.4;
    const totalVolume = workout ? getWorkoutVolume(workout) : 0;
    const density = totalVolume > 0 ? totalVolume / Math.max(1, profileWeightKg * minutes) : 0;
    const volumeBump = Math.min(0.55, Math.max(0, (density - 1.1) * 0.14));
    const met = Math.max(2.8, Math.min(5.5, baseMet + volumeBump));
    return Math.max(0, Math.round((met * 3.5 * profileWeightKg / 200) * minutes));
  };

  const getWorkoutIncompleteSetCount = (workout) => (workout?.exercises || [])
    .flatMap(exercise => exercise.sets || [])
    .filter(set => getSetStatus(set) === "pending")
    .length;

  const pickTonnageAchievement = (volumeKg) => {
    const volume = Math.max(0, safeWorkoutNumber(volumeKg, 0));
    const options = [
      { max: 80, weight: 4, label: "кошки", single: "кошка" },
      { max: 200, weight: 10, label: "маленьких собак", single: "маленькая собака" },
      { max: 400, weight: 25, label: "больших собак", single: "большая собака" },
      { max: 700, weight: 80, label: "мужчин", single: "мужчина" },
      { max: 1500, weight: 200, label: "мотоциклов", single: "мотоцикл" },
      { max: 3000, weight: 1200, label: "маленьких автомобилей", single: "маленький автомобиль" },
      { max: 7000, weight: 5000, label: "слонов", single: "слон" },
      { max: 15000, weight: 12000, label: "автобусов", single: "автобус" },
      { max: 30000, weight: 25000, label: "вагонов метро", single: "вагон метро" },
      { max: 70000, weight: 60000, label: "локомотивов", single: "локомотив" },
      { max: Infinity, weight: 120000, label: "башенных кранов", single: "башенный кран" },
    ];
    const item = options.find(option => volume <= option.max) || options[options.length - 1];
    const count = Math.max(1, Math.round(volume / item.weight));
    const objectLabel = count === 1 ? item.single : item.label;
    return {
      title: count === 1 ? `Это как ${objectLabel}` : `Это как ${count} ${objectLabel}`,
      subtitle: `примерно ${Math.round(volume).toLocaleString("ru-RU")} кг поднятого тоннажа`,
    };
  };

  const formatAchievementDistance = (distanceKm) => {
    const value = Math.max(0, safeWorkoutNumber(distanceKm, 0));
    if (!value) return "";
    return value >= 10
      ? `${Math.round(value).toLocaleString("ru-RU")} км`
      : `${(Math.round(value * 10) / 10).toLocaleString("ru-RU")} км`;
  };

  const pickActivityAchievement = (workout, metrics = {}, totals = {}) => {
    const type = normalizeWorkoutType(workout?.workoutType);
    if (type === "strength") {
      const volume = Math.max(0, safeWorkoutNumber(totals.totalVolume, 0));
      return volume > 0 ? { label: "Ачивка тоннажа", ...pickTonnageAchievement(volume) } : null;
    }
    const durationMinutes = Math.max(0, safeWorkoutNumber(metrics.durationMinutes || (metrics.durationSeconds / 60), 0));
    const distanceKm = Math.max(0, safeWorkoutNumber(metrics.distanceKm ?? metrics.distance, 0));
    const caloriesValue = Math.max(0, safeWorkoutNumber(metrics.calories, 0));
    const practiceCount = (workout?.exercises || []).filter(exercise => getActivityDurationSeconds(exercise) > 0 || getActivityDistance(exercise) > 0 || estimateActivityCalories(exercise) > 0).length;

    if (type === "cardio") {
      if (distanceKm > 0) return {
        label: "Кардио-ачивка",
        title: `Дистанция ${formatAchievementDistance(distanceKm)}`,
        subtitle: `${Math.round(durationMinutes).toLocaleString("ru-RU")} мин движения · ${Math.round(caloriesValue).toLocaleString("ru-RU")} ккал`,
      };
      if (durationMinutes > 0) return {
        label: "Кардио-ачивка",
        title: `${Math.round(durationMinutes).toLocaleString("ru-RU")} мин кардио`,
        subtitle: `${Math.round(caloriesValue).toLocaleString("ru-RU")} ккал за тренировку`,
      };
      if (caloriesValue > 0) return {
        label: "Кардио-ачивка",
        title: `${Math.round(caloriesValue).toLocaleString("ru-RU")} ккал`,
        subtitle: "кардио-сессия сохранена",
      };
    }

    if (type === "yoga") {
      if (durationMinutes > 0) return {
        label: "Ачивка практики",
        title: `${Math.round(durationMinutes).toLocaleString("ru-RU")} мин йоги`,
        subtitle: practiceCount > 1 ? `${practiceCount} практики в сессии` : "практика сохранена",
      };
      if (practiceCount > 0) return {
        label: "Ачивка практики",
        title: `${practiceCount} ${practiceCount === 1 ? "практика" : "практики"}`,
        subtitle: "йога добавлена в историю",
      };
    }

    if (type === "pilates") {
      if (durationMinutes > 0) return {
        label: "Пилатес-ачивка",
        title: `${Math.round(durationMinutes).toLocaleString("ru-RU")} мин контроля`,
        subtitle: practiceCount > 1 ? `${practiceCount} блока пилатеса` : "сессия пилатеса сохранена",
      };
      if (practiceCount > 0) return {
        label: "Пилатес-ачивка",
        title: `${practiceCount} ${practiceCount === 1 ? "блок" : "блока"}`,
        subtitle: "пилатес добавлен в историю",
      };
    }

    if (type === "stretching") {
      if (durationMinutes > 0) return {
        label: "Ачивка растяжки",
        title: `${Math.round(durationMinutes).toLocaleString("ru-RU")} мин мобильности`,
        subtitle: practiceCount > 1 ? `${practiceCount} блока растяжки` : "растяжка сохранена",
      };
      if (practiceCount > 0) return {
        label: "Ачивка растяжки",
        title: "Растяжка сохранена",
        subtitle: `${practiceCount} ${practiceCount === 1 ? "запись" : "записи"} в тренировке`,
      };
    }

    return null;
  };

  const buildWorkoutCompletionSummary = (workout, durationSeconds, calories) => {
    const completedEntries = getCompletedSetsFromWorkout(workout);
    const totals = recalculateWorkoutTotals(workout);
    const exercises = workout?.exercises || [];
    const workoutType = normalizeWorkoutType(workout?.workoutType);
    const activityMetrics = workoutType === "strength"
      ? null
      : { ...getNonStrengthWorkoutMetrics(workout), durationSeconds, calories };
    const rirValues = completedEntries.map(set => optionalWorkoutNumber(set.rir)).filter(value => value !== null);
    const rpeValues = completedEntries.map(set => optionalWorkoutNumber(set.rpe)).filter(value => value !== null);
    const average = (values) => values.length ? Math.round((values.reduce((sum, value) => sum + value, 0) / values.length) * 10) / 10 : null;
    const muscleMap = completedEntries.filter(set => isStrengthStatsExercise(set.__exercise || {})).reduce((map, set) => {
      const exercise = set.__exercise || {};
      const group = exercise.muscleGroup || "Другое";
      if (!map[group]) map[group] = { muscleGroup: group, sets: 0, volume: 0 };
      map[group].sets += 1;
      map[group].volume += getSetVolumeForExercise(set, exercise);
      return map;
    }, {});
    const exerciseDetails = exercises.map(exercise => {
      const setList = exercise.sets || [];
      const completed = setList.filter(isCompletedSet);
      const volume = completed.reduce((sum, set) => sum + getSetVolumeForExercise(set, exercise), 0);
      const exerciseRir = completed.map(set => optionalWorkoutNumber(set.rir)).filter(value => value !== null);
      const exerciseRpe = completed.map(set => optionalWorkoutNumber(set.rpe)).filter(value => value !== null);
      return {
        id: exercise.id,
        name: exercise.name,
        muscleGroup: exercise.muscleGroup || "Другое",
        completedSets: completed.length,
        totalSets: setList.length,
        volume,
        averageRir: average(exerciseRir),
        averageRpe: average(exerciseRpe),
      };
    });

    return {
      workoutId: workout.id,
      title: workout.title || "Тренировка",
      completedAt: new Date().toISOString(),
      durationSeconds,
      durationMinutes: Math.max(1, Math.round(durationSeconds / 60)),
      calories,
      completedSets: totals.completedSets,
      totalSets: totals.totalSets,
      completedExercises: exercises.filter(exercise => getExerciseCompletion(exercise).done).length,
      totalExercises: exercises.length,
      volumeKg: totals.totalVolume,
      averageRir: average(rirValues),
      averageRpe: average(rpeValues),
      achievement: pickActivityAchievement(workout, activityMetrics || { durationSeconds, calories }, totals),
      muscles: Object.values(muscleMap).map(stat => ({
        ...stat,
        percent: totals.completedSets ? Math.round((stat.sets / totals.completedSets) * 100) : 0,
      })).sort((a, b) => b.sets - a.sets || b.volume - a.volume),
      exercises: exerciseDetails,
    };
  };

  const addExerciseToSelectedWorkout = (name, muscleGroup, sourceItem = {}) => {
    addExercisesToSelectedWorkout([{ ...sourceItem, name, muscleGroup }]);
  };

  const addExercisesToSelectedWorkout = async (items = []) => {
    if (!selectedWorkout) return;
    const completedByDefault = normalizeWorkoutStatus(selectedWorkout.status) === "completed";
    const completedAt = completedByDefault ? new Date().toISOString() : null;
    const selectedWorkoutType = normalizeWorkoutType(selectedWorkout.workoutType);
    const additions = items.map((item, index) => {
      const source = normalizeExerciseSourceItem(item);
      const sourceCategory = normalizeExerciseCategory(source.exerciseCategory, selectedWorkoutType);
      const defaultSets = selectedWorkoutType === "strength" && sourceCategory === "strength" ? [[0, 0], [0, 0], [0, 0]] : [[0, 0]];
      const exercise = makeExercise((selectedWorkout.exercises || []).length + index + 1, source.name, source.muscleGroup, defaultSets, completedByDefault, source);
      return {
        ...exercise,
        sets: (exercise.sets || []).map(set => ({
          ...set,
          completedAt,
          restSeconds: sourceCategory === "strength" ? set.restSeconds : 0,
          restAfterSeconds: sourceCategory === "strength" ? set.restAfterSeconds : 0,
          durationSeconds: sourceCategory === "strength" ? set.durationSeconds : 0,
          distanceValue: 0,
          manualCalories: null,
          estimatedCalories: 0,
        })),
        pending: canUseWorkoutApi,
        isSaving: canUseWorkoutApi,
        isSyncing: canUseWorkoutApi,
      };
    });

    if (canUseWorkoutApi && selectedWorkout.supabaseId) {
      const patch = (workout) => ({
        ...workout,
        exercises: [...(workout.exercises || []), ...additions],
        updatedAt: new Date().toISOString(),
      });
      setWorkouts(prev => prev.map(workout => workout.id === selectedWorkout.id ? patch(workout) : workout));
      setSelectedWorkout(prev => prev ? patch(prev) : prev);
      for (const exercise of additions) {
        const id = await createExerciseViaApi(selectedWorkout.id, selectedWorkout.supabaseId, exercise);
        if (!id) patchExerciseInState(selectedWorkout.id, exercise.id, item => ({ ...item, isSaving: false, isSyncing: false, syncError: true }));
      }
      const nextWorkout = patch(selectedWorkout);
      queueWorkoutPatch(selectedWorkout.id, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
        exercise_updates: (nextWorkout.exercises || []).map(buildExercisePatchPayload).filter(Boolean),
      }, { immediate: true });
      return;
    }

    const patch = (workout) => ({
      ...workout,
      exercises: [...(workout.exercises || []), ...additions],
      updatedAt: new Date().toISOString(),
    });

    setWorkouts(prev => prev.map(workout => workout.id === selectedWorkout.id ? patch(workout) : workout));
    setSelectedWorkout(prev => prev ? patch(prev) : prev);
  };

  const exercisePickerKey = (itemOrName, muscleGroup = "") => {
    const item = typeof itemOrName === "object" ? itemOrName : { name: itemOrName, muscleGroup };
    return `${item.sourceExerciseId || item.id || item.muscleGroup || item.group || muscleGroup}::${item.name || itemOrName}`;
  };

  const togglePendingExerciseAdd = (itemOrName, muscleGroup = "") => {
    const item = normalizeExerciseSourceItem(typeof itemOrName === "object" ? itemOrName : { name: itemOrName, muscleGroup });
    const key = exercisePickerKey(item);
    setPendingExerciseAdds(prev => prev.some(item => item.key === key)
      ? prev.filter(item => item.key !== key)
      : [...prev, { key, ...item }]);
  };

  const addPendingExercisesToWorkout = async () => {
    if (!pendingExerciseAdds.length) return;
    addExercisesToSelectedWorkout(pendingExerciseAdds);
    setPendingExerciseAdds([]);
    setIsExerciseBaseOpen(false);
  };

  const getActivitySet = (exercise = {}) => (exercise.sets || [])[0] || {};
  const getActivityDurationSeconds = (exercise = {}) => safeWorkoutNumber(getActivitySet(exercise).durationSeconds ?? getActivitySet(exercise).duration_seconds ?? getActivitySet(exercise).workTimeSeconds, 0);
  const getActivityDistance = (exercise = {}) => safeWorkoutNumber(getActivitySet(exercise).distanceValue ?? getActivitySet(exercise).distance_value, 0);
  const getActivityDistanceKm = (exercise = {}) => {
    const distance = getActivityDistance(exercise);
    const unit = normalizeDistanceUnit(exercise.distanceUnit ?? exercise.distance_unit ?? "km");
    return unit === "m" ? distance / 1000 : distance;
  };
  const estimateActivityCalories = (exercise = {}, set = getActivitySet(exercise), fallbackWorkoutType = selectedWorkout?.workoutType || "cardio") => {
    const manual = optionalWorkoutNumber(set.manualCalories ?? set.manual_calories);
    if (manual !== null) return Math.max(0, Math.round(manual));
    const seconds = safeWorkoutNumber(set.durationSeconds ?? set.duration_seconds ?? set.workTimeSeconds, 0);
    const workoutType = normalizeExerciseCategory(exercise.exerciseCategory, fallbackWorkoutType);
    return estimateWorkoutCalories(seconds, { workoutType, exercises: [exercise] });
  };
  const getNonStrengthWorkoutMetrics = (workout = selectedWorkout) => {
    const activities = workout?.exercises || [];
    const durationSeconds = activities.reduce((sum, exercise) => sum + getActivityDurationSeconds(exercise), 0);
    const distance = activities.reduce((sum, exercise) => sum + getActivityDistance(exercise), 0);
    const distanceKm = activities.reduce((sum, exercise) => sum + getActivityDistanceKm(exercise), 0);
    const calories = activities.reduce((sum, exercise) => sum + estimateActivityCalories(exercise, getActivitySet(exercise), workout?.workoutType), 0);
    return { durationSeconds, durationMinutes: Math.round(durationSeconds / 60), distance, distanceKm, calories };
  };
  const openNonStrengthActivityEditor = (exercise) => {
    if (!exercise) return;
    const set = getActivitySet(exercise);
    setNonStrengthActivityEditor({
      exerciseId: exercise.id,
      title: exercise.name,
      durationMinutes: String(Math.floor(getActivityDurationSeconds(exercise) / 60)),
      distanceValue: String(getActivityDistance(exercise) || ""),
      manualCalories: set.manualCalories ?? set.manual_calories ?? "",
    });
  };
  const saveNonStrengthActivityEditor = () => {
    if (!nonStrengthActivityEditor || !selectedWorkout) return;
    const durationSeconds = Math.max(0, Math.round(safeWorkoutNumber(nonStrengthActivityEditor.durationMinutes, 0) * 60));
    const distanceValue = Math.max(0, safeWorkoutNumber(nonStrengthActivityEditor.distanceValue, 0));
    const manualCalories = optionalWorkoutNumber(nonStrengthActivityEditor.manualCalories);
    updateSelectedWorkoutModel(workout => {
      const nextExercises = (workout.exercises || []).map(exercise => {
        if (exercise.id !== nonStrengthActivityEditor.exerciseId) return exercise;
        const currentSet = getActivitySet(exercise);
        const nextSet = {
          ...currentSet,
          order: currentSet.order || 1,
          status: normalizeWorkoutStatus(workout.status) === "planned" ? "pending" : "completed",
          isCompleted: normalizeWorkoutStatus(workout.status) !== "planned",
          durationSeconds,
          workTimeSeconds: durationSeconds,
          distanceValue,
          manualCalories,
          estimatedCalories: manualCalories ?? estimateWorkoutCalories(durationSeconds, { workoutType: normalizeExerciseCategory(exercise.exerciseCategory, workout.workoutType), exercises: [exercise] }),
        };
        return {
          ...exercise,
          sets: [nextSet],
        };
      });
      const nextWorkout = { ...workout, exercises: nextExercises };
      const metrics = getNonStrengthWorkoutMetrics(nextWorkout);
      return {
        ...nextWorkout,
        durationMinutes: metrics.durationMinutes || workout.durationMinutes || 0,
        calories: metrics.calories,
        estimatedCaloriesBurned: metrics.calories,
        updatedAt: new Date().toISOString(),
      };
    }, { immediate: true });
    setNonStrengthActivityEditor(null);
  };

  const setWorkoutSetCompletionState = (workout, completed = false) => {
    const completedAt = completed ? new Date().toISOString() : null;
    return normalizeWorkoutSupersetMetadata({
      ...workout,
      exercises: (workout.exercises || []).map(exercise => ({
        ...exercise,
        sets: (exercise.sets || []).map(set => ({
          ...set,
          status: completed ? "completed" : "pending",
          isCompleted: completed,
          completedAt,
        })),
      })),
    });
  };

  const getFirstWorkoutTarget = (workout) => {
    const exercise = (workout?.exercises || [])[0] || null;
    return {
      exerciseIndex: 0,
      setId: getFirstActiveSetId(exercise),
    };
  };

  const startWorkout = (workout) => {
    if (!workout) return;
    const startedAt = new Date().toISOString();
    const patch = (item) => ({
      ...setWorkoutSetCompletionState(item, false),
      status: "active",
      durationMinutes: 0,
      totalVolumeKg: 0,
      calories: 0,
      estimatedCaloriesBurned: 0,
      startedAt,
      autoStoppedAt: null,
      updatedAt: new Date().toISOString(),
    });
    const nextWorkout = patch(workout);
    const firstTarget = getFirstWorkoutTarget(nextWorkout);
    setWorkouts(prev => prev.map(item => item.id === workout.id ? patch(item) : item));
    setSelectedWorkout(nextWorkout);
    setWorkoutViewMode("exercise");
    setActiveExerciseIndex(firstTarget.exerciseIndex);
    setActiveSetId(firstTarget.setId);
    setElapsedWorkoutTime(0);
    setRestTimer(null);
    restAdvanceRef.current = null;
    if (nextWorkout.supabaseId) {
      queueWorkoutPatch(nextWorkout.id, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
        set_updates: (nextWorkout.exercises || []).flatMap(exercise => (exercise.sets || []).map(buildSetPatchPayload).filter(Boolean)),
      }, { immediate: true });
    }
  };

  const openRepeatSheet = (workout) => {
    setRepeatSheetWorkout(workout);
    setDetailMenuOpen(false);
    setWeekMenuGroup(null);
  };

  const buildWorkoutDateTimeIso = (dateKey, hour = 0, minute = 0) => {
    const date = parseDateKey(dateKey || selectedDateKey);
    date.setHours(Number(hour || 0), Number(minute || 0), 0, 0);
    return date.toISOString();
  };

  const padTimePart = (value) => String(Math.max(0, safeWorkoutNumber(value, 0))).padStart(2, "0");
  const clampDurationMinutes = (minutes) => Math.min(24 * 60, Math.max(0, Math.round(safeWorkoutNumber(minutes, 0))));
  const durationPartsFromMinutes = (minutes) => {
    const safe = clampDurationMinutes(minutes);
    return {
      hours: String(Math.floor(safe / 60)),
      minutes: String(safe % 60),
    };
  };
  const schedulerDurationMinutes = (scheduler = repeatScheduler) => {
    const hours = Math.max(0, safeWorkoutNumber(scheduler?.durationHours, 0));
    const minutes = Math.max(0, safeWorkoutNumber(scheduler?.durationMinutes, 0));
    return clampDurationMinutes(hours >= 24 ? 24 * 60 : hours * 60 + minutes);
  };

  const updateRepeatSchedulerField = (key, value) => {
    setRepeatScheduler(prev => prev ? ({ ...prev, [key]: value }) : prev);
  };

  const updateRepeatSchedulerDurationHours = (value) => {
    const hour = Math.min(24, Math.max(0, safeWorkoutNumber(value, 0)));
    setRepeatScheduler(prev => prev ? ({
      ...prev,
      durationHours: String(hour),
      durationMinutes: hour >= 24 ? "0" : String(Math.min(59, safeWorkoutNumber(prev.durationMinutes, 0))),
    }) : prev);
  };

  const updateRepeatSchedulerDurationMinutes = (value) => {
    setRepeatScheduler(prev => {
      if (!prev) return prev;
      const hours = Math.min(24, Math.max(0, safeWorkoutNumber(prev.durationHours, 0)));
      return {
        ...prev,
        durationMinutes: hours >= 24 ? "0" : String(Math.min(59, Math.max(0, safeWorkoutNumber(value, 0)))),
      };
    });
  };

  const openRepeatScheduler = (workout, mode) => {
    const now = new Date();
    const durationParts = durationPartsFromMinutes(safeWorkoutNumber(workout?.durationMinutes, 60));
    setRepeatSheetWorkout(null);
    setRepeatScheduler({
      workout,
      mode,
      workoutType: normalizeWorkoutType(workout?.workoutType),
      dateKey: formatDateKey(now),
      hour: String(now.getHours()).padStart(2, "0"),
      minute: String(now.getMinutes()).padStart(2, "0"),
      durationHours: durationParts.hours,
      durationMinutes: durationParts.minutes,
    });
  };

  const openWorkoutTypePicker = (mode) => {
    setIsAddMenuOpen(false);
    setWorkoutTypePicker({ mode });
  };

  const openPlanWorkoutScheduler = (workoutType = "strength") => {
    const now = new Date();
    setIsAddMenuOpen(false);
    setWorkoutTypePicker(null);
    setRepeatScheduler({
      workout: null,
      mode: "new_planned",
      workoutType: normalizeWorkoutType(workoutType),
      dateKey: selectedDateKey || formatDateKey(now),
      hour: String(now.getHours()).padStart(2, "0"),
      minute: String(now.getMinutes()).padStart(2, "0"),
      durationHours: "0",
      durationMinutes: "0",
    });
  };

  const openCompletedWorkoutScheduler = (workoutType = "strength") => {
    const now = new Date();
    const durationParts = durationPartsFromMinutes(45);
    setIsAddMenuOpen(false);
    setWorkoutTypePicker(null);
    setRepeatScheduler({
      workout: null,
      mode: "new_completed",
      workoutType: normalizeWorkoutType(workoutType),
      dateKey: selectedDateKey || formatDateKey(now),
      hour: String(now.getHours()).padStart(2, "0"),
      minute: String(now.getMinutes()).padStart(2, "0"),
      durationHours: durationParts.hours,
      durationMinutes: durationParts.minutes,
    });
  };

  const getSchedulerActionLabel = (mode) => {
    if (mode === "completed" || mode === "new_completed") return "Добавить выполненную";
    if (mode === "new_planned") return "Добавить запланированную";
    if (mode === "planned") return "Запланировать";
    return "Начать";
  };

  const getSchedulerEyebrow = (mode) => {
    if (mode === "completed" || mode === "new_completed") return "Выполненная";
    if (mode === "new_planned") return "Новая тренировка";
    return "План";
  };

  const SchedulerWheelColumn = ({ label, value, options = [], onChange, className = "", size = "large" }) => {
    const scrollRef = useRef(null);
    const settleTimerRef = useRef(null);
    const itemHeight = size === "small" ? 44 : 52;
    const repeatCount = options.length > 1 ? 9 : 1;
    const centerRepeat = Math.floor(repeatCount / 2);
    const selectedIndex = Math.max(0, options.findIndex(option => String(option.value) === String(value)));
    const wheelOptions = useMemo(() => {
      if (!options.length) return [];
      return Array.from({ length: options.length * repeatCount }, (_, virtualIndex) => {
        const baseIndex = virtualIndex % options.length;
        return { ...options[baseIndex], baseIndex, virtualIndex };
      });
    }, [options, repeatCount]);

    const scrollToIndex = (index, behavior = "auto") => {
      const node = scrollRef.current;
      if (!node || index < 0) return;
      node.scrollTo({ top: index * itemHeight, behavior });
    };

    const readCenteredOption = () => {
      const node = scrollRef.current;
      if (!node || !wheelOptions.length) return null;
      const virtualIndex = Math.max(0, Math.min(wheelOptions.length - 1, Math.round(node.scrollTop / itemHeight)));
      return wheelOptions[virtualIndex] || null;
    };

    const normalizeScrollPosition = (option) => {
      if (!option || options.length <= 1) return;
      const centeredIndex = centerRepeat * options.length + option.baseIndex;
      window.setTimeout(() => scrollToIndex(centeredIndex, "auto"), 130);
    };

    const commitCenteredOption = (behavior = "smooth") => {
      const option = readCenteredOption();
      if (!option) return;
      scrollToIndex(option.virtualIndex, behavior);
      if (String(option.value) !== String(value)) onChange(option.value);
      normalizeScrollPosition(option);
    };

    const handleScroll = () => {
      window.clearTimeout(settleTimerRef.current);
      settleTimerRef.current = window.setTimeout(() => commitCenteredOption("smooth"), 110);
    };

    useEffect(() => {
      if (!options.length) return undefined;
      scrollToIndex(centerRepeat * options.length + selectedIndex, "auto");
      return () => {
        window.clearTimeout(settleTimerRef.current);
      };
    }, [options, selectedIndex, centerRepeat, itemHeight]);

    return <div className={`onlypump-field-surface rounded-[24px] bg-black/28 p-3 ${className}`}>
      <div className="mb-2 text-center text-[10px] font-bold uppercase tracking-[0.16em] text-zinc-500">{label}</div>
      <div
        ref={scrollRef}
        data-no-sheet-drag="true"
        className="onlypump-wheel-scroll relative rounded-2xl"
        onScroll={handleScroll}
        style={{ "--onlypump-wheel-item-height": `${itemHeight}px`, height: `${itemHeight * 3}px`, paddingTop: `${itemHeight}px`, paddingBottom: `${itemHeight}px` }}
      >
        <div className="onlypump-wheel-center" />
        {wheelOptions.map(option => {
          const selected = String(option.value) === String(value);
          return <button
            key={`${option.value}-${option.virtualIndex}`}
            type="button"
            onClick={() => { onChange(option.value); scrollToIndex(option.virtualIndex, "smooth"); normalizeScrollPosition(option); }}
            className={`onlypump-wheel-item relative z-10 flex w-full items-center justify-center rounded-2xl px-2 text-center text-base font-black transition ${selected ? "onlypump-wheel-selected text-red-100" : "text-zinc-500"}`}
            style={{ height: `${itemHeight}px` }}
          >
            {option.label}
          </button>;
        })}
      </div>
    </div>;
  };

  const schedulerDateOptions = () => Array.from({ length: 121 }, (_, index) => {
    const offset = index - 60;
    const date = addLocalDays(parseDateKey(formatDateKey(new Date())), offset);
    const key = toDateKey(date);
    return { value: key, label: formatDayMonth(date) };
  });
  const schedulerHourOptions = () => Array.from({ length: 24 }, (_, hour) => ({ value: padTimePart(hour), label: padTimePart(hour) }));
  const schedulerMinuteOptions = () => Array.from({ length: 60 }, (_, minute) => ({ value: padTimePart(minute), label: padTimePart(minute) }));
  const schedulerDurationHourOptions = () => Array.from({ length: 25 }, (_, hour) => ({ value: String(hour), label: String(hour) }));
  const schedulerDurationMinuteOptions = (hours) => {
    const maxed = safeWorkoutNumber(hours, 0) >= 24;
    const length = maxed ? 1 : 60;
    return Array.from({ length }, (_, minute) => ({ value: String(minute), label: padTimePart(minute) }));
  };

  const createPlannedWorkoutFromScheduler = async (scheduler) => {
    if (!scheduler) return;
    const startedAt = buildWorkoutDateTimeIso(scheduler.dateKey, scheduler.hour, scheduler.minute);
    setRepeatScheduler(null);
    await addWorkoutForDate({
      dateKey: scheduler.dateKey,
      title: "Запланированная тренировка",
      status: "planned",
      workoutType: scheduler.workoutType || "strength",
      durationMinutes: 0,
      calories: 0,
      exercises: [],
      startedAt,
    });
  };

  const createCompletedWorkoutFromScheduler = async (scheduler) => {
    if (!scheduler) return;
    const durationMinutes = Math.max(1, schedulerDurationMinutes(scheduler));
    const startedAt = buildWorkoutDateTimeIso(scheduler.dateKey, scheduler.hour, scheduler.minute);
    const workoutType = normalizeWorkoutType(scheduler.workoutType);
    const calories = estimateWorkoutCalories(durationMinutes * 60, { workoutType, exercises: [] });
    setRepeatScheduler(null);
    await addWorkoutForDate({
      dateKey: scheduler.dateKey,
      title: "Выполненная тренировка",
      status: "completed",
      workoutType,
      durationMinutes,
      totalVolumeKg: 0,
      calories,
      estimatedCaloriesBurned: calories,
      exercises: [],
      startedAt,
      finishedAt: startedAt,
    });
  };

  const confirmRepeatScheduler = () => {
    if (!repeatScheduler) return;
    if (repeatScheduler.mode === "new_planned") {
      createPlannedWorkoutFromScheduler(repeatScheduler);
      return;
    }
    if (repeatScheduler.mode === "new_completed") {
      createCompletedWorkoutFromScheduler(repeatScheduler);
      return;
    }
    repeatWorkout(repeatScheduler.workout, {
      mode: repeatScheduler.mode,
      dateKey: repeatScheduler.dateKey,
      hour: repeatScheduler.hour,
      minute: repeatScheduler.minute,
      durationMinutes: schedulerDurationMinutes(repeatScheduler),
    });
  };

  const repeatWorkout = async (workout, options = {}) => {
    const mode = options.mode || "now";
    const targetDateKey = mode === "now" ? formatDateKey(new Date()) : (options.dateKey || selectedDateKey);
    const status = mode === "planned" ? "planned" : mode === "completed" ? "completed" : "active";
    const workoutType = normalizeWorkoutType(workout?.workoutType);
    const startedAt = mode === "now"
      ? new Date().toISOString()
      : buildWorkoutDateTimeIso(targetDateKey, options.hour, options.minute);
    const durationMinutes = mode === "completed"
      ? Math.max(1, clampDurationMinutes(safeWorkoutNumber(options.durationMinutes, workout.durationMinutes || 60)))
      : 0;
    const repeatedExercises = cloneExercisesForRepeat(workout.exercises || [], mode === "completed");
    const estimatedCalories = mode === "completed" ? estimateWorkoutCalories(durationMinutes * 60, { workoutType, exercises: repeatedExercises }) : 0;
    const repeatedTotals = recalculateWorkoutTotals({ exercises: repeatedExercises });
    const copy = makeWorkout(targetDateKey, {
      title: workout.title,
      programDayNumber: workout.programDayNumber,
      durationMinutes,
      totalVolumeKg: mode === "completed" ? repeatedTotals.totalVolume : 0,
      calories: estimatedCalories,
      estimatedCaloriesBurned: estimatedCalories,
      workoutType,
      status,
      startedAt,
      exercises: repeatedExercises,
      notes: workout.notes,
      templateId: workout.templateId,
    });
    if (mode === "completed") copy.finishedAt = startedAt;

    setRepeatSheetWorkout(null);
    setRepeatScheduler(null);
    if (canUseWorkoutApi) {
      const pendingWorkout = { ...copy, pending: true, isSaving: true, isSyncing: true };
      setWorkouts(prev => [pendingWorkout, ...prev]);
      if (mode === "now") {
        const firstTarget = getFirstWorkoutTarget(pendingWorkout);
        setSelectedWorkout(pendingWorkout);
        setWorkoutViewMode("exercise");
        setActiveExerciseIndex(firstTarget.exerciseIndex);
        setActiveSetId(firstTarget.setId);
        setElapsedWorkoutTime(0);
        setRestTimer(null);
        restAdvanceRef.current = null;
      }
      const id = await createWorkoutTreeViaApi(pendingWorkout);
      if (!id) patchWorkoutInState(pendingWorkout.id, item => ({ ...item, isSaving: false, isSyncing: false, syncError: true }));
      return;
    }

    setWorkouts(prev => [copy, ...prev]);
    if (mode === "now") {
      const firstTarget = getFirstWorkoutTarget(copy);
      setSelectedWorkout(copy);
      setWorkoutViewMode("exercise");
      setActiveExerciseIndex(firstTarget.exerciseIndex);
