  const createWorkoutFromTypePicker = async (workoutType) => {
    const type = normalizeWorkoutType(workoutType);
    const mode = workoutTypePicker?.mode;
    setWorkoutTypePicker(null);
    if (mode === "planned") {
      openPlanWorkoutScheduler(type);
      return;
    }
    if (mode === "completed") {
      openCompletedWorkoutScheduler(type);
      return;
    }
    const meta = getWorkoutTypeMeta(type);
    await addWorkoutForDate({
      title: type === "strength" ? "Пустая тренировка" : meta.title,
      status: "active",
      workoutType: type,
      durationMinutes: 0,
      totalVolumeKg: 0,
      calories: 0,
      estimatedCaloriesBurned: 0,
      exercises: [],
      startedAt: new Date().toISOString(),
    });
  };

  const getProgramWorkoutKey = (workout = {}) => workout.userProgramId || workout.userProgramClientId || null;
  const getProgramExerciseProgressionKey = (exercise = {}) => (
    exercise.userProgramExerciseSettingId
    || exercise.userProgramExerciseSettingClientId
    || exercise.programTemplateExerciseKey
    || `${exercise.name}-${exercise.muscleGroup}`
  );

  const getBestCompletedProgramSet = (exercise = {}) => {
    const completedSets = (exercise.sets || []).filter(set => getSetStatus(set) === "completed");
    if (!completedSets.length) return null;
    return completedSets.reduce((best, set) => {
      const currentScore = safeWorkoutNumber(set.weight) * 1000 + safeWorkoutNumber(set.reps);
      const bestScore = safeWorkoutNumber(best.weight) * 1000 + safeWorkoutNumber(best.reps);
      return currentScore >= bestScore ? set : best;
    }, completedSets[0]);
  };

  const advanceProgramTarget = (target, state = {}) => {
    const repMin = Number(state.repMin || target.reps || 8);
    const repMax = Math.max(repMin, Number(state.repMax || repMin + 4));
    const repStep = Math.max(1, Number(state.repStep || state.progressionRepStep || 1));
    const weightStep = Math.max(0, Number(state.weightStep || state.progressionWeightStep || 0));
    if (Number(target.reps || 0) >= repMax) {
      return { weight: Math.max(0, Number(target.weight || 0) + weightStep), reps: repMin };
    }
    return { weight: Math.max(0, Number(target.weight || 0)), reps: Math.min(repMax, Number(target.reps || repMin) + repStep) };
  };

  const getNextProgramTargetFromCompletedExercise = (exercise = {}) => {
    const state = exercise.progressionState || {};
    const repMin = Number(exercise.plannedRepMin ?? state.repMin ?? 8);
    const repMax = Math.max(repMin, Number(exercise.plannedRepMax ?? state.repMax ?? 12));
    const plannedReps = Number(exercise.plannedReps ?? state.plannedReps ?? repMin);
    const plannedWeight = Number(exercise.plannedWeight ?? state.plannedWeight ?? 0);
    const repStep = Math.max(1, Number(state.repStep || state.progressionRepStep || 1));
    const weightStep = Math.max(0, Number(state.weightStep || state.progressionWeightStep || 0));
    const threshold = Math.max(1, Number(state.regressionThresholdSessions || 2));
    const bestSet = getBestCompletedProgramSet(exercise);
    if (!bestSet) return { weight: plannedWeight, reps: plannedReps, state: { ...state, missedSessions: Number(state.missedSessions || 0) + 1 } };
    const actualWeight = safeWorkoutNumber(bestSet.weight, plannedWeight);
    const actualReps = safeWorkoutNumber(bestSet.reps, plannedReps);
    const success = actualReps >= plannedReps;
    if (success) {
      const next = actualReps >= repMax
        ? { weight: Math.max(0, actualWeight + weightStep), reps: repMin }
        : { weight: Math.max(0, actualWeight), reps: Math.min(repMax, actualReps + repStep) };
      return { ...next, state: { ...state, missedSessions: 0, lastActualWeight: actualWeight, lastActualReps: actualReps } };
    }
    const missedSessions = Number(state.missedSessions || 0) + 1;
    if (missedSessions >= threshold) {
      const nextWeight = plannedReps <= repMin ? Math.max(0, plannedWeight - weightStep) : plannedWeight;
      return { weight: nextWeight, reps: repMin, state: { ...state, missedSessions: 0, lastActualWeight: actualWeight, lastActualReps: actualReps, deloadApplied: true } };
    }
    return { weight: plannedWeight, reps: plannedReps, state: { ...state, missedSessions, lastActualWeight: actualWeight, lastActualReps: actualReps } };
  };

  const applyProgramTargetToExercise = (exercise, target) => {
    const nextState = {
      ...(exercise.progressionState || {}),
      ...(target.state || {}),
      plannedWeight: target.weight,
      plannedReps: target.reps,
    };
    return {
      ...exercise,
      plannedWeight: target.weight,
      plannedReps: target.reps,
      progressionState: nextState,
      sets: (exercise.sets || []).map(set => getSetStatus(set) === "completed" ? set : ({
        ...set,
        weight: target.weight,
        reps: target.reps,
        weightValue: target.weight,
        repsValue: target.reps,
      })),
    };
  };

  const adaptProgramProgressionAfterCompletion = (completedWorkout) => {
    const programKey = getProgramWorkoutKey(completedWorkout);
    if (!programKey) return;
    const completedDateTime = parseDateKey(completedWorkout.date).getTime();
    const currentWorkouts = workoutsRef.current.map(item => item.id === completedWorkout.id ? completedWorkout : item);
    const seeds = {};
    currentWorkouts
      .filter(item => getProgramWorkoutKey(item) === programKey && item.status === "completed")
      .sort((a, b) => parseDateKey(a.date).getTime() - parseDateKey(b.date).getTime())
      .forEach(workout => {
        (workout.exercises || []).forEach(exercise => {
          const key = getProgramExerciseProgressionKey(exercise);
          const target = getNextProgramTargetFromCompletedExercise(exercise);
          if (target) seeds[key] = target;
        });
      });

    const changed = [];
    const nextWorkouts = currentWorkouts
      .slice()
      .sort((a, b) => parseDateKey(a.date).getTime() - parseDateKey(b.date).getTime())
      .map(workout => {
        const isFutureProgramWorkout = getProgramWorkoutKey(workout) === programKey
          && workout.status === "planned"
          && parseDateKey(workout.date).getTime() > completedDateTime;
        if (!isFutureProgramWorkout) return workout;
        let touched = false;
        const nextWorkout = {
          ...workout,
          exercises: (workout.exercises || []).map(exercise => {
            const key = getProgramExerciseProgressionKey(exercise);
            const seed = seeds[key];
            if (!seed) return exercise;
            touched = true;
            const nextExercise = applyProgramTargetToExercise(exercise, seed);
            seeds[key] = {
              ...advanceProgramTarget(seed, nextExercise.progressionState),
              state: nextExercise.progressionState,
            };
            return nextExercise;
          }),
        };
        if (touched) changed.push(nextWorkout);
        return nextWorkout;
      });

    if (!changed.length) return;
    const nextById = new Map(nextWorkouts.map(item => [item.id, item]));
    setWorkouts(prev => prev.map(item => nextById.get(item.id) || item));
    setSelectedWorkout(prev => prev ? (nextById.get(prev.id) || prev) : prev);
    changed.forEach(workout => {
      const patch = buildWorkoutTreePatch(workout);
      if (patch) queueWorkoutPatch(workout.id, patch, { immediate: true });
    });
  };

  const saveCompletedWorkoutInBackground = async (workout, patch = buildWorkoutTreePatch(workout)) => {
    if (!workout?.supabaseId || !patch) {
      completionSaveRef.current = null;
      setCompletionSaving(false);
      return null;
    }

    completionSaveRef.current = { workout, patch };
    setCompletionSaving(true);
    setCompletionSaveError(null);
    patchWorkoutInState(workout.id, item => ({ ...item, isSaving: true, isSyncing: true, syncError: false, pendingPatch: patch }));

    try {
      clearWorkoutSaveQueue(workout.id);
      const saved = await sendWorkoutPatch(workout.id, patch);
      if (!saved) throw new Error("save_workout_patch returned empty response");
      completionSaveRef.current = null;
      setCompletionSaving(false);
      setCompletionSaveError(null);
      patchWorkoutInState(workout.id, item => ({
        ...item,
        isDirty: false,
        isSaving: false,
        isSyncing: false,
        syncError: false,
        pendingPatch: null,
        lastSavedAt: new Date().toISOString(),
      }));
      return saved;
    } catch (error) {
      console.error("Supabase workout error", error);
      setCompletionSaving(false);
      setCompletionSaveError("Не удалось сохранить. Повторить?");
      patchWorkoutInState(workout.id, item => ({ ...item, isSaving: false, isSyncing: false, syncError: true, pendingPatch: patch }));
      return null;
    }
  };

    const durationMinutes = Math.max(0, Math.round(durationSeconds / 60));

      durationMinutes,

    const calories = estimateWorkoutCalories(durationSeconds, baseCompletedWorkout);

const getFoodSearchText = (foodItem) => [foodItem.name, foodItem.category, ...(foodItem.synonyms || [])].join(" ").toLowerCase().replace(/ё/g, "е");
const calculateNutritionItemTotals = (foodItem, grams = foodItem?.default_grams || 100, selectedModifierIds = []) => {
  const ratio = Math.max(0, Number(grams || 0)) / 100;
  const selected = new Set(selectedModifierIds || []);
  const modifierTotals = (foodItem?.modifiers || []).filter(modifier => selected.has(modifier.id)).reduce((acc, modifier) => ({
    calories: acc.calories + Number(modifier.calories || 0),
    protein: acc.protein + Number(modifier.protein || 0),
    fat: acc.fat + Number(modifier.fat || 0),
    carbs: acc.carbs + Number(modifier.carbs || 0),
  }), { calories: 0, protein: 0, fat: 0, carbs: 0 });
  return {
    calories: Math.max(0, roundCalories(Number(foodItem?.calories_per_100 || 0) * ratio + modifierTotals.calories)),
    protein: Math.max(0, roundMacro(Number(foodItem?.protein_per_100 || 0) * ratio + modifierTotals.protein)),
    fat: Math.max(0, roundMacro(Number(foodItem?.fat_per_100 || 0) * ratio + modifierTotals.fat)),
    carbs: Math.max(0, roundMacro(Number(foodItem?.carbs_per_100 || 0) * ratio + modifierTotals.carbs)),
  };
};

const buildNutritionPayloadFromFood = (foodItem, grams, selectedModifierIds, notes = "") => {
  const totals = calculateNutritionItemTotals(foodItem, grams, selectedModifierIds);
  return {
    food_key: foodItem.key,
    food_name: foodItem.name,
    food_category: foodItem.category,
    serving_grams: Number(grams || 0),
    base_calories_per_100: Number(foodItem.calories_per_100 || 0),
    base_protein_per_100: Number(foodItem.protein_per_100 || 0),
    base_fat_per_100: Number(foodItem.fat_per_100 || 0),
    base_carbs_per_100: Number(foodItem.carbs_per_100 || 0),
    selected_modifiers: (foodItem.modifiers || []).filter(modifier => selectedModifierIds.includes(modifier.id)),
    calories_total: totals.calories,
    protein_total: totals.protein,
    fat_total: totals.fat,
    carbs_total: totals.carbs,
    notes,
  };
};

const getNutritionDayTotalsFromMeals = (meals = []) => meals.reduce((acc, meal) => ({
  calories: acc.calories + Number(meal.calories || 0),
  protein: acc.protein + Number(meal.protein || 0),
  fat: acc.fat + Number(meal.fat || 0),
  carbs: acc.carbs + Number(meal.carbs || 0),
}), { calories: 0, protein: 0, fat: 0, carbs: 0 });

const normalizeNutritionDay = (result = {}, fallbackDate = formatDateKey(new Date()), fallbackGoal = initialNutritionGoal) => {
  const day = result.nutrition_day || result.day || result || {};
  const rawMeals = result.nutrition_meals || result.meals || [];
  const mealsByType = new Map(rawMeals.map(meal => [meal.meal_type || meal.type, mapNutritionMeal(meal)]));
  const meals = nutritionMealTypes.map(def => mealsByType.get(def.type) || mapNutritionMeal({
    meal_type: def.type,
    meal_title: def.title,
    meal_order: def.order,
    nutrition_items: [],
  }));
  const computedTotals = getNutritionDayTotalsFromMeals(meals);
  const hasMealItems = meals.some(meal => (meal.items || []).length > 0);
  const manualEntryEnabled = Boolean(day.manual_entry_enabled ?? day.manualEntryEnabled) && !hasMealItems;
  const manualTotals = {
    calories: roundCalories(day.manual_calories_total ?? day.manualCaloriesTotal ?? 0),
    protein: roundMacro(day.manual_protein_total ?? day.manualProteinTotal ?? 0),
    fat: roundMacro(day.manual_fat_total ?? day.manualFatTotal ?? 0),
    carbs: roundMacro(day.manual_carbs_total ?? day.manualCarbsTotal ?? 0),
  };
  const displayTotals = manualEntryEnabled ? manualTotals : {
    calories: roundCalories(day.calories_total ?? day.totals?.calories ?? computedTotals.calories),
    protein: roundMacro(day.protein_total ?? day.totals?.protein ?? computedTotals.protein),
    fat: roundMacro(day.fat_total ?? day.totals?.fat ?? computedTotals.fat),
    carbs: roundMacro(day.carbs_total ?? day.totals?.carbs ?? computedTotals.carbs),
  };
  const explicitCaloriesTarget = day.calories_target ?? day.goal?.calories;
  const caloriesTarget = Number(explicitCaloriesTarget ?? fallbackGoal.calories ?? initialNutritionGoal.calories);
  return {
    id: day.id || null,
    date: day.nutrition_date || day.date || fallbackDate,
    manual_entry_enabled: manualEntryEnabled,
    manualEntryEnabled,
    manual_calories_total: manualTotals.calories,
    manual_protein_total: manualTotals.protein,
    manual_fat_total: manualTotals.fat,
    manual_carbs_total: manualTotals.carbs,
    manual_entry_updated_at: day.manual_entry_updated_at || day.manualEntryUpdatedAt || null,
    calories_target: explicitCaloriesTarget != null ? Number(explicitCaloriesTarget) : null,
    goal: {
      calories: caloriesTarget,
      protein: Number(day.protein_target ?? day.goal?.protein ?? fallbackGoal.protein ?? initialNutritionGoal.protein),
      fat: Number(day.fat_target ?? day.goal?.fat ?? fallbackGoal.fat ?? initialNutritionGoal.fat),
      carbs: Number(day.carbs_target ?? day.goal?.carbs ?? fallbackGoal.carbs ?? initialNutritionGoal.carbs),
    },
    totals: displayTotals,
    meals,
    favorites: (result.favorites || []).map(favorite => ({ id: favorite.id, foodKey: favorite.food_key, foodSnapshot: favorite.food_snapshot || {} })),
    recentFoods: (result.recent_foods || []).map(mapNutritionItem),
    frequentFoods: (result.frequent_foods || []).map(item => ({ ...mapNutritionItem(item), useCount: item.use_count || item.useCount || 0 })),
    markedDateKeys: getNutritionFilledDateKeys(result),
  };
};

const buildLocalNutritionDay = (dateKey = formatDateKey(new Date()), goal = initialNutritionGoal) => normalizeNutritionDay({
  nutrition_day: {
    nutrition_date: dateKey,
    calories_target: goal.calories,
    protein_target: goal.protein,
    fat_target: goal.fat,
    carbs_target: goal.carbs,
  },
  nutrition_meals: nutritionMealTypes.map(def => ({ meal_type: def.type, meal_title: def.title, meal_order: def.order, nutrition_items: [] })),
}, dateKey, goal);

const recalculateNutritionDayLocal = (day) => {
  const meals = (day?.meals || []).map(meal => {
    const totals = (meal.items || []).reduce((acc, item) => ({
      calories: acc.calories + Number(item.calories || 0),
      protein: acc.protein + Number(item.protein || 0),
      fat: acc.fat + Number(item.fat || 0),
      carbs: acc.carbs + Number(item.carbs || 0),
    }), { calories: 0, protein: 0, fat: 0, carbs: 0 });
    return { ...meal, calories: roundCalories(totals.calories), protein: roundMacro(totals.protein), fat: roundMacro(totals.fat), carbs: roundMacro(totals.carbs) };
  });
  const totals = getNutritionDayTotalsFromMeals(meals);
  const hasMealItems = meals.some(meal => (meal.items || []).length > 0);
  const manualEntryEnabled = Boolean(day?.manual_entry_enabled || day?.manualEntryEnabled) && !hasMealItems;
  const manualTotals = {
    calories: roundCalories(day?.manual_calories_total ?? day?.manualCaloriesTotal ?? 0),
    protein: roundMacro(day?.manual_protein_total ?? day?.manualProteinTotal ?? 0),
    fat: roundMacro(day?.manual_fat_total ?? day?.manualFatTotal ?? 0),
    carbs: roundMacro(day?.manual_carbs_total ?? day?.manualCarbsTotal ?? 0),
  };
  const displayTotals = manualEntryEnabled ? manualTotals : {
    calories: roundCalories(totals.calories),
    protein: roundMacro(totals.protein),
    fat: roundMacro(totals.fat),
    carbs: roundMacro(totals.carbs),
  };
  return {
    ...day,
    manual_entry_enabled: manualEntryEnabled,
    manualEntryEnabled,
    manual_calories_total: manualTotals.calories,
    manual_protein_total: manualTotals.protein,
    manual_fat_total: manualTotals.fat,
    manual_carbs_total: manualTotals.carbs,
    meals,
    totals: displayTotals,
    markedDateKeys: mergeNutritionMarkerKeys(day?.markedDateKeys || [], day?.date, manualEntryEnabled ? displayTotals.calories > 0 : (totals.calories > 0 || hasMealItems)),
  };
};

const snapshotFoodFromPayload = (item = {}) => ({
  key: item.food_key || item.foodKey || item.key || normalizeFoodKey(item.food_name || item.foodName || item.name || "product"),
  name: item.food_name || item.foodName || item.name || "Продукт",
  category: item.food_category || item.foodCategory || item.category || "На глаз",
  calories_per_100: Number(item.base_calories_per_100 ?? item.baseCaloriesPer100 ?? item.calories_per_100 ?? 0),
  protein_per_100: Number(item.base_protein_per_100 ?? item.baseProteinPer100 ?? item.protein_per_100 ?? 0),
  fat_per_100: Number(item.base_fat_per_100 ?? item.baseFatPer100 ?? item.fat_per_100 ?? 0),
  carbs_per_100: Number(item.base_carbs_per_100 ?? item.baseCarbsPer100 ?? item.carbs_per_100 ?? 0),
  default_grams: Number(item.serving_grams ?? item.servingGrams ?? item.default_grams ?? 100),
  modifiers: Array.isArray(item.modifiers) ? item.modifiers : (item.selected_modifiers || item.selectedModifiers || []),
  defaultSelectedModifierIds: item.defaultSelectedModifierIds || (item.selected_modifiers || item.selectedModifiers || []).map(modifier => modifier.id || modifier).filter(Boolean),
  synonyms: Array.isArray(item.synonyms) ? item.synonyms : [],
});

const buildNutritionItemFromPayload = (payload = {}) => mapNutritionItem({
  id: `local-nutrition-item-${Date.now()}-${Math.random().toString(16).slice(2)}`,
  created_at: new Date().toISOString(),
  item_order: payload.item_order || payload.itemOrder || 0,
  ...payload,
});

const applyLocalNutritionAction = (day, action, payload = {}) => {
  let next = day || buildLocalNutritionDay(payload.date || formatDateKey(new Date()));
  if (action === "add_item" || action === "copy_recent_item") {
    const item = buildNutritionItemFromPayload(payload.item || payload);
    next = {
      ...next,
      manual_entry_enabled: false,
      manualEntryEnabled: false,
      meals: next.meals.map(meal => meal.type === payload.meal_type
        ? { ...meal, items: [...(meal.items || []), { ...item, itemOrder: (meal.items || []).length + 1 }] }
        : meal),
      recentFoods: [item, ...(next.recentFoods || []).filter(food => food.foodKey !== item.foodKey)].slice(0, 20),
      frequentFoods: [item, ...(next.frequentFoods || []).filter(food => food.foodKey !== item.foodKey)].slice(0, 20),
    };
  }
  if (action === "save_manual_day_totals") {
    next = {
      ...next,
      manual_entry_enabled: true,
      manualEntryEnabled: true,
      manual_calories_total: roundCalories(payload.manual_calories_total ?? payload.calories_total ?? payload.calories ?? 0),
      manual_protein_total: roundMacro(payload.manual_protein_total ?? payload.protein_total ?? payload.protein ?? 0),
      manual_fat_total: roundMacro(payload.manual_fat_total ?? payload.fat_total ?? payload.fat ?? 0),
      manual_carbs_total: roundMacro(payload.manual_carbs_total ?? payload.carbs_total ?? payload.carbs ?? 0),
      manual_entry_updated_at: new Date().toISOString(),
    };
  }
  if (action === "update_item") {
    const item = buildNutritionItemFromPayload({ ...(payload.item || payload), id: payload.id || payload.item_id });
    next = {
      ...next,
      meals: next.meals.map(meal => ({
        ...meal,
        items: (meal.items || []).map(existing => existing.id === item.id ? { ...existing, ...item } : existing),
      })),
    };
  }
  if (action === "delete_item") {
    const id = payload.id || payload.item_id;
    next = {
      ...next,
      meals: next.meals.map(meal => ({ ...meal, items: (meal.items || []).filter(item => item.id !== id) })),
    };
  }
  if (action === "toggle_favorite") {
    const key = payload.food_key || payload.foodKey;
    const exists = (next.favorites || []).some(favorite => favorite.foodKey === key);
    next = {
      ...next,
      favorites: exists
        ? (next.favorites || []).filter(favorite => favorite.foodKey !== key)
        : [{ id: `local-favorite-${key}`, foodKey: key, foodSnapshot: payload.food_snapshot || payload.foodSnapshot || {} }, ...(next.favorites || [])],
    };
  }
  return recalculateNutritionDayLocal(next);
};

const deriveHomeMealsFromNutritionDay = (day) => (day?.meals || []).map(meal => ({
  id: meal.id,
  name: meal.title,
  food: meal.items?.length ? meal.items.map(item => item.foodName).join(", ") : "ничего не добавлено",
  calories: meal.calories,
  protein: meal.protein,
  fat: meal.fat,
  carbs: meal.carbs,
}));

function NutritionPage({ nutritionDay, setNutritionDay, nutritionGoal, setNutritionGoal, selectedDateKey, setSelectedDateKey, markedDateKeys = [], profile, telegramInitData, onNutritionAction, nutritionLoading }) {
  const day = nutritionDay?.date === selectedDateKey ? nutritionDay : buildLocalNutritionDay(selectedDateKey, nutritionGoal);
  const [mealChoiceOpen, setMealChoiceOpen] = useState(false);
  const [foodPickerOpen, setFoodPickerOpen] = useState(false);
  const [targetMealType, setTargetMealType] = useState(null);
  const [activeFoodTab, setActiveFoodTab] = useState("eyeball");
  const [activeEyeballTab, setActiveEyeballTab] = useState("all");
  const [foodSearch, setFoodSearch] = useState("");
  const [foodDraft, setFoodDraft] = useState(null);
  const [manualEntryOpen, setManualEntryOpen] = useState(false);
  const [notice, setNotice] = useState(null);
  const [swipedItemId, setSwipedItemId] = useState(null);
  const [expandedMeals, setExpandedMeals] = useState({});
  const [pendingFoodAction, setPendingFoodAction] = useState(null);
  const [pendingFavoriteKeys, setPendingFavoriteKeys] = useState([]);

  useAppBackLayer("nutrition-meal-choice", mealChoiceOpen, () => setMealChoiceOpen(false), 142);
  useAppBackLayer("nutrition-food-picker", foodPickerOpen && !foodDraft, () => setFoodPickerOpen(false), 143);
  useAppBackLayer("nutrition-food-draft", Boolean(foodDraft), () => setFoodDraft(null), 144);
  useAppBackLayer("nutrition-manual-entry", manualEntryOpen, () => setManualEntryOpen(false), 145);

  const totals = day.totals || { calories: 0, protein: 0, fat: 0, carbs: 0 };
  const goal = day.goal || nutritionGoal || initialNutritionGoal;
  const dayHasItems = (day.meals || []).some(meal => (meal.items || []).length > 0);
  const percent = (value, target) => Math.min(100, Math.round((Number(value || 0) / Math.max(1, Number(target || 1))) * 100));
  const caloriesPercent = percent(totals.calories, goal.calories);
  const calorieTarget = roundCalories(day?.calories_target ?? 2500);
  const nutritionMarkedDateKeys = nutritionDay?.date === selectedDateKey
    ? mergeNutritionMarkerKeys(markedDateKeys, selectedDateKey, nutritionDayHasFood(day))
    : normalizeNutritionFilledDateKeys(markedDateKeys);

  useEffect(() => {
    if (day.goal) setNutritionGoal(day.goal);
  }, [day.goal?.calories, day.goal?.protein, day.goal?.fat, day.goal?.carbs]);

  useEffect(() => {
    if (!foodPickerOpen) setFoodSearch("");
  }, [foodPickerOpen]);

  const showSoon = () => {
    setNotice("Функция появится позже");
    setTimeout(() => setNotice(null), 1800);
  };

  const openMealChoice = () => {
    setMealChoiceOpen(true);
  };

  const showNutritionError = (message) => {
    setNotice(message);
    setTimeout(() => setNotice(null), 2400);
  };

  const saveManualNutritionTotals = async (values) => {
    const result = await onNutritionAction("save_manual_day_totals", {
      date: selectedDateKey,
      manual_calories_total: values.calories,
      manual_protein_total: values.protein,
      manual_fat_total: values.fat,
      manual_carbs_total: values.carbs,
    });
    if (result?.ok === false) {
      showNutritionError("Не удалось сохранить КБЖУ");
      return false;
    }
    setManualEntryOpen(false);
    return true;
  };

  const toggleMealExpanded = (mealType) => {
    setExpandedMeals(prev => ({ ...prev, [mealType]: !prev[mealType] }));
  };

  const openFoodPicker = (mealType, options = {}) => {
    setTargetMealType(mealType);
    setMealChoiceOpen(false);
    setFoodPickerOpen(true);
    setActiveFoodTab("eyeball");
    if (options.resetSearch) setFoodSearch("");
    setFoodDraft(null);
  };

  const foodFromItem = (item) => {
    const fromLibrary = getFoodByKey(item.foodKey);
    const selectedModifierIds = item.selectedModifiers?.map(modifier => modifier.id || modifier).filter(Boolean) || [];
    if (fromLibrary) return {
      ...fromLibrary,
      default_grams: item.servingGrams || fromLibrary.default_grams,
      defaultSelectedModifierIds: selectedModifierIds,
    };
    return {
      key: item.foodKey,
      name: item.foodName,
      category: item.foodCategory,
      synonyms: [],
      calories_per_100: item.baseCaloriesPer100,
      protein_per_100: item.baseProteinPer100,
      fat_per_100: item.baseFatPer100,
      carbs_per_100: item.baseCarbsPer100,
      default_grams: item.servingGrams,
      modifiers: item.selectedModifiers || [],
      defaultSelectedModifierIds: selectedModifierIds,
    };
  };

  const openFoodDraft = (foodItem, mealType = targetMealType, item = null) => {
    const selectedModifierIds = item?.selectedModifiers?.map(modifier => modifier.id || modifier).filter(Boolean) || foodItem.defaultSelectedModifierIds || [];
    setFoodDraft({
      mode: item ? "edit" : "add",
      itemId: item?.id || null,
      mealType,
      food: foodItem,
      grams: item?.servingGrams || foodItem.default_grams || 100,
      selectedModifierIds,
      notes: item?.notes || "",
    });
  };

  const activeEyeballFoods = useMemo(() => {
    if (activeEyeballTab === "recent") return (day.recentFoods || []).map(foodFromItem);
    if (activeEyeballTab === "frequent") return (day.frequentFoods || []).map(foodFromItem);
    if (activeEyeballTab === "favorites") return (day.favorites || []).map(favorite => getFoodByKey(favorite.foodKey) || snapshotFoodFromPayload(favorite.foodSnapshot || { foodKey: favorite.foodKey }));
    return nutritionFoodLibrary;
  }, [activeEyeballTab, day.recentFoods, day.frequentFoods, day.favorites]);

  const filteredFoods = useMemo(() => {
    const query = foodSearch.trim().toLowerCase().replace(/ё/g, "е");
    const source = activeEyeballFoods.filter(Boolean).map(item => snapshotFoodFromPayload(item));
    if (!query) return source.slice(0, activeEyeballTab === "all" ? 80 : 40);
    return source.filter(item => getFoodSearchText(item).includes(query)).slice(0, 90);
  }, [activeEyeballFoods, activeEyeballTab, foodSearch]);

  const favoriteKeys = new Set((day.favorites || []).map(item => item.foodKey));
  const draftTotals = foodDraft ? calculateNutritionItemTotals(foodDraft.food, foodDraft.grams, foodDraft.selectedModifierIds) : null;

  const saveFoodDraft = async () => {
    if (!foodDraft?.food || pendingFoodAction) return;
    const actionKey = `${foodDraft.mode}-${foodDraft.mealType}-${foodDraft.food.key}`;
    setPendingFoodAction(actionKey);
    const payload = buildNutritionPayloadFromFood(foodDraft.food, foodDraft.grams, foodDraft.selectedModifierIds, foodDraft.notes);
    const action = foodDraft.mode === "edit" ? "update_item" : "add_item";
    const requestPayload = {
      date: selectedDateKey,
      meal_type: foodDraft.mealType,
      id: foodDraft.itemId,
      item: payload,
    };

    if (action === "add_item") {
      const mealType = foodDraft.mealType;
      const resultPromise = onNutritionAction(action, requestPayload);
      setExpandedMeals(prev => ({ ...prev, [mealType]: true }));
      setFoodDraft(null);
      setMealChoiceOpen(false);
      setPendingFoodAction(null);
      resultPromise.then(result => {
        if (result?.ok === false) showNutritionError("Не удалось сохранить продукт. Попробуй ещё раз");
      }).catch(() => showNutritionError("Не удалось сохранить продукт. Попробуй ещё раз"));
      return;
    }

    try {
      const result = await onNutritionAction(action, requestPayload);
      if (result?.ok === false) {
        showNutritionError(action === "add_item" ? "Не удалось сохранить продукт. Попробуй ещё раз" : "Не удалось сохранить изменения");
        return;
      }
      setExpandedMeals(prev => ({ ...prev, [foodDraft.mealType]: true }));
      setFoodDraft(null);
      if (action === "update_item") {
        setFoodPickerOpen(false);
        setMealChoiceOpen(false);
      }
    } finally {
      setPendingFoodAction(null);
    }
  };

  const deleteFoodItem = async (itemId) => {
    const result = await onNutritionAction("delete_item", { date: selectedDateKey, id: itemId });
    if (result?.ok === false) showNutritionError("Не удалось удалить продукт");
    setSwipedItemId(null);
  };

  const toggleFavorite = async (foodItem) => {
    if (!foodItem?.key || pendingFavoriteKeys.includes(foodItem.key)) return;
    setPendingFavoriteKeys(prev => [...prev, foodItem.key]);
    try {
      const result = await onNutritionAction("toggle_favorite", {
        date: selectedDateKey,
        food_key: foodItem.key,
        food_snapshot: foodItem,
      });
      if (result?.ok === false) showNutritionError("Не удалось обновить избранное");
    } finally {
      setPendingFavoriteKeys(prev => prev.filter(key => key !== foodItem.key));
    }
  };

  const renderFoodButton = (foodItem, source = "") => {
    const foodCard = snapshotFoodFromPayload(foodItem || {});
    return <button key={`${source}-${foodCard.key}`} onClick={() => openFoodDraft(foodCard)} className="w-full rounded-2xl bg-white/[0.04] p-4 text-left transition active:scale-[0.99] hover:bg-white/[0.07]">
      <div className="flex items-start justify-between gap-3">
        <div className="min-w-0">
          <div className="break-words text-base font-black text-zinc-100">{foodCard.name}</div>
          <div className="mt-1 text-xs font-semibold text-red-400">{foodCard.category}</div>
        </div>
        <div className="shrink-0 text-right text-xs text-zinc-500">{foodCard.default_grams || 100} г</div>
      </div>
      <div className="mt-3 text-xs text-zinc-500">{foodCard.calories_per_100} ккал · {foodCard.protein_per_100} Б · {foodCard.fat_per_100} Ж · {foodCard.carbs_per_100} У</div>
    </button>;
  };

  return <><Header title="Питание" subtitle="Добавляй еду на глаз: порции, дополнения, избранное и быстрый поиск."/>
    <div className="mt-6">
      <IOSWeekCalendar title="Неделя питания" selectedDateKey={selectedDateKey} onSelect={setSelectedDateKey} markedDateKeys={nutritionMarkedDateKeys}/>
    </div>

    <div className="mt-5 rounded-[28px] border border-white/10 bg-white/[0.035] p-4">
      <div className="grid grid-cols-[126px_1fr] gap-4">
        <div className="flex flex-col items-center justify-center">
          <div className="relative h-[86px] w-32 overflow-hidden">
            <div className="absolute left-0 top-0 h-32 w-32 rounded-full" style={{ background: `conic-gradient(from 270deg, #ef4444 0deg ${Math.round(caloriesPercent * 1.8)}deg, var(--chart-track) ${Math.round(caloriesPercent * 1.8)}deg 180deg, transparent 180deg 360deg)` }} />
            <div className="absolute left-[10px] top-[10px] flex h-28 w-28 flex-col items-center justify-start rounded-full bg-zinc-950 pt-3 text-center">
              <span className="text-[10px] font-bold uppercase tracking-[0.14em] text-zinc-500">Ккал</span>
              <span className="mt-1 text-2xl font-black leading-none">{roundCalories(totals.calories)}</span>
              <span className="mt-1 text-[10px] font-bold leading-none text-zinc-400">/ {calorieTarget}</span>
            </div>
          </div>
        </div>
        <div className="space-y-3">
          {[["Белки", totals.protein, goal.protein], ["Жиры", totals.fat, goal.fat], ["Углеводы", totals.carbs, goal.carbs]].map(([label, value, target]) => <div key={label}>
            <div className="flex justify-between gap-3 text-xs"><span className="font-bold text-zinc-400">{label}</span><span className="text-zinc-500">{roundMacro(value)} / {target} г</span></div>
            <div className="mt-2"><Progress value={percent(value, target)}/></div>
          </div>)}
        </div>
      </div>
      {nutritionLoading && <div className="mt-3 text-xs text-zinc-600">Синхронизация питания...</div>}
    </div>

    <div className="mt-5 flex items-center justify-between gap-3">
      <h2 className="text-xl font-black tracking-[-0.03em]">Приемы пищи</h2>
      <div className="flex items-center gap-2">
        {!dayHasItems && <button onClick={() => setManualEntryOpen(true)} className="min-h-10 rounded-full border border-red-500/60 bg-red-500/12 px-4 py-2 text-xs font-black text-red-300 transition hover:bg-red-500 hover:text-black">Внести КБЖУ вручную</button>}
        <button onClick={openMealChoice} className="flex h-10 w-10 items-center justify-center rounded-full bg-white/8 text-red-400"><Plus size={22}/></button>
      </div>
    </div>

    <div className="mt-3 space-y-3 pb-24">
      {(day.meals || []).map(meal => {
        const expanded = Boolean(expandedMeals[meal.type]);
        return <div key={meal.type} className="overflow-hidden rounded-[26px] border border-white/10 bg-zinc-950/80">
        <button onClick={() => toggleMealExpanded(meal.type)} className="w-full p-4 text-left">
          <div className="flex items-start justify-between gap-3">
            <div className="min-w-0">
              <h3 className="text-lg font-black">{meal.title}</h3>
              <p className="mt-1 text-xs text-zinc-500">{roundCalories(meal.calories)} ккал · {roundMacro(meal.protein)} Б / {roundMacro(meal.fat)} Ж / {roundMacro(meal.carbs)} У</p>
              <p className="mt-2 text-xs text-zinc-600">{meal.items?.length ? `${meal.items.length} продукт${meal.items.length === 1 ? "" : meal.items.length < 5 ? "а" : "ов"}` : "ничего не добавлено"}</p>
            </div>
            <div className="flex shrink-0 items-center gap-2">
              <span className="rounded-full bg-white/[0.06] px-3 py-1 text-xs font-bold text-zinc-400">{meal.items?.length || 0}</span>
              <ChevronDown size={18} className={`text-zinc-500 transition ${expanded ? "rotate-180" : ""}`}/>
            </div>
          </div>
        </button>
        {expanded && <div className="border-t border-white/10">
          {!meal.items?.length && <div className="p-4">
            <p className="rounded-2xl bg-white/[0.03] p-4 text-sm text-zinc-500">ничего не добавлено</p>
          </div>}
          {meal.items?.map(item => <SwipeActionRow key={item.id} rowId={item.id} swipedId={swipedItemId} setSwipedId={setSwipedItemId} className="border-b border-white/10 last:border-b-0" actions={[
            { label: "delete", icon: "🗑", className: "bg-red-500", onClick: () => deleteFoodItem(item.id) },
          ]}>
            <button onClick={() => openFoodDraft(foodFromItem(item), meal.type, item)} className="grid w-full grid-cols-[1fr_auto] gap-3 bg-zinc-950 px-4 py-4 text-left transition hover:bg-white/[0.03]">
              <div className="min-w-0">
                <div className="break-words font-black text-zinc-100">{item.foodName}</div>
                <div className="mt-1 text-xs font-semibold text-red-400">{item.servingGrams} г · {item.foodCategory}</div>
              </div>
              <div className="shrink-0 text-right">

function ManualNutritionSheet({ day, dateKey, onSave, onClose }) {
  const [draft, setDraft] = useState({
    calories: day?.manual_entry_enabled ? String(day.manual_calories_total || day.totals?.calories || "") : "",
    protein: day?.manual_entry_enabled ? String(day.manual_protein_total || day.totals?.protein || "") : "",
    fat: day?.manual_entry_enabled ? String(day.manual_fat_total || day.totals?.fat || "") : "",
    carbs: day?.manual_entry_enabled ? String(day.manual_carbs_total || day.totals?.carbs || "") : "",
  });
  const [saving, setSaving] = useState(false);

  const set = (key, value) => {
    setDraft(prev => ({ ...prev, [key]: value }));
  };

  const save = async () => {
    if (saving) return;
    setSaving(true);
    const safeNumber = (value) => {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : 0;
    };
    const ok = await onSave?.({
      calories: Math.max(0, roundCalories(safeNumber(draft.calories))),
      protein: Math.max(0, roundMacro(safeNumber(draft.protein))),
      fat: Math.max(0, roundMacro(safeNumber(draft.fat))),
      carbs: Math.max(0, roundMacro(safeNumber(draft.carbs))),
    });
    if (ok === false) setSaving(false);
  };

  const fields = [
    ["calories", "Калории", "ккал"],
    ["protein", "Белки", "г"],
    ["fat", "Жиры", "г"],
    ["carbs", "Углеводы", "г"],
  ];

  return <div onClick={onClose} className="onlypump-modal-layer fixed inset-0 z-[188] flex items-end bg-black/55 p-3 backdrop-blur-sm">
    <BottomSheetPanel onClose={onClose} onClick={(e) => e.stopPropagation()} className="mx-auto w-full max-w-[430px] rounded-[34px] border border-white/10 bg-zinc-950/96 p-5 shadow-2xl shadow-black/70 backdrop-blur-2xl">
      <div className="mx-auto mb-4 h-1 w-12 rounded-full bg-white/20" />
      <div className="flex items-start justify-between gap-3">
        <button onClick={onClose} className="mt-1 shrink-0 text-sm font-black text-zinc-400">Отмена</button>
        <div className="min-w-0 text-center">
          <p className="text-xs font-bold uppercase tracking-[0.18em] text-red-400">{formatCycleDate(dateKey)}</p>
          <h2 className="mt-2 text-2xl font-black tracking-[-0.04em]">КБЖУ вручную</h2>
        </div>
        <button onClick={onClose} className="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-white/8 text-zinc-300">×</button>
      </div>
      <div className="mt-5 space-y-3">
        {fields.map(([key, label, unit]) => <label key={key} className="onlypump-field-surface flex items-center gap-3 rounded-2xl bg-white/[0.05] px-4 py-3">
          <span className="w-24 shrink-0 text-sm font-bold text-zinc-400">{label}</span>
          <input
            type="number"
            inputMode="decimal"
            value={draft[key]}
            onChange={(e) => set(key, e.target.value)}
            className="onlypump-field-input min-w-0 flex-1 bg-transparent text-right text-lg font-black outline-none"
            placeholder="0"
          />
          <span className="w-10 shrink-0 text-right text-xs font-bold text-zinc-500">{unit}</span>
        </label>)}
      </div>
      <button onClick={save} disabled={saving} className="mt-6 h-12 w-full rounded-full bg-red-500 text-sm font-black text-black transition active:scale-[0.98] disabled:opacity-60">
        {saving ? "Сохраняю..." : "Сохранить"}
      </button>
    </BottomSheetPanel>
  </div>;
}

    const completed = module.lessons.filter(lesson => lesson.done).length;

    const progress = total ? Math.round((completed / total) * 100) : 0;
    return { completed, total, progress };

    const allLessons = educationModules.flatMap(module => module.lessons);

    const total = allLessons.length;
    return {
      completed,
      total,
      progress: total ? Math.round((completed / total) * 100) : 0,

  const activeModule = educationModules.find(x => x.id === activeEducation) || educationModules[0];

  const openModule = (module) => {
    if (module.locked && !showLocked) return;
    setActiveEducation(module.id);

  const toggleLesson = (moduleId, lessonId) => {
    setEducationModules(prev => prev.map(module => module.id === moduleId ? {

              <span className="rounded-lg bg-white/5 px-3 py-2">{totalEducationStats.progress}% всей программы</span>
            </div>
          </div>

          <div className="flex flex-col gap-2">
            <Button onClick={continueModule} className="bg-gradient-to-r from-red-700 to-red-500">

      </Card>
    </div>

    {activeLesson && <div onClick={closeLesson} className="onlypump-modal-layer fixed inset-0 z-[120] flex items-center justify-center bg-black/75 p-4 backdrop-blur-sm">
      <Card onClick={(e) => e.stopPropagation()} className="w-full max-w-4xl overflow-hidden">

          <div>

          <button onClick={closeLesson} className="flex h-7 w-7 items-center justify-center rounded-full bg-red-500/10 text-red-400 transition hover:bg-red-500/20">×</button>
        </div>

        <div className="p-6">

function LecturesPage({ lectureItems, setLectureItems }) {
  const safeLectureItems = lectureItems || [];
  const [activeLecture, setActiveLecture] = useState(null);
  const [lectureFilter, setLectureFilter] = useState("Все");

  useAppBackLayer("lectures-active-lecture", Boolean(activeLecture), () => setActiveLecture(null), 130);

  const lectureCategories = ["Все", ...Array.from(new Set(safeLectureItems.map(item => item.category)))];
  const filteredLectures = lectureFilter === "Все" ? safeLectureItems : safeLectureItems.filter(item => item.category === lectureFilter);
  const watchedCount = safeLectureItems.filter(item => item.watched).length;
  const totalProgress = safeLectureItems.length ? Math.round((watchedCount / safeLectureItems.length) * 100) : 0;

  const openLecture = (lecture) => {
    setActiveLecture(lecture);
  };

  const closeLecture = () => {
    setActiveLecture(null);
  };

  const updateLecture = (id, patch) => {
    setLectureItems(prev => prev.map(item => item.id === id ? { ...item, ...patch } : item));
    setActiveLecture(prev => prev && prev.id === id ? { ...prev, ...patch } : prev);
  };

  const toggleLectureWatched = (id) => {
    const lecture = safeLectureItems.find(item => item.id === id);
    if (!lecture) return;
    updateLecture(id, {
      watched: !lecture.watched,
      progress: lecture.watched ? 50 : 100,
    });
  };

  const openNextLecture = () => {
    if (!activeLecture) return;
    const currentIndex = safeLectureItems.findIndex(item => item.id === activeLecture.id);
    const nextLecture = safeLectureItems[currentIndex + 1] || safeLectureItems[0];
    setActiveLecture(nextLecture);
  };

  const setLectureProgress = (id, value) => {
    const progress = Number(value);
    updateLecture(id, {
      progress,
      watched: progress >= 100,
    });
  };

  return <>
    <Header title="Лекции" subtitle="Короткие видеоуроки, разборы мифов и практические инструкции."/>

              {category}
            </button>)}
          </div>
          <div className="text-xs text-zinc-500">{watchedCount}/{safeLectureItems.length} просмотрено · {totalProgress}%</div>
        </div>

        <MasonryGrid className="grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">

            <div className="p-4">
              <div className="flex items-center justify-between gap-2">

      </Card>
    </div>

    {activeLecture && <div onClick={closeLecture} className="onlypump-modal-layer fixed inset-0 z-[120] flex items-center justify-center bg-black/75 p-4 backdrop-blur-sm">
      <Card onClick={(e) => e.stopPropagation()} className="w-full max-w-4xl overflow-hidden">
        <div className="flex items-start justify-between gap-4 border-b border-white/10 p-6">
          <div>
            <p className="text-xs uppercase tracking-wider text-red-500">{activeLecture.category}</p>
            <h2 className="mt-2 break-words text-2xl font-semibold">{activeLecture.title}</h2>
            <p className="mt-2 text-sm text-zinc-500">{activeLecture.duration} · лекция · видео</p>
          </div>
          <button onClick={closeLecture} className="flex h-7 w-7 items-center justify-center rounded-full bg-red-500/10 text-red-400 transition hover:bg-red-500/20">×</button>
        </div>

        <div className="p-6">
          <div className={`relative flex aspect-video items-center justify-center overflow-hidden rounded-2xl border border-white/10 bg-cover bg-center ${activeLecture.watched || activeLecture.progress >= 100 ? "" : "grayscale"}`} style={{backgroundImage:`url(${activeLecture.img})`}}>
            <div className="absolute inset-0 bg-black/65"/>
            <button onClick={() => setLectureProgress(activeLecture.id, Math.min(100, activeLecture.progress + 25))} className="relative flex h-20 w-20 items-center justify-center rounded-full bg-red-500 text-black shadow-2xl shadow-red-500/30 transition hover:scale-105">
              <Play size={34} fill="currentColor" />
            </button>
            <div className="absolute bottom-4 left-4 right-4">
              <div className="mb-3 flex items-center justify-between text-xs text-zinc-400">
                <span>{activeLecture.progress}%</span>
                <span>{activeLecture.duration}</span>
              </div>
              <Progress value={activeLecture.progress}/>
            </div>
          </div>

          <div className="mt-6 grid gap-4 md:grid-cols-[1fr_0.55fr]">
            <div className="rounded-2xl border border-white/10 bg-white/[0.03] p-5">
              <h3 className="font-semibold">Описание лекции</h3>
              <p className="mt-3 break-words text-sm leading-7 text-zinc-400">{activeLecture.description}</p>
              <div className="mt-5 rounded-xl bg-black/30 p-4 text-sm text-zinc-400">
                Здесь можно разместить конспект, ссылки на материалы, домашнее задание и таймкоды лекции.
              </div>
            </div>

            <div className="rounded-2xl border border-white/10 bg-white/[0.03] p-5">
              <h3 className="font-semibold">Управление</h3>
              <p className="mt-3 text-sm text-zinc-400">Статус влияет на общий прогресс лекций.</p>
              <Button onClick={() => toggleLectureWatched(activeLecture.id)} className={`mt-5 w-full ${activeLecture.watched ? 'bg-red-500 text-black' : 'bg-white/8 text-zinc-300'}`}>
                {activeLecture.watched ? 'Просмотрено' : 'Отметить просмотренной'}
              </Button>
              <Button onClick={openNextLecture} className="mt-3 w-full bg-white/8">
                Следующая лекция
              </Button>
            </div>
          </div>
        </div>
      </Card>
    </div>}
  </>;
}

const progressMeasurementFields = [
  { field: "weight", db: "weight_kg", label: "Вес", unit: "кг" },
  { field: "bodyFat", db: "body_fat_percent", label: "Процент жира", unit: "%" },
  { field: "neck", db: "neck_cm", label: "Шея", unit: "см" },
  { field: "shoulders", db: "shoulders_cm", label: "Плечи", unit: "см" },
  { field: "chest", db: "chest_cm", label: "Грудь", unit: "см" },
  { field: "biceps", db: "biceps_cm", label: "Бицепс", unit: "см" },
  { field: "waist", db: "waist_cm", label: "Талия", unit: "см" },
  { field: "belly", db: "abdomen_cm", label: "Живот", unit: "см" },
  { field: "glutes", db: "glutes_cm", label: "Ягодицы", unit: "см" },
  { field: "thigh", db: "thigh_cm", label: "Бедро", unit: "см" },
  { field: "calf", db: "calf_cm", label: "Голень", unit: "см" },
];

const progressMeasurementsFromRecord = (record = {}, fallback = {}) => progressMeasurementFields.reduce((acc, item) => {
  const value = record?.[item.db] ?? record?.[item.field] ?? fallback?.[item.field];
  const number = Number(value);
  acc[item.field] = Number.isFinite(number) ? number : (fallback?.[item.field] ?? "");
  return acc;
}, {});

const progressPayloadFromMeasurements = (dateKey, measurements = {}, goalType = "recomposition", goalIntensityPercent = 10) => {
  const normalizedIntensity = normalizeGoalIntensityPercent(goalType, goalIntensityPercent);
  const payload = {
    date: dateKey,
    goal_type: goalType || "recomposition",
    goal_intensity_percent: normalizedIntensity,
  };
  if (goalType === "fat_loss") payload.deficit_percent = normalizeDeficitPercent(normalizedIntensity);
  progressMeasurementFields.forEach(item => {
    const number = Number(measurements[item.field]);
    if (Number.isFinite(number) && number > 0) payload[item.db] = number;
  });
  return payload;
};

const progressMeasurementsEqual = (a = {}, b = {}) => progressMeasurementFields.every(({ field }) => String(a?.[field] ?? "") === String(b?.[field] ?? ""));

function GoalIntensityBar({ goalType = "fat_loss", value = 10 }) {
  const range = getGoalIntensityRange(goalType);
  const percent = normalizeGoalIntensityPercent(goalType, value);
  const position = ((percent - range.min) / Math.max(1, range.max - range.min)) * 100;
  return <div className="mt-4">
    <div className="relative h-3 rounded-full bg-white/10">
      <span className="absolute left-0 top-0 h-full rounded-full bg-red-500" style={{ width: `${position}%` }}/>
      <span className="absolute top-1/2 h-7 w-7 -translate-x-1/2 -translate-y-1/2 rounded-full border-4 border-black bg-red-500 shadow-lg shadow-red-500/30" style={{ left: `${position}%` }}/>
    </div>
    <div className="mt-3 grid grid-cols-4 gap-2 text-[10px] text-zinc-500">
      <span>0%</span>
      <span>10%</span>
      <span>30%</span>
      <span className="text-right">50%</span>
    </div>
  </div>;
}

function ProgressPage({ workouts = [], measurements, setMeasurements, progressGoal, setProgressGoal, profile = DEFAULT_PROFILE, profileStatus = "local", telegramInitData = "", selectedDateKey = formatDateKey(new Date()), setSelectedDateKey = () => {}, onProgressProfileSaved }) {

  const [previousMeasurements] = useState({
    weight: "",
    bodyFat: "",
    neck: "",
    shoulders: "",
    chest: "",
    biceps: "",
    waist: "",
    belly: "",
    glutes: "",
    thigh: "",
    calf: "",
  });
  const [progressMeasurements, setProgressMeasurements] = useState(() => progressMeasurementsFromRecord(profile, measurements));
  const [previousProgressMeasurements, setPreviousProgressMeasurements] = useState(previousMeasurements);
  const [progressMarkedDateKeys, setProgressMarkedDateKeys] = useState([]);
  const [saveError, setSaveError] = useState("");
  const [goalIntensityError, setGoalIntensityError] = useState("");
  const [isProgressSaving, setIsProgressSaving] = useState(false);
  const saveTimerRef = useRef(null);
  const saveSequenceRef = useRef(0);
  const measurementsRef = useRef(measurements);
  const goalIntensityFocusedRef = useRef(false);
  const isRemoteProgress = profileStatus === "verified" && Boolean(telegramInitData && profile?.id);

  useEffect(() => {
    measurementsRef.current = measurements;
  }, [measurements]);

  const strengthStats = useMemo(() => {
    const exercises = workouts.flatMap(workout => (workout.exercises || []).map(exercise => ({
      ...exercise,
      workoutTitle: workout.title,
      workoutDate: workout.date,
    }))).filter(isStrengthStatsExercise);
    const grouped = exercises.reduce((acc, exercise) => {
      const sets = exercise.sets || [];
      const bestSet = sets.reduce((best, set) => {
        const volume = Number(set.weight || 0) * Number(set.reps || 0);
        const bestVolume = Number(best.weight || 0) * Number(best.reps || 0);
        return volume > bestVolume ? set : best;
      }, sets[0] || { weight: 0, reps: 0 });

      const estimatedOneRepMax = Math.round(Number(bestSet.weight || 0) * (1 + Number(bestSet.reps || 0) / 30));
      const currentVolume = sets.reduce((sum, set) => sum + Number(set.weight || 0) * Number(set.reps || 0), 0);

      if (!acc[exercise.name] || estimatedOneRepMax > acc[exercise.name].oneRepMax) {
        acc[exercise.name] = {
          name: exercise.name,
          muscle: exercise.muscleGroup || exercise.muscle || "Другое",
          oneRepMax: estimatedOneRepMax,
          bestSet: `${bestSet.weight}×${bestSet.reps}`,
          volume: currentVolume,
          progress: Math.min(100, Math.round((estimatedOneRepMax / Math.max(1, estimatedOneRepMax - 8)) * 75)),
        };
      }

      return acc;
    }, {});

    const list = Object.values(grouped).filter(item => item.oneRepMax > 0).sort((a, b) => b.oneRepMax - a.oneRepMax);
    const totalVolume = list.reduce((sum, item) => sum + item.volume, 0);
    const avgStrength = list.length ? Math.round(list.reduce((sum, item) => sum + item.oneRepMax, 0) / list.length) : 0;

    return { list, totalVolume, avgStrength };
  }, [workouts]);

  const goalType = progressGoal?.goalType || profile?.goal_type || "recomposition";
  const goalIntensityPercent = normalizeGoalIntensityPercent(goalType, progressGoal?.goalIntensityPercent ?? profile?.goal_intensity_percent ?? profile?.deficit_percent ?? 10);
  const strengthTargetPercent = hasPositiveMetric(progressGoal?.targetStrength) ? Number(progressGoal.targetStrength) : null;
  const showGoalIntensity = goalUsesIntensity(goalType);
  const [goalIntensityInput, setGoalIntensityInput] = useState(() => String(goalIntensityPercent));

  useEffect(() => {
    if (!goalIntensityFocusedRef.current) setGoalIntensityInput(String(goalIntensityPercent));
  }, [goalIntensityPercent, goalType]);

  const validateGoalIntensity = useCallback((value) => {
    if (String(value).trim() === "") return { valid: false, message: "" };
    const number = Number(value);
    if (!Number.isFinite(number)) return { valid: false, message: "Введите число" };
    if (number < 0) return { valid: false, message: "Минимум 0%" };
    if (number > 50) return { valid: false, message: "Максимум 50%" };
    return { valid: true, value: number };
  }, []);

  const applyProgressResponse = useCallback((result, options = {}) => {
    const nextProfile = result?.profile ? normalizeProfileRecord(result.profile, profile || DEFAULT_PROFILE) : profile;
    const effectiveRecord = result?.effective_measurement || result?.measurement || nextProfile || profile;
    const previousRecord = result?.previous_measurement || result?.effective_measurement || nextProfile || previousMeasurements;
    const nextMeasurements = progressMeasurementsFromRecord(effectiveRecord, progressMeasurementsFromRecord(nextProfile, measurementsRef.current));
    const nextPrevious = progressMeasurementsFromRecord(previousRecord, previousMeasurements);
    setProgressMeasurements(nextMeasurements);
    setPreviousProgressMeasurements(nextPrevious);
    setMeasurements(prev => progressMeasurementsEqual(prev, nextMeasurements) ? prev : nextMeasurements);
    setProgressGoal(prev => ({
      ...prev,
      title: profileGoalTypeLabels[nextProfile?.goal_type] || nextProfile?.goal || prev.title,
      goalType: nextProfile?.goal_type || prev.goalType || "recomposition",
      targetWeight: nextProfile?.target_weight_kg || prev.targetWeight,
      targetWaist: nextProfile?.waist_cm || nextMeasurements.waist || prev.targetWaist,
      goalIntensityPercent: normalizeGoalIntensityPercent(nextProfile?.goal_type, nextProfile?.goal_intensity_percent ?? nextProfile?.deficit_percent, prev.goalIntensityPercent || prev.deficitPercent || 10),
      deficitPercent: normalizeDeficitPercent(nextProfile?.deficit_percent, prev.deficitPercent || 10),
    }));
    if (Array.isArray(result?.measurement_dates)) setProgressMarkedDateKeys(normalizeNutritionFilledDateKeys(result.measurement_dates));
    if (result?.profile && options.syncNutrition) onProgressProfileSaved?.(nextProfile, { syncNutrition: true });
  }, [onProgressProfileSaved, previousMeasurements, profile, setMeasurements, setProgressGoal]);

  useEffect(() => {
    let cancelled = false;
    const loadProgress = async () => {
      setSaveError("");
      if (!isRemoteProgress) {
        const localMeasurements = progressMeasurementsFromRecord(profile, measurementsRef.current);
        setProgressMeasurements(localMeasurements);
        setPreviousProgressMeasurements(previousMeasurements);
        return;
      }
      try {
        const result = await callOnlyPumpProfileApi(telegramInitData, "load_progress", { date: selectedDateKey });
        if (cancelled) return;
        applyProgressResponse(result, { syncNutrition: false });
      } catch (error) {
        if (!cancelled) {
          console.error("onlypump-profile-api progress error:", error);
          setSaveError("Не удалось загрузить замеры. Показываю последние локальные значения.");
        }
      }
    };
    loadProgress();
    return () => {
      cancelled = true;
    };
  }, [applyProgressResponse, isRemoteProgress, selectedDateKey, telegramInitData, profile?.id]);

  const saveProgress = useCallback((nextMeasurements, nextGoalType = goalType, nextGoalIntensityPercent = goalIntensityPercent) => {
    clearTimeout(saveTimerRef.current);
    const sequence = ++saveSequenceRef.current;
    setProgressMarkedDateKeys(prev => normalizeNutritionFilledDateKeys([...prev, selectedDateKey]));
    if (!isRemoteProgress) {
      setMeasurements(nextMeasurements);
      setProgressGoal(prev => ({
        ...prev,
        goalType: nextGoalType,
        title: profileGoalTypeLabels[nextGoalType] || prev.title,
        goalIntensityPercent: normalizeGoalIntensityPercent(nextGoalType, nextGoalIntensityPercent),
        deficitPercent: nextGoalType === "fat_loss" ? normalizeDeficitPercent(nextGoalIntensityPercent) : prev.deficitPercent,
      }));
      return;
    }
    saveTimerRef.current = setTimeout(async () => {
      setIsProgressSaving(true);
      setSaveError("");
      try {
        const payload = progressPayloadFromMeasurements(selectedDateKey, nextMeasurements, nextGoalType, nextGoalIntensityPercent);
        console.log("SAVE PROGRESS MEASUREMENT", payload);
        const result = await callOnlyPumpProfileApi(telegramInitData, "save_progress_measurement", payload);
        console.log("SAVE PROGRESS RESPONSE", result);
        if (sequence !== saveSequenceRef.current) return;
        applyProgressResponse(result, { syncNutrition: true });
      } catch (error) {
        console.error("onlypump-profile-api progress error:", error);
        console.log("SAVE PROGRESS ERROR", error);
        setSaveError("Не удалось сохранить замер. Я оставил изменения на экране, попробую при следующем вводе.");
      } finally {
        if (sequence === saveSequenceRef.current) setIsProgressSaving(false);
      }
    }, 450);
  }, [applyProgressResponse, goalIntensityPercent, goalType, isRemoteProgress, selectedDateKey, setMeasurements, setProgressGoal, telegramInitData]);

  const updateMeasurement = (field, value) => {
    const number = value === "" ? "" : Number(value);
    const next = { ...progressMeasurements, [field]: Number.isFinite(number) ? number : "" };
    setProgressMeasurements(next);
    setMeasurements(next);
    if (value !== "") saveProgress(next, goalType, goalIntensityPercent);
  };

  const updateGoalType = (value) => {
    const nextGoalType = value || "recomposition";
    const nextIntensity = normalizeGoalIntensityPercent(nextGoalType, goalIntensityPercent);
    setProgressGoal(prev => ({
      ...prev,
      goalType: nextGoalType,
      title: profileGoalTypeLabels[nextGoalType] || prev.title,
      goalIntensityPercent: nextIntensity,
      deficitPercent: nextGoalType === "fat_loss" ? normalizeDeficitPercent(nextIntensity) : prev.deficitPercent,
    }));
    saveProgress(progressMeasurements, nextGoalType, nextIntensity);
  };

  const updateGoalIntensityPercent = (value) => {
    setGoalIntensityInput(value);
    const validation = validateGoalIntensity(value);
    if (!validation.valid) {
      clearTimeout(saveTimerRef.current);
      saveSequenceRef.current += 1;
      setGoalIntensityError(validation.message);
      return;
    }
    const nextIntensity = validation.value;
    setGoalIntensityError("");
    setProgressGoal(prev => ({
      ...prev,
      goalIntensityPercent: nextIntensity,
      deficitPercent: goalType === "fat_loss" ? normalizeDeficitPercent(nextIntensity) : prev.deficitPercent,
    }));
    saveProgress(progressMeasurements, goalType, nextIntensity);
  };

  const bodyProgress = useMemo(() => {
    const parts = [];
    const weightStart = Number(previousMeasurements.weight);
    const weightCurrent = Number(progressMeasurements.weight || measurements.weight);
    const weightTarget = Number(progressGoal.targetWeight);
    if (hasPositiveMetric(weightStart) && hasPositiveMetric(weightCurrent) && hasPositiveMetric(weightTarget) && weightStart !== weightTarget) {
      const total = Math.abs(weightStart - weightTarget);
      const done = Math.abs(weightStart - weightCurrent);
      parts.push(Math.min(100, (done / total) * 100));
    }

    const waistStart = Number(previousMeasurements.waist);
    const waistCurrent = Number(progressMeasurements.waist || measurements.waist);
    const waistTarget = Number(progressGoal.targetWaist);
    if (hasPositiveMetric(waistStart) && hasPositiveMetric(waistCurrent) && hasPositiveMetric(waistTarget) && waistStart !== waistTarget) {
      const total = Math.abs(waistStart - waistTarget);
      const done = Math.abs(waistStart - waistCurrent);
      parts.push(Math.min(100, (done / total) * 100));
    }

    return parts.length ? Math.min(100, Math.round(parts.reduce((sum, value) => sum + value, 0) / parts.length)) : 0;
  }, [measurements, previousMeasurements, progressGoal, progressMeasurements]);

  return <><Header title="Прогресс" subtitle="Силовые показатели связаны с вкладкой тренировок. Замеры и цель можно менять вручную."/>
    <div className="mt-8">
      <IOSWeekCalendar title="Неделя прогресса" selectedDateKey={selectedDateKey} onSelect={setSelectedDateKey} markedDateKeys={progressMarkedDateKeys} markerClassName="bg-white"/>
    </div>
    <div className="mt-8 grid gap-4 xl:grid-cols-[1.15fr_0.85fr]">
      <Card className="p-5">
        <div className="flex items-start justify-between gap-4">
          <div>
            <h2 className="text-xl font-semibold">Прогресс в силовых</h2>
            <p className="mt-2 break-words text-sm text-zinc-400">Данные берутся из упражнений, подходов, веса и повторов во вкладке «Тренировки».</p>
          </div>
          <div className="text-right">
            <div className="text-3xl font-semibold text-red-500">{strengthStats.avgStrength}</div>
            <div className="text-xs text-zinc-500">средний 1ПМ</div>
          </div>
        </div>

        <div className="mt-5 grid gap-3 md:grid-cols-3">
          <div className="rounded-xl border border-white/10 bg-white/[0.03] p-4"><p className="text-xs text-zinc-500">Упражнений</p><div className="mt-2 text-2xl">{strengthStats.list.length}</div></div>
          <div className="rounded-xl border border-white/10 bg-white/[0.03] p-4"><p className="text-xs text-zinc-500">Тоннаж</p><div className="mt-2 text-2xl">{strengthStats.totalVolume.toLocaleString("ru-RU")} кг</div></div>
          <div className="rounded-xl border border-white/10 bg-white/[0.03] p-4"><p className="text-xs text-zinc-500">Цель силы</p><div className="mt-2 text-2xl">{strengthTargetPercent ? `+${strengthTargetPercent}%` : "—"}</div></div>
        </div>

        <div className="mt-6 space-y-3">
          {strengthStats.list.slice(0, 8).map(item => <div key={item.name} className="rounded-2xl border border-white/10 bg-white/[0.03] p-4">
            <div className="flex items-center justify-between gap-3">
              <div>
                <h3 className="break-words text-sm font-semibold">{item.name}</h3>
                <p className="mt-1 text-xs text-zinc-500">{item.muscle} · лучший сет {item.bestSet}</p>
              </div>
              <div className="text-right">
                <div className="text-lg font-semibold">{item.oneRepMax} кг</div>
                <div className="text-[10px] text-zinc-500">расчётный 1ПМ</div>
              </div>
            </div>
            <div className="mt-3"><Progress value={strengthTargetPercent ? Math.min(100, Math.round((item.oneRepMax / Math.max(1, item.oneRepMax * (1 + strengthTargetPercent / 100))) * 100)) : 0}/></div>
          </div>)}
        </div>
      </Card>

      <div className="space-y-4">
        <Card className="p-5">
          <Target className="text-red-500"/>
          <h2 className="mt-5 text-xl font-semibold">Цель</h2>
          <label className="mt-4 block rounded-xl bg-white/[0.03] p-3">
            <span className="text-[10px] uppercase tracking-wider text-zinc-500">Цель</span>
            <select value={goalType} onChange={(e) => updateGoalType(e.target.value)} className="mt-1 w-full bg-transparent text-lg font-semibold text-zinc-100 outline-none">
              {Object.entries(profileGoalTypeLabels).map(([value, label]) => <option key={value} value={value} className="bg-zinc-950 text-zinc-100">{label}</option>)}
            </select>
          </label>
          <div className={`mt-3 grid gap-2 ${showGoalIntensity ? "grid-cols-2 sm:grid-cols-3" : "grid-cols-2"}`}>
            <label className="rounded-xl bg-white/[0.03] p-3"><span className="text-[10px] uppercase tracking-wider text-zinc-500">Вес</span><input type="number" value={progressMeasurements.weight ?? ""} onChange={(e) => updateMeasurement("weight", e.target.value)} className="mt-1 w-full bg-transparent text-base outline-none" /></label>
            <label className="rounded-xl bg-white/[0.03] p-3"><span className="text-[10px] uppercase tracking-wider text-zinc-500">Талия</span><input type="number" value={progressMeasurements.waist ?? ""} onChange={(e) => updateMeasurement("waist", e.target.value)} className="mt-1 w-full bg-transparent text-base outline-none" /></label>
            {showGoalIntensity && <label className="rounded-xl bg-white/[0.03] p-3"><span className="text-[10px] uppercase tracking-wider text-zinc-500">{goalType === "muscle_gain" ? "Сила профицита, %" : "Сила дефицита, %"}</span><input type="number" min="0" max="50" value={goalIntensityInput} onFocus={() => { goalIntensityFocusedRef.current = true; }} onBlur={() => { goalIntensityFocusedRef.current = false; const validation = validateGoalIntensity(goalIntensityInput); if (!validation.valid && goalIntensityInput === "") { setGoalIntensityInput(String(goalIntensityPercent)); setGoalIntensityError(""); } }} onChange={(e) => updateGoalIntensityPercent(e.target.value)} className="mt-1 w-full bg-transparent text-base outline-none" /></label>}
          </div>
          {showGoalIntensity && <GoalIntensityBar goalType={goalType} value={goalIntensityPercent}/>}
          {goalIntensityError && <p className="mt-3 rounded-2xl bg-red-500/10 p-3 text-xs text-red-300">{goalIntensityError}</p>}
          {showGoalIntensity && <>
            <div className="mt-5 text-5xl">{bodyProgress}%</div>
            <div className="mt-5"><Progress value={bodyProgress}/></div>
          </>}
          <p className="mt-3 text-xs text-zinc-500">{isProgressSaving ? "Сохраняю..." : "Автосохранение включено"}</p>
        </Card>

        <Card className="p-5">
          <h2 className="text-xl font-semibold">Замеры</h2>
          <div className="mt-5 grid grid-cols-2 gap-3">
            {progressMeasurementFields.map(({ field, label, unit }) => {
              const current = progressMeasurements[field] ?? "";
              const previous = previousProgressMeasurements[field] ?? current;
              const currentNumber = Number(current || 0);
              const previousNumber = Number(previous || currentNumber || 0);
              const delta = Number((currentNumber - previousNumber).toFixed(1));
              return <label key={field} className="rounded-xl border border-white/10 bg-white/[0.03] p-3">
                <span className="flex items-center justify-between gap-2 text-[10px] uppercase tracking-wider text-zinc-500">
                  <span>{label}</span>
                  <span className={delta < 0 ? "text-red-400" : delta > 0 ? "text-zinc-300" : "text-zinc-600"}>{delta > 0 ? "+" : ""}{delta}</span>
                </span>
                <div className="mt-1 flex items-center gap-1">
                  <input type="number" value={current} onChange={(e) => updateMeasurement(field, e.target.value)} className="w-full bg-transparent text-base outline-none" />
                  <span className="text-xs text-zinc-500">{unit}</span>
                </div>
              </label>
            })}
          </div>
          {saveError && <p className="mt-4 rounded-2xl bg-red-500/10 p-3 text-sm text-red-300">{saveError}</p>}
        </Card>
      </div>
    </div>
  </>;
}
