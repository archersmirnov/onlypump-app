function syncOnlyPumpViewportHeight(tg) {
  const telegramHeight = Number(tg?.viewportHeight || tg?.viewportStableHeight || 0);
  const browserHeight = Number(window.visualViewport?.height || window.innerHeight || document.documentElement.clientHeight || 0);
  const nextHeight = Math.max(320, Math.round(telegramHeight || browserHeight));
  if (nextHeight) {
    document.documentElement.style.setProperty("--tg-viewport-height", `${nextHeight}px`);
    document.documentElement.style.setProperty("--onlypump-app-height", `${nextHeight}px`);
  }
}

function syncOnlyPumpSafeArea(tg) {
  const safeArea = tg?.safeAreaInset || {};
  const contentSafeArea = tg?.contentSafeAreaInset || {};
  const safeTop = Math.max(0, Number(safeArea.top || 0));
  const safeBottom = Math.max(0, Number(safeArea.bottom || 0));
  const contentTopRaw = Math.max(0, Number(contentSafeArea.top || 0));
  const contentBottom = Math.max(0, Number(contentSafeArea.bottom || 0));
  const telegramTopFallback = tg && Math.max(safeTop, contentTopRaw) === 0 ? 72 : 0;
  const contentTop = Math.max(contentTopRaw, telegramTopFallback);

  document.documentElement.style.setProperty("--tg-safe-area-top", `${safeTop}px`);
  document.documentElement.style.setProperty("--tg-safe-area-bottom", `${safeBottom}px`);
  document.documentElement.style.setProperty("--tg-content-safe-area-top", `${contentTop}px`);
  document.documentElement.style.setProperty("--tg-content-safe-area-bottom", `${contentBottom}px`);
}

function initTelegramWebApp() {
  const tg = window.Telegram?.WebApp;
  const safeCall = (callback) => {
    try { callback(); } catch (error) {}
  };

  if (tg) {
    safeCall(() => tg.ready());
    safeCall(() => tg.expand());
    if (typeof tg.requestFullscreen === "function") {
      safeCall(() => tg.requestFullscreen());
    }
    if (typeof tg.disableVerticalSwipes === "function") {
      safeCall(() => tg.disableVerticalSwipes());
    }
    if (typeof tg.setHeaderColor === "function") {
      safeCall(() => tg.setHeaderColor("#000000"));
    }
    if (typeof tg.setBackgroundColor === "function") {
      safeCall(() => tg.setBackgroundColor("#000000"));
    }
  }

  const updateViewport = () => syncOnlyPumpViewportHeight(tg);
  const updateSafeArea = () => syncOnlyPumpSafeArea(tg);
  updateViewport();
  updateSafeArea();
  if (typeof tg?.onEvent === "function") {
    safeCall(() => tg.onEvent("viewportChanged", updateViewport));
    safeCall(() => tg.onEvent("safeAreaChanged", updateSafeArea));
    safeCall(() => tg.onEvent("contentSafeAreaChanged", updateSafeArea));
  }
  window.visualViewport?.addEventListener("resize", updateViewport);
  window.addEventListener("resize", updateViewport);

  return tg;
}

function safeProfileNumber(value, fallback) {

function normalizeProfileRecord(record = {}, fallback = DEFAULT_PROFILE) {
  return {
    ...fallback,
    id: record.id !== undefined ? (record.id || null) : (fallback.id || null),
    telegram_id: record.telegram_id != null ? String(record.telegram_id) : fallback.telegram_id,
    telegram_username: record.telegram_username !== undefined ? (record.telegram_username || null) : (fallback.telegram_username || null),

    weight_kg: safeProfileNumber(record.weight_kg, fallback.weight_kg || DEFAULT_PROFILE.weight_kg),
    height_cm: safeProfileNumber(record.height_cm, fallback.height_cm || DEFAULT_PROFILE.height_cm),
    goal: record.goal || fallback.goal || DEFAULT_PROFILE.goal,
    source: record.source || fallback.source || "supabase",
  };
}

async function verifyTelegramUserProfile(initData, fallback = DEFAULT_PROFILE) {
  const localProfile = normalizeProfileRecord({ ...fallback, source: "fallback" }, fallback);
  if (!initData) return { profile: localProfile, status: "local" };

  try {
    console.log("Calling verify-telegram-user");
    const response = await fetch(VERIFY_TELEGRAM_USER_URL, {
      method: "POST",
      headers: {
        Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
        apikey: SUPABASE_PUBLISHABLE_KEY,
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ initData }),
    });
    const result = await response.json().catch(() => ({}));
    if (!response.ok || result?.ok !== true || !result?.profile) {
      throw result?.error || result?.message || new Error(`verify-telegram-user failed with ${response.status}`);
    }

    const profile = normalizeProfileRecord({ ...result.profile, source: "supabase" }, localProfile);
    console.log("Verified profile:", profile);
    return { profile, status: "verified" };
  } catch (error) {
    console.error("verify-telegram-user error:", error);
    return { profile: localProfile, status: "local" };
  }
}

const onlypumpBackLayers = new Map();
let onlypumpBackLayerOrder = 0;

function notifyOnlyPumpBackLayers() {
  window.dispatchEvent(new CustomEvent("onlypump:back-layers-change", {
    detail: { count: onlypumpBackLayers.size },
  }));
}

function runOnlyPumpBackLayer() {
  const layer = Array.from(onlypumpBackLayers.values())
    .sort((a, b) => b.priority - a.priority || b.order - a.order)[0];
  if (!layer) return false;
  layer.onBack?.();
  return true;
}

function useBackLayerCount() {
  const [count, setCount] = useState(0);
  useEffect(() => {
    const update = () => setCount(onlypumpBackLayers.size);
    update();
    window.addEventListener("onlypump:back-layers-change", update);
    return () => window.removeEventListener("onlypump:back-layers-change", update);
  }, []);
  return count;
}

function useAppBackLayer(id, active, onBack, priority = 100) {
  const handlerRef = useRef(onBack);
  useEffect(() => {
    handlerRef.current = onBack;
  }, [onBack]);

  useEffect(() => {
    if (!active) {
      if (onlypumpBackLayers.delete(id)) notifyOnlyPumpBackLayers();
      return;
    }

    const order = ++onlypumpBackLayerOrder;
    onlypumpBackLayers.set(id, {
      id,
      priority,
      order,
      onBack: () => handlerRef.current?.(),
    });
    notifyOnlyPumpBackLayers();

    return () => {
      const layer = onlypumpBackLayers.get(id);
      if (layer?.order === order) {
        onlypumpBackLayers.delete(id);
        notifyOnlyPumpBackLayers();
      }
    };
  }, [id, active, priority]);
}

function BackLayer({ id, onBack, priority = 100 }) {
  const fallbackId = useRef(`back-layer-${Date.now()}-${Math.random().toString(16).slice(2)}`);
  useAppBackLayer(id || fallbackId.current, true, onBack, priority);
  return null;
}

function isSheetDragIgnored(target) {
  return Boolean(target?.closest?.('input, textarea, select, button, [contenteditable="true"], [data-no-sheet-drag="true"]'));
}

function closestScrollableParent(target, boundary) {
  let node = target;
  while (node && node !== boundary) {
    const style = window.getComputedStyle(node);
    if (/(auto|scroll)/.test(style.overflowY) && node.scrollHeight > node.clientHeight) return node;
    node = node.parentElement;
  }
  return null;
}

function BottomSheetPanel({ children, className = "", onClose, priority = 150, style = {}, ...props }) {
  const idRef = useRef(`sheet-${Date.now()}-${Math.random().toString(16).slice(2)}`);
  const panelRef = useRef(null);
  const dragRef = useRef(null);
  const [dragY, setDragY] = useState(0);
  const [dragging, setDragging] = useState(false);

  useAppBackLayer(idRef.current, true, onClose, priority);

  const resetDrag = () => {
    dragRef.current = null;
    setDragging(false);
    setDragY(0);
  };

  const startDrag = (event) => {
    const panel = panelRef.current;
    if (!panel || isSheetDragIgnored(event.target)) return;
    const scrollable = closestScrollableParent(event.target, panel);
    if (scrollable && scrollable.scrollTop > 0) return;

    dragRef.current = {
      pointerId: event.pointerId,
      startX: event.clientX,
      startY: event.clientY,
      lastY: event.clientY,
      startedAt: Date.now(),
      scrollable,
      active: false,
    };
    setDragging(true);
    event.currentTarget.setPointerCapture?.(event.pointerId);
  };

  const moveDrag = (event) => {
    const drag = dragRef.current;
    if (!drag || drag.pointerId !== event.pointerId) return;
    const dx = event.clientX - drag.startX;
    const dy = event.clientY - drag.startY;
    drag.lastY = event.clientY;

    if (!drag.active) {
      if (Math.abs(dx) > Math.abs(dy) + 8) {
        resetDrag();
        return;
      }
      if (dy < 8) return;
      drag.active = true;
    }

    if (drag.scrollable && drag.scrollable.scrollTop > 0) {
      resetDrag();
      return;
    }

    event.preventDefault();
    setDragY(Math.max(0, dy));
  };

  const endDrag = (event) => {
    const drag = dragRef.current;
    if (!drag || drag.pointerId !== event.pointerId) return;
    const dy = Math.max(0, event.clientY - drag.startY);
    const elapsed = Math.max(1, Date.now() - drag.startedAt);
    const velocity = dy / elapsed;
    const shouldClose = dy > 100 || (dy > 45 && velocity > 0.55);

    dragRef.current = null;
    setDragging(false);
    if (shouldClose) {
      setDragY(0);
      onClose?.();
    } else {
      setDragY(0);
    }
  };

  return <div
    {...props}
    ref={panelRef}
    data-no-edge-back="true"
    data-sheet-panel="true"
    onPointerDown={startDrag}
    onPointerMove={moveDrag}
    onPointerUp={endDrag}
    onPointerCancel={resetDrag}
    style={{
      ...style,
      transform: `translate3d(0, ${dragY}px, 0)`,
      transition: dragging ? "none" : "transform 220ms cubic-bezier(0.22, 1, 0.36, 1)",
      touchAction: dragging ? "none" : "pan-y",
    }}
    className={`onlypump-sheet-panel ${className}`}
  >
    {children}
  </div>;
}

const nutritionHomeWidgetIds = ["metricCalories", "metricProtein", "macros", "nutrition"];

function enforceHomeWidgetRules(widgets = []) {
  const unique = [];
  widgets.forEach(id => {
    if (!unique.includes(id)) unique.push(id);
  });

  const withoutNutritionGroup = unique.filter(id => !nutritionHomeWidgetIds.includes(id));
  const insertAtFirstNutritionPosition = (items) => {
    const firstNutritionIndex = unique.findIndex(id => nutritionHomeWidgetIds.includes(id));
    if (firstNutritionIndex === -1) return [...withoutNutritionGroup, ...items];
    const before = unique.slice(0, firstNutritionIndex).filter(id => !nutritionHomeWidgetIds.includes(id));
    const after = unique.slice(firstNutritionIndex).filter(id => !nutritionHomeWidgetIds.includes(id));
    return [...before, ...items, ...after];
  };

  if (unique.includes("nutrition")) return insertAtFirstNutritionPosition(["nutrition"]);
  if (unique.includes("macros")) return insertAtFirstNutritionPosition(["metricCalories", "macros"]);
  if (unique.includes("metricProtein")) return insertAtFirstNutritionPosition(["metricCalories", "metricProtein"]);
  if (unique.includes("metricCalories")) return insertAtFirstNutritionPosition(["metricCalories", "metricProtein"]);

  return unique;
}

function buildHomeWidgetsAfterAdding(prevWidgets, id) {
  const withoutNutritionGroup = prevWidgets.filter(widgetId => !nutritionHomeWidgetIds.includes(widgetId));
  const compactInsertIndex = withoutNutritionGroup.findIndex(widgetId => homeWidgetCatalog.find(w => w.id === widgetId)?.span !== "compact");
  const insertCompact = (items) => {
    const cleanItems = items.filter((item, index) => items.indexOf(item) === index);
    if (compactInsertIndex === -1) return [...withoutNutritionGroup, ...cleanItems];
    return [...withoutNutritionGroup.slice(0, compactInsertIndex), ...cleanItems, ...withoutNutritionGroup.slice(compactInsertIndex)];
  };

  if (id === "nutrition") return insertCompact(["nutrition"]);
  if (id === "macros") return insertCompact(["metricCalories", "macros"]);
  if (id === "metricProtein") return insertCompact(["metricCalories", "metricProtein"]);
  if (id === "metricCalories") {
    if (prevWidgets.includes("macros")) return insertCompact(["metricCalories", "macros"]);
    return insertCompact(["metricCalories", "metricProtein"]);
  }

  if (prevWidgets.includes(id)) return enforceHomeWidgetRules(prevWidgets);
  const catalogItem = homeWidgetCatalog.find(w => w.id === id);
  if (catalogItem?.span === "compact") {
    const firstLargeIndex = prevWidgets.findIndex(widgetId => homeWidgetCatalog.find(w => w.id === widgetId)?.span !== "compact");
    const next = firstLargeIndex === -1
      ? [...prevWidgets, id]
      : [...prevWidgets.slice(0, firstLargeIndex), id, ...prevWidgets.slice(firstLargeIndex)];
    return enforceHomeWidgetRules(next);
  }
  return enforceHomeWidgetRules([...prevWidgets, id]);
}

function buildHomeWidgetsAfterRemoving(prevWidgets, id) {
  let next = prevWidgets.filter(widgetId => widgetId !== id);
  if (id === "metricCalories") next = next.filter(widgetId => widgetId !== "metricProtein" && widgetId !== "macros");
  if (id === "metricProtein") next = next.filter(widgetId => widgetId !== "metricCalories");
  if (id === "macros") next = next.filter(widgetId => widgetId !== "metricCalories");
  return enforceHomeWidgetRules(next);
}

const parseDateKeyLocal = (dateKey) => {
  const [year, month, day] = String(dateKey || "").split("-").map(Number);
  if (year && month && day) return new Date(year, month - 1, day);
  const fallback = new Date(dateKey);
  return Number.isNaN(fallback.getTime()) ? new Date() : fallback;
};
const formatDateKey = (date) => {
  const safeDate = date instanceof Date ? date : new Date(date);
  const year = safeDate.getFullYear();
  const month = String(safeDate.getMonth() + 1).padStart(2, "0");
  const day = String(safeDate.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
};
const addDays = (days) => {
  const date = new Date();
  date.setDate(date.getDate() + days);
  return date;
};
const formatCycleDate = (dateKey) => {
  if (!dateKey) return "Дата не выбрана";
  const date = parseDateKeyLocal(dateKey);
  if (Number.isNaN(date.getTime())) return "Дата не выбрана";
  return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', weekday: 'short' });
};

const formatCycleCardDate = (dateKey) => {
  if (!dateKey) return "Дата";
  const today = new Date();
  const date = parseDateKeyLocal(dateKey);
  if (Number.isNaN(date.getTime())) return "Дата";
  const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const dateStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diffDays = Math.round((dateStart - todayStart) / (1000 * 60 * 60 * 24));

  if (diffDays >= 0 && diffDays <= 6) {
    return date.toLocaleDateString('ru-RU', { weekday: 'long' });
  }

  return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
};

const onlypumpUuidPattern = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
const createOnlyPumpUuid = () => {
  const cryptoApi = globalThis.crypto;
  if (typeof cryptoApi?.randomUUID === "function") return cryptoApi.randomUUID();
  const bytes = new Uint8Array(16);
  if (cryptoApi?.getRandomValues) cryptoApi.getRandomValues(bytes);
  else bytes.forEach((_, index) => { bytes[index] = Math.floor(Math.random() * 256); });
  bytes[6] = (bytes[6] & 0x0f) | 0x40;
  bytes[8] = (bytes[8] & 0x3f) | 0x80;
  const hex = [...bytes].map(byte => byte.toString(16).padStart(2, "0"));
  return `${hex.slice(0, 4).join("")}-${hex.slice(4, 6).join("")}-${hex.slice(6, 8).join("")}-${hex.slice(8, 10).join("")}-${hex.slice(10, 16).join("")}`;
};
const normalizeSupersetGroupId = (value) => {
  const id = String(value || "").trim();
  return onlypumpUuidPattern.test(id) ? id : null;
};
const getExerciseSupersetGroupId = (exercise = {}) => normalizeSupersetGroupId(exercise.supersetGroupId || exercise.supersetId || exercise.superset_group_id);
const normalizeWorkoutSupersetMetadata = (workout) => {
  if (!workout) return workout;
  const exercises = workout.exercises || [];
  const groupCounts = exercises.reduce((acc, exercise) => {
    const groupId = getExerciseSupersetGroupId(exercise);
    if (groupId) acc[groupId] = (acc[groupId] || 0) + 1;
    return acc;
  }, {});
  const groupOrders = {};
  return {
    ...workout,
    exercises: exercises.map(exercise => {
      const groupId = getExerciseSupersetGroupId(exercise);
      if (!groupId || groupCounts[groupId] < 2) {
        return { ...exercise, supersetId: null, supersetGroupId: null, supersetOrder: null, isSuperset: false };
      }
      groupOrders[groupId] = (groupOrders[groupId] || 0) + 1;
      return {
        ...exercise,
        supersetId: groupId,
        supersetGroupId: groupId,
        supersetOrder: groupOrders[groupId],
        isSuperset: true,
      };
    }),
  };
};

};

  const sets = completedOnly ? getWorkoutSets(workout).filter(set => getSetStatusGlobal(set) === "completed") : getWorkoutSets(workout);
  return sets.reduce((sum, set) => sum + Number(set.weight || 0) * Number(set.reps || 0), 0);
};

const summarizeWorkouts = (items = []) => {
  const sets = items.flatMap(getWorkoutSets);
  const completedSets = sets.filter(set => getSetStatusGlobal(set) === "completed");
  const completedVolume = completedSets.reduce((sum, set) => sum + Number(set.weight || 0) * Number(set.reps || 0), 0);
  const plannedVolume = sets.reduce((sum, set) => sum + Number(set.weight || 0) * Number(set.reps || 0), 0);
  const totalSets = sets.length;
  return {
    completedSets: completedSets.length,
    totalSets,
    completedVolume,
    plannedVolume,
    progress: totalSets ? Math.round((completedSets.length / totalSets) * 100) : 0,
    exerciseCount: items.reduce((sum, workout) => sum + (workout.exercises || []).length, 0),
  };
};

const formatWorkoutDuration = (minutes) => {
  const safe = Number(minutes || 0);
  const h = Math.floor(safe / 60);
  const m = safe % 60;
  if (h && m) return `${h} ч ${m} мин`;
  if (h) return `${h} ч`;
  return `${m} мин`;
};

function SwipeActionRow({ children, actions = [], actionWidth = 68, className = "", rowId, swipedId, setSwipedId }) {
  const [offset, setOffset] = useState(0);
  const startX = useRef(0);
  const startY = useRef(0);
  const startOffset = useRef(0);
  const latestOffset = useRef(0);
  const dragging = useRef(false);
  const didDrag = useRef(false);
  const swiping = useRef(false);
  const maxOffset = -Math.max(1, actions.length) * actionWidth;
  const isExternallyOpen = rowId != null && swipedId === rowId;
  const actionsVisible = offset < -4 || isExternallyOpen;

  const setRowOffset = (value) => {
    const next = Math.max(maxOffset, Math.min(0, value));
    latestOffset.current = next;
    setOffset(next);
  };

  useEffect(() => {
    if (dragging.current) return;
    setRowOffset(isExternallyOpen ? maxOffset : 0);
  }, [isExternallyOpen, maxOffset]);

  const handlePointerDown = (event) => {
    if (rowId != null && swipedId && swipedId !== rowId) setSwipedId?.(null);
    startX.current = event.clientX;
    startY.current = event.clientY;
    startOffset.current = latestOffset.current;
    dragging.current = true;
    didDrag.current = false;
    swiping.current = false;
    event.currentTarget.setPointerCapture?.(event.pointerId);
  };

  const handlePointerMove = (event) => {
    if (!dragging.current) return;
    const dx = event.clientX - startX.current;
    const dy = event.clientY - startY.current;
    if (!swiping.current && Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
    if (swiping.current || Math.abs(dx) > Math.abs(dy) + 4) {
      swiping.current = true;
      didDrag.current = true;
      if (dx < -8 && rowId != null) setSwipedId?.(rowId);
      event.preventDefault();
      setRowOffset(startOffset.current + dx);
    }
  };

  const handlePointerUp = (event) => {
    if (!dragging.current) return;
    dragging.current = false;
    try { event?.currentTarget?.releasePointerCapture?.(event.pointerId); } catch {}
    const shouldOpen = latestOffset.current < maxOffset * 0.35;
    setRowOffset(shouldOpen ? maxOffset : 0);
    if (rowId != null) setSwipedId?.(shouldOpen ? rowId : null);
    setTimeout(() => { didDrag.current = false; }, 120);
    swiping.current = false;
  };

  return <div data-no-edge-back="true" data-swipe-row="true" className={`relative overflow-hidden rounded-[22px] ${className}`} style={{ touchAction: 'pan-y' }}>
    <div
      className="absolute inset-y-0 right-0 z-0 flex transition-all duration-200"
      style={{
        pointerEvents: actionsVisible ? "auto" : "none",
        opacity: actionsVisible ? 1 : 0,
        visibility: actionsVisible ? "visible" : "hidden",
        transform: actionsVisible ? "translateX(0)" : "translateX(100%)",
      }}
    >
      {actions.map(action => <button
        key={action.label}
        type="button"
        onClick={(event) => { event.stopPropagation(); setRowOffset(0); setSwipedId?.(null); action.onClick?.(); }}
        className={`flex h-full items-center justify-center text-lg font-black text-white ${action.className || 'bg-red-500'}`}
        style={{ width: actionWidth }}
        aria-label={action.label}
      >
        {action.icon || action.label}
      </button>)}
    </div>
    <div
      onPointerDown={handlePointerDown}
      onPointerMove={handlePointerMove}
      onPointerUp={handlePointerUp}
      onPointerCancel={handlePointerUp}
      onClickCapture={(event) => {
        if (didDrag.current) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }
        if (latestOffset.current < 0) {
          event.preventDefault();
          event.stopPropagation();
          setRowOffset(0);
          setSwipedId?.(null);
        }
      }}
      style={{ transform: `translateX(${offset}px)`, transition: dragging.current ? 'none' : 'transform 180ms ease' }}
      className="relative z-10 bg-zinc-950"
    >
      {children}
    </div>
  </div>;
}


const getDayOffsetFromToday = (dateKey) => {
  const today = new Date();
  const date = parseDateKeyLocal(dateKey);
  if (Number.isNaN(date.getTime())) return 0;
  const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const dateStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  return Math.round((dateStart - todayStart) / (1000 * 60 * 60 * 24));
};

const clampNumber = (value, min = 0, max = Infinity) => Math.max(min, Math.min(max, Number(value || 0)));

const buildNutritionTotalsForDate = (dateKey, baseTotals = {}) => {
  const diff = getDayOffsetFromToday(dateKey);
  if (diff === 0) return baseTotals;
  const wave = ((Math.abs(diff) * 73) % 17) - 8;
  return {
    calories: Math.round(clampNumber(baseTotals.calories || 2320, 1200) + diff * 35 + wave * 18),
    protein: Math.round(clampNumber(baseTotals.protein || 190, 80) + diff * 2 + wave),
    fat: Math.round(clampNumber(baseTotals.fat || 65, 25) + Math.round(wave / 2)),
    carbs: Math.round(clampNumber(baseTotals.carbs || 220, 60) + diff * 5 + wave * 2),
  };
};

const buildMealsForDate = (dateKey, baseMeals = []) => {
  const diff = getDayOffsetFromToday(dateKey);
  if (diff === 0 && baseMeals.length) return baseMeals;
  const totals = buildNutritionTotalsForDate(dateKey, baseMeals.reduce((acc, meal) => ({
    calories: acc.calories + Number(meal.calories || 0),
    protein: acc.protein + Number(meal.protein || 0),
    fat: acc.fat + Number(meal.fat || 0),
    carbs: acc.carbs + Number(meal.carbs || 0),
  }), { calories: 2320, protein: 190, fat: 65, carbs: 220 }));
  return [
    { id: `day-${dateKey}-1`, name: "Завтрак", food: diff < 0 ? "Яйца, тосты, ягоды" : "Омлет, хлеб, кофе", calories: Math.round(totals.calories * 0.27), protein: Math.round(totals.protein * 0.25), fat: Math.round(totals.fat * 0.35), carbs: Math.round(totals.carbs * 0.25) },
    { id: `day-${dateKey}-2`, name: "Обед", food: diff < 0 ? "Курица, картофель, овощи" : "Рис, курица, салат", calories: Math.round(totals.calories * 0.34), protein: Math.round(totals.protein * 0.34), fat: Math.round(totals.fat * 0.25), carbs: Math.round(totals.carbs * 0.38) },
    { id: `day-${dateKey}-3`, name: "Перекус", food: "Йогурт, фрукт, протеин", calories: Math.round(totals.calories * 0.15), protein: Math.round(totals.protein * 0.18), fat: Math.round(totals.fat * 0.1), carbs: Math.round(totals.carbs * 0.15) },
    { id: `day-${dateKey}-4`, name: "Ужин", food: diff > 0 ? "Рыба, картофель, салат" : "Рыба, рис, овощи", calories: Math.round(totals.calories * 0.24), protein: Math.round(totals.protein * 0.23), fat: Math.round(totals.fat * 0.3), carbs: Math.round(totals.carbs * 0.22) },
  ];
};

const buildWorkoutSummaryForDate = (dateKey, baseSummary = {}) => {
  const diff = getDayOffsetFromToday(dateKey);
  if (diff === 0) return baseSummary;
  const totalSets = Number(baseSummary.totalSets || 9);
  const completedSets = diff < 0 ? totalSets : Math.max(0, Math.min(totalSets, Number(baseSummary.completedSets || 0) - Math.abs(diff % 3)));
  const completedVolume = Math.max(0, Math.round(Number(baseSummary.completedVolume || 4200) + diff * 240));
  return {
    ...baseSummary,
    totalSets,
    completedSets,
    completedVolume,
    plannedVolume: Math.max(completedVolume, Number(baseSummary.plannedVolume || completedVolume + 2200)),
    progress: totalSets ? Math.round((completedSets / totalSets) * 100) : 0,
    exerciseCount: Number(baseSummary.exerciseCount || 4),
  };
};

const buildMeasurementsForDate = (dateKey, baseMeasurements = {}) => {
  const diff = getDayOffsetFromToday(dateKey);
  if (diff === 0) return baseMeasurements;
  const drift = diff * 0.08;
  return {
    ...baseMeasurements,
    weight: Number(clampNumber(baseMeasurements.weight || 90, 40, 250) + drift).toFixed(1).replace(/\.0$/, ""),
    bodyFat: Number(clampNumber(baseMeasurements.bodyFat || 12.9, 3, 60) + diff * 0.03).toFixed(1),
    waist: Number(clampNumber(baseMeasurements.waist || 78, 40, 180) + diff * 0.05).toFixed(1).replace(/\.0$/, ""),
    belly: Number(clampNumber(baseMeasurements.belly || 84, 40, 200) + diff * 0.06).toFixed(1).replace(/\.0$/, ""),
  };
};

function IOSWeekCalendar({ title = "Календарь", selectedDateKey, onSelect, markedDateKeys = [], className = "" }) {
  const [startOffset, setStartOffset] = useState(-3);
  const [dragX, setDragX] = useState(0);
  const [historyOpen, setHistoryOpen] = useState(false);
  const dragRef = useRef(null);
  const suppressCalendarClickRef = useRef(false);
  const suppressResetRef = useRef(null);
  useAppBackLayer(`calendar-history-${title}`, historyOpen, () => setHistoryOpen(false), 130);
  const todayKey = formatDateKey(new Date());
  const days = Array.from({ length: 7 }, (_, i) => {
    const date = addDays(startOffset + i);
    const key = formatDateKey(date);
    return { date, key };
  });

  const startCalendarDrag = (event) => {
    clearTimeout(suppressResetRef.current);
    dragRef.current = {
      pointerId: event.pointerId,
      startX: event.clientX,
      lastX: event.clientX,
      hasDragged: false,
    };
    setDragX(0);
    suppressCalendarClickRef.current = false;
    event.currentTarget.setPointerCapture?.(event.pointerId);
  };

  const moveCalendarDrag = (event) => {
    const drag = dragRef.current;
    if (!drag || drag.pointerId !== event.pointerId) return;

    const rawDx = event.clientX - drag.startX;
    if (Math.abs(rawDx) > 10) {
      drag.hasDragged = true;
      suppressCalendarClickRef.current = true;
    }
    const dayWidth = 46;
    const steps = Math.trunc(rawDx / dayWidth);

    if (steps !== 0) {
      setStartOffset(prev => prev - steps);
      drag.startX += steps * dayWidth;
      setDragX(rawDx - steps * dayWidth);
    } else {
      setDragX(rawDx);
    }

    event.preventDefault();
  };

  const endCalendarDrag = (event) => {
    if (dragRef.current?.pointerId === event.pointerId) {
      const wasDragged = dragRef.current.hasDragged;
      dragRef.current = null;
      setDragX(0);
      if (wasDragged) {
        clearTimeout(suppressResetRef.current);
        suppressResetRef.current = setTimeout(() => {
          suppressCalendarClickRef.current = false;
        }, 0);
      }
    }
  };

  return <>
    <Card className={`p-4 ${className}`}>
    <button type="button" onClick={() => setHistoryOpen(true)} className="mb-4 flex w-full items-center justify-between gap-3 rounded-2xl text-left transition hover:bg-white/[0.035]">
      <div className="px-1 py-1">
        <h2 className="text-base font-semibold">{title}</h2>
        <p className="mt-1 text-xs text-zinc-500">Неделя на экране. Перетаскивай кружки вправо или влево — шаг равен одному дню.</p>
      </div>
      <CalendarDays className="mr-1 shrink-0 text-zinc-500" size={18}/>
    </button>

    <div
      data-calendar-swipe="true"
      className="overflow-hidden touch-pan-y select-none"
      onPointerDown={startCalendarDrag}
      onPointerMove={moveCalendarDrag}
      onPointerUp={endCalendarDrag}
      onPointerCancel={endCalendarDrag}
    >
      <div
        className="grid grid-cols-7 gap-2 will-change-transform"
        style={{ transform: `translate3d(${dragX}px,0,0)`, transition: dragRef.current ? 'none' : 'transform 180ms ease' }}
      >
        {days.map(({ date, key }) => {
          const selected = selectedDateKey === key;
          const isToday = todayKey === key;
          const marked = markedDateKeys.includes(key);
          return <button key={key} type="button" onClick={() => { if (suppressCalendarClickRef.current) return; onSelect?.(key); }} className="min-w-0 text-center touch-manipulation">
            <div className={`mx-auto flex h-11 w-11 flex-col items-center justify-center rounded-full border transition sm:h-14 sm:w-14 ${selected ? "border-red-500 bg-red-500 text-black" : isToday ? "border-red-500/50 bg-red-500/10 text-red-300" : "border-white/10 bg-white/[0.04] text-zinc-300 hover:border-red-500/40 hover:bg-white/[0.07]"}`}>
              <span className="text-[8px] uppercase leading-none sm:text-[10px]">{date.toLocaleDateString('ru-RU', { weekday: 'short' })}</span>
              <span className="mt-1 text-sm font-semibold leading-none sm:text-xl">{date.getDate()}</span>
            </div>
            <div className="mt-1 flex h-2 items-center justify-center">
              {marked && <span className={`h-1.5 w-1.5 rounded-full ${selected ? "bg-black" : "bg-red-500"}`}/>} 
            </div>
          </button>;
        })}
      </div>
    </div>
    </Card>
    {historyOpen && <CalendarHistoryModal initialDateKey={selectedDateKey} onClose={() => setHistoryOpen(false)} />}
  </>;
}

function MasonryGrid({ children, className = "" }) {
  const gridRef = useRef(null);

  useEffect(() => {
    const grid = gridRef.current;
    if (!grid) return;

    let rafId = null;

    const recalculate = () => {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(() => {
        const styles = window.getComputedStyle(grid);
        const rowGap = parseFloat(styles.rowGap || styles.gap) || 0;
        const rowHeight = parseFloat(styles.gridAutoRows) || 8;

        Array.from(grid.children).forEach((item) => {
          item.style.gridRowEnd = "span 1";
          const height = item.getBoundingClientRect().height;
          const span = Math.max(1, Math.ceil((height + rowGap) / (rowHeight + rowGap)));
          item.style.gridRowEnd = `span ${span}`;
        });
      });
    };

    const observer = new ResizeObserver(recalculate);
    observer.observe(grid);
    Array.from(grid.children).forEach((item) => observer.observe(item));

    recalculate();
    window.addEventListener("resize", recalculate);

    return () => {
      if (rafId) cancelAnimationFrame(rafId);
      window.removeEventListener("resize", recalculate);
      observer.disconnect();
    };
  }, [children]);

  return <div ref={gridRef} className={`onlypump-masonry-grid ${className}`}>{children}</div>;
}

    setHomeWidgets(prev => buildHomeWidgetsAfterAdding(prev, id));
  };

    if (!dragId || dragId === targetId) return;
    setHomeWidgets(prev => {
      const from = prev.indexOf(dragId);
      const targetIndex = prev.indexOf(targetId);
      if (from === -1 || targetIndex === -1) return prev;
      const next = [...prev];
      const [item] = next.splice(from, 1);
      let to = next.indexOf(targetId);
      if (to === -1) return prev;
      if (insertAfter) to += 1;
      next.splice(to, 0, item);

    return items.reduce((best, item) => {
      const rect = item.getBoundingClientRect();

      case "tools":
        return <div key={id} className={widgetSpan(id)}><Tools/></div>;
      default:
        return null;
    }
  };

  const startWidgetDrag = (event, id) => {
    if (!homeEditMode) return;
    if (event.target.closest?.('[data-no-drag="true"]')) return;

    const rect = event.currentTarget.getBoundingClientRect();
    widgetDragRef.current = {
      id,
      pointerId: event.pointerId,
      startX: event.clientX,
      startY: event.clientY,
      startRect: rect,
    };
    setDraggedWidget(id);
    setWidgetDragVisual({ id, dx: 0, dy: 0 });
    event.currentTarget.setPointerCapture?.(event.pointerId);
    event.preventDefault();
  };

  const moveWidgetDrag = (event, id) => {
    const drag = widgetDragRef.current;
    if (!homeEditMode || !drag || drag.id !== id || drag.pointerId !== event.pointerId) return;

    const dx = event.clientX - drag.startX;
    const dy = event.clientY - drag.startY;
    setWidgetDragVisual({ id, dx, dy });

    event.preventDefault();
  };

  const endWidgetDrag = (event, id) => {
    const drag = widgetDragRef.current;
    if (!drag || drag.id !== id || drag.pointerId !== event.pointerId) return;

    const target = getDropTarget(event.clientX, event.clientY, drag.id);
    if (target?.id) moveWidgetToIndex(drag.id, target.id, target.insertAfter);

    widgetDragRef.current = null;
    setDraggedWidget(null);
    setWidgetDragVisual(null);
  };

  const renderEditableWidget = (id) => {
    const widget = renderWidget(id);
    if (!widget) return null;
    const hiddenOnMobile = !homeEditMode && mobileHiddenWidgetIds.includes(id);
    const isDragging = widgetDragVisual?.id === id;
    const dragStyle = isDragging
      ? {
          transform: `translate3d(${widgetDragVisual.dx}px, ${widgetDragVisual.dy}px, 0) scale(1.03)`,
          transition: 'none',
          zIndex: 60,
        }
      : { transition: homeEditMode ? 'transform 180ms ease, opacity 180ms ease' : undefined };

    return <div
      key={id}
      data-home-widget-id={id}
      onPointerDown={(e) => startWidgetDrag(e, id)}
      onPointerMove={(e) => moveWidgetDrag(e, id)}
      onPointerUp={(e) => endWidgetDrag(e, id)}
      onPointerCancel={(e) => endWidgetDrag(e, id)}
      className={`relative min-w-0 ${homeEditMode ? "touch-none select-none cursor-grab active:cursor-grabbing" : "touch-auto"} ${widgetSpan(id)} ${hiddenOnMobile ? "hidden sm:block" : ""} ${draggedWidget === id ? "opacity-95" : ""}`}
      style={dragStyle}
    >
      {homeEditMode && <>
        <button
          type="button"
          data-no-drag="true"
          onPointerDown={(e) => e.stopPropagation()}
          onClick={(e) => { e.stopPropagation(); removeWidget(id); }}
          className="absolute -right-2 -top-2 z-20 flex h-7 w-7 items-center justify-center rounded-full bg-zinc-200 text-lg leading-none text-black shadow-xl shadow-black/40 transition hover:scale-105"
        >×</button>
        <div className="absolute left-3 top-3 z-20 rounded-full bg-black/50 px-2 py-1 text-[10px] text-zinc-300 backdrop-blur">перетащи</div>
      </>}
      <div className={`${homeEditMode && !isDragging ? "onlypump-wiggle rounded-2xl ring-1 ring-white/10" : ""} ${homeEditMode ? "pointer-events-none" : ""}`}>
        {widget}
      </div>
    </div>;
  };


  const openDayFromCalendar = (dateKey) => {
    setSelectedDateKey(dateKey);
  };

  return <>
    <Header title={<>Добро пожаловать, <span className="text-red-500">{displayName}</span></>} subtitle="Продолжай работать. Результат — это система." />
    <div className="mt-5">
      <IOSWeekCalendar
        title="Календарь недели"
        selectedDateKey={selectedDateKey}
        onSelect={openDayFromCalendar}
        markedDateKeys={workouts.map(workout => workout.date)}
      />
    </div>
    <div className="mt-4 flex flex-wrap justify-end gap-2">
      {homeEditMode && <button onClick={() => setWidgetPickerOpen(true)} className="inline-flex items-center gap-2 rounded-full bg-white/10 px-4 py-2 text-sm text-white transition hover:bg-white/15">
        <Plus size={16}/>
        Добавить виджет
      </button>}
      <button onClick={() => setHomeEditMode(prev => !prev)} className={`inline-flex items-center gap-2 rounded-full px-4 py-2 text-sm transition ${homeEditMode ? "bg-red-500 text-black" : "bg-white/5 text-zinc-400 hover:bg-white/10 hover:text-white"}`}>
        <Grid3X3 size={16}/>
        {homeEditMode ? "Готово" : "Настроить вид"}
      </button>
    </div>
    <MasonryGrid className="mt-4 grid-cols-2 gap-3 sm:grid-cols-3 sm:gap-4 xl:grid-cols-4 2xl:grid-cols-7">
      {homeWidgets.map(id => renderEditableWidget(id))}
      {homeWidgets.length === 0 && <Card className="col-span-full p-8 text-center">
        <p className="text-zinc-400">Нет активных виджетов.</p>
        <Button onClick={() => setWidgetPickerOpen(true)} className="mt-4 bg-white/8">Добавить виджет</Button>
      </Card>}
    </MasonryGrid>
    {widgetPickerOpen && <HomeWidgetSettingsModal enabledWidgets={homeWidgets} onAdd={addWidget} onClose={() => setWidgetPickerOpen(false)}/>} 
    <InlineDateDataCard
      context="home"
      dateKey={selectedDateKey}
      nutritionMeals={selectedNutritionMeals}
      nutritionTotals={selectedNutritionTotals}
      nutritionGoal={nutritionGoal}
      workout={workoutDisplayInfo(selectedPrimaryWorkout)}
      workoutSummary={selectedWorkoutSummary}
      measurements={selectedMeasurements}
    />
  </>;
}

function WorkoutsPage({ workouts: controlledWorkouts, setWorkouts: controlledSetWorkouts, selectedDateKey: controlledSelectedDateKey, setSelectedDateKey: controlledSetSelectedDateKey, profile, telegramInitData }) {
  const localDateState = useState(formatDateKey(new Date()));
  const selectedDateKey = controlledSelectedDateKey || localDateState[0];
  const setSelectedDateKey = controlledSetSelectedDateKey || localDateState[1];

  const months = [
    "января", "февраля", "марта", "апреля", "мая", "июня",
    "июля", "августа", "сентября", "октября", "ноября", "декабря"
  ];
  const weekdayNames = ["Воскресенье", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота"];
  const shortWeekdayNames = ["Вс", "Пн", "Вт", "Ср", "Чт", "Пт", "Сб"];

  const parseDateKey = (key) => {
    const [year, month, day] = String(key || formatDateKey(new Date())).split('-').map(Number);
    return new Date(year, (month || 1) - 1, day || 1);
  };

  const toDateKey = (date) => {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  };

  const startOfWeek = (date) => {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const day = (d.getDay() + 6) % 7;
    d.setDate(d.getDate() - day);
    return d;
  };

  const addLocalDays = (date, days) => {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    d.setDate(d.getDate() + days);
    return d;
  };

  const formatDayMonth = (date, withYear = false) => {
    return `${date.getDate()} ${months[date.getMonth()]}${withYear ? ` ${date.getFullYear()}` : ''}`;
  };

  const formatWeekRange = (weekStartKey, weekEndKey) => {
    const startDate = parseDateKey(weekStartKey);
    const endDate = parseDateKey(weekEndKey);
    const sameYear = startDate.getFullYear() === endDate.getFullYear();
    const sameMonth = sameYear && startDate.getMonth() === endDate.getMonth();

    if (sameMonth) return `${startDate.getDate()}—${endDate.getDate()} ${months[startDate.getMonth()]}`;
    if (sameYear) return `${formatDayMonth(startDate)} — ${formatDayMonth(endDate)}`;
    return `${formatDayMonth(startDate, true)} — ${formatDayMonth(endDate, true)}`;
  };

  const formatDuration = (minutes) => {
    const h = Math.floor(Number(minutes || 0) / 60);
    const m = Number(minutes || 0) % 60;
    if (h && m) return `${h} ч ${m} мин`;
    if (h) return `${h} ч`;
    return `${m} мин`;
  };

  const formatVolume = (value) => {
    return `${Number(value || 0).toLocaleString('en-US')} кг`;
  };

  const pluralizeWorkout = (count) => {
    const mod10 = count % 10;
    const mod100 = count % 100;
    if (mod10 === 1 && mod100 !== 11) return `${count} тренировка`;
    if ([2, 3, 4].includes(mod10) && ![12, 13, 14].includes(mod100)) return `${count} тренировки`;
    return `${count} тренировок`;
  };

  const makeSet = (weight, reps, index = 0, completed = true, type = "working") => ({
    id: `set-${Date.now()}-${index}-${Math.random().toString(16).slice(2)}`,
    supabaseId: null,
    order: index + 1,
    weight,
    reps,
    type,
    status: completed ? "completed" : "pending",
    note: "",
    restSeconds: 120,
    restAfterSeconds: 0,
    isCompleted: completed,
  });

  const makeExercise = (order, name, muscleGroup, sets = [], completed = true) => ({
    id: `exercise-${Date.now()}-${order}-${Math.random().toString(16).slice(2)}`,
    supabaseId: null,
    order,
    name,
    muscleGroup,
    blockType: "обычное",
    restSeconds: 120,
    restAfterSeconds: 0,
    supersetId: null,
    supersetGroupId: null,
    supersetOrder: null,
    isSuperset: false,
    sets: sets.map(([weight, reps], index) => makeSet(weight, reps, index, completed)),
  });

  const cloneExercises = (exercises = [], emptySets = false) => exercises.map((exercise, exerciseIndex) => ({
    ...exercise,
    id: `exercise-copy-${Date.now()}-${exerciseIndex}-${Math.random().toString(16).slice(2)}`,
    supabaseId: null,
    order: exercise.order ?? exerciseIndex + 1,
    sets: (exercise.sets || []).map((set, setIndex) => ({
      ...set,
      id: `set-copy-${Date.now()}-${exerciseIndex}-${setIndex}-${Math.random().toString(16).slice(2)}`,
      supabaseId: null,
      order: set.order ?? setIndex + 1,
      weight: emptySets ? 0 : Number(set.weight || 0),
      reps: emptySets ? 0 : Number(set.reps || 0),
      type: set.type || "working",
      status: emptySets ? "pending" : (set.status || (set.isCompleted ?? true ? "completed" : "pending")),
      note: set.note || "",
      restSeconds: Number(set.restSeconds || 120),
      restAfterSeconds: Number(set.restAfterSeconds || 0),
      isCompleted: !emptySets && Boolean(set.isCompleted ?? true),
    })),
  }));

  const defaultExercisesForTitle = (title = "") => {
    const lower = title.toLowerCase();
    if (lower.includes("ног") || lower.includes("ягод")) {
      return [

  const mergeWorkoutPatch = (base = {}, patch = {}) => ({

    deleted_exercise_ids: uniqueIds([...(base.deleted_exercise_ids || []), ...(patch.deleted_exercise_ids || [])]),

      patch.deleted_exercise_ids,
      patch.deleted_set_ids,

    patchWorkoutInState(workoutId, workout => ({ ...workout, isSaving: true, pendingPatch: patch }));

    const serverWorkout = pickApiRecord(result, "workout") || {};
    const apiExercises = readApiArray(result, "workout_exercises", ["exercises", "workoutExercises", "exerciseRows"]);

      const key = String(exerciseId);
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(set);
      return map;

    const exerciseByClientId = new Map();
    const exerciseByOrder = new Map();
    exerciseRows.forEach(row => {

        const nestedSets = exerciseRow.workout_sets || exerciseRow.sets || exerciseRow.workoutSets || [];
        const setRows = nestedSets.length ? nestedSets : (exerciseRow.id ? (setsByExerciseId.get(String(exerciseRow.id)) || []) : []);
        const setByClientId = new Map();
        const setByOrder = new Map();
        setRows.forEach(row => {
          const clientId = row.client_id || row.clientId;
          const order = row.set_order ?? row.order;
          if (clientId) setByClientId.set(String(clientId), row);
          if (order !== undefined && order !== null) setByOrder.set(String(order), row);
        });
        return {
          ...exercise,
          supabaseId: exerciseRow.id || exerciseRow.workout_exercise_id || exercise.supabaseId || null,
          pending: false,
          isSaving: false,
          isSyncing: false,
          syncError: false,
          sets: (exercise.sets || []).map((set, setIndex) => {

  const mapSupabaseExercise = (row = {}, index = 0) => {

    const sets = row.workout_sets || row.sets || row.workoutSets || [];

  const mapSupabaseWorkout = (row = {}, index = 0) => {

  const buildWorkoutTreeFromApi = (result) => {
    const apiWorkouts = readApiArray(result, "workouts", ["workoutRows"]);
    const apiExercises = readApiArray(result, "workout_exercises", ["exercises", "workoutExercises", "exerciseRows"]);
    const apiSets = readApiArray(result, "workout_sets", ["sets", "workoutSets", "setRows"]);

    console.log("API load response:", result);
    console.log("Loaded workouts:", apiWorkouts);
    console.log("Loaded exercises:", apiExercises);
    console.log("Loaded sets:", apiSets);

    if (!apiExercises.length && !apiSets.length) {
      const nestedTree = apiWorkouts.map(mapSupabaseWorkout);
      console.log("Built workout tree:", nestedTree);
      const nestedSupersetGroups = nestedTree.reduce((acc, workout) => {
        (workout.exercises || []).forEach(exercise => {
          const groupId = getExerciseSupersetGroupId(exercise);
          if (!groupId) return;
          if (!acc[groupId]) acc[groupId] = [];
          acc[groupId].push({ workoutId: workout.supabaseId || workout.id, exerciseId: exercise.supabaseId || exercise.id, order: exercise.supersetOrder });
        });
        return acc;
      }, {});
      console.log("Built superset groups:", nestedSupersetGroups);
      return nestedTree;
    }

    const setsByExerciseId = apiSets.reduce((map, set) => {
      const exerciseId = set?.workout_exercise_id || set?.workoutExerciseId || set?.exercise_id || set?.exerciseId;
      if (!exerciseId) return map;
      const key = String(exerciseId);
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(set);
      return map;
    }, new Map());

    const exercisesByWorkoutId = apiExercises.reduce((map, exercise) => {
      const workoutId = exercise?.workout_id || exercise?.workoutId || exercise?.workout?.id;
      if (!workoutId) return map;
      const exerciseId = exercise?.id || exercise?.workout_exercise_id || exercise?.exercise_id;
      const key = String(workoutId);
      const setRows = exerciseId ? (setsByExerciseId.get(String(exerciseId)) || []) : [];
      if (!map.has(key)) map.set(key, []);
      map.get(key).push({
        ...exercise,
        workout_sets: setRows.length ? setRows : (exercise?.workout_sets || exercise?.sets || []),
      });
      return map;
    }, new Map());

    const tree = apiWorkouts.map((workout, index) => {
      const workoutId = workout?.id || workout?.workout_id || workout?.workoutId;
      const exerciseRows = workoutId ? (exercisesByWorkoutId.get(String(workoutId)) || []) : [];
      return mapSupabaseWorkout({
        ...workout,
        workout_exercises: exerciseRows.length ? exerciseRows : (workout?.workout_exercises || workout?.exercises || []),
      }, index);
    });

    console.log("Built workout tree:", tree);
    const supersetGroups = tree.reduce((acc, workout) => {
      (workout.exercises || []).forEach(exercise => {
        const groupId = getExerciseSupersetGroupId(exercise);
        if (!groupId) return;
        if (!acc[groupId]) acc[groupId] = [];
        acc[groupId].push({ workoutId: workout.supabaseId || workout.id, exerciseId: exercise.supabaseId || exercise.id, order: exercise.supersetOrder });
      });
      return acc;
    }, {});
    console.log("Built superset groups:", supersetGroups);
    return tree;
  };

  const loadWorkoutsFromApi = async ({ preserveSelected = true, selectedSupabaseId = null } = {}) => {
    if (!canUseWorkoutApi) return null;
    let result = null;
    try {
      result = await callWorkoutsApi("load", { profile_id: profile.id });
    } catch (error) {
      logSupabaseWorkoutError({ action: "load", error });
      loadedWorkoutProfileRef.current = null;
      return null;
    }
    const loadedWorkouts = buildWorkoutTreeFromApi(result);
    const mergedWorkouts = mergeLoadedWorkoutsWithDirtyState(loadedWorkouts);
    setWorkouts(mergedWorkouts);
    setSelectedWorkout(prev => {
      const targetSupabaseId = selectedSupabaseId || prev?.supabaseId;
      if (!preserveSelected || !targetSupabaseId) return null;
      return mergedWorkouts.find(workout => workout.supabaseId === targetSupabaseId) || null;
    });
    console.log("Workouts loaded", mergedWorkouts);
    return mergedWorkouts;
  };

  useEffect(() => {

      } catch (error) {
        loadedWorkoutProfileRef.current = null;
        logSupabaseRestSupersetError(error);

  const getSetDraftValue = (set, field) => {
    const draft = setDrafts[set.id]?.[field];
    return draft !== undefined ? draft : (set[field] ?? "");
  };

  const updateSetDraft = (setId, field, value) => {
    setSetDrafts(prev => ({
      ...prev,
      [setId]: {
        ...(prev[setId] || {}),
        [field]: value,
      },
    }));
  };

  const commitSetDraft = (workoutId, exerciseId, setId, field) => {
    const value = setDrafts[setId]?.[field];
    if (value === undefined) return;
    updateWorkoutSet(workoutId, exerciseId, setId, field, value);
    setSetDrafts(prev => {
      const nextFields = { ...(prev[setId] || {}) };
      delete nextFields[field];
      if (!Object.keys(nextFields).length) {
        const next = { ...prev };
        delete next[setId];
        return next;
      }
      return { ...prev, [setId]: nextFields };
    });
  };

  const updateWorkoutSet = (workoutId, exerciseId, setId, field, value) => {
    const patch = (workout) => ({
      ...workout,
      exercises: (workout.exercises || []).map(exercise => exercise.id === exerciseId ? {
        ...exercise,
        sets: (exercise.sets || []).map(set => set.id === setId ? { ...set, [field]: Number(value) } : set),
      } : exercise),
      updatedAt: new Date().toISOString(),
    });

    setWorkouts(prev => prev.map(workout => workout.id === workoutId ? patch(workout) : workout));
    setSelectedWorkout(prev => prev?.id === workoutId ? patch(prev) : prev);
    const workout = workouts.find(item => item.id === workoutId) || selectedWorkout;
    if (!workout) return;
    const nextWorkout = patch(workout);
    const exercise = (nextWorkout.exercises || []).find(item => item.id === exerciseId);
    const set = (exercise?.sets || []).find(item => item.id === setId);
    if (set?.supabaseId) {
      queueWorkoutPatch(workoutId, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
        set_updates: [buildSetPatchPayload(set)],
      });

  };

  const updateSelectedWorkoutModel = (updater, options = {}) => {

    setSelectedWorkout(nextSelectedWorkout);

  const toggleWorkoutEditMode = () => {

  const createSupersetFromSelection = () => {
    if (selectedExerciseIds.length < 2) {
      setEditError({
        title: "невозможно создать суперсет",
        description: "Выбери минимум два упражнения пустыми кружками, затем нажми кнопку суперсета ещё раз.",
      });
      return;
    }

    const supersetGroupId = createOnlyPumpUuid();
    console.log("Creating superset group:", { superset_group_id: supersetGroupId, exercise_ids: selectedExerciseIds });
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (() => {
        const selectedSet = new Set(selectedExerciseIds);
        const ordered = [...(workout.exercises || [])].sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
        const firstSelectedIndex = ordered.findIndex(exercise => selectedSet.has(exercise.id));
        const insertIndex = ordered.slice(0, Math.max(0, firstSelectedIndex)).filter(exercise => !selectedSet.has(exercise.id)).length;
        const selectedBlock = ordered.filter(exercise => selectedSet.has(exercise.id)).map((exercise, supersetIndex) => ({
          ...exercise,
          supersetId: supersetGroupId,
          supersetGroupId,
          supersetOrder: supersetIndex + 1,
          isSuperset: true,
        }));
        const remaining = ordered.filter(exercise => !selectedSet.has(exercise.id));
        return [
          ...remaining.slice(0, insertIndex),
          ...selectedBlock,
          ...remaining.slice(insertIndex),
        ].map((exercise, index) => ({ ...exercise, order: index + 1 }));
      })(),
      updatedAt: new Date().toISOString(),
    }));
    setSelectedExerciseIds([]);
    setEditError(null);
  };

  const openRestEditor = (type) => {
    setRestMenuOpen(false);
    setRestDraft({ minutes: "2", seconds: "0" });
    setRestEditor(type);
  };

  const applyRestInterval = () => {
    if (!restEditor) return;
    const seconds = Math.max(0, Number(restDraft.minutes || 0) * 60 + Number(restDraft.seconds || 0));
    updateSelectedWorkoutModel(workout => {
      const targetIds = selectedExerciseIds.length ? selectedExerciseIds : (workout.exercises || []).map(exercise => exercise.id);
      return {
        ...workout,
        exercises: (workout.exercises || []).map(exercise => {
          if (!targetIds.includes(exercise.id)) return exercise;
          const nextExercise = { ...exercise };
          if (restEditor === "between" || restEditor === "all") {
            nextExercise.restSeconds = seconds;
            nextExercise.sets = (exercise.sets || []).map(set => ({ ...set, restSeconds: seconds }));
          }
          if (restEditor === "after" || restEditor === "all") {
            nextExercise.restAfterSeconds = seconds;
            const sourceSets = nextExercise.sets || exercise.sets || [];
            const lastSetIndex = sourceSets.length - 1;
            nextExercise.sets = sourceSets.map((set, setIndex) => {
              if (restEditor === "all") return { ...set, restAfterSeconds: seconds };
              return setIndex === lastSetIndex ? { ...set, restAfterSeconds: seconds } : set;
            });
          }
          return nextExercise;
        }),
        updatedAt: new Date().toISOString(),
      };
    });
    setRestEditor(null);
  };

  const reorderExerciseInSelectedWorkout = (sourceId, targetId, insertAfter = false) => {
    if (!sourceId || !targetId || sourceId === targetId) return;
    updateSelectedWorkoutModel(workout => {
      const ordered = [...(workout.exercises || [])].sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
      const source = ordered.find(exercise => exercise.id === sourceId);
      const target = ordered.find(exercise => exercise.id === targetId);
      if (!source || !target) return workout;

      const sourceSupersetId = getExerciseSupersetGroupId(source);
      const targetSupersetId = getExerciseSupersetGroupId(target);
      const movingIds = sourceSupersetId
        ? ordered.filter(exercise => getExerciseSupersetGroupId(exercise) === sourceSupersetId).map(exercise => exercise.id)
        : [source.id];
      if (movingIds.includes(target.id)) return workout;

      const targetIds = targetSupersetId
        ? ordered.filter(exercise => getExerciseSupersetGroupId(exercise) === targetSupersetId).map(exercise => exercise.id)
        : [target.id];
      const movingBlock = ordered.filter(exercise => movingIds.includes(exercise.id));
      const remaining = ordered.filter(exercise => !movingIds.includes(exercise.id));
      const targetStart = Math.max(0, remaining.findIndex(exercise => targetIds.includes(exercise.id)));
      const targetSize = remaining.filter(exercise => targetIds.includes(exercise.id)).length;
      const insertIndex = insertAfter ? targetStart + targetSize : targetStart;
      const next = [
        ...remaining.slice(0, insertIndex),
        ...movingBlock,
        ...remaining.slice(insertIndex),
      ];
      return {
        ...workout,
        exercises: next.map((exercise, index) => ({ ...exercise, order: index + 1 })),
        updatedAt: new Date().toISOString(),
      };
    });
  };

  const getExerciseDropTarget = (clientY, movingIds = []) => {
    const movingSet = new Set(movingIds);
    const rows = Array.from(document.querySelectorAll("[data-workout-exercise-id]"))
      .map(row => ({ row, id: row.getAttribute("data-workout-exercise-id"), rect: row.getBoundingClientRect() }))
      .filter(item => item.id && !movingSet.has(item.id));
    if (!rows.length) return null;

    const direct = rows.find(item => clientY >= item.rect.top && clientY <= item.rect.bottom);
    const target = direct || rows.reduce((best, item) => {
      const distance = Math.abs(clientY - (item.rect.top + item.rect.height / 2));
      return !best || distance < best.distance ? { ...item, distance } : best;
    }, null);
    if (!target) return null;
    return {
      targetId: target.id,
      insertAfter: clientY > target.rect.top + target.rect.height / 2,
    };
  };

  const beginExerciseReorder = (exerciseId, clientY) => {
    const ordered = [...(selectedWorkout?.exercises || [])].sort((a, b) => Number(a.order || 0) - Number(b.order || 0));
    const source = ordered.find(exercise => exercise.id === exerciseId);
    const sourceSupersetId = getExerciseSupersetGroupId(source);
    const movingIds = sourceSupersetId
      ? ordered.filter(exercise => getExerciseSupersetGroupId(exercise) === sourceSupersetId).map(exercise => exercise.id)
      : [exerciseId];
    reorderExerciseRef.current = { exerciseId, movingIds, startY: clientY };
    reorderTargetRef.current = null;
    setReorderVisual({ movingIds, dy: 0, targetId: null, insertAfter: false });
  };

  const updateExerciseReorder = (clientY) => {
    const drag = reorderExerciseRef.current;
    if (!drag) return;
    const dy = clientY - drag.startY;
    const target = getExerciseDropTarget(clientY, drag.movingIds);
    reorderTargetRef.current = target;
    setReorderVisual({ movingIds: drag.movingIds, dy, targetId: target?.targetId || null, insertAfter: Boolean(target?.insertAfter) });
  };

  const finishExerciseReorder = (clientY) => {
    const drag = reorderExerciseRef.current;
    if (!drag) return;
    const target = reorderTargetRef.current || getExerciseDropTarget(clientY, drag.movingIds);
    reorderExerciseInSelectedWorkout(drag.exerciseId, target?.targetId, Boolean(target?.insertAfter));
    reorderExerciseRef.current = null;
    reorderTargetRef.current = null;
    setReorderVisual(null);
  };

  const startExerciseReorder = (event, exerciseId) => {
    if (!isEditingWorkout) return;
    event.preventDefault();
    event.stopPropagation();
    beginExerciseReorder(exerciseId, event.clientY);
    event.currentTarget.setPointerCapture?.(event.pointerId);
    const pointerId = event.pointerId;
    const handleMove = (moveEvent) => {
      if (pointerId != null && moveEvent.pointerId !== pointerId) return;
      moveEvent.preventDefault();
      updateExerciseReorder(moveEvent.clientY);
    };
    const handleUp = (upEvent) => {
      if (pointerId != null && upEvent.pointerId !== pointerId) return;
      upEvent.preventDefault();
      finishExerciseReorder(upEvent.clientY);
      document.removeEventListener("pointermove", handleMove);
      document.removeEventListener("pointerup", handleUp);
      document.removeEventListener("pointercancel", handleUp);
    };
    document.addEventListener("pointermove", handleMove, { passive: false });
    document.addEventListener("pointerup", handleUp, { passive: false });
    document.addEventListener("pointercancel", handleUp, { passive: false });
  };

  const moveExerciseReorder = (event) => {

    event.preventDefault();
    event.stopPropagation();
    updateExerciseReorder(event.clientY);

  const endExerciseReorder = (event) => {

    event.stopPropagation();
    finishExerciseReorder(event.clientY);

  const startExerciseMouseReorder = (event, exerciseId) => {
    if (!isEditingWorkout || reorderExerciseRef.current) return;
    event.preventDefault();
    event.stopPropagation();
    beginExerciseReorder(exerciseId, event.clientY);
    const handleMove = (moveEvent) => {
      moveEvent.preventDefault();
      updateExerciseReorder(moveEvent.clientY);
    };
    const handleUp = (upEvent) => {
      upEvent.preventDefault();
      finishExerciseReorder(upEvent.clientY);
      document.removeEventListener("mousemove", handleMove);
      document.removeEventListener("mouseup", handleUp);
    };
    document.addEventListener("mousemove", handleMove);
    document.addEventListener("mouseup", handleUp);

  const applyExercisePatchWithRest = (exercise, patch) => {
    const nextExercise = { ...exercise, ...patch };
    if (patch.restSeconds !== undefined) {
      nextExercise.restSeconds = safeWorkoutNumber(patch.restSeconds, 120);
      nextExercise.sets = (exercise.sets || []).map(set => ({ ...set, restSeconds: nextExercise.restSeconds }));
    }
    if (patch.restAfterSeconds !== undefined) {
      nextExercise.restAfterSeconds = safeWorkoutNumber(patch.restAfterSeconds, 0);
      const sourceSets = nextExercise.sets || exercise.sets || [];
      const lastSetIndex = sourceSets.length - 1;
      nextExercise.sets = sourceSets.map((set, setIndex) => setIndex === lastSetIndex ? { ...set, restAfterSeconds: nextExercise.restAfterSeconds } : set);
    }
    return nextExercise;
  };

  const updateActiveSet = (setId, patch) => {
    const currentExercise = (selectedWorkout?.exercises || [])[activeExerciseIndex];
    const currentSet = (currentExercise?.sets || []).find(set => set.id === setId);
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).map((exercise, exerciseIndex) => exerciseIndex === activeExerciseIndex ? {
        ...exercise,
        sets: (exercise.sets || []).map(set => set.id === setId ? { ...set, ...patch, isCompleted: (patch.status || set.status) === "completed" } : set),
      } : exercise),
      updatedAt: new Date().toISOString(),
    }));
  };

  const updateActiveExercise = (patch) => {
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).map((exercise, exerciseIndex) => exerciseIndex === activeExerciseIndex ? applyExercisePatchWithRest(exercise, patch) : exercise),
      updatedAt: new Date().toISOString(),
    }));
  };

  const saveExerciseNameDraft = () => {
    const currentExercise = (selectedWorkout?.exercises || [])[activeExerciseIndex];
    if (!currentExercise) return;
    const name = exerciseNameDraft.trim() || currentExercise.name || "Упражнение";
    updateActiveExercise({ name });
  };

  const removeActiveExercise = async () => {
    if (!selectedWorkout) return;
    const removedExercise = (selectedWorkout.exercises || [])[activeExerciseIndex];
    if (canUseWorkoutApi && removedExercise?.supabaseId) {
      console.log("Delete exercise clicked:", removedExercise);
      const previousWorkouts = workoutsRef.current;
      const previousSelectedWorkout = selectedWorkout;
      const nextExercises = (selectedWorkout.exercises || []).filter((_, index) => index !== activeExerciseIndex);
      const nextIndex = Math.max(0, Math.min(activeExerciseIndex, nextExercises.length - 1));
      setActiveExerciseIndex(nextIndex);
      setActiveSetId(getFirstActiveSetId(nextExercises[nextIndex]));
      setOpenMenu(null);
      const nextWorkout = {
        ...selectedWorkout,
        exercises: nextExercises.map((exercise, index) => ({ ...exercise, order: index + 1 })),
        updatedAt: new Date().toISOString(),
      };
      setWorkouts(prev => prev.map(workout => workout.id === selectedWorkout.id ? nextWorkout : workout));
      setSelectedWorkout(nextWorkout);
      const patchResult = await sendWorkoutPatch(selectedWorkout.id, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
        exercise_updates: nextWorkout.exercises.map(buildExercisePatchPayload).filter(Boolean),
        deleted_exercise_ids: [removedExercise.supabaseId],
      });
      const deleted = patchResult || await deleteExerciseViaApi(removedExercise);
      if (!deleted) {
        setWorkouts(previousWorkouts);
        setSelectedWorkout(previousSelectedWorkout);
      }
      return;
    }
    const nextIndex = Math.max(0, activeExerciseIndex - 1);
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).filter((_, index) => index !== activeExerciseIndex).map((exercise, index) => ({ ...exercise, order: index + 1 })),
      updatedAt: new Date().toISOString(),
    }));
    const nextExercise = (selectedWorkout.exercises || []).filter((_, index) => index !== activeExerciseIndex)[nextIndex];
    setActiveExerciseIndex(nextIndex);
    setActiveSetId(getFirstActiveSetId(nextExercise));
    setOpenMenu(null);
  };

  const removeExerciseFromSelectedWorkout = async (exerciseId) => {
    if (!selectedWorkout) return;
    const currentExercises = selectedWorkout.exercises || [];
    const removedIndex = currentExercises.findIndex(exercise => exercise.id === exerciseId);
    const removedExercise = currentExercises.find(exercise => exercise.id === exerciseId);
    const nextExercises = currentExercises.filter(exercise => exercise.id !== exerciseId);
    if (canUseWorkoutApi && removedExercise?.supabaseId) {
      console.log("Delete exercise clicked:", removedExercise);
      const previousWorkouts = workoutsRef.current;
      const previousSelectedWorkout = selectedWorkout;
      const nextIndex = Math.max(0, Math.min(removedIndex, nextExercises.length - 1));
      setActiveExerciseIndex(nextIndex);
      setActiveSetId(getFirstActiveSetId(nextExercises[nextIndex]));
      setSelectedExerciseIds(prev => prev.filter(id => id !== exerciseId));
      setOpenMenu(null);
      const nextWorkout = {
        ...selectedWorkout,
        exercises: nextExercises.map((exercise, index) => ({ ...exercise, order: index + 1 })),
        updatedAt: new Date().toISOString(),
      };
      setWorkouts(prev => prev.map(workout => workout.id === selectedWorkout.id ? nextWorkout : workout));
      setSelectedWorkout(nextWorkout);
      const patchResult = await sendWorkoutPatch(selectedWorkout.id, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
        exercise_updates: nextWorkout.exercises.map(buildExercisePatchPayload).filter(Boolean),
        deleted_exercise_ids: [removedExercise.supabaseId],
      });
      const deleted = patchResult || await deleteExerciseViaApi(removedExercise);
      if (!deleted) {
        setWorkouts(previousWorkouts);
        setSelectedWorkout(previousSelectedWorkout);
      }
      return;
    }
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).filter(exercise => exercise.id !== exerciseId).map((exercise, index) => ({ ...exercise, order: index + 1 })),
      updatedAt: new Date().toISOString(),
    }));
    const nextIndex = Math.max(0, Math.min(removedIndex, nextExercises.length - 1));
    setActiveExerciseIndex(nextIndex);
    setActiveSetId(getFirstActiveSetId(nextExercises[nextIndex]));
    setSelectedExerciseIds(prev => prev.filter(id => id !== exerciseId));
    setOpenMenu(null);

  const openReplaceForExercise = (exerciseId) => {

  const skipRemainingSets = () => {
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).map((exercise, exerciseIndex) => exerciseIndex === activeExerciseIndex ? {
        ...exercise,
        sets: (exercise.sets || []).map(set => getSetStatus(set) === "pending" ? { ...set, status: "skipped", isCompleted: false } : set),

      updatedAt: new Date().toISOString(),
    }));
    setOpenMenu(null);

  const addSetToActiveExercise = (type = "working", afterSetId = null) => {
    if (!selectedWorkout) return;
    const currentExercise = (selectedWorkout.exercises || [])[activeExerciseIndex];
    const sets = currentExercise?.sets || [];
    const afterIndex = afterSetId ? sets.findIndex(set => set.id === afterSetId) : sets.length - 1;
    const base = afterIndex >= 0 ? sets[afterIndex] : sets[sets.length - 1];
    const insertIndexForStorage = afterSetId ? Math.max(0, afterIndex + 1) : sets.length;
    const newSet = { ...makeSet(Number(base?.weight || 0), Number(base?.reps || 0), sets.length, false, type), order: insertIndexForStorage + 1, pending: canUseWorkoutApi, isSaving: canUseWorkoutApi, isSyncing: canUseWorkoutApi };

    const getWorkoutWithInsertedSet = (workout) => ({
      ...workout,
      exercises: (workout.exercises || []).map((exercise, exerciseIndex) => {
        if (exerciseIndex !== activeExerciseIndex) return exercise;
        const sourceSets = exercise.sets || [];
        const insertIndex = afterSetId ? Math.max(0, sourceSets.findIndex(set => set.id === afterSetId) + 1) : sourceSets.length;
        const nextSets = [...sourceSets.slice(0, insertIndex), newSet, ...sourceSets.slice(insertIndex)].map((set, index) => ({ ...set, order: index + 1 }));
        return { ...exercise, sets: nextSets };
      }),
      updatedAt: new Date().toISOString(),
    });

    updateSelectedWorkoutModel(workout => ({
      ...getWorkoutWithInsertedSet(workout),
    }), { sync: false });
    setActiveSetId(newSet.id);
    setOpenMenu(null);
    if (canUseWorkoutApi && currentExercise?.supabaseId) {
      createSetViaApi(selectedWorkout.id, currentExercise.id, currentExercise.supabaseId, { ...newSet, pending: true, isSaving: true, isSyncing: true }).then(id => {
        if (!id) patchSetInState(selectedWorkout.id, currentExercise.id, newSet.id, item => ({ ...item, isSaving: false, isSyncing: false, syncError: true }));
        const nextWorkout = getWorkoutWithInsertedSet(selectedWorkout);
        const nextExercise = (nextWorkout.exercises || []).find(exercise => exercise.id === currentExercise.id);
        queueWorkoutPatch(selectedWorkout.id, {
          workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
          set_updates: (nextExercise?.sets || []).map(buildSetPatchPayload).filter(Boolean),
        }, { immediate: true });
      });
    }
  };

  const removeSetFromActiveExercise = async (setId) => {
    const currentExercise = (selectedWorkout?.exercises || [])[activeExerciseIndex];
    const removedSet = (currentExercise?.sets || []).find(set => set.id === setId);
    const remaining = (currentExercise?.sets || []).filter(set => set.id !== setId);
    if (canUseWorkoutApi && removedSet?.supabaseId) {
      const previousWorkouts = workoutsRef.current;
      const previousSelectedWorkout = selectedWorkout;
      setActiveSetId((remaining.find(set => getSetStatus(set) === "pending") || remaining[0] || null)?.id || null);
      setOpenMenu(null);
      const nextWorkout = {
        ...selectedWorkout,
        exercises: (selectedWorkout.exercises || []).map((exercise, exerciseIndex) => exerciseIndex === activeExerciseIndex ? {
          ...exercise,
          sets: (exercise.sets || []).filter(set => set.id !== setId).map((set, index) => ({ ...set, order: index + 1 })),
        } : exercise),
        updatedAt: new Date().toISOString(),
      };
      setWorkouts(prev => prev.map(workout => workout.id === selectedWorkout.id ? nextWorkout : workout));
      setSelectedWorkout(nextWorkout);
      const nextExercise = (nextWorkout.exercises || [])[activeExerciseIndex];
      const patchResult = await sendWorkoutPatch(selectedWorkout.id, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
        exercise_updates: [buildExercisePatchPayload(nextExercise)].filter(Boolean),
        set_updates: (nextExercise?.sets || []).map(buildSetPatchPayload).filter(Boolean),
        deleted_set_ids: [removedSet.supabaseId],
      });
      const deleted = patchResult || await deleteSetViaApi(removedSet);
      if (!deleted) {
        setWorkouts(previousWorkouts);
        setSelectedWorkout(previousSelectedWorkout);
      }
      return;
    }
    updateSelectedWorkoutModel(workout => ({
      ...workout,
      exercises: (workout.exercises || []).map((exercise, exerciseIndex) => exerciseIndex === activeExerciseIndex ? {
        ...exercise,
        sets: (exercise.sets || []).filter(set => set.id !== setId).map((set, index) => ({ ...set, order: index + 1 })),
      } : exercise),
      updatedAt: new Date().toISOString(),
    }));
    setActiveSetId((remaining.find(set => getSetStatus(set) === "pending") || remaining[0] || null)?.id || null);
    setOpenMenu(null);
  };

  const goToExercise = (nextIndex) => {
    if (!selectedWorkout) return;
    const exercises = selectedWorkout.exercises || [];
    const clamped = Math.max(0, Math.min(exercises.length - 1, nextIndex));
    const nextExercise = exercises[clamped];
    setActiveExerciseIndex(clamped);
    setActiveSetId(getFirstActiveSetId(nextExercise));
    setOpenMenu(null);
  };

  const completeCurrentSet = () => {
    if (!selectedWorkout) return;
    const currentExercise = (selectedWorkout.exercises || [])[activeExerciseIndex];
    if (!currentExercise) return;
    const sets = currentExercise.sets || [];
    const currentSet = sets.find(set => set.id === activeSetId) || sets.find(set => getSetStatus(set) === "pending") || sets[0];

    if (!currentSet) {
      goToExercise(activeExerciseIndex + 1);
      return;
    }

    if (getSetStatus(currentSet) !== "completed") {
      updateActiveSet(currentSet.id, { status: "completed", completedAt: new Date().toISOString() });
      setRestTimer(Number(currentSet.restSeconds || currentExercise.restSeconds || 120));
      const currentIndex = sets.findIndex(set => set.id === currentSet.id);
      const nextSet = sets.slice(currentIndex + 1).find(set => getSetStatus(set) === "pending");
      if (nextSet) setActiveSetId(nextSet.id);
      return;
    }

    const nextPending = sets.find(set => getSetStatus(set) === "pending");
    if (nextPending) {
      setActiveSetId(nextPending.id);
      return;
    }

    goToExercise(activeExerciseIndex + 1);
  };

  const formatSecondsTimer = (seconds) => {
    const safe = Math.max(0, Number(seconds || 0));
    const h = Math.floor(safe / 3600);
    const m = Math.floor((safe % 3600) / 60);
    const sec = safe % 60;
    if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    return `${m}:${String(sec).padStart(2, "0")}`;
  };

  const addExerciseToSelectedWorkout = (name, muscleGroup) => {
    addExercisesToSelectedWorkout([{ name, muscleGroup }]);
  };

  const addExercisesToSelectedWorkout = async (items = []) => {
    if (!selectedWorkout) return;
    const additions = items.map((item, index) => ({
      ...makeExercise((selectedWorkout.exercises || []).length + index + 1, item.name, item.muscleGroup, [[0, 0], [0, 0], [0, 0]]),
      pending: canUseWorkoutApi,
      isSaving: canUseWorkoutApi,
      isSyncing: canUseWorkoutApi,
    }));

    if (canUseWorkoutApi && selectedWorkout.supabaseId) {
      const patch = (workout) => ({
        ...workout,
        exercises: [...(workout.exercises || []), ...additions],
        updatedAt: new Date().toISOString(),
      });
      setWorkouts(prev => prev.map(workout => workout.id === selectedWorkout.id ? patch(workout) : workout));
      setSelectedWorkout(prev => prev ? patch(prev) : prev);
      for (const exercise of additions) {
        const id = await createExerciseViaApi(selectedWorkout.id, selectedWorkout.supabaseId, exercise);
        if (!id) patchExerciseInState(selectedWorkout.id, exercise.id, item => ({ ...item, isSaving: false, isSyncing: false, syncError: true }));
      }
      const nextWorkout = patch(selectedWorkout);
      queueWorkoutPatch(selectedWorkout.id, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
        exercise_updates: (nextWorkout.exercises || []).map(buildExercisePatchPayload).filter(Boolean),
      }, { immediate: true });
      return;
    }

    const patch = (workout) => ({
      ...workout,
      exercises: [...(workout.exercises || []), ...additions],
      updatedAt: new Date().toISOString(),
    });

    setWorkouts(prev => prev.map(workout => workout.id === selectedWorkout.id ? patch(workout) : workout));
    setSelectedWorkout(prev => prev ? patch(prev) : prev);
  };

  const exercisePickerKey = (name, muscleGroup) => `${muscleGroup}::${name}`;

  const togglePendingExerciseAdd = (name, muscleGroup) => {
    const key = exercisePickerKey(name, muscleGroup);
    setPendingExerciseAdds(prev => prev.some(item => item.key === key)
      ? prev.filter(item => item.key !== key)
      : [...prev, { key, name, muscleGroup }]);
  };

  const addPendingExercisesToWorkout = async () => {
    if (!pendingExerciseAdds.length) return;
    addExercisesToSelectedWorkout(pendingExerciseAdds);
    setPendingExerciseAdds([]);
    setIsExerciseBaseOpen(false);
  };

  const startWorkout = (workout) => {
    if (!workout) return;
    const patch = (item) => ({
      ...item,
      status: "active",
      durationMinutes: 0,
      startedAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    });
    setWorkouts(prev => prev.map(item => item.id === workout.id ? patch(item) : item));
    setSelectedWorkout(prev => prev?.id === workout.id ? patch(prev) : prev);
    setRestTimer(null);
    const nextWorkout = patch(workout);
    if (nextWorkout.supabaseId) {
      queueWorkoutPatch(nextWorkout.id, {
        workout_updates: [buildWorkoutPatchPayload(nextWorkout)],
      }, { immediate: true });
    }
  };

  const repeatWorkout = async (workout) => {
    const copy = makeWorkout(selectedDateKey, {
      title: workout.title,
      programDayNumber: workout.programDayNumber,
      durationMinutes: 0,
      totalVolumeKg: 0,
      calories: 0,
      status: "active",
      startedAt: new Date().toISOString(),
      exercises: cloneExercises(workout.exercises || [], true),
      notes: workout.notes,
      templateId: workout.templateId,
    });

    if (canUseWorkoutApi) {
      const pendingWorkout = { ...copy, pending: true, isSaving: true, isSyncing: true };
      setWorkouts(prev => [pendingWorkout, ...prev]);
      openWorkoutDetails(pendingWorkout);
      const id = await createWorkoutTreeViaApi(pendingWorkout);
      if (!id) patchWorkoutInState(pendingWorkout.id, item => ({ ...item, isSaving: false, isSyncing: false, syncError: true }));
      return;
    }

    setWorkouts(prev => [copy, ...prev]);
    openWorkoutDetails(copy);
  };

  const finishActiveWorkout = () => {
    if (!selectedWorkout) return;
    const durationMinutes = Math.max(1, Math.round(elapsedWorkoutTime / 60));
    const exercises = selectedWorkout.exercises || [];
    const completedSets = exercises.flatMap(exercise => exercise.sets || []).filter(set => getSetStatus(set) === "completed");
    const allSets = exercises.flatMap(exercise => exercise.sets || []);
    const setsForVolume = completedSets.length ? completedSets : allSets;
    const totalVolumeKg = setsForVolume.reduce((sum, set) => sum + Number(set.weight || 0) * Number(set.reps || 0), 0);
    const calories = Math.max(0, selectedWorkout.calories || Math.round(durationMinutes * 2.3));
    const patch = (workout) => ({
      ...workout,
      status: "completed",
      durationMinutes,
      totalVolumeKg,
      calories,
      finishedAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),

    const nextWorkout = patch(selectedWorkout);
    if (nextWorkout.supabaseId) {

    { id: "settings", label: "Настройки", icon: Settings },

  const filteredExerciseGroups = useMemo(() => {
