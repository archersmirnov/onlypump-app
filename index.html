    (function () {
      function getCrashMessage(error) {
        if (!error) return "Unknown startup error";
        if (error.reason) return getCrashMessage(error.reason);
        if (error.error) return getCrashMessage(error.error);
        return error.message || String(error);
      }

      window.__ONLYPUMP_SHOW_CRASH__ = function (error) {
        try {
          console.error("ONLYPUMP APP CRASH", error);
          var root = document.getElementById("root");
          if (!root) return;
          var message = getCrashMessage(error);
          root.innerHTML = [
            '<div class="onlypump-app-shell" style="min-height:100vh;background:#000;color:#f4f4f5;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;">',

            '<div style="font-size:28px;font-weight:900;letter-spacing:-.04em;color:#ef4444;">ONLYPUMP</div>',

            '<div style="margin-top:14px;background:rgba(255,255,255,.04);border-radius:14px;padding:12px;text-align:left;color:#71717a;font-size:12px;word-break:break-word;">',
            String(message).replace(/[<>&]/g, function (char) { return ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" })[char]; }),
            '</div>',
            '<button type="button" onclick="window.location.reload()" style="margin-top:18px;width:100%;height:46px;border:0;border-radius:999px;background:#ef4444;color:#000;font-weight:800;">Перезагрузить</button>',
            '</div>',
            '</div>'
          ].join("");
        } catch (fallbackError) {
          console.error("ONLYPUMP APP CRASH FALLBACK FAILED", fallbackError);
        }
      };

      window.addEventListener("error", function (event) {
        if (!event.error && !event.message) return;
        window.__ONLYPUMP_SHOW_CRASH__(event.error || event.message || event);
      });
      window.addEventListener("unhandledrejection", function (event) {
        window.__ONLYPUMP_SHOW_CRASH__(event.reason || event);
      });

function syncOnlyPumpViewportHeight(tg) {
  const telegramHeight = Number(tg?.viewportHeight || tg?.viewportStableHeight || 0);
  const visualViewport = window.visualViewport;
  const browserHeight = Number(visualViewport?.height || window.innerHeight || document.documentElement.clientHeight || 0);
  const layoutHeight = Number(window.innerHeight || document.documentElement.clientHeight || 0);
  const rawKeyboardBottom = visualViewport ? Math.max(0, Math.round(layoutHeight - visualViewport.height - visualViewport.offsetTop)) : 0;
  const keyboardBottom = rawKeyboardBottom > 80 ? rawKeyboardBottom : 0;
  const nextHeight = Math.max(320, Math.round(telegramHeight || browserHeight));

function syncOnlyPumpSafeArea(tg) {
  const safeArea = tg?.safeAreaInset || {};
  const contentSafeArea = tg?.contentSafeAreaInset || {};
  const safeTop = Math.max(0, Number(safeArea.top || 0));
  const safeBottom = Math.max(0, Number(safeArea.bottom || 0));
  const contentTopRaw = Math.max(0, Number(contentSafeArea.top || 0));
  const contentBottom = Math.max(0, Number(contentSafeArea.bottom || 0));
  const telegramTopFallback = tg && Math.max(safeTop, contentTopRaw) === 0 ? 72 : 0;
  const contentTop = Math.max(contentTopRaw, telegramTopFallback);

  document.documentElement.style.setProperty("--tg-safe-area-top", `${safeTop}px`);
  document.documentElement.style.setProperty("--tg-safe-area-bottom", `${safeBottom}px`);
  document.documentElement.style.setProperty("--tg-content-safe-area-top", `${contentTop}px`);

function safeProfileNumber(value, fallback) {
  const parsed = Number(value);
  return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
}

function optionalProfileNumber(value, fallback = null) {
  const parsed = Number(value);
  return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
}

function optionalProfileNonNegativeNumber(value, fallback = 0) {
  const parsed = Number(value);
  return Number.isFinite(parsed) && parsed >= 0 ? parsed : fallback;
}

function parseProfileBoolean(value, fallback = false) {
  if (value === true || value === "true" || value === 1 || value === "1") return true;
  if (value === false || value === "false" || value === 0 || value === "0") return false;
  return fallback;
}

function normalizeThemeTime(value, fallback = "06:00") {
  const source = String(value ?? "").trim();
  const match = source.match(/^(\d{1,2}):(\d{1,2})$/);
  if (!match) return fallback;
  const hour = Math.min(23, Math.max(0, Number(match[1])));
  const minute = Math.min(59, Math.max(0, Number(match[2])));
  if (!Number.isFinite(hour) || !Number.isFinite(minute)) return fallback;
  return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
}

function themeTimeToMinutes(value, fallback = "06:00") {
  const [hour, minute] = normalizeThemeTime(value, fallback).split(":").map(Number);
  return hour * 60 + minute;
}

function isMinuteInsideThemeRange(current, start, end) {
  if (start === end) return false;
  if (start < end) return current >= start && current < end;
  return current >= start || current < end;
}

function buildThemeSettingsPayload(settings = {}) {

  const always = enabled && parseProfileBoolean(settings.light_theme_always, false);

    light_theme_end_time: always ? "00:00" : normalizeThemeTime(settings.light_theme_end_time, DEFAULT_PROFILE.light_theme_end_time),
  };
}

function profileWantsLightTheme(profile = DEFAULT_PROFILE, now = new Date()) {
  if (!parseProfileBoolean(profile?.light_theme_enabled, DEFAULT_PROFILE.light_theme_enabled)) return false;
  if (parseProfileBoolean(profile?.light_theme_always, DEFAULT_PROFILE.light_theme_always)) return true;
  const current = now.getHours() * 60 + now.getMinutes();
  const start = themeTimeToMinutes(profile?.light_theme_start_time, DEFAULT_PROFILE.light_theme_start_time);
  const end = themeTimeToMinutes(profile?.light_theme_end_time, DEFAULT_PROFILE.light_theme_end_time);
  return isMinuteInsideThemeRange(current, start, end);
}

function calculateProfileAge(birthDate) {
  if (!birthDate) return null;
  const birth = new Date(`${String(birthDate).slice(0, 10)}T00:00:00`);
  if (Number.isNaN(birth.getTime())) return null;
  const today = new Date();
  let age = today.getFullYear() - birth.getFullYear();
  const monthDelta = today.getMonth() - birth.getMonth();
  if (monthDelta < 0 || (monthDelta === 0 && today.getDate() < birth.getDate())) age--;
  return age > 0 ? age : null;
}

function formatAgeRu(age) {
  const n = Math.abs(Number(age));
  if (!Number.isFinite(n) || n <= 0) return "";
  const lastTwo = n % 100;
  const last = n % 10;
  if (lastTwo >= 11 && lastTwo <= 14) return `${n} лет`;
  if (last === 1) return `${n} год`;
  if (last >= 2 && last <= 4) return `${n} года`;
  return `${n} лет`;
}

async function callOnlyPumpProfileApi(initData, action, payload = {}) {
  const response = await fetch(ONLYPUMP_PROFILE_API_URL, {
    method: "POST",
    headers: {
      Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
      apikey: SUPABASE_PUBLISHABLE_KEY,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ initData, action, payload }),
  });
  const result = await response.json().catch(() => ({}));
  if (result?.access_denied && action === "load_profile" && result?.profile) {
    return result;
  }
  if (!response.ok || result?.ok === false || result?.error) {
    const error = new Error(result?.error || result?.message || `onlypump-profile-api ${action} failed with ${response.status}`);
    error.payload = result;
    throw error;
  }
  return result;
}

const profileRound = (value, precision = 0) => {

const normalizeGoalIntensityPercent = (goalType, value, fallback = 10) => {
  const range = getGoalIntensityRange(goalType);
  const parsed = Number(value);
  const fallbackNumber = Number(fallback);
  const safeValue = Number.isFinite(parsed) ? parsed : (Number.isFinite(fallbackNumber) ? fallbackNumber : range.fallback);
  return Math.max(range.min, Math.min(range.max, safeValue));
};

const getProfileActivityMultiplier = (stepsPerDay, workoutsPerWeek) => {
  const steps = profileNonNegativeNumber(stepsPerDay, DEFAULT_PROFILE.steps_per_day);
  const workouts = profileNonNegativeNumber(workoutsPerWeek, DEFAULT_PROFILE.workouts_per_week);
  let base = 1.25;
  if (steps < 5000) base = 1.25;
  else if (steps < 8000) base = 1.35;
  else if (steps < 12000) base = 1.45;
  else if (steps < 16000) base = 1.55;
  else base = 1.65;
  const workoutBonus = Math.min(workouts * 0.04, 0.25);
  return Math.min(base + workoutBonus, 1.9);
};

const calculateProfileBodyFat = (draft = {}) => {
  const sex = draft.sex;
  const height = profileNumber(draft.height_cm);
  const neck = profileNumber(draft.neck_cm);
  const waist = profileNumber(draft.waist_cm);
  const hips = profileNumber(draft.hips_cm);
  if (!height || !neck || !waist) return null;
  let value = null;
  if (sex === "male" && waist > neck) {
    value = 495 / (1.0324 - 0.19077 * Math.log10(waist - neck) + 0.15456 * Math.log10(height)) - 450;
  }
  if (sex === "female" && hips && waist + hips > neck) {
    value = 495 / (1.29579 - 0.35004 * Math.log10(waist + hips - neck) + 0.22100 * Math.log10(height)) - 450;
  }
  if (!Number.isFinite(value)) return null;
  return profileRound(Math.max(3, Math.min(60, value)), 1);
};

const calculateProfileNutritionTargets = (draft = {}) => {
  const sex = draft.sex === "female" ? "female" : "male";
  const age = calculateProfileAge(draft.birth_date) || profileNumber(draft.age, 30);
  const height = profileNumber(draft.height_cm, 180);
  const weight = profileNumber(draft.weight_kg, 80);
  const activityMultiplier = getProfileActivityMultiplier(draft.steps_per_day, draft.workouts_per_week);
  const goalType = draft.goal_type || "recomposition";
  const bmr = sex === "female"
    ? 10 * weight + 6.25 * height - 5 * age - 161
    : 10 * weight + 6.25 * height - 5 * age + 5;
  const maintenance = bmr * activityMultiplier;
  const goalIntensityPercent = normalizeGoalIntensityPercent(goalType, draft.goal_intensity_percent ?? draft.deficit_percent);
  const goalMultiplier = goalType === "fat_loss" ? (1 - goalIntensityPercent / 100) : goalType === "muscle_gain" ? (1 + goalIntensityPercent / 100) : goalType === "maintenance" ? 1 : 0.95;
  let calories = Math.round((maintenance * goalMultiplier) / 10) * 10;
  const highProtein = parseProfileBoolean(draft.high_protein_enabled);
  const higherFat = parseProfileBoolean(draft.higher_fat_enabled);
  const proteinRate = highProtein ? 2.5 : (goalType === "fat_loss" || goalType === "recomposition" ? 2.2 : 2.0);
  const protein = Math.round(weight * proteinRate);
  let fat = Math.round(higherFat ? weight * 1.0 : Math.max(weight * 0.8, 45));
  let carbs = Math.round((calories - protein * 4 - fat * 9) / 4);
  if (carbs < 50) {
    carbs = 50;
    fat = Math.max(45, Math.round((calories - protein * 4 - carbs * 4) / 9));
    calories = Math.round((protein * 4 + fat * 9 + carbs * 4) / 10) * 10;
  }
  return { calories_target: calories, protein_target: protein, fat_target: fat, carbs_target: carbs };
};

const manualNutritionConflictMessage = "Эти значения не помещаются в заданные калории";

const normalizeManualTargetValue = (value, fallback) => {
  if (value === "" || value === null || value === undefined) return fallback;
  return profileNumber(value, fallback);
};

const getManualNutritionConflict = (draft = {}) => {
  if (!parseProfileBoolean(draft.manual_nutrition_targets_enabled)) return "";
  const autoTargets = calculateProfileNutritionTargets(draft);
  const calories = normalizeManualTargetValue(draft.calories_target, autoTargets.calories_target);
  const protein = normalizeManualTargetValue(draft.protein_target, autoTargets.protein_target);
  const fat = normalizeManualTargetValue(draft.fat_target, autoTargets.fat_target);
  const carbs = normalizeManualTargetValue(draft.carbs_target, autoTargets.carbs_target);
  if (protein * 4 + fat * 9 > calories || protein * 4 + carbs * 4 > calories) return manualNutritionConflictMessage;
  return draft.nutrition_targets_error || "";
};

const updateManualNutritionDraft = (previousDraft, key, value) => {
  const autoTargets = calculateProfileNutritionTargets(previousDraft);
  const wasManual = parseProfileBoolean(previousDraft.manual_nutrition_targets_enabled);
  const sourceValue = (field) => wasManual ? previousDraft[field] : autoTargets[field];
  const next = {
    ...previousDraft,
    [key]: value,
    manual_nutrition_targets_enabled: true,
    nutrition_targets_error: "",
  };
  if (!wasManual) {
    next.calories_target = String(autoTargets.calories_target);
    next.protein_target = String(autoTargets.protein_target);
    next.fat_target = String(autoTargets.fat_target);
    next.carbs_target = String(autoTargets.carbs_target);
    next[key] = value;
  }
  if (value === "") return next;

  const calories = normalizeManualTargetValue(key === "calories_target" ? value : sourceValue("calories_target"), autoTargets.calories_target);
  const protein = normalizeManualTargetValue(key === "protein_target" ? value : sourceValue("protein_target"), autoTargets.protein_target);
  const fat = normalizeManualTargetValue(key === "fat_target" ? value : sourceValue("fat_target"), autoTargets.fat_target);
  const carbs = normalizeManualTargetValue(key === "carbs_target" ? value : sourceValue("carbs_target"), autoTargets.carbs_target);

  if (key === "carbs_target") {
    const remainingForFat = calories - protein * 4 - carbs * 4;
    if (remainingForFat < 0) {
      next.nutrition_targets_error = manualNutritionConflictMessage;
      return next;
    }
    next.fat_target = String(Math.round(remainingForFat / 9));
    return next;
  }

  const remainingForCarbs = calories - protein * 4 - fat * 9;
  if (remainingForCarbs < 0) {
    next.nutrition_targets_error = manualNutritionConflictMessage;
    return next;
  }
  next.carbs_target = String(Math.round(remainingForCarbs / 4));
  return next;
};

const onlypumpBackLayers = new Map();
let onlypumpBackLayerOrder = 0;
let onlypumpOpenSheetCount = 0;

function updateOnlyPumpSheetLock(delta) {
  onlypumpOpenSheetCount = Math.max(0, onlypumpOpenSheetCount + delta);
  document.documentElement.classList.toggle("onlypump-sheet-open", onlypumpOpenSheetCount > 0);
}

function notifyOnlyPumpBackLayers() {
  window.dispatchEvent(new CustomEvent("onlypump:back-layers-change", {
    detail: { count: onlypumpBackLayers.size },
  }));
}

function runOnlyPumpBackLayer() {
  const layer = Array.from(onlypumpBackLayers.values())
    .sort((a, b) => b.priority - a.priority || b.order - a.order)[0];
  if (!layer) return false;
  layer.onBack?.();
  return true;
}

function useBackLayerCount() {
  const [count, setCount] = useState(0);
  useEffect(() => {
    const update = () => setCount(onlypumpBackLayers.size);
    update();
    window.addEventListener("onlypump:back-layers-change", update);
    return () => window.removeEventListener("onlypump:back-layers-change", update);
  }, []);
  return count;
}

function useAppBackLayer(id, active, onBack, priority = 100) {
  const handlerRef = useRef(onBack);
  useEffect(() => {
    handlerRef.current = onBack;
  }, [onBack]);

  useEffect(() => {
    if (!active) {
      if (onlypumpBackLayers.delete(id)) notifyOnlyPumpBackLayers();
      return;
    }

    const order = ++onlypumpBackLayerOrder;
    onlypumpBackLayers.set(id, {
      id,
      priority,
      order,
      onBack: () => handlerRef.current?.(),
    });
    notifyOnlyPumpBackLayers();

    return () => {
      const layer = onlypumpBackLayers.get(id);
      if (layer?.order === order) {
        onlypumpBackLayers.delete(id);
        notifyOnlyPumpBackLayers();
      }
    };
  }, [id, active, priority]);
}

function BackLayer({ id, onBack, priority = 100 }) {
  const fallbackId = useRef(`back-layer-${Date.now()}-${Math.random().toString(16).slice(2)}`);
  useAppBackLayer(id || fallbackId.current, true, onBack, priority);
  return null;
}

function isSheetDragIgnored(target) {
  return Boolean(target?.closest?.('input, textarea, select, button, [contenteditable="true"], [data-no-sheet-drag="true"]'));
}

function closestScrollableParent(target, boundary) {
  let node = target;
  while (node && node !== boundary) {
    const style = window.getComputedStyle(node);
    if (/(auto|scroll)/.test(style.overflowY) && node.scrollHeight > node.clientHeight) return node;
    node = node.parentElement;
  }
  return null;
}

function BottomSheetPanel({ children, className = "", onClose, priority = 150, style = {}, ...props }) {
  const idRef = useRef(`sheet-${Date.now()}-${Math.random().toString(16).slice(2)}`);
  const panelRef = useRef(null);
  const dragRef = useRef(null);
  const [dragY, setDragY] = useState(0);
  const [dragging, setDragging] = useState(false);

  useAppBackLayer(idRef.current, true, onClose, priority);

  useEffect(() => {
    updateOnlyPumpSheetLock(1);
    return () => updateOnlyPumpSheetLock(-1);
  }, []);

  const resetDrag = () => {
    dragRef.current = null;
    setDragging(false);
    setDragY(0);
  };

  const startDrag = (event) => {
    const panel = panelRef.current;
    if (!panel || isSheetDragIgnored(event.target)) return;
    const scrollable = closestScrollableParent(event.target, panel);
    if (scrollable && scrollable.scrollTop > 0) return;

    dragRef.current = {
      pointerId: event.pointerId,
      startX: event.clientX,
      startY: event.clientY,
      lastY: event.clientY,
      startedAt: Date.now(),
      scrollable,
      active: false,
    };
    setDragging(true);
    event.currentTarget.setPointerCapture?.(event.pointerId);
  };

  const moveDrag = (event) => {
    const drag = dragRef.current;
    if (!drag || drag.pointerId !== event.pointerId) return;
    const dx = event.clientX - drag.startX;
    const dy = event.clientY - drag.startY;
    drag.lastY = event.clientY;

    if (!drag.active) {
      if (Math.abs(dx) > Math.abs(dy) + 8) {
        resetDrag();
        return;
      }
      if (dy < 8) return;
      drag.active = true;
    }

    if (drag.scrollable && drag.scrollable.scrollTop > 0) {
      resetDrag();
      return;
    }

    event.preventDefault();
    setDragY(Math.max(0, dy));
  };

  const endDrag = (event) => {
    const drag = dragRef.current;
    if (!drag || drag.pointerId !== event.pointerId) return;
    const dy = Math.max(0, event.clientY - drag.startY);
    const elapsed = Math.max(1, Date.now() - drag.startedAt);
    const velocity = dy / elapsed;
    const shouldClose = dy > 100 || (dy > 45 && velocity > 0.55);

    dragRef.current = null;
    setDragging(false);
    if (shouldClose) {
      setDragY(0);
      onClose?.();
    } else {
      setDragY(0);
    }
  };

  return <div
    {...props}
    ref={panelRef}
    data-no-edge-back="true"
    data-sheet-panel="true"
    onPointerDown={startDrag}
    onPointerMove={moveDrag}
    onPointerUp={endDrag}
    onPointerCancel={resetDrag}
    style={{
      ...style,
      transform: `translate3d(0, ${dragY}px, 0)`,
      transition: dragging ? "none" : "transform 220ms cubic-bezier(0.22, 1, 0.36, 1)",
      touchAction: dragging ? "none" : "pan-y",
    }}
    className={`onlypump-sheet-panel ${className}`}
  >
    {children}
  </div>;
}

const defaultHomeWidgets = homeWidgetCatalog.filter(w => w.default).map(w => w.id);

const nutritionHomeWidgetIds = ["metricCalories", "metricProtein", "macros", "nutrition"];

function enforceHomeWidgetRules(widgets = []) {
  const unique = [];
  widgets.forEach(id => {
    if (!unique.includes(id)) unique.push(id);
  });

  const withoutNutritionGroup = unique.filter(id => !nutritionHomeWidgetIds.includes(id));
  const insertAtFirstNutritionPosition = (items) => {
    const firstNutritionIndex = unique.findIndex(id => nutritionHomeWidgetIds.includes(id));
    if (firstNutritionIndex === -1) return [...withoutNutritionGroup, ...items];
    const before = unique.slice(0, firstNutritionIndex).filter(id => !nutritionHomeWidgetIds.includes(id));
    const after = unique.slice(firstNutritionIndex).filter(id => !nutritionHomeWidgetIds.includes(id));
    return [...before, ...items, ...after];
  };

  if (unique.includes("nutrition")) return insertAtFirstNutritionPosition(["nutrition"]);
  if (unique.includes("macros")) return insertAtFirstNutritionPosition(["metricCalories", "macros"]);
  if (unique.includes("metricProtein")) return insertAtFirstNutritionPosition(["metricCalories", "metricProtein"]);
  if (unique.includes("metricCalories")) return insertAtFirstNutritionPosition(["metricCalories", "metricProtein"]);

  return unique;
}

function buildHomeWidgetsAfterAdding(prevWidgets, id) {
  const withoutNutritionGroup = prevWidgets.filter(widgetId => !nutritionHomeWidgetIds.includes(widgetId));
  const compactInsertIndex = withoutNutritionGroup.findIndex(widgetId => homeWidgetCatalog.find(w => w.id === widgetId)?.span !== "compact");
  const insertCompact = (items) => {
    const cleanItems = items.filter((item, index) => items.indexOf(item) === index);
    if (compactInsertIndex === -1) return [...withoutNutritionGroup, ...cleanItems];
    return [...withoutNutritionGroup.slice(0, compactInsertIndex), ...cleanItems, ...withoutNutritionGroup.slice(compactInsertIndex)];
  };

  if (id === "nutrition") return insertCompact(["nutrition"]);
  if (id === "macros") return insertCompact(["metricCalories", "macros"]);
  if (id === "metricProtein") return insertCompact(["metricCalories", "metricProtein"]);
  if (id === "metricCalories") {
    if (prevWidgets.includes("macros")) return insertCompact(["metricCalories", "macros"]);
    return insertCompact(["metricCalories", "metricProtein"]);
  }

  if (prevWidgets.includes(id)) return enforceHomeWidgetRules(prevWidgets);
  const catalogItem = homeWidgetCatalog.find(w => w.id === id);
  if (catalogItem?.span === "compact") {
    const firstLargeIndex = prevWidgets.findIndex(widgetId => homeWidgetCatalog.find(w => w.id === widgetId)?.span !== "compact");
    const next = firstLargeIndex === -1
      ? [...prevWidgets, id]
      : [...prevWidgets.slice(0, firstLargeIndex), id, ...prevWidgets.slice(firstLargeIndex)];
    return enforceHomeWidgetRules(next);
  }
  return enforceHomeWidgetRules([...prevWidgets, id]);
}

function buildHomeWidgetsAfterRemoving(prevWidgets, id) {
  let next = prevWidgets.filter(widgetId => widgetId !== id);
  if (id === "metricCalories") next = next.filter(widgetId => widgetId !== "metricProtein" && widgetId !== "macros");
  if (id === "metricProtein") next = next.filter(widgetId => widgetId !== "metricCalories");
  if (id === "macros") next = next.filter(widgetId => widgetId !== "metricCalories");
  return enforceHomeWidgetRules(next);
}

const parseDateKeyLocal = (dateKey) => {
  const [year, month, day] = String(dateKey || "").split("-").map(Number);
  if (year && month && day) return new Date(year, month - 1, day);
  const fallback = new Date(dateKey);
  return Number.isNaN(fallback.getTime()) ? new Date() : fallback;
};
const formatDateKey = (date) => {
  const safeDate = date instanceof Date ? date : new Date(date);
  const year = safeDate.getFullYear();
  const month = String(safeDate.getMonth() + 1).padStart(2, "0");
  const day = String(safeDate.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
};
const addDays = (days) => {
  const date = new Date();
  date.setDate(date.getDate() + days);
  return date;
};
const formatCycleDate = (dateKey) => {
  if (!dateKey) return "Дата не выбрана";
  const date = parseDateKeyLocal(dateKey);
  if (Number.isNaN(date.getTime())) return "Дата не выбрана";
  return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', weekday: 'short' });
};

const formatCycleCardDate = (dateKey) => {
  if (!dateKey) return "Дата";
  const today = new Date();
  const date = parseDateKeyLocal(dateKey);
  if (Number.isNaN(date.getTime())) return "Дата";
  const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const dateStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diffDays = Math.round((dateStart - todayStart) / (1000 * 60 * 60 * 24));

  if (diffDays >= 0 && diffDays <= 6) {
    return date.toLocaleDateString('ru-RU', { weekday: 'long' });
  }

  return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
};

const clampNumber = (value, min = 0, max = Infinity) => Math.max(min, Math.min(max, Number(value || 0)));

const calculateSleepDurationMinutesLocal = (startValue, endValue, fallback = 0) => {
  const start = new Date(startValue || "");
  const end = new Date(endValue || "");
  const fallbackNumber = Number(fallback);
  if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return Number.isFinite(fallbackNumber) ? Math.max(0, fallbackNumber) : 0;
  let diff = Math.round((end.getTime() - start.getTime()) / 60000);
  if (diff < 0) diff += 24 * 60;
  return clampNumber(diff, 0, 24 * 60);
};

const calculateRecoveryScoreLocal = (log = {}) => {
  const duration = Number(log.sleep_duration_minutes || 0);
  if (!duration) return null;
  const latency = Number(log.sleep_latency_minutes || 0);
  const awakenings = Number(log.sleep_awakenings || 0);
  const sleepScore = Math.min(duration / 480, 1) * 100;
  const latencyPenalty = latency <= 20 ? 0 : clampNumber((latency - 20) / 4, 5, 15);
  const awakeningsPenalty = awakenings * 5;
  return Math.round(clampNumber(sleepScore - latencyPenalty - awakeningsPenalty, 0, 100));
};

const normalizeHealthLog = (record = {}, dateKey = formatDateKey(new Date())) => {
  const logDate = record?.log_date || record?.date || dateKey;
  const duration = calculateSleepDurationMinutesLocal(record.sleep_started_at, record.sleep_ended_at, record.sleep_duration_minutes);
  const base = {
    ...DEFAULT_HEALTH_LOG,
    ...record,
    date: logDate,
    log_date: logDate,
    steps_count: profileNonNegativeNumber(record.steps_count, 0),
    water_ml: profileNonNegativeNumber(record.water_ml, DEFAULT_HEALTH_LOG.water_ml),
    water_target_ml: profileNonNegativeNumber(record.water_target_ml, DEFAULT_HEALTH_LOG.water_target_ml),
    sleep_duration_minutes: duration,
    sleep_latency_minutes: profileNonNegativeNumber(record.sleep_latency_minutes, 0),
    sleep_awakenings: profileNonNegativeNumber(record.sleep_awakenings, 0),
  };
  return {
    ...base,
    recovery_score: record.recovery_score ?? calculateRecoveryScoreLocal(base),
  };
};

const buildLocalHealthLog = (dateKey = formatDateKey(new Date())) => normalizeHealthLog({ date: dateKey, log_date: dateKey }, dateKey);

const healthLogHasRealData = (log = {}) => {
  if (!log) return false;
  return profileNonNegativeNumber(log.steps_count, 0) > 0
    || profileNonNegativeNumber(log.water_ml, 0) > 0
    || profileNonNegativeNumber(log.sleep_duration_minutes, 0) > 0
    || Boolean(log.sleep_started_at || log.sleep_ended_at)
    || log.recovery_score !== null && log.recovery_score !== undefined
    || String(log.notes || "").trim().length > 0;
};

const upsertHealthLogList = (logs = [], log) => {
  const normalized = normalizeHealthLog(log, log?.log_date || log?.date);
  const filtered = logs.filter(item => (item.log_date || item.date) !== normalized.log_date);
  return [...filtered, normalized].sort((a, b) => String(a.log_date || a.date).localeCompare(String(b.log_date || b.date)));
};

const formatSleepDuration = (minutes) => {
  const total = Math.max(0, Math.round(Number(minutes || 0)));
  if (!total) return "сон не добавлен";
  const hours = Math.floor(total / 60);
  const mins = total % 60;
  if (!hours) return `${mins} мин`;
  return `${hours} ч ${String(mins).padStart(2, "0")} м`;
};

const sleepQualityLabel = (log = {}) => {
  const recovery = Number(log.recovery_score ?? 0);
  if (!log.sleep_duration_minutes) return "сон не добавлен";
  if (recovery >= 85) return "отлично";
  if (recovery >= 70) return "хорошо";
  if (recovery >= 50) return "средне";
  return "мало восстановления";
};

const toLocalDateTimeInput = (value, fallbackDateKey = formatDateKey(new Date()), fallbackTime = "07:00") => {
  const date = value ? new Date(value) : null;
  if (date && !Number.isNaN(date.getTime())) {
    const yyyy = date.getFullYear();
    const mm = String(date.getMonth() + 1).padStart(2, "0");
    const dd = String(date.getDate()).padStart(2, "0");
    const hh = String(date.getHours()).padStart(2, "0");
    const min = String(date.getMinutes()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}T${hh}:${min}`;
  }
  return `${fallbackDateKey}T${fallbackTime}`;
};

const sleepDateTimeParts = (value, fallbackDateKey = formatDateKey(new Date()), fallbackTime = "07:00") => {
  const safeValue = toLocalDateTimeInput(value, fallbackDateKey, fallbackTime);
  const [dateKey, time = fallbackTime] = safeValue.split("T");
  const [hour = "00", minute = "00"] = time.split(":");
  return {
    dateKey,
    hour: String(hour).padStart(2, "0").slice(0, 2),
    minute: String(minute).padStart(2, "0").slice(0, 2),
  };
};

const localDateTimeFromParts = (dateKey, hour, minute) => `${dateKey}T${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;

const formatShortDateRu = (dateKey) => {
  const [year, month, day] = String(dateKey || "").slice(0, 10).split("-");
  if (!year || !month || !day) return "Дата";
  return `${day}.${month}`;
};

const formatSleepDateTimeDisplay = (value, fallbackDateKey, fallbackTime) => {
  const parts = sleepDateTimeParts(value, fallbackDateKey, fallbackTime);
  return `${parts.hour}:${parts.minute}, ${formatShortDateRu(parts.dateKey)}`;
};

const normalizeSleepEndDateTime = (startValue, endValue) => {
  const start = new Date(startValue || "");
  const end = new Date(endValue || "");
  if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return endValue;
  const normalized = new Date(end);
  if (normalized.getTime() <= start.getTime()) normalized.setDate(normalized.getDate() + 1);
  return toLocalDateTimeInput(normalized, formatDateKey(normalized), "07:00");
};

const dateKeyDaysAgo = (dateKey, days) => {
  const date = parseDateKeyLocal(dateKey);
  date.setDate(date.getDate() - days);
  return formatDateKey(date);
};

const formatVolumeForProfile = (valueKg, profile = DEFAULT_PROFILE) => {
  const unit = normalizeWeightUnit(profile?.default_weight_unit || DEFAULT_PROFILE.default_weight_unit);
  const value = unit === "lb" ? kgToLb(valueKg) : Number(valueKg || 0);
  const rounded = Math.round(value * 10) / 10;
  return `${rounded.toLocaleString("ru-RU")} ${unit === "lb" ? "lb" : "кг"}`;
};

const summarizeWorkouts = (items = []) => {
  const sets = items.flatMap(getWorkoutSets);
  const completedSets = sets.filter(set => getSetStatusGlobal(set) === "completed");
  const completedVolume = completedSets.reduce((sum, set) => sum + getSetVolumeForExercise(set, set.__exercise), 0);
  const plannedVolume = sets.reduce((sum, set) => sum + getSetVolumeForExercise(set, set.__exercise), 0);
  const totalSets = sets.length;
  return {
    completedSets: completedSets.length,
    totalSets,
    completedVolume,
    plannedVolume,
    progress: totalSets ? Math.round((completedSets.length / totalSets) * 100) : 0,
    exerciseCount: items.reduce((sum, workout) => sum + (workout.exercises || []).length, 0),
  };
};

const summarizeCurrentWeekWorkouts = (items = [], anchorDate = new Date()) => {
  const start = startOfWeekMondayDate(anchorDate).getTime();
  const end = addLocalDaysToDate(startOfWeekMondayDate(anchorDate), 7).getTime();
  const weekWorkouts = items.filter(workout => {
    const time = parseDateKeyLocal(workout.date).getTime();
    return time >= start && time < end;
  });
  const plannedWorkouts = weekWorkouts.filter(workout => ["planned", "active", "completed"].includes(workout.status || "completed"));
  const completedWorkouts = weekWorkouts.filter(workout => workout.status === "completed");
  const plannedSets = plannedWorkouts.flatMap(getWorkoutSets);
  const completedSets = completedWorkouts.flatMap(getWorkoutSets).filter(set => getSetStatusGlobal(set) === "completed");
  const completedVolume = completedSets.reduce((sum, set) => sum + getSetVolumeForExercise(set, set.__exercise), 0);
  const totalSets = plannedSets.length;
  return {
    completedSets: completedSets.length,
    totalSets,
    plannedSets: totalSets,
    completedVolume,
    plannedVolume: plannedSets.reduce((sum, set) => sum + getSetVolumeForExercise(set, set.__exercise), 0),
    progress: totalSets ? Math.round((completedSets.length / totalSets) * 100) : 0,
    exerciseCount: plannedWorkouts.reduce((sum, workout) => sum + (workout.exercises || []).length, 0),
  };
};

const buildWorkoutsTreeFromApiResponse = (result, fallbackDateKey = formatDateKey(new Date())) => {
  const apiWorkouts = pickWorkoutApiArray(result, "workouts", ["workoutRows"]);
  if (!apiWorkouts.length) return [];

  const flatExercises = pickWorkoutApiArray(result, "workout_exercises", ["exercises", "exerciseRows"]);
  const flatSets = pickWorkoutApiArray(result, "workout_sets", ["sets", "setRows"]);
  const setsByExerciseId = flatSets.reduce((map, set) => {
    const key = String(set.workout_exercise_id || set.exercise_id || "");
    if (!key) return map;
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(set);
    return map;
  }, new Map());
  const exercisesByWorkoutId = flatExercises.reduce((map, exercise) => {
    const key = String(exercise.workout_id || "");
    if (!key) return map;
    if (!map.has(key)) map.set(key, []);
    map.get(key).push({
      ...exercise,
      workout_sets: exercise.workout_sets || exercise.sets || setsByExerciseId.get(String(exercise.id)) || [],
    });
    return map;
  }, new Map());

  return apiWorkouts.map((workout, index) => mapWorkoutFromApi({
    ...workout,
    workout_exercises: workout.workout_exercises || workout.exercises || exercisesByWorkoutId.get(String(workout.id)) || [],
  }, index, fallbackDateKey));
};

const clearCachedNutritionForProfileFromDate = (profile, fromDateKey = formatDateKey(new Date())) => {
  try {
    const telegramId = profile?.telegram_id || profile?.telegramId || profile?.id || "local";
    const prefix = `onlypump_nutrition_cache_${telegramId}_`;
    const keysToRemove = [];
    for (let index = 0; index < localStorage.length; index += 1) {
      const key = localStorage.key(index);
      if (!key || !key.startsWith(prefix)) continue;
      const dateKey = key.slice(prefix.length, prefix.length + 10);
      if (isDateKeyOnOrAfter(dateKey, fromDateKey)) keysToRemove.push(key);
    }
    keysToRemove.forEach(key => localStorage.removeItem(key));
    if (keysToRemove.length) console.log("Nutrition future cache cleared", { fromDateKey, count: keysToRemove.length });
  } catch (error) {
    console.log("Nutrition cache error", error);
  }
};

    if (Array.isArray(source?.[field])) {

      values.push(...source[field]);
    }
  }
  return normalizeNutritionFilledDateKeys(hasExplicitDates ? values : fallback);
};

function SwipeActionRow({ children, actions = [], actionWidth = 68, className = "", rowId, swipedId, setSwipedId }) {
  const [offset, setOffset] = useState(0);
  const startX = useRef(0);
  const startY = useRef(0);
  const startOffset = useRef(0);
  const latestOffset = useRef(0);
  const dragging = useRef(false);
  const didDrag = useRef(false);
  const swiping = useRef(false);
  const maxOffset = -Math.max(1, actions.length) * actionWidth;
  const isExternallyOpen = rowId != null && swipedId === rowId;
  const actionsVisible = offset < -4 || isExternallyOpen;

  const setRowOffset = (value) => {
    const next = Math.max(maxOffset, Math.min(0, value));
    latestOffset.current = next;
    setOffset(next);
  };

  useEffect(() => {
    if (dragging.current) return;
    setRowOffset(isExternallyOpen ? maxOffset : 0);
  }, [isExternallyOpen, maxOffset]);

  const handlePointerDown = (event) => {
    if (rowId != null && swipedId && swipedId !== rowId) setSwipedId?.(null);
    startX.current = event.clientX;
    startY.current = event.clientY;
    startOffset.current = latestOffset.current;
    dragging.current = true;
    didDrag.current = false;
    swiping.current = false;
    event.currentTarget.setPointerCapture?.(event.pointerId);
  };

  const handlePointerMove = (event) => {
    if (!dragging.current) return;
    const dx = event.clientX - startX.current;
    const dy = event.clientY - startY.current;
    if (!swiping.current && Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
    if (swiping.current || Math.abs(dx) > Math.abs(dy) + 4) {
      swiping.current = true;
      didDrag.current = true;
      if (dx < -8 && rowId != null) setSwipedId?.(rowId);
      event.preventDefault();
      setRowOffset(startOffset.current + dx);
    }
  };

  const handlePointerUp = (event) => {
    if (!dragging.current) return;
    dragging.current = false;
    try { event?.currentTarget?.releasePointerCapture?.(event.pointerId); } catch {}
    const shouldOpen = latestOffset.current < maxOffset * 0.35;
    setRowOffset(shouldOpen ? maxOffset : 0);
    if (rowId != null) setSwipedId?.(shouldOpen ? rowId : null);
    setTimeout(() => { didDrag.current = false; }, 120);
    swiping.current = false;
  };

  return <div data-no-edge-back="true" data-swipe-row="true" className={`relative overflow-hidden rounded-[22px] ${className}`} style={{ touchAction: 'pan-y' }}>
    <div
      className="absolute inset-y-0 right-0 z-0 flex transition-all duration-200"
      style={{
        pointerEvents: actionsVisible ? "auto" : "none",
        opacity: actionsVisible ? 1 : 0,
        visibility: actionsVisible ? "visible" : "hidden",
        transform: actionsVisible ? "translateX(0)" : "translateX(100%)",
      }}
    >
      {actions.map(action => <button
        key={action.label}
        type="button"
        onClick={(event) => { event.stopPropagation(); setRowOffset(0); setSwipedId?.(null); action.onClick?.(); }}
        className={`flex h-full items-center justify-center text-lg font-black text-white ${action.className || 'bg-red-500'}`}
        style={{ width: actionWidth }}
        aria-label={action.label}
      >
        {action.icon || action.label}
      </button>)}
    </div>
    <div
      onPointerDown={handlePointerDown}
      onPointerMove={handlePointerMove}
      onPointerUp={handlePointerUp}
      onPointerCancel={handlePointerUp}
      onClickCapture={(event) => {
        if (didDrag.current) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }
        if (latestOffset.current < 0) {
          event.preventDefault();
          event.stopPropagation();
          setRowOffset(0);
          setSwipedId?.(null);
        }
      }}
      style={{ transform: `translateX(${offset}px)`, transition: dragging.current ? 'none' : 'transform 180ms ease' }}
      className="relative z-10 bg-zinc-950"
    >
      {children}
    </div>
  </div>;
}


const getDayOffsetFromToday = (dateKey) => {
  const today = new Date();
  const date = parseDateKeyLocal(dateKey);
  if (Number.isNaN(date.getTime())) return 0;
  const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const dateStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  return Math.round((dateStart - todayStart) / (1000 * 60 * 60 * 24));
};

const buildNutritionTotalsForDate = (dateKey, baseTotals = {}) => {
  return {
    calories: Number(baseTotals.calories || 0),

    carbs: Number(baseTotals.carbs || 0),
  };
};

const buildMealsForDate = (dateKey, baseMeals = []) => {
  return Array.isArray(baseMeals) ? baseMeals : [];
};

const buildWorkoutSummaryForDate = (dateKey, baseSummary = {}) => {
  const diff = getDayOffsetFromToday(dateKey);
  if (diff === 0) return baseSummary;
  const totalSets = Number(baseSummary.totalSets || 9);
  const completedSets = diff < 0 ? totalSets : Math.max(0, Math.min(totalSets, Number(baseSummary.completedSets || 0) - Math.abs(diff % 3)));
  const completedVolume = Math.max(0, Math.round(Number(baseSummary.completedVolume || 4200) + diff * 240));
  return {
    ...baseSummary,
    totalSets,
    completedSets,
    completedVolume,
    plannedVolume: Math.max(completedVolume, Number(baseSummary.plannedVolume || completedVolume + 2200)),
    progress: totalSets ? Math.round((completedSets / totalSets) * 100) : 0,
    exerciseCount: Number(baseSummary.exerciseCount || 4),
  };
};

  return baseMeasurements || {};
};

const hasPositiveMetric = (value) => {
  const number = Number(value);
  return Number.isFinite(number) && number > 0;
};

const formatOptionalMetric = (value, unit = "") => hasPositiveMetric(value)
  ? `${Number(value).toLocaleString("ru-RU")}${unit ? ` ${unit}` : ""}`
  : "—";

const formatMeasurementSummary = (measurements = {}) => {
  const weight = formatOptionalMetric(measurements.weight, "кг");
  const bodyFat = formatOptionalMetric(measurements.bodyFat, "%");
  if (weight === "—" && bodyFat === "—") return "нет данных";
  return `${weight} · ${bodyFat} жира`;
};

function IOSWeekCalendar({ title = "Календарь", selectedDateKey, onSelect, markedDateKeys = [], historyByDate = {}, className = "", markerClassName = "bg-red-500" }) {
  const [startOffset, setStartOffset] = useState(-3);
  const [dragX, setDragX] = useState(0);
  const [historyOpen, setHistoryOpen] = useState(false);
  const dragRef = useRef(null);
  const suppressCalendarClickRef = useRef(false);
  const suppressResetRef = useRef(null);
  useAppBackLayer(`calendar-history-${title}`, historyOpen, () => setHistoryOpen(false), 130);
  const todayKey = formatDateKey(new Date());
  const days = Array.from({ length: 7 }, (_, i) => {
    const date = addDays(startOffset + i);
    const key = formatDateKey(date);
    return { date, key };
  });

  const startCalendarDrag = (event) => {
    clearTimeout(suppressResetRef.current);
    dragRef.current = {
      pointerId: event.pointerId,
      startX: event.clientX,
      lastX: event.clientX,
      hasDragged: false,
    };
    setDragX(0);
    suppressCalendarClickRef.current = false;
    event.currentTarget.setPointerCapture?.(event.pointerId);
  };

  const moveCalendarDrag = (event) => {
    const drag = dragRef.current;
    if (!drag || drag.pointerId !== event.pointerId) return;

    const rawDx = event.clientX - drag.startX;
    if (Math.abs(rawDx) > 10) {
      drag.hasDragged = true;
      suppressCalendarClickRef.current = true;
    }
    const dayWidth = 46;
    const steps = Math.trunc(rawDx / dayWidth);

    if (steps !== 0) {
      setStartOffset(prev => prev - steps);
      drag.startX += steps * dayWidth;
      setDragX(rawDx - steps * dayWidth);
    } else {
      setDragX(rawDx);
    }

    event.preventDefault();
  };

  const endCalendarDrag = (event) => {
    if (dragRef.current?.pointerId === event.pointerId) {
      const wasDragged = dragRef.current.hasDragged;
      dragRef.current = null;
      setDragX(0);
      if (wasDragged) {
        clearTimeout(suppressResetRef.current);
        suppressResetRef.current = setTimeout(() => {
          suppressCalendarClickRef.current = false;
        }, 0);
      }
    }
  };

  return <>
    <Card className={`p-4 ${className}`}>
    <button type="button" onClick={() => setHistoryOpen(true)} className="mb-4 flex w-full items-center justify-between gap-3 rounded-2xl text-left transition hover:bg-white/[0.035]">
      <div className="px-1 py-1">
        <h2 className="text-base font-semibold">{title}</h2>
        <p className="mt-1 text-xs text-zinc-500">Неделя на экране. Перетаскивай кружки вправо или влево — шаг равен одному дню.</p>
      </div>
      <CalendarDays className="mr-1 shrink-0 text-zinc-500" size={18}/>
    </button>

    <div
      data-calendar-swipe="true"
      className="overflow-hidden touch-pan-y select-none"
      onPointerDown={startCalendarDrag}
      onPointerMove={moveCalendarDrag}
      onPointerUp={endCalendarDrag}
      onPointerCancel={endCalendarDrag}
    >
      <div
        className="grid grid-cols-7 gap-2 will-change-transform"
        style={{ transform: `translate3d(${dragX}px,0,0)`, transition: dragRef.current ? 'none' : 'transform 180ms ease' }}
      >
        {days.map(({ date, key }) => {
          const selected = selectedDateKey === key;
          const isToday = todayKey === key;
          const marked = markedDateKeys.includes(key);
          return <button key={key} type="button" onClick={() => { if (suppressCalendarClickRef.current) return; onSelect?.(key); }} className="min-w-0 text-center touch-manipulation">
            <div className={`mx-auto flex h-11 w-11 flex-col items-center justify-center rounded-full border transition sm:h-14 sm:w-14 ${selected ? "border-red-500 bg-red-500 text-black" : isToday ? "border-red-500/50 bg-red-500/10 text-red-300" : "border-white/10 bg-white/[0.04] text-zinc-300 hover:border-red-500/40 hover:bg-white/[0.07]"}`}>
              <span className="text-[8px] uppercase leading-none sm:text-[10px]">{date.toLocaleDateString('ru-RU', { weekday: 'short' })}</span>
              <span className="mt-1 text-sm font-semibold leading-none sm:text-xl">{date.getDate()}</span>
            </div>
            <div className="mt-1 flex h-2 items-center justify-center">
              {marked && <span className={`h-1.5 w-1.5 rounded-full ${selected ? "bg-black" : markerClassName}`}/>} 
            </div>
          </button>;
        })}
      </div>
    </div>
    </Card>
    {historyOpen && <CalendarHistoryModal initialDateKey={selectedDateKey} historyByDate={historyByDate} onClose={() => setHistoryOpen(false)} />}
  </>;
}

function MasonryGrid({ children, className = "" }) {
  const gridRef = useRef(null);

  useEffect(() => {
    const grid = gridRef.current;
    if (!grid) return;

    let rafId = null;

    const recalculate = () => {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(() => {
        const styles = window.getComputedStyle(grid);
        const rowGap = parseFloat(styles.rowGap || styles.gap) || 0;
        const rowHeight = parseFloat(styles.gridAutoRows) || 8;

        Array.from(grid.children).forEach((item) => {
          item.style.gridRowEnd = "span 1";
          const height = item.getBoundingClientRect().height;
          const span = Math.max(1, Math.ceil((height + rowGap) / (rowHeight + rowGap)));
          item.style.gridRowEnd = `span ${span}`;
        });
      });
    };

    const observer = new ResizeObserver(recalculate);
    observer.observe(grid);
    Array.from(grid.children).forEach((item) => observer.observe(item));

    recalculate();
    window.addEventListener("resize", recalculate);

    return () => {
      if (rafId) cancelAnimationFrame(rafId);
      window.removeEventListener("resize", recalculate);
      observer.disconnect();
    };
  }, [children]);

  return <div ref={gridRef} className={`onlypump-masonry-grid ${className}`}>{children}</div>;
}

function HomePage({ setActive, workouts = [], nutritionMeals, nutritionDay, nutritionMarkedDateKeys = [], nutritionGoal, measurements, progressGoal, lectureItems, homeWidgets, setHomeWidgets, profile, selectedDateKey: controlledSelectedDateKey, setSelectedDateKey: controlledSetSelectedDateKey, healthLog = DEFAULT_HEALTH_LOG, healthLogs = [], healthSaving = false, profileSaving = false, onSaveHealthLog, onSaveWeightMeasurement, onOpenAnalytics }) {

function WorkoutsPage({ workouts: controlledWorkouts, setWorkouts: controlledSetWorkouts, selectedDateKey: controlledSelectedDateKey, setSelectedDateKey: controlledSetSelectedDateKey, profile, telegramInitData }) {
  const localDateState = useState(formatDateKey(new Date()));
  const selectedDateKey = controlledSelectedDateKey || localDateState[0];
  const setSelectedDateKey = controlledSetSelectedDateKey || localDateState[1];

  const months = [
    "января", "февраля", "марта", "апреля", "мая", "июня",
    "июля", "августа", "сентября", "октября", "ноября", "декабря"
  ];
  const weekdayNames = ["Воскресенье", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота"];
  const shortWeekdayNames = ["Вс", "Пн", "Вт", "Ср", "Чт", "Пт", "Сб"];

  const parseDateKey = (key) => {
    const [year, month, day] = String(key || formatDateKey(new Date())).split('-').map(Number);
    return new Date(year, (month || 1) - 1, day || 1);
  };

  const toDateKey = (date) => {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  };

  const startOfWeek = (date) => {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const day = (d.getDay() + 6) % 7;
    d.setDate(d.getDate() - day);
    return d;
  };

  const addLocalDays = (date, days) => {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    d.setDate(d.getDate() + days);
    return d;
  };

  const formatDayMonth = (date, withYear = false) => {
    return `${date.getDate()} ${months[date.getMonth()]}${withYear ? ` ${date.getFullYear()}` : ''}`;
  };

  const formatWeekRange = (weekStartKey, weekEndKey) => {
    const startDate = parseDateKey(weekStartKey);
    const endDate = parseDateKey(weekEndKey);
    const sameYear = startDate.getFullYear() === endDate.getFullYear();
    const sameMonth = sameYear && startDate.getMonth() === endDate.getMonth();

    if (sameMonth) return `${startDate.getDate()}—${endDate.getDate()} ${months[startDate.getMonth()]}`;
    if (sameYear) return `${formatDayMonth(startDate)} — ${formatDayMonth(endDate)}`;
    return `${formatDayMonth(startDate, true)} — ${formatDayMonth(endDate, true)}`;
  };

  const formatDuration = (minutes) => {
    const h = Math.floor(Number(minutes || 0) / 60);
    const m = Number(minutes || 0) % 60;
    if (h && m) return `${h} ч ${m} мин`;
    if (h) return `${h} ч`;
    return `${m} мин`;
  };

  const getProfileWeightUnit = () => normalizeWeightUnit(profile?.default_weight_unit || DEFAULT_PROFILE.default_weight_unit);
  const convertKgVolumeForDisplay = (valueKg, unit = getProfileWeightUnit()) => unit === "lb" ? kgToLb(valueKg) : Number(valueKg || 0);
  const formatVolume = (valueKg, unit = getProfileWeightUnit()) => {
    const value = convertKgVolumeForDisplay(valueKg, unit);
    const rounded = Math.round(value * 10) / 10;
    return `${rounded.toLocaleString('en-US')} ${unit === "lb" ? "lb" : "кг"}`;
  };
  const formatVolumeNumber = (valueKg, unit = getProfileWeightUnit()) => formatVolume(valueKg, unit).replace(/\s(?:кг|lb)$/u, "");

  const pluralizeWorkout = (count) => {
    const mod10 = count % 10;
    const mod100 = count % 100;
    if (mod10 === 1 && mod100 !== 11) return `${count} тренировка`;
    if ([2, 3, 4].includes(mod10) && ![12, 13, 14].includes(mod100)) return `${count} тренировки`;
    return `${count} тренировок`;
  };

  const makeSet = (weight, reps, index = 0, completed = true, type = "working") => ({
    id: `set-${Date.now()}-${index}-${Math.random().toString(16).slice(2)}`,
    supabaseId: null,
    order: index + 1,
    weight,
    reps,
    weightValue: weight,
    repsValue: reps,
    durationSeconds: 0,
    distanceValue: 0,
    manualCalories: null,
    estimatedCalories: 0,
    workTimeSeconds: 0,
    rir: null,
    rpe: null,
    type,
    status: completed ? "completed" : "pending",
    note: "",
    restSeconds: 120,
    restAfterSeconds: 0,
    isCompleted: completed,
  });

  const normalizeExerciseSourceItem = (item = {}) => {
    const source = typeof item === "string" ? { name: item } : item;
    const settings = normalizeExerciseMeasurementSettings({
      ...source,
      exerciseCategory: source.exerciseCategory || source.category || (source.muscleGroup === "Кардио" ? "cardio" : "strength"),
      measurementMode: source.measurementMode || source.measurement_mode || (source.muscleGroup === "Кардио" ? "time" : "weight_reps"),
      primaryMuscles: source.primaryMuscles || source.primary_muscles || (source.muscleGroup && source.muscleGroup !== "Кардио" ? [source.muscleGroup] : []),
    });
    return {
      name: source.name || source.exercise_name || "Упражнение",
      muscleGroup: source.muscleGroup || source.muscle_group || source.group || "Другое",
      group: source.group || source.muscleGroup || source.muscle_group || "Другое",
      isCustom: Boolean(source.isCustom ?? source.is_custom),
      met: source.met ?? source.met_value ?? null,
      ...settings,
    };
  };

  const makeExercise = (order, name, muscleGroup, sets = [], completed = true, sourceItem = {}) => {
    const source = normalizeExerciseSourceItem({ ...sourceItem, name, muscleGroup });
    return {
      id: `exercise-${Date.now()}-${order}-${Math.random().toString(16).slice(2)}`,
      supabaseId: null,
      order,
      name: source.name,
      muscleGroup: source.muscleGroup,
      blockType: "обычное",
      restSeconds: 120,
      restAfterSeconds: 0,
      supersetId: null,
      supersetGroupId: null,
      supersetOrder: null,
      isSuperset: false,
      sourceExerciseId: source.sourceExerciseId || null,
      exerciseCategory: source.exerciseCategory,
      primaryMuscles: source.primaryMuscles,
      secondaryMuscles: source.secondaryMuscles,
      measurementMode: source.measurementMode,
      distanceUnit: source.distanceUnit,
      countsInMuscleStats: source.countsInMuscleStats,
      measureWeightEnabled: source.measureWeightEnabled,
      measureRepsEnabled: source.measureRepsEnabled,
      measureTimeEnabled: source.measureTimeEnabled,
      measureDistanceEnabled: source.measureDistanceEnabled,
      measureRirEnabled: source.measureRirEnabled,
      measureRpeEnabled: source.measureRpeEnabled,
      weightUnit: source.weightUnit,
      doubleWeightInStats: source.doubleWeightInStats,
      doubleCountInStatistics: source.doubleCountInStatistics,
      double_count_in_statistics: source.doubleCountInStatistics,
      met: source.met,
      sets: sets.map(([weight, reps], index) => makeSet(weight, reps, index, completed)),
    };
  };

  const cloneExercises = (exercises = [], emptySets = false) => exercises.map((exercise, exerciseIndex) => ({
    ...exercise,
    ...normalizeExerciseMeasurementSettings(exercise),
    id: `exercise-copy-${Date.now()}-${exerciseIndex}-${Math.random().toString(16).slice(2)}`,
    supabaseId: null,
    order: exercise.order ?? exerciseIndex + 1,
    sets: (exercise.sets || []).map((set, setIndex) => ({
      ...set,
      id: `set-copy-${Date.now()}-${exerciseIndex}-${setIndex}-${Math.random().toString(16).slice(2)}`,
      supabaseId: null,
      order: set.order ?? setIndex + 1,
      weight: emptySets ? 0 : Number(set.weight ?? set.weight_kg ?? set.weightValue ?? set.weight_value ?? 0),
      reps: emptySets ? 0 : Number(set.reps ?? set.repsValue ?? set.reps_value ?? 0),
      workTimeSeconds: emptySets ? 0 : Number(set.workTimeSeconds || set.work_time_seconds || 0),
      rir: emptySets ? null : (set.rir ?? null),
      rpe: emptySets ? null : (set.rpe ?? null),
      type: set.type || "working",
      status: emptySets ? "pending" : (set.status || (set.isCompleted ?? true ? "completed" : "pending")),
      note: set.note || "",
      restSeconds: Number(set.restSeconds || 120),
      restAfterSeconds: Number(set.restAfterSeconds || 0),
      isCompleted: !emptySets && Boolean(set.isCompleted ?? true),
      weightValue: emptySets ? 0 : Number(set.weight ?? set.weight_kg ?? set.weightValue ?? set.weight_value ?? 0),
      repsValue: emptySets ? 0 : Number(set.reps ?? set.repsValue ?? set.reps_value ?? 0),
      durationSeconds: emptySets ? 0 : Number(set.durationSeconds ?? set.duration_seconds ?? set.workTimeSeconds ?? 0),
      distanceValue: emptySets ? 0 : Number(set.distanceValue ?? set.distance_value ?? 0),
      manualCalories: emptySets ? null : (set.manualCalories ?? set.manual_calories ?? null),
      estimatedCalories: emptySets ? 0 : Number(set.estimatedCalories ?? set.estimated_calories ?? 0),
    })),
  }));

  const cloneExercisesForRepeat = (exercises = [], completed = false) => cloneExercises(exercises, false).map(exercise => ({
    ...exercise,
    pending: false,
    isSaving: false,
    isSyncing: false,
    syncError: false,
    sets: (exercise.sets || []).map(set => ({
      ...set,
      status: completed ? "completed" : "pending",
      isCompleted: completed,
      completedAt: completed ? new Date().toISOString() : null,
      pending: false,
      isSaving: false,
      isSyncing: false,
      syncError: false,
    })),
  }));

  const defaultExercisesForTitle = (title = "") => {
    const lower = title.toLowerCase();
    if (lower.includes("ног") || lower.includes("ягод")) {
      return [
        makeExercise(1, "Hip Thrust", "Ягодицы", [[120, 10], [130, 8], [130, 8]]),
        makeExercise(2, "Болгарские выпады", "Ноги", [[24, 12], [24, 10], [22, 12]]),
        makeExercise(3, "Румынская тяга", "Ноги", [[90, 10], [100, 8], [100, 8]]),
      ];
    }

    if (lower.includes("пул") || lower.includes("pull") || lower.includes("спин")) {
      return [
        makeExercise(1, "Подтягивания", "Спина", [[10, 8], [10, 7], [0, 10]]),
        makeExercise(2, "Тяга горизонтального блока", "Спина", [[75, 12], [80, 10], [80, 10]]),
        makeExercise(3, "Подъём штанги на бицепс", "Руки", [[35, 10], [35, 9], [30, 12]]),
      ];
    }

    return [
      makeExercise(1, "Жим гантелей лёжа", "Грудь", [[34, 12], [36, 10], [36, 9]]),
      makeExercise(2, "Жим в тренажере", "Грудь", [[70, 12], [75, 10], [75, 9]]),
      makeExercise(3, "Махи в стороны", "Плечи", [[12, 15], [12, 14], [10, 16]]),
      makeExercise(4, "Разгибания каната", "Руки", [[32, 15], [36, 12], [36, 11]]),
    ];
  };

  const makeWorkout = (dateKey, patch = {}) => {
    const date = parseDateKey(dateKey);
    const title = patch.title || "Новая тренировка";
    const workoutType = normalizeWorkoutType(patch.workoutType ?? patch.workout_type);
    return {
      id: `workout-${dateKey}-${Date.now()}-${Math.random().toString(16).slice(2)}`,
      supabaseId: null,
      date: dateKey,
      weekday: weekdayNames[date.getDay()],
      title,
      programDayNumber: patch.programDayNumber || 1,
      durationMinutes: patch.durationMinutes ?? 0,
      totalVolumeKg: patch.totalVolumeKg ?? 0,
      calories: patch.calories ?? 0,
      estimatedCaloriesBurned: patch.estimatedCaloriesBurned ?? patch.estimated_calories_burned ?? patch.calories ?? 0,
      workoutType,
      status: normalizeWorkoutStatus(patch.status),
      startedAt: patch.startedAt !== undefined ? patch.startedAt : new Date().toISOString(),
	      exercises: patch.exercises ? cloneExercises(patch.exercises) : (workoutType === "strength" ? defaultExercisesForTitle(title) : []),
	      notes: patch.notes || "",
	      templateId: patch.templateId,
	      userProgramId: patch.userProgramId ?? patch.user_program_id ?? null,
	      userProgramClientId: patch.userProgramClientId ?? patch.user_program_client_id ?? null,
	      programTemplateWorkoutId: patch.programTemplateWorkoutId ?? patch.program_template_workout_id ?? null,
	      programTemplateWorkoutKey: patch.programTemplateWorkoutKey ?? patch.program_template_workout_key ?? null,
	      programWeekNumber: patch.programWeekNumber ?? patch.program_week_number ?? null,
	      programDayIndex: patch.programDayIndex ?? patch.program_day_index ?? null,
	      programName: patch.programName ?? patch.program_name ?? null,
	      programPlanMode: patch.programPlanMode ?? patch.program_plan_mode ?? null,
	      programDifficulty: patch.programDifficulty ?? patch.program_difficulty ?? null,
	      isProgramGenerated: Boolean(patch.isProgramGenerated ?? patch.is_program_generated ?? false),
	      createdAt: new Date().toISOString(),
	      updatedAt: new Date().toISOString(),
	    };
  };

  const buildInitialWorkouts = () => {
    return [];
  };

  const fallbackWorkoutState = useState(buildInitialWorkouts);
  const workouts = controlledWorkouts || fallbackWorkoutState[0];
  const setWorkouts = controlledSetWorkouts || fallbackWorkoutState[1];
  const [activeTab, setActiveTab] = useState("diary");
  const [isAddMenuOpen, setIsAddMenuOpen] = useState(false);
  const [isTemplatesOpen, setIsTemplatesOpen] = useState(false);
  const [programSettingsSheet, setProgramSettingsSheet] = useState(null);
  const [programSaving, setProgramSaving] = useState(false);
  const [isWhatsNewOpen, setIsWhatsNewOpen] = useState(false);
  const [isExerciseBaseOpen, setIsExerciseBaseOpen] = useState(false);
  const [exerciseBaseMode, setExerciseBaseMode] = useState("view");
  const [detailMenuOpen, setDetailMenuOpen] = useState(false);
  const [isEditingWorkout, setIsEditingWorkout] = useState(false);
  const [muscleStatsOpen, setMuscleStatsOpen] = useState(false);

  const loadedWorkoutProfileRef = useRef(null);

  const pendingWorkoutPatchesRef = useRef({});
