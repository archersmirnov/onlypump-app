        className="block w-full rounded-[22px] border border-white/10 bg-white/[0.04] p-4 text-left transition active:scale-[0.98] hover:border-red-500/40 hover:bg-red-500/5"
      >

      <div>
        <p className="text-xs font-black uppercase tracking-[0.18em] text-red-300">Активная тренировка</p>

        </div>
        <span className="shrink-0 rounded-full bg-white/7 px-3 py-1 text-xs font-semibold text-zinc-300">{pluralizeWorkout(workoutsBySelectedDate.length)}</span>
      </div>
    </div>;

            <button onClick={() => openRestEditor("after")} className="w-full rounded-2xl px-4 py-4 text-left font-semibold hover:bg-white/8">После упражнения</button>
            <button onClick={() => openRestEditor("all")} className="w-full rounded-2xl px-4 py-4 text-left font-semibold hover:bg-white/8">Все интервалы</button>
          </div>
        </BottomSheetPanel>
      </div>}

      {restEditor && <div onClick={() => setRestEditor(null)} className="onlypump-modal-layer fixed inset-0 z-[195] flex items-end bg-black/45 p-4 backdrop-blur-sm">
        <BottomSheetPanel onClose={() => setRestEditor(null)} onClick={(e) => e.stopPropagation()} className="mx-auto w-full max-w-[430px] rounded-[30px] border border-white/10 bg-zinc-950/94 p-5 shadow-2xl shadow-black/60 backdrop-blur-2xl">
          <div className="mx-auto mb-5 h-1 w-12 rounded-full bg-white/20" />
          <p className="text-xs font-black uppercase tracking-[0.18em] text-red-400">Отдых</p>
          <h2 className="mt-2 text-2xl font-black tracking-[-0.04em]">{restEditor === "between" ? "Между подходами" : restEditor === "after" ? "После упражнения" : "Все интервалы"}</h2>
          <div className="mt-5 grid grid-cols-2 gap-3">
            <label className="rounded-2xl bg-white/[0.05] p-4">
              <span className="text-xs font-semibold uppercase tracking-[0.14em] text-zinc-500">Минуты</span>
              <input type="number" min="0" value={restDraft.minutes} onChange={(e) => setRestDraft(prev => ({ ...prev, minutes: e.target.value }))} className="mt-2 w-full bg-transparent text-3xl font-black outline-none" />
            </label>
            <label className="rounded-2xl bg-white/[0.05] p-4">
              <span className="text-xs font-semibold uppercase tracking-[0.14em] text-zinc-500">Секунды</span>
              <input type="number" min="0" max="59" value={restDraft.seconds} onChange={(e) => setRestDraft(prev => ({ ...prev, seconds: e.target.value }))} className="mt-2 w-full bg-transparent text-3xl font-black outline-none" />
            </label>
          </div>
          <div className="mt-5 grid grid-cols-2 gap-3">
            <button onClick={() => setRestEditor(null)} className="h-12 rounded-full bg-white/8 font-bold text-zinc-300">Отмена</button>
            <button onClick={applyRestInterval} className="h-12 rounded-full bg-red-500 font-black text-black">Установить</button>
          </div>
        </BottomSheetPanel>
      </div>}

      {editError && <div onClick={() => setEditError(null)} className="onlypump-modal-layer fixed inset-0 z-[195] flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm">
        <div onClick={(e) => e.stopPropagation()} className="w-full max-w-[360px] rounded-[30px] border border-red-500/30 bg-zinc-950/95 p-6 text-center shadow-2xl shadow-black/70">
          <div className="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-red-500 text-2xl font-black text-black">!</div>
          <h2 className="mt-5 text-2xl font-black tracking-[-0.04em]">{editError.title}</h2>
          <p className="mt-3 text-sm leading-6 text-zinc-400">{editError.description}</p>
          <button onClick={() => setEditError(null)} className="mt-6 h-12 w-full rounded-full bg-white font-black text-black">Понятно</button>
        </div>
      </div>}
    </div>;

    const ActiveExerciseScreen = () => {
      const currentExercise = exercises[activeExerciseIndex] || exercises[0] || null;
      const currentSets = currentExercise?.sets || [];
      const currentSet = currentSets.find(set => set.id === activeSetId) || currentSets.find(set => getSetStatus(set) === "pending") || currentSets[0] || null;
      const exerciseCompleted = currentSets.length > 0 && currentSets.every(set => getSetStatus(set) !== "pending");
      const canCompleteSets = selectedWorkout.status === "active";
      const confirmLabel = !canCompleteSets
        ? "В обзор"
        : !currentSet
          ? "Дальше"
          : getSetStatus(currentSet) !== "completed"
            ? "Выполнить"
            : exerciseCompleted
              ? "Следующее"
              : "Выбрать подход";
      const menuSet = openMenu?.type === "set" ? currentSets.find(set => set.id === openMenu.setId) : null;

      const openExerciseMenu = (event) => {
        if (!currentExercise) return;
        const rect = event.currentTarget.getBoundingClientRect();
        setOpenMenu({
          type: "exercise",
          exerciseId: currentExercise.id,
          top: rect.bottom + 8,
          right: Math.max(14, window.innerWidth - rect.right),
        });
      };

      const openSetMenu = (event, set) => {
        const rect = event.currentTarget.getBoundingClientRect();
        setActiveSetId(set.id);
        setOpenMenu({
          type: "set",
          exerciseId: currentExercise?.id,
          setId: set.id,
          top: Math.max(92, rect.top - 8),
          left: Math.max(14, rect.left),
        });
      };

      return <div className="onlypump-fullscreen-layer fixed inset-0 z-[170] bg-black text-zinc-100">
        <div className="mx-auto flex h-full max-w-[430px] flex-col overflow-hidden bg-black">
          <div className="shrink-0 px-5 pt-[calc(var(--onlypump-safe-top)+18px)]">
            <div className="grid grid-cols-3 items-start gap-3 text-center">
              <div className="rounded-2xl bg-white/[0.05] px-3 py-3 text-left">
                <div className="text-[10px] font-bold uppercase tracking-[0.16em] text-zinc-600">упражнение</div>
                <div className="mt-1 text-xl font-black">{Math.min(activeExerciseIndex + 1, exercises.length || 1)} / {exercises.length || 0}</div>
              </div>
              <div className={`${canCompleteSets ? 'bg-red-500 text-black' : 'bg-white/[0.05] text-zinc-200'} rounded-2xl px-3 py-3`}>
                <div className={`text-[10px] font-black uppercase tracking-[0.16em] ${canCompleteSets ? 'text-black/55' : 'text-zinc-600'}`}>таймер</div>
                <div className="mt-1 text-2xl font-black tracking-[-0.04em]">{formatSecondsTimer(elapsedWorkoutTime)}</div>
              </div>
              <div className="rounded-2xl bg-white/[0.05] px-3 py-3 text-right">
                <div className="text-[10px] font-bold uppercase tracking-[0.16em] text-zinc-600">блок</div>
                <div className="mt-1 text-sm font-black text-zinc-200">{currentExercise?.blockType || "обычное"}</div>
              </div>
            </div>
          </div>

          <div ref={workoutScrollRef} className="flex-1 overflow-y-auto px-5 pb-28 pt-5 onlypump-scrollbar-none">
            {currentExercise ? <div className="relative min-h-[calc(var(--onlypump-app-height)-220px)] rounded-[34px] border border-white/10 bg-zinc-950/92 p-5 shadow-2xl shadow-black/60">
              <div className="flex items-center justify-between">
                <button onClick={() => { setWorkoutViewMode("overview"); setOpenMenu(null); }} className="flex h-10 w-10 items-center justify-center rounded-full bg-white/[0.06] text-zinc-200 backdrop-blur">⌄</button>
                <div className="text-center text-[11px] font-semibold uppercase tracking-[0.18em] text-zinc-600">
                  {selectedWorkout.weekday} · {formatDayMonth(workoutDate)} · {canCompleteSets ? 'идёт тренировка' : 'просмотр'}
                </div>
                <button onClick={openExerciseMenu} className="flex h-10 w-10 items-center justify-center rounded-full bg-white/[0.06] text-zinc-200 backdrop-blur"><MoreHorizontal size={22}/></button>
              </div>

              <div className="mt-10 text-center">
                {isEditingWorkout ? <input
                  value={exerciseNameDraft}
                  onChange={(e) => setExerciseNameDraft(e.target.value)}
                  onBlur={saveExerciseNameDraft}
                  onKeyDown={(e) => { if (e.key === "Enter") e.currentTarget.blur(); }}
                  className="w-full rounded-2xl bg-white/[0.06] px-4 py-3 text-center text-[32px] font-black leading-none tracking-[-0.07em] text-white outline-none"
                /> : <h2 className="break-words text-[34px] font-black leading-none tracking-[-0.07em] text-white">{currentExercise.name}</h2>}
                <p className="mt-3 text-sm font-semibold text-red-400">{currentExercise.muscleGroup}</p>
                <p className="mt-2 text-xs text-zinc-600">{selectedWorkout.title}</p>
              </div>

              <VolumeLoadBar
                count={(getMuscleSetStats(selectedWorkout).find(stat => stat.muscleGroup === currentExercise.muscleGroup)?.sets) || currentSets.length}
                title={`Объем: ${currentExercise.muscleGroup}`}
                subtitle="подходов"
                experiencedAt={volumeStandards.workoutMuscle}
                className="mt-6 bg-black/24"
              />

              <div className="mt-5 overflow-hidden rounded-[26px] border border-white/10 bg-black/25">
                {currentSets.length ? currentSets.map((set, setIndex) => {
                  const status = getSetStatus(set);
                  const active = set.id === activeSetId;
                  return <SwipeActionRow key={set.id} rowId={set.id} swipedId={swipedSetId} setSwipedId={setSwipedSetId} className="border-b border-white/10 last:border-b-0" actions={[
                    { label: "delete", icon: "🗑", className: "bg-red-500", onClick: () => removeSetFromActiveExercise(set.id) },
                  ]}>
                    <div onClick={() => setActiveSetId(set.id)} className={`grid grid-cols-[48px_1fr_46px_1fr] items-center gap-2 px-3 py-4 transition ${active ? 'bg-red-500/10' : 'hover:bg-white/[0.03]'}`}>
                      <button onClick={(e) => { e.stopPropagation(); openSetMenu(e, set); }} className={`flex h-9 w-9 items-center justify-center rounded-full text-sm font-black transition ${status === 'completed' ? 'bg-red-500 text-black' : status === 'skipped' ? 'bg-zinc-700 text-zinc-400' : active ? 'bg-white text-black' : 'bg-white/[0.08] text-zinc-300'}`}>
                        {set.order || setIndex + 1}
                      </button>

                      <label onClick={(e) => e.stopPropagation()} className="flex h-11 items-center rounded-2xl bg-white/[0.04] px-3">
                        <input
                          type="number"
                          value={getSetDraftValue(set, "weight")}
                          onChange={(e) => updateSetDraft(set.id, "weight", e.target.value)}
                          onBlur={() => commitSetDraft(selectedWorkout.id, currentExercise.id, set.id, "weight")}
                          onKeyDown={(e) => { if (e.key === "Enter") e.currentTarget.blur(); }}
                          className="w-full bg-transparent text-right text-lg font-black outline-none"
                        />
                        <span className="ml-1 text-xs text-zinc-500">кг</span>
                      </label>

                      <div className="text-center text-xl font-black text-zinc-600">×</div>

                      <label onClick={(e) => e.stopPropagation()} className="flex h-11 items-center rounded-2xl bg-white/[0.04] px-3">
                        <input
                          type="number"
                          value={getSetDraftValue(set, "reps")}
                          onChange={(e) => updateSetDraft(set.id, "reps", e.target.value)}
                          onBlur={() => commitSetDraft(selectedWorkout.id, currentExercise.id, set.id, "reps")}
                          onKeyDown={(e) => { if (e.key === "Enter") e.currentTarget.blur(); }}
                          className="w-full bg-transparent text-right text-lg font-black outline-none"
                        />
                        <span className="ml-1 text-xs text-zinc-500">повт</span>
                      </label>
                    </div>
                  </SwipeActionRow>;
                }) : <div className="p-6 text-sm text-zinc-500">В упражнении пока нет подходов.</div>}
              </div>

                {[

                  ["Заметки", "заметки"],
                  ["Видео", "техника"],
                  ["Инфо", "описание"],
                ].map(([label, sub]) => <button key={label} className="rounded-2xl bg-white/[0.04] px-2 py-3 text-center transition active:scale-95 hover:bg-white/[0.07]">
                  <div className="text-xs font-bold text-zinc-300">{label}</div>
                  <div className="mt-1 text-[10px] text-zinc-600">{sub}</div>
                </button>)}
              </div>
            </div> : <div className="rounded-[34px] border border-white/10 bg-white/[0.04] p-8 text-center text-zinc-500">В тренировке нет упражнений.</div>}
          </div>

          <div className="fixed bottom-0 left-0 right-0 z-[176] border-t border-white/10 bg-black/86 px-4 pb-[calc(var(--onlypump-safe-bottom)+10px)] pt-3 backdrop-blur-2xl">
            <div className="mx-auto grid h-[72px] max-w-[430px] grid-cols-[48px_48px_1fr_58px_48px] items-center gap-2">
              <button onClick={() => goToExercise(activeExerciseIndex - 1)} disabled={activeExerciseIndex <= 0} className="flex h-12 w-12 items-center justify-center rounded-full bg-white/8 text-zinc-200 disabled:opacity-30">←</button>
              <button onClick={() => addSetToActiveExercise("working")} className="flex h-12 w-12 items-center justify-center rounded-full bg-white/8 text-zinc-200"><Plus size={24}/></button>
              <button onClick={() => canCompleteSets ? completeCurrentSet() : setWorkoutViewMode("overview")} className={`h-12 rounded-full px-4 text-base font-black transition active:scale-[0.98] ${canCompleteSets ? 'bg-red-500 text-black' : 'bg-white text-black'}`}>{confirmLabel}</button>
              <button onClick={() => canCompleteSets && setRestTimer(prev => prev ? 0 : Number(currentExercise?.restSeconds || 120))} className={`h-12 rounded-full px-2 text-sm font-black transition ${restTimer ? 'bg-red-500/20 text-red-300' : 'bg-white/8 text-zinc-200'} ${!canCompleteSets ? 'opacity-40' : ''}`}>
                {restTimer ? formatSecondsTimer(restTimer) : "отдых"}
              </button>
              <button onClick={() => goToExercise(activeExerciseIndex + 1)} disabled={activeExerciseIndex >= exercises.length - 1} className="flex h-12 w-12 items-center justify-center rounded-full bg-white/8 text-zinc-200 disabled:opacity-30">→</button>
            </div>
          </div>
        </div>

        {openMenu && <div onClick={() => setOpenMenu(null)} className="onlypump-fullscreen-layer fixed inset-0 z-[190] bg-black/20 backdrop-blur-[1px]">
          {openMenu.type === "exercise" && <div onClick={(e) => e.stopPropagation()} style={{ top: openMenu.top, right: openMenu.right, width: 'min(65vw, 280px)' }} className="fixed rounded-[26px] border border-white/10 bg-zinc-950/92 p-3 shadow-2xl shadow-black/70 backdrop-blur-2xl">
            <div className="px-3 py-2 text-xs font-bold uppercase tracking-[0.18em] text-red-400">Упражнение</div>
            {[
              ["Редактировать упражнение", () => { setIsEditingWorkout(true); setOpenMenu(null); }],
              ["Редактировать измерение", null, true],
              ["Редактировать подход", () => { setIsEditingWorkout(true); setOpenMenu(null); }],
              ["Изменить отдых", () => { const value = prompt('Отдых в секундах', currentExercise?.restSeconds || 120); if (value) updateActiveExercise({ restSeconds: Number(value) }); setOpenMenu(null); }],
              ["Добавить разминочный подход", () => addSetToActiveExercise("warmup")],
              ["Добавить упражнения", () => { setOpenMenu(null); openExerciseBase("add"); }],
              ["Заменить упражнение", () => { setOpenMenu(null); openExerciseBase("replace"); }],
              ["Пропустить оставшиеся подходы", skipRemainingSets],
              ["Убрать упражнение из тренировки", removeActiveExercise],
            ].map(([label, handler, disabled]) => <button key={label} disabled={disabled} onClick={handler || undefined} className={`block w-full rounded-2xl px-3 py-3 text-left text-sm font-semibold transition ${disabled ? 'cursor-not-allowed text-zinc-700' : label.includes('Убрать') ? 'text-red-400 hover:bg-red-500/10' : 'text-zinc-200 hover:bg-white/8'}`}>
              {label} {disabled && <span className="float-right text-[10px] text-zinc-700">PRO</span>}
            </button>)}
          </div>}

          {openMenu.type === "set" && menuSet && <div onClick={(e) => e.stopPropagation()} style={{ top: openMenu.top, left: openMenu.left, width: 'min(60vw, 258px)' }} className="fixed rounded-[26px] border border-white/10 bg-zinc-950/92 p-3 shadow-2xl shadow-black/70 backdrop-blur-2xl">
            <div className="px-3 py-2 text-xs font-bold uppercase tracking-[0.18em] text-red-400">Подход {menuSet.order || currentSets.findIndex(set => set.id === menuSet.id) + 1}</div>
            <div className="mb-2 grid grid-cols-3 gap-1 rounded-2xl bg-black/30 p-1">
              {[["warmup", "Разм."], ["working", "Рабочий"], ["drop", "Дроп"]].map(([type, label]) => <button key={type} onClick={() => updateActiveSet(menuSet.id, { type })} className={`rounded-xl px-2 py-2 text-xs font-bold ${menuSet.type === type ? 'bg-red-500 text-black' : 'text-zinc-500 hover:bg-white/8'}`}>{label}</button>)}
            </div>
            <button onClick={() => { updateActiveSet(menuSet.id, { status: "completed", completedAt: new Date().toISOString() }); setOpenMenu(null); }} className="block w-full rounded-2xl px-3 py-3 text-left text-sm font-semibold text-zinc-200 hover:bg-white/8">Выполненный {getSetStatus(menuSet) === "completed" && <span className="float-right text-red-400">✓</span>}</button>
            <button onClick={() => { updateActiveSet(menuSet.id, { status: "skipped" }); setOpenMenu(null); }} className="block w-full rounded-2xl px-3 py-3 text-left text-sm font-semibold text-zinc-200 hover:bg-white/8">Пропущенный {getSetStatus(menuSet) === "skipped" && <span className="float-right text-zinc-500">✓</span>}</button>
            <button onClick={() => addSetToActiveExercise("drop", menuSet.id)} className="block w-full rounded-2xl px-3 py-3 text-left text-sm font-semibold text-zinc-200 hover:bg-white/8">Добавить дроп-сет</button>
            <button onClick={() => { const note = prompt('Заметка к подходу', menuSet.note || ''); if (note !== null) updateActiveSet(menuSet.id, { note }); setOpenMenu(null); }} className="block w-full rounded-2xl px-3 py-3 text-left text-sm font-semibold text-zinc-200 hover:bg-white/8">Добавить заметку</button>
            <button onClick={() => removeSetFromActiveExercise(menuSet.id)} className="block w-full rounded-2xl px-3 py-3 text-left text-sm font-semibold text-red-400 hover:bg-red-500/10">Удалить</button>
          </div>}
        </div>}
      </div>;
    };

    return workoutViewMode === "exercise" ? ActiveExerciseScreen() : WorkoutOverviewScreen();
  };

  return <>
    <Header title="Тренировки" subtitle="Дневник тренировок, готовые программы, недельный объём и упражнения."/>
    <div className="mt-6 w-full pb-32">
      <div className="rounded-2xl border border-white/10 bg-white/[0.02] p-4 sm:p-6">
        <div className="flex min-h-11 items-center justify-between gap-4">
          <button onClick={() => setIsTemplatesOpen(true)} className="min-h-11 rounded-full px-1 text-base font-medium text-zinc-100 transition hover:text-red-400">
            Доступные программы
          </button>
          <button onClick={() => setIsAddMenuOpen(true)} className="flex min-h-11 min-w-11 items-center justify-center rounded-full text-3xl font-light leading-none text-zinc-100 transition active:scale-95 hover:text-red-400">
            +
          </button>
        </div>

        <div className="mt-5">
          <IOSWeekCalendar
            title="Календарь недели"
            selectedDateKey={selectedDateKey}
            onSelect={selectDate}
            markedDateKeys={markedDateKeys}
          />
        </div>

        {activeTab === "diary" && <DiaryContent />}
        {activeTab === "results" && <SecondaryContent title="Результаты" description="Здесь будут графики тоннажа, частоты тренировок, среднего RIR и прогресса по упражнениям.">
          <div className="mt-6 grid grid-cols-2 gap-3">
            <div className="rounded-2xl bg-black/25 p-4"><div className="text-xs text-zinc-500">Тренировок</div><div className="mt-2 text-3xl font-black">{workouts.length}</div></div>
            <div className="rounded-2xl bg-black/25 p-4"><div className="text-xs text-zinc-500">Тоннаж</div><div className="mt-2 text-3xl font-black">{formatVolume(workouts.reduce((sum, w) => sum + Number(getWorkoutVolume(w) || w.totalVolumeKg || 0), 0)).replace(' кг','')}</div></div>
          </div>
        </SecondaryContent>}
        {activeTab === "exercises" && <SecondaryContent title="Упражнения" description="Полная база упражнений: поиск по названию и сортировка по мышечным группам.">
          <div className="mt-6 rounded-2xl border border-white/10 bg-black/25 p-3">
            <input
              value={exerciseSearch}
              onChange={(e) => setExerciseSearch(e.target.value)}
              placeholder="Поиск упражнения"
              className="w-full bg-transparent px-2 py-2 text-sm outline-none placeholder:text-zinc-600"
            />
          </div>
          <div className="mt-4 flex gap-2 overflow-x-auto pb-1 onlypump-scrollbar-none">
            {exerciseGroups.map(group => <button
              key={group}
              onClick={() => setSelectedExerciseGroup(group)}
              className={`shrink-0 rounded-full px-4 py-2 text-xs font-semibold transition ${selectedExerciseGroup === group ? 'bg-red-500 text-black' : 'bg-white/[0.06] text-zinc-400 hover:bg-white/10'}`}
            >
              {group}
            </button>)}
          </div>
          <div className="mt-6 space-y-6">
            {filteredExerciseGroups.length ? filteredExerciseGroups.map(section => <div key={section.group}>
              <h3 className="text-sm font-bold uppercase tracking-[0.16em] text-zinc-500">{section.group}</h3>
              <div className="mt-3 space-y-2">
                {section.exercises.map(exercise => <button key={`${section.group}-${exercise}`} className="flex w-full items-center justify-between rounded-2xl bg-black/25 p-4 text-left font-semibold transition active:scale-[0.98] hover:bg-white/[0.06]">
                  <span>{exercise}</span>
                  <Plus size={17} className="text-red-400" />
                </button>)}
              </div>
            </div>) : <div className="rounded-2xl bg-black/25 p-5 text-sm text-zinc-500">Ничего не найдено.</div>}
          </div>
        </SecondaryContent>}
        {activeTab === "settings" && <SecondaryContent title="Настройки" description="Настройки дневника: единицы измерения, автопрогрессия, программы и экспорт.">
          <div className="mt-6 space-y-3">{["Единицы измерения", "Автопрогрессия", "Экспорт истории", "Скрытые недели"].map(item => <button key={item} className="w-full rounded-2xl bg-black/25 p-4 text-left font-semibold">{item}</button>)}</div>
        </SecondaryContent>}
      </div>
    </div>

    <div className="fixed bottom-0 left-0 right-0 z-[95] border-t border-white/10 bg-black/70 px-3 pb-[calc(var(--onlypump-safe-bottom)+8px)] pt-2 backdrop-blur-2xl lg:hidden">
      <div className="mx-auto grid h-[72px] max-w-[430px] grid-cols-4">
        {diaryTabs.map(({ id, label, icon: Icon }) => <button key={id} onClick={() => {
          if (id === "exercises") {
            openExerciseBase("view");
            return;
          }
          setActiveTab(id);
        }} className={`flex flex-col items-center justify-center rounded-2xl transition ${(activeTab === id || (id === "exercises" && isExerciseBaseOpen)) ? 'text-red-400' : 'text-zinc-600'}`}>
          <Icon size={26}/>
          <span className="mt-1 text-[12px] font-semibold">{label}</span>
        </button>)}
      </div>
    </div>

    {isAddMenuOpen && <div onClick={() => setIsAddMenuOpen(false)} className="onlypump-modal-layer fixed inset-0 z-[150] flex items-end bg-black/45 p-4 backdrop-blur-sm">
      <BottomSheetPanel onClose={() => setIsAddMenuOpen(false)} onClick={(e) => e.stopPropagation()} className="mx-auto w-full max-w-[430px] rounded-[30px] border border-white/10 bg-zinc-950/90 p-5 shadow-2xl shadow-black/60 backdrop-blur-2xl">
        <div className="mx-auto mb-5 h-1 w-12 rounded-full bg-white/20" />
        <h2 className="text-xl font-black tracking-[-0.03em]">Добавить на {formatDayMonth(selectedDate)}</h2>
        <div className="mt-5 space-y-2">
          <button onClick={() => addWorkoutForDate({ title: "Пустая тренировка", exercises: [] })} className="w-full rounded-2xl px-4 py-4 text-left text-[17px] font-semibold transition hover:bg-white/8">Начать пустую тренировку</button>
          <button onClick={() => { setIsAddMenuOpen(false); setIsTemplatesOpen(true); }} className="w-full rounded-2xl px-4 py-4 text-left text-[17px] font-semibold transition hover:bg-white/8">Выбрать программу</button>
          <button onClick={() => addWorkoutForDate()} className="w-full rounded-2xl px-4 py-4 text-left text-[17px] font-semibold transition hover:bg-white/8">Добавить тренировку за выбранную дату</button>
          <button onClick={() => setIsAddMenuOpen(false)} className="w-full rounded-2xl px-4 py-4 text-left text-[17px] font-semibold text-zinc-500 transition hover:bg-white/8">Добавить заметку / замер</button>
        </div>
      </BottomSheetPanel>
    </div>}

    {isTemplatesOpen && <div onClick={() => setIsTemplatesOpen(false)} className="onlypump-modal-layer fixed inset-0 z-[150] flex items-end bg-black/45 p-4 backdrop-blur-sm">
      <BottomSheetPanel onClose={() => setIsTemplatesOpen(false)} onClick={(e) => e.stopPropagation()} className="onlypump-modal-scroll mx-auto w-full max-w-[430px] overflow-y-auto rounded-[30px] border border-white/10 bg-zinc-950/90 p-5 shadow-2xl shadow-black/60 backdrop-blur-2xl onlypump-scrollbar-none">
        <div className="mx-auto mb-5 h-1 w-12 rounded-full bg-white/20" />
        <h2 className="text-xl font-black tracking-[-0.03em]">Доступные программы</h2>
        <p className="mt-2 text-sm leading-6 text-zinc-500">Нажми программу — её тренировочные дни добавятся в календарь, начиная с {formatDayMonth(selectedDate)}.</p>
        <div className="mt-5 space-y-3">
          {availableTrainingPrograms.map(program => <button key={program.id} onClick={() => addProgramToWorkouts(program)} className="w-full rounded-[24px] border border-white/10 bg-white/[0.04] p-4 text-left transition active:scale-[0.99] hover:border-red-500/40 hover:bg-red-500/10">
            <div className="flex items-start justify-between gap-3">
              <div className="min-w-0">
                <div className="break-words text-[22px] font-black leading-tight tracking-[-0.04em]">{program.title}</div>
                <div className="mt-2 flex flex-wrap gap-2 text-[11px] font-bold uppercase tracking-[0.12em]">
                  <span className="rounded-full bg-red-500/15 px-2.5 py-1 text-red-300">{program.audience}</span>
                  <span className="rounded-full bg-white/[0.07] px-2.5 py-1 text-zinc-400">{program.focus}</span>
                </div>
              </div>
              <span className="shrink-0 rounded-full bg-white px-3 py-1.5 text-xs font-black text-black">{program.days.length} дня</span>
            </div>
            <p className="mt-3 text-sm leading-6 text-zinc-500">{program.description}</p>
            <div className="mt-4 grid grid-cols-3 gap-2 text-center text-xs">
              <div className="rounded-2xl bg-black/25 p-3"><span className="block text-zinc-500">Дней</span><b>{program.days.length}</b></div>
              <div className="rounded-2xl bg-black/25 p-3"><span className="block text-zinc-500">Подходов</span><b>{getProgramSetCount(program)}</b></div>
              <div className="rounded-2xl bg-black/25 p-3"><span className="block text-zinc-500">Старт</span><b>{formatDayMonth(selectedDate)}</b></div>
            </div>
            <div className="mt-4 space-y-2">
              {program.days.map((day, index) => <div key={day.title} className="rounded-2xl bg-black/25 p-3">
                <div className="flex items-center justify-between gap-3">
                  <span className="min-w-0 break-words text-sm font-semibold text-zinc-200">{index + 1}. {day.title}</span>
                  <span className="shrink-0 text-xs text-zinc-500">{day.exercises.length} упр.</span>
                </div>
                <div className="mt-1 text-xs text-zinc-600">{formatDuration(day.durationMinutes)} · {day.exercises.reduce((sum, exercise) => sum + exercise.sets.length, 0)} подходов</div>
              </div>)}
            </div>
          </button>)}
        </div>
      </BottomSheetPanel>
    </div>}

    {selectedWorkout && WorkoutDetailScreen()}

    {isExerciseBaseOpen && ExerciseBaseSheet()}

    {weekStatsOpen && <div onClick={() => setWeekStatsOpen(false)} className="onlypump-modal-layer fixed inset-0 z-[150] flex items-end bg-black/45 p-4 backdrop-blur-sm">
      <BottomSheetPanel onClose={() => setWeekStatsOpen(false)} onClick={(e) => e.stopPropagation()} className="mx-auto w-full max-w-[430px] rounded-[30px] border border-white/10 bg-zinc-950/94 p-5 shadow-2xl shadow-black/60 backdrop-blur-2xl">
        <div className="mx-auto mb-5 h-1 w-12 rounded-full bg-white/20" />
        <div className="flex items-start justify-between gap-3">
          <div>
            <p className="text-xs font-bold uppercase tracking-[0.18em] text-red-400">Анализ недели</p>
            <h2 className="mt-2 text-2xl font-black tracking-[-0.04em]">{formatWeekRange(toDateKey(weekStart), toDateKey(addLocalDays(weekStart, 6)))}</h2>
            <p className="mt-2 text-sm text-zinc-500">{pluralizeWorkout(weeklyWorkouts.length)} · {weeklySetCount} подходов · {formatVolume(weeklyVolume)}</p>
          </div>
          <button onClick={() => setWeekStatsOpen(false)} className="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-white/8 text-zinc-300">×</button>
        </div>

        <div className="mt-5 grid grid-cols-2 gap-3">
          <div className="rounded-2xl bg-white/[0.04] p-4">
            <div className="text-xs font-semibold uppercase tracking-[0.14em] text-zinc-500">Групп</div>
            <div className="mt-2 text-3xl font-black">{weeklyMuscleStats.length}</div>
          </div>
          <div className="rounded-2xl bg-white/[0.04] p-4">
            <div className="text-xs font-semibold uppercase tracking-[0.14em] text-zinc-500">Тоннаж</div>
            <div className="mt-2 text-3xl font-black">{formatVolume(weeklyVolume).replace(' кг','')}</div>
          </div>
        </div>

        <div className="onlypump-list-58 mt-5 space-y-3 overflow-y-auto onlypump-scrollbar-none">
          {weeklyMuscleStats.length ? weeklyMuscleStats.map(stat => <div key={stat.muscleGroup} className="rounded-[24px] border border-white/10 bg-white/[0.035] p-4">
            <VolumeLoadBar count={stat.sets} title={stat.muscleGroup} subtitle="подходов" experiencedAt={volumeStandards.weeklyMuscle} />
            <div className="mt-3 grid grid-cols-2 gap-2 text-center text-xs">
              <div className="rounded-2xl bg-black/25 p-3"><span className="block text-zinc-500">Тоннаж</span><b>{formatVolume(stat.volume)}</b></div>
              <div className="rounded-2xl bg-black/25 p-3"><span className="block text-zinc-500">Тренировки</span><b>{stat.workoutCount}</b></div>
            </div>
          </div>) : <div className="rounded-2xl bg-white/[0.04] p-5 text-sm text-zinc-500">На выбранной неделе пока нет упражнений для анализа.</div>}
        </div>
      </BottomSheetPanel>
    </div>}

    {weekMenuGroup && <div onClick={() => setWeekMenuGroup(null)} className="onlypump-modal-layer fixed inset-0 z-[150] flex items-end bg-black/45 p-4 backdrop-blur-sm">
      <BottomSheetPanel onClose={() => setWeekMenuGroup(null)} onClick={(e) => e.stopPropagation()} className="mx-auto w-full max-w-[430px] rounded-[30px] border border-white/10 bg-zinc-950/90 p-5 shadow-2xl shadow-black/60 backdrop-blur-2xl">
        <div className="mx-auto mb-5 h-1 w-12 rounded-full bg-white/20" />
        {weekMenuGroup.type === "week" ? <>
          <h2 className="text-xl font-black tracking-[-0.03em]">{formatWeekRange(weekMenuGroup.group.weekStart, weekMenuGroup.group.weekEnd)}</h2>
          <div className="mt-5 space-y-2">
            <button onClick={() => { setSelectedDateKey(weekMenuGroup.group.weekStart); setWeekMenuGroup(null); setWeekStatsOpen(true); }} className="w-full rounded-2xl px-4 py-4 text-left font-semibold hover:bg-white/8">Показать статистику недели</button>
            <button onClick={() => toggleWeek(weekMenuGroup.group.id)} className="w-full rounded-2xl px-4 py-4 text-left font-semibold hover:bg-white/8">{collapsedWeeks[weekMenuGroup.group.id] ? 'Развернуть неделю' : 'Свернуть неделю'}</button>
            <button onClick={() => setWeekMenuGroup(null)} className="w-full rounded-2xl px-4 py-4 text-left font-semibold hover:bg-white/8">Экспортировать</button>
            <button onClick={() => setWeekMenuGroup(null)} className="w-full rounded-2xl px-4 py-4 text-left font-semibold text-red-400 hover:bg-red-500/10">Скрыть неделю</button>
          </div>
        </> : <>
          <h2 className="text-xl font-black tracking-[-0.03em]">{weekMenuGroup.workout.title}</h2>
          <div className="mt-5 space-y-2">
            <button onClick={() => duplicateWorkout(weekMenuGroup.workout)} className="w-full rounded-2xl px-4 py-4 text-left font-semibold hover:bg-white/8">Дублировать тренировку</button>
            <button onClick={() => setWeekMenuGroup(null)} className="w-full rounded-2xl px-4 py-4 text-left font-semibold hover:bg-white/8">Перенести на другую дату</button>
            <button onClick={() => setWeekMenuGroup(null)} className="w-full rounded-2xl px-4 py-4 text-left font-semibold hover:bg-white/8">Превратить в программу</button>
            <button onClick={() => deleteWorkout(weekMenuGroup.workout.id)} className="w-full rounded-2xl px-4 py-4 text-left font-semibold text-red-400 hover:bg-red-500/10">Удалить</button>
          </div>
        </>}
      </BottomSheetPanel>
    </div>}
  </>;
}

function NutritionPage({ nutritionMeals, setNutritionMeals, nutritionGoal, setNutritionGoal }) {
  const [mealModalOpen, setMealModalOpen] = useState(false);
  const [editingMeal, setEditingMeal] = useState(null);
  const [goalModalOpen, setGoalModalOpen] = useState(false);
  const [selectedNutritionDateKey, setSelectedNutritionDateKey] = useState(formatDateKey(new Date()));

  useAppBackLayer("nutrition-meal-modal", mealModalOpen && Boolean(editingMeal), () => {
    setMealModalOpen(false);
    setEditingMeal(null);
  }, 130);
  useAppBackLayer("nutrition-goal-modal", goalModalOpen, () => setGoalModalOpen(false), 130);

  const nutritionTotals = useMemo(() => {
    return nutritionMeals.reduce((acc, meal) => ({
      calories: acc.calories + Number(meal.calories || 0),
      protein: acc.protein + Number(meal.protein || 0),
      fat: acc.fat + Number(meal.fat || 0),
      carbs: acc.carbs + Number(meal.carbs || 0),
    }), { calories: 0, protein: 0, fat: 0, carbs: 0 });
  }, [nutritionMeals]);

  const nutritionPercent = (value, goal) => Math.min(100, goal ? Math.round((Number(value || 0) / Number(goal || 1)) * 100) : 0);

  const openNewMeal = () => {
    setEditingMeal({
      id: Date.now(),
      name: "Новый прием",
      food: "Впиши продукты",
      calories: 0,
      protein: 0,
      fat: 0,
      carbs: 0,
      isNew: true,
    });
    setMealModalOpen(true);
  };

  const openMeal = (meal) => {
    setEditingMeal({ ...meal, isNew: false });
    setMealModalOpen(true);
  };

  const updateEditingMeal = (field, value) => {
    setEditingMeal(prev => ({
      ...prev,
      [field]: ["calories", "protein", "fat", "carbs"].includes(field) ? Number(value) : value,
    }));
  };

  const saveMeal = () => {
    if (!editingMeal) return;

    const { isNew, ...mealToSave } = editingMeal;
    setNutritionMeals(prev => {
      if (isNew) return [...prev, mealToSave];
      return prev.map(meal => meal.id === mealToSave.id ? mealToSave : meal);
    });
    setMealModalOpen(false);
    setEditingMeal(null);
  };

  const removeMeal = (id) => {
    setNutritionMeals(prev => prev.filter(meal => meal.id !== id));
    setMealModalOpen(false);
    setEditingMeal(null);
  };

  const duplicateMeal = (meal) => {
    setNutritionMeals(prev => {
      const baseName = meal.name.replace(/\s\d+$/, "");
      const existingCopies = prev.filter(item => item.name === baseName || item.name.startsWith(baseName + " "));
      const nextNumber = existingCopies.length;

      return [
        ...prev,
        {
          ...meal,
          id: Date.now(),
          name: baseName + " " + nextNumber,
        }
      ];
    });
  };

  const handleMealContextMenu = (event, meal) => {
    event.preventDefault();
    duplicateMeal(meal);
  };

  const updateGoal = (field, value) => {
    setNutritionGoal(prev => ({ ...prev, [field]: Number(value) }));
  };

  const selectedNutritionTotals = useMemo(() => buildNutritionTotalsForDate(selectedNutritionDateKey, nutritionTotals), [selectedNutritionDateKey, nutritionTotals]);
  const selectedNutritionMeals = useMemo(() => buildMealsForDate(selectedNutritionDateKey, nutritionMeals), [selectedNutritionDateKey, nutritionMeals]);

  const openNutritionCalendarDay = (dateKey) => {
    setSelectedNutritionDateKey(dateKey);
  };

  return <><Header title="Питание" subtitle="Дневник, калории, БЖУ, шаблоны приемов пищи и контроль недели."/>
    <div className="mt-6">
      <IOSWeekCalendar
        title="Неделя питания"
        selectedDateKey={selectedNutritionDateKey}
        onSelect={openNutritionCalendarDay}
        markedDateKeys={[formatDateKey(new Date()), formatDateKey(addDays(-1)), formatDateKey(addDays(-2)), formatDateKey(addDays(1))]}
      />
    </div>
    <InlineDateDataCard
      context="nutrition"
      dateKey={selectedNutritionDateKey}
      nutritionMeals={selectedNutritionMeals}
      nutritionTotals={selectedNutritionTotals}
      nutritionGoal={nutritionGoal}
    />
    <PageGrid>
      <Card className="p-5 xl:col-span-2">
        <div className="flex items-center justify-between gap-3">
          <h2 className="text-xl font-semibold">Дневник питания</h2>
          <button
            onClick={openNewMeal}
            className="flex h-8 w-8 items-center justify-center rounded-lg bg-white/5 text-red-500 transition hover:bg-white/10"
          >
            +
          </button>
        </div>

        <div className="mt-5 grid gap-3 md:grid-cols-2">
          {selectedNutritionMeals.map(meal => (
            <div
              key={meal.id}
              onContextMenu={(e) => handleMealContextMenu(e, meal)}
              onClick={() => openMeal(meal)}
              className="cursor-pointer rounded-xl border border-white/10 bg-white/[0.03] p-4 text-left transition hover:border-red-500/40 hover:bg-red-500/5"
              title="ПКМ — дублировать прием"
            >
              <div className="flex items-center justify-between gap-3">
                <h3>{meal.name}</h3>
                <div className="flex items-center gap-2">
                  <button
                    onClick={(e) => {
                      e.stopPropagation();
                      duplicateMeal(meal);
                    }}
                    className="flex h-5 w-5 items-center justify-center rounded-full bg-white/5 text-[10px] text-zinc-400 transition hover:bg-white/10"
                    title="Дублировать"
                  >
                    ⧉
                  </button>
                  <button
                    onClick={(e) => {
                      e.stopPropagation();
                      removeMeal(meal.id);
                    }}
                    className="flex h-5 w-5 items-center justify-center rounded-full bg-red-500/10 text-[10px] text-red-400 transition hover:bg-red-500/20"
                    title="Удалить"
                  >
                    ×
                  </button>
                </div>
              </div>
              <p className="mt-2 break-words text-sm text-zinc-400">{meal.food}</p>
              <p className="mt-3 text-sm">{meal.calories} ккал</p>
              <p className="mt-1 break-words text-xs text-zinc-500">{meal.protein} Б / {meal.fat} Ж / {meal.carbs} У</p>
            </div>
          ))}
        </div>
      </Card>

      <Card className="p-5">
        <div className="flex items-center justify-between gap-3">
          <h2 className="text-xl font-semibold">Цель дня</h2>
          <button onClick={() => setGoalModalOpen(true)} className="rounded-lg bg-white/5 px-3 py-2 text-xs text-zinc-400 transition hover:bg-white/10">Изменить</button>
        </div>
        <div className="mt-5 flex justify-center"><NutritionRing calories={selectedNutritionTotals.calories} goal={nutritionGoal.calories}/></div>
        <div className="mt-6 space-y-4 text-sm">
          <div>Белки <span className="float-right">{selectedNutritionTotals.protein} / {nutritionGoal.protein}г</span><Progress value={nutritionPercent(selectedNutritionTotals.protein, nutritionGoal.protein)}/></div>
          <div>Жиры <span className="float-right">{selectedNutritionTotals.fat} / {nutritionGoal.fat}г</span><Progress value={nutritionPercent(selectedNutritionTotals.fat, nutritionGoal.fat)}/></div>
          <div>Углеводы <span className="float-right">{selectedNutritionTotals.carbs} / {nutritionGoal.carbs}г</span><Progress value={nutritionPercent(selectedNutritionTotals.carbs, nutritionGoal.carbs)}/></div>
          <div>Калории <span className="float-right">{selectedNutritionTotals.calories} / {nutritionGoal.calories}</span><Progress value={nutritionPercent(selectedNutritionTotals.calories, nutritionGoal.calories)}/></div>
        </div>
      </Card>

      <Card className="p-5">
        <h2 className="text-xl font-semibold">Шаблоны</h2>
        {["Рекомпозиция", "Сушка", "Набор мышц", "Питание на бегу"].map(x => <button key={x} onClick={() => {
          if (x === "Сушка") setNutritionGoal({ calories: 2300, protein: 190, fat: 60, carbs: 245 });
          if (x === "Набор мышц") setNutritionGoal({ calories: 3300, protein: 190, fat: 90, carbs: 430 });
          if (x === "Рекомпозиция") setNutritionGoal({ calories: 2800, protein: 190, fat: 70, carbs: 260 });
          if (x === "Питание на бегу") setNutritionGoal({ calories: 2600, protein: 170, fat: 75, carbs: 300 });
        }} className="mt-3 w-full rounded-lg bg-white/[0.03] p-3 text-left text-sm transition hover:bg-white/8">{x}</button>)}
        <Button as="a" href={calculatorLinks.macros} className="mt-5 w-full bg-white/8">Рассчитать БЖУ <ExternalLink size={14}/></Button>
      </Card>
    </PageGrid>

    {mealModalOpen && editingMeal && <div onClick={() => setMealModalOpen(false)} className="onlypump-modal-layer fixed inset-0 z-[100] flex items-center justify-center bg-black/70 p-4 backdrop-blur-sm">
      <Card onClick={(e) => e.stopPropagation()} className="w-full max-w-xl p-6">
        <div className="flex items-start justify-between gap-4">
          <div>
            <h2 className="text-2xl font-semibold">{editingMeal.isNew ? "Добавить прием" : "Изменить прием"}</h2>
            <p className="mt-2 text-sm text-zinc-500">Внеси данные вручную. После сохранения цель дня пересчитается.</p>
          </div>
          <button onClick={() => setMealModalOpen(false)} className="flex h-7 w-7 items-center justify-center rounded-full bg-red-500/10 text-red-400 transition hover:bg-red-500/20">×</button>
        </div>

        <div className="mt-6 space-y-3">
          <label className="block rounded-xl bg-white/[0.03] p-3">
            <span className="text-[10px] uppercase tracking-wider text-zinc-500">Название приема</span>
            <input value={editingMeal.name} onChange={(e) => updateEditingMeal("name", e.target.value)} className="mt-1 w-full bg-transparent text-lg outline-none" />
          </label>
          <label className="block rounded-xl bg-white/[0.03] p-3">
            <span className="text-[10px] uppercase tracking-wider text-zinc-500">Продукты / описание</span>
            <input value={editingMeal.food} onChange={(e) => updateEditingMeal("food", e.target.value)} className="mt-1 w-full bg-transparent text-sm text-zinc-300 outline-none" />
          </label>

          <div className="grid grid-cols-2 gap-3">
            {[["calories", "Ккал"], ["protein", "Белки"], ["fat", "Жиры"], ["carbs", "Углеводы"]].map(([field, label]) => <label key={field} className="rounded-xl bg-white/[0.03] p-3">
              <span className="text-[10px] uppercase tracking-wider text-zinc-500">{label}</span>
              <input type="number" value={editingMeal[field]} onChange={(e) => updateEditingMeal(field, e.target.value)} className="mt-1 w-full bg-transparent text-lg outline-none" />
            </label>)}
          </div>
        </div>

        <div className="mt-6 flex flex-wrap justify-between gap-3">
          {!editingMeal.isNew && <Button onClick={() => removeMeal(editingMeal.id)} className="bg-red-500/10 text-red-400 hover:bg-red-500/20">Удалить</Button>}
          <div className="ml-auto flex gap-3">
            <Button onClick={() => setMealModalOpen(false)} className="bg-white/8">Отмена</Button>
            <Button onClick={saveMeal} className="bg-gradient-to-r from-red-700 to-red-500">Сохранить</Button>
          </div>
        </div>
      </Card>
    </div>}

    {goalModalOpen && <div onClick={() => setGoalModalOpen(false)} className="onlypump-modal-layer fixed inset-0 z-[100] flex items-center justify-center bg-black/70 p-4 backdrop-blur-sm">
      <Card onClick={(e) => e.stopPropagation()} className="w-full max-w-lg p-6">
        <div className="flex items-start justify-between gap-4">
          <div>
            <h2 className="text-2xl font-semibold">Цель дня</h2>
            <p className="mt-2 text-sm text-zinc-500">Измени плановые калории и БЖУ.</p>
          </div>
          <button onClick={() => setGoalModalOpen(false)} className="flex h-7 w-7 items-center justify-center rounded-full bg-red-500/10 text-red-400 transition hover:bg-red-500/20">×</button>
        </div>

        <div className="mt-6 grid grid-cols-2 gap-3">
          {[["calories", "Ккал"], ["protein", "Белки"], ["fat", "Жиры"], ["carbs", "Углеводы"]].map(([field, label]) => <label key={field} className="rounded-xl bg-white/[0.03] p-3">
            <span className="text-[10px] uppercase tracking-wider text-zinc-500">{label}</span>
            <input type="number" value={nutritionGoal[field]} onChange={(e) => updateGoal(field, e.target.value)} className="mt-1 w-full bg-transparent text-lg outline-none" />
          </label>)}
        </div>

        <div className="mt-6 flex justify-end gap-3">
          <Button onClick={() => setGoalModalOpen(false)} className="bg-gradient-to-r from-red-700 to-red-500">Готово</Button>
        </div>
      </Card>
    </div>}
  </>;

    const completed = module.lessons.filter(lesson => lesson.done).length;
    const total = module.lessons.length;
    const progress = total ? Math.round((completed / total) * 100) : 0;
    return { completed, total, progress };
  };

  const totalEducationStats = useMemo(() => {
    const allLessons = educationModules.flatMap(module => module.lessons);
    const completed = allLessons.filter(lesson => lesson.done).length;
    const total = allLessons.length;
    return {
      completed,
      total,
      progress: total ? Math.round((completed / total) * 100) : 0,
    };
  }, [educationModules]);

  const activeModule = educationModules.find(x => x.id === activeEducation) || educationModules[0];
  const activeStats = moduleStats(activeModule);

  const openModule = (module) => {
    if (module.locked && !showLocked) return;
    setActiveEducation(module.id);
  };

  const toggleLesson = (moduleId, lessonId) => {
    setEducationModules(prev => prev.map(module => module.id === moduleId ? {
      ...module,
      lessons: module.lessons.map(lesson => lesson.id === lessonId ? {
        ...lesson,
        done: !lesson.done,
      } : lesson)
    } : module));
  };

  const continueModule = () => {
    const firstIncomplete = activeModule.lessons.find(lesson => !lesson.done);
    if (!firstIncomplete) return;
    setActiveLesson({ ...firstIncomplete, moduleId: activeModule.id, moduleTitle: activeModule.title });
  };

  const openLesson = (lesson) => {
    setActiveLesson({ ...lesson, moduleId: activeModule.id, moduleTitle: activeModule.title });
  };

  const closeLesson = () => {
    setActiveLesson(null);
  };

  const toggleActiveLessonDone = () => {

    toggleLesson(activeLesson.moduleId, activeLesson.id);
    setActiveLesson(prev => ({ ...prev, done: !prev.done }));
  };

  const openNextLesson = () => {
    if (!activeLesson) return;
    const module = educationModules.find(m => m.id === activeLesson.moduleId);

    setActiveLesson({ ...nextLesson, moduleId: module.id, moduleTitle: module.title });

              <span className="rounded-lg bg-white/5 px-3 py-2">{totalEducationStats.progress}% всей программы</span>

function LecturesPage({ lectureItems, setLectureItems }) {
  const safeLectureItems = lectureItems || [];
  const [activeLecture, setActiveLecture] = useState(null);
  const [lectureFilter, setLectureFilter] = useState("Все");

  useAppBackLayer("lectures-active-lecture", Boolean(activeLecture), () => setActiveLecture(null), 130);

  const lectureCategories = ["Все", ...Array.from(new Set(safeLectureItems.map(item => item.category)))];
  const filteredLectures = lectureFilter === "Все" ? safeLectureItems : safeLectureItems.filter(item => item.category === lectureFilter);
  const watchedCount = safeLectureItems.filter(item => item.watched).length;
  const totalProgress = safeLectureItems.length ? Math.round((watchedCount / safeLectureItems.length) * 100) : 0;

  const openLecture = (lecture) => {
    setActiveLecture(lecture);
  };

  const closeLecture = () => {
    setActiveLecture(null);
  };

  const updateLecture = (id, patch) => {
    setLectureItems(prev => prev.map(item => item.id === id ? { ...item, ...patch } : item));
    setActiveLecture(prev => prev && prev.id === id ? { ...prev, ...patch } : prev);
  };

  const toggleLectureWatched = (id) => {
    const lecture = safeLectureItems.find(item => item.id === id);
    if (!lecture) return;
    updateLecture(id, {
      watched: !lecture.watched,
      progress: lecture.watched ? 50 : 100,
    });
  };

  const openNextLecture = () => {
    if (!activeLecture) return;
    const currentIndex = safeLectureItems.findIndex(item => item.id === activeLecture.id);
    const nextLecture = safeLectureItems[currentIndex + 1] || safeLectureItems[0];
    setActiveLecture(nextLecture);
  };

  const setLectureProgress = (id, value) => {
    const progress = Number(value);
    updateLecture(id, {
      progress,
      watched: progress >= 100,
    });
  };

  return <>
    <Header title="Лекции" subtitle="Короткие видеоуроки, разборы мифов и практические инструкции."/>

    <div className="mt-8 grid gap-4 xl:grid-cols-[1fr_320px]">
      <div>
        <div className="mb-4 flex flex-wrap items-center justify-between gap-3">
          <div className="flex flex-wrap gap-2">
            {lectureCategories.map(category => <button key={category} onClick={() => setLectureFilter(category)} className={`rounded-lg px-3 py-2 text-xs transition ${lectureFilter === category ? 'bg-red-500 text-black' : 'bg-white/5 text-zinc-400 hover:bg-white/10'}`}>
              {category}
            </button>)}
          </div>
          <div className="text-xs text-zinc-500">{watchedCount}/{safeLectureItems.length} просмотрено · {totalProgress}%</div>
        </div>

        <MasonryGrid className="grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">
          {filteredLectures.map(lecture => <Card key={lecture.id} onClick={() => openLecture(lecture)} className="cursor-pointer overflow-hidden transition hover:-translate-y-1 hover:border-red-500/50 hover:bg-red-500/5">
            <div className={`relative h-40 bg-cover bg-center ${lecture.watched || lecture.progress >= 100 ? "" : "grayscale"}`} style={{backgroundImage:`url(${lecture.img})`}}>
              <div className="absolute inset-0 bg-black/40"/>
              <button className="absolute left-1/2 top-1/2 flex h-12 w-12 -translate-x-1/2 -translate-y-1/2 items-center justify-center rounded-full bg-red-500 text-black shadow-lg shadow-red-500/20">
                <Play size={22} fill="currentColor"/>
              </button>
              <div className="absolute right-3 top-3 rounded-full bg-black/60 px-2 py-1 text-[10px] text-zinc-300">
                {lecture.duration}
              </div>
            </div>
            <div className="p-4">
              <div className="flex items-center justify-between gap-2">
                <p className="text-xs text-red-500">{lecture.category}</p>
                {lecture.watched ? <CheckCircle2 size={15} className="text-red-500"/> : <Clock3 size={15} className="text-zinc-500"/>}
              </div>
              <h3 className="mt-1 break-words text-sm leading-tight font-semibold md:text-[15px]">{lecture.title}</h3>
              <p className="mt-2 break-words text-xs text-zinc-500">{lecture.description}</p>
              <div className="mt-4 flex items-center gap-3">
                <Progress value={lecture.progress}/>
                <span className="text-xs text-zinc-500">{lecture.progress}%</span>
              </div>
            </div>
          </Card>)}
        </MasonryGrid>
      </div>

      <Card className="p-5">
        <h2 className="text-xl font-semibold">Прогресс лекций</h2>
        <div className="mt-6 flex justify-center">
          <div className="relative flex h-32 w-32 items-center justify-center rounded-full" style={{background:`conic-gradient(#ef4444 0 ${totalProgress}%, #27272a ${totalProgress}% 100%)`}}>
            <div className="flex h-24 w-24 flex-col items-center justify-center rounded-full bg-zinc-950">
              <span className="text-3xl font-semibold">{totalProgress}%</span>
              <span className="text-[10px] text-zinc-500">лекций</span>
            </div>
          </div>
        </div>
        <div className="mt-6 space-y-3 text-sm">
          <div className="flex justify-between"><span className="text-zinc-500">Всего</span><span>{safeLectureItems.length}</span></div>
          <div className="flex justify-between"><span className="text-zinc-500">Просмотрено</span><span>{watchedCount}</span></div>
          <div className="flex justify-between"><span className="text-zinc-500">Осталось</span><span>{safeLectureItems.length - watchedCount}</span></div>
        </div>
      </Card>
    </div>

    {activeLecture && <div onClick={closeLecture} className="onlypump-modal-layer fixed inset-0 z-[120] flex items-center justify-center bg-black/75 p-4 backdrop-blur-sm">
      <Card onClick={(e) => e.stopPropagation()} className="w-full max-w-4xl overflow-hidden">
        <div className="flex items-start justify-between gap-4 border-b border-white/10 p-6">
          <div>
            <p className="text-xs uppercase tracking-wider text-red-500">{activeLecture.category}</p>
            <h2 className="mt-2 break-words text-2xl font-semibold">{activeLecture.title}</h2>
            <p className="mt-2 text-sm text-zinc-500">{activeLecture.duration} · лекция · видео</p>
          </div>
          <button onClick={closeLecture} className="flex h-7 w-7 items-center justify-center rounded-full bg-red-500/10 text-red-400 transition hover:bg-red-500/20">×</button>
        </div>

        <div className="p-6">
          <div className={`relative flex aspect-video items-center justify-center overflow-hidden rounded-2xl border border-white/10 bg-cover bg-center ${activeLecture.watched || activeLecture.progress >= 100 ? "" : "grayscale"}`} style={{backgroundImage:`url(${activeLecture.img})`}}>
            <div className="absolute inset-0 bg-black/65"/>
            <button onClick={() => setLectureProgress(activeLecture.id, Math.min(100, activeLecture.progress + 25))} className="relative flex h-20 w-20 items-center justify-center rounded-full bg-red-500 text-black shadow-2xl shadow-red-500/30 transition hover:scale-105">
              <Play size={34} fill="currentColor" />
            </button>
            <div className="absolute bottom-4 left-4 right-4">
              <div className="mb-3 flex items-center justify-between text-xs text-zinc-400">
                <span>{activeLecture.progress}%</span>
                <span>{activeLecture.duration}</span>
              </div>
              <Progress value={activeLecture.progress}/>
            </div>
          </div>

          <div className="mt-6 grid gap-4 md:grid-cols-[1fr_0.55fr]">
            <div className="rounded-2xl border border-white/10 bg-white/[0.03] p-5">
              <h3 className="font-semibold">Описание лекции</h3>
              <p className="mt-3 break-words text-sm leading-7 text-zinc-400">{activeLecture.description}</p>
              <div className="mt-5 rounded-xl bg-black/30 p-4 text-sm text-zinc-400">
                Здесь можно разместить конспект, ссылки на материалы, домашнее задание и таймкоды лекции.
              </div>
            </div>

            <div className="rounded-2xl border border-white/10 bg-white/[0.03] p-5">
              <h3 className="font-semibold">Управление</h3>
              <p className="mt-3 text-sm text-zinc-400">Статус влияет на общий прогресс лекций.</p>
              <Button onClick={() => toggleLectureWatched(activeLecture.id)} className={`mt-5 w-full ${activeLecture.watched ? 'bg-red-500 text-black' : 'bg-white/8 text-zinc-300'}`}>
                {activeLecture.watched ? 'Просмотрено' : 'Отметить просмотренной'}
              </Button>
              <Button onClick={openNextLecture} className="mt-3 w-full bg-white/8">
                Следующая лекция
              </Button>
            </div>
          </div>
        </div>
      </Card>
    </div>}
  </>;
}

function ProgressPage({ workouts = [], measurements, setMeasurements, progressGoal, setProgressGoal }) {

  const [previousMeasurements] = useState({
    weight: 90,
    bodyFat: 12.6,
    neck: 39,
    shoulders: 122,
    chest: 106,
    biceps: 37,
    waist: 82,
    belly: 88,
    glutes: 102,
    thigh: 60,
    calf: 38,
  });

  const measurementLabels = {
    weight: "Вес",
    bodyFat: "Процент жира",
    neck: "Шея",
    shoulders: "Плечи",
    chest: "Грудь",
    biceps: "Бицепс",
    waist: "Талия",
    belly: "Живот",
    glutes: "Ягодицы",
    thigh: "Бедро",
    calf: "Голень",
  };

  const strengthStats = useMemo(() => {
    const exercises = workouts.flatMap(workout => (workout.exercises || []).map(exercise => ({
      ...exercise,
      workoutTitle: workout.title,
      workoutDate: workout.date,
    })));
    const grouped = exercises.reduce((acc, exercise) => {
      const sets = exercise.sets || [];
      const bestSet = sets.reduce((best, set) => {
        const volume = Number(set.weight || 0) * Number(set.reps || 0);
        const bestVolume = Number(best.weight || 0) * Number(best.reps || 0);
        return volume > bestVolume ? set : best;
      }, sets[0] || { weight: 0, reps: 0 });

      const estimatedOneRepMax = Math.round(Number(bestSet.weight || 0) * (1 + Number(bestSet.reps || 0) / 30));
      const currentVolume = sets.reduce((sum, set) => sum + Number(set.weight || 0) * Number(set.reps || 0), 0);

      if (!acc[exercise.name] || estimatedOneRepMax > acc[exercise.name].oneRepMax) {
        acc[exercise.name] = {
          name: exercise.name,
          muscle: exercise.muscleGroup || exercise.muscle || "Другое",
          oneRepMax: estimatedOneRepMax,
          bestSet: `${bestSet.weight}×${bestSet.reps}`,
          volume: currentVolume,
          progress: Math.min(100, Math.round((estimatedOneRepMax / Math.max(1, estimatedOneRepMax - 8)) * 75)),
        };
      }

      return acc;
    }, {});

    const list = Object.values(grouped).filter(item => item.oneRepMax > 0).sort((a, b) => b.oneRepMax - a.oneRepMax);
    const totalVolume = list.reduce((sum, item) => sum + item.volume, 0);
    const avgStrength = list.length ? Math.round(list.reduce((sum, item) => sum + item.oneRepMax, 0) / list.length) : 0;

    return { list, totalVolume, avgStrength };
  }, [workouts]);

  const updateMeasurement = (field, value) => {
    setMeasurements(prev => ({ ...prev, [field]: Number(value) }));
  };

  const updateGoal = (field, value) => {
    setProgressGoal(prev => ({ ...prev, [field]: field === "title" ? value : Number(value) }));
  };

  const bodyProgress = useMemo(() => {
    const weightStart = previousMeasurements.weight;
    const weightCurrent = measurements.weight;
    const weightTarget = progressGoal.targetWeight;
    const weightTotal = Math.abs(weightStart - weightTarget) || 1;
    const weightDone = Math.abs(weightStart - weightCurrent);

    const waistStart = previousMeasurements.waist;
    const waistCurrent = measurements.waist;
    const waistTarget = progressGoal.targetWaist;
    const waistTotal = Math.abs(waistStart - waistTarget) || 1;
    const waistDone = Math.abs(waistStart - waistCurrent);

    return Math.min(100, Math.round(((weightDone / weightTotal) * 50) + ((waistDone / waistTotal) * 50)));
  }, [measurements, previousMeasurements, progressGoal]);

  return <><Header title="Прогресс" subtitle="Силовые показатели связаны с вкладкой тренировок. Замеры и цель можно менять вручную."/>
    <div className="mt-8 grid gap-4 xl:grid-cols-[1.15fr_0.85fr]">
      <Card className="p-5">
        <div className="flex items-start justify-between gap-4">
          <div>
            <h2 className="text-xl font-semibold">Прогресс в силовых</h2>
            <p className="mt-2 break-words text-sm text-zinc-400">Данные берутся из упражнений, подходов, веса и повторов во вкладке «Тренировки».</p>
          </div>
          <div className="text-right">
            <div className="text-3xl font-semibold text-red-500">{strengthStats.avgStrength}</div>
            <div className="text-xs text-zinc-500">средний 1ПМ</div>
          </div>
        </div>

        <div className="mt-5 grid gap-3 md:grid-cols-3">
          <div className="rounded-xl border border-white/10 bg-white/[0.03] p-4"><p className="text-xs text-zinc-500">Упражнений</p><div className="mt-2 text-2xl">{strengthStats.list.length}</div></div>
          <div className="rounded-xl border border-white/10 bg-white/[0.03] p-4"><p className="text-xs text-zinc-500">Тоннаж</p><div className="mt-2 text-2xl">{strengthStats.totalVolume.toLocaleString("ru-RU")} кг</div></div>
          <div className="rounded-xl border border-white/10 bg-white/[0.03] p-4"><p className="text-xs text-zinc-500">Цель силы</p><div className="mt-2 text-2xl">+{progressGoal.targetStrength}%</div></div>
        </div>

        <div className="mt-6 space-y-3">
          {strengthStats.list.slice(0, 8).map(item => <div key={item.name} className="rounded-2xl border border-white/10 bg-white/[0.03] p-4">
            <div className="flex items-center justify-between gap-3">
              <div>
                <h3 className="break-words text-sm font-semibold">{item.name}</h3>
                <p className="mt-1 text-xs text-zinc-500">{item.muscle} · лучший сет {item.bestSet}</p>
              </div>
              <div className="text-right">
                <div className="text-lg font-semibold">{item.oneRepMax} кг</div>
                <div className="text-[10px] text-zinc-500">расчётный 1ПМ</div>
              </div>
            </div>
            <div className="mt-3"><Progress value={Math.min(100, Math.round((item.oneRepMax / Math.max(1, item.oneRepMax * (1 + progressGoal.targetStrength / 100))) * 100))}/></div>
          </div>)}
        </div>
      </Card>

      <div className="space-y-4">
        <Card className="p-5">
          <Target className="text-red-500"/>
          <h2 className="mt-5 text-xl font-semibold">Цель</h2>
          <label className="mt-4 block rounded-xl bg-white/[0.03] p-3">
            <span className="text-[10px] uppercase tracking-wider text-zinc-500">Название цели</span>
            <input value={progressGoal.title} onChange={(e) => updateGoal("title", e.target.value)} className="mt-1 w-full bg-transparent text-lg outline-none" />
          </label>
          <div className="mt-3 grid grid-cols-3 gap-2">
            <label className="rounded-xl bg-white/[0.03] p-3"><span className="text-[10px] uppercase tracking-wider text-zinc-500">Вес</span><input type="number" value={progressGoal.targetWeight} onChange={(e) => updateGoal("targetWeight", e.target.value)} className="mt-1 w-full bg-transparent outline-none" /></label>
            <label className="rounded-xl bg-white/[0.03] p-3"><span className="text-[10px] uppercase tracking-wider text-zinc-500">Талия</span><input type="number" value={progressGoal.targetWaist} onChange={(e) => updateGoal("targetWaist", e.target.value)} className="mt-1 w-full bg-transparent outline-none" /></label>
            <label className="rounded-xl bg-white/[0.03] p-3"><span className="text-[10px] uppercase tracking-wider text-zinc-500">Сила %</span><input type="number" value={progressGoal.targetStrength} onChange={(e) => updateGoal("targetStrength", e.target.value)} className="mt-1 w-full bg-transparent outline-none" /></label>
          </div>
          <div className="mt-5 text-5xl">{bodyProgress}%</div>
          <div className="mt-5"><Progress value={bodyProgress}/></div>
        </Card>

        <Card className="p-5">
          <h2 className="text-xl font-semibold">Замеры</h2>
          <div className="mt-5 grid grid-cols-2 gap-3">
            {Object.entries(measurementLabels).map(([field, label]) => {
              const current = measurements[field];
              const previous = previousMeasurements[field];
              const delta = Number((current - previous).toFixed(1));
              return <label key={field} className="rounded-xl border border-white/10 bg-white/[0.03] p-3">
                <span className="flex items-center justify-between gap-2 text-[10px] uppercase tracking-wider text-zinc-500">
                  <span>{label}</span>
                  <span className={delta < 0 ? "text-red-400" : delta > 0 ? "text-zinc-300" : "text-zinc-600"}>{delta > 0 ? "+" : ""}{delta}</span>
                </span>
                <div className="mt-1 flex items-center gap-1">
                  <input type="number" value={current} onChange={(e) => updateMeasurement(field, e.target.value)} className="w-full bg-transparent text-lg outline-none" />
                  <span className="text-xs text-zinc-500">{field === "weight" ? "кг" : field === "bodyFat" ? "%" : "см"}</span>
                </div>
              </label>
            })}
          </div>
        </Card>
      </div>
    </div>
  </>;
}

function AnalyticsPage({ workouts = [] }) {
  const weekAnalytics = useMemo(() => {
    const today = parseDateKeyLocal(formatDateKey(new Date()));
    const start = addLocalDaysToDate(today, -6).getTime();
    const recent = workouts.filter(workout => parseDateKeyLocal(workout.date).getTime() >= start);
    const sets = recent.reduce((sum, workout) => sum + getWorkoutSetCountGlobal(workout), 0);
    const volume = recent.reduce((sum, workout) => sum + (getWorkoutVolume(workout) || workout.totalVolumeKg), 0);
    const loadLevel = getVolumeLoadLevel(sets, volumeStandards.weeklyTotal);
    return { recent, sets, volume, loadLevel };
  }, [workouts]);

  const analyticCards = [
    [HeartPulse, "Восстановление", "78%", "Норма"],
    [Moon, "Сон", "7 ч 32 м", "Хорошо"],
    [Activity, "Активность", "12 842", "Выше цели"],
    [Zap, "Тренировочная нагрузка", `${weekAnalytics.sets}`, `${weekAnalytics.loadLevel.label} · подходов за 7 дней`],
  ];

  return <><Header title="Аналитика" subtitle="Система ищет слабые места: недоедание, перегруз, провалы сна и просадки активности."/><PageGrid>
    {analyticCards.map(([Icon,t,v,s])=><Card key={t} className="p-5"><Icon className="text-red-500"/><p className="mt-5 text-sm text-zinc-500">{t}</p><div className="mt-2 text-4xl">{v}</div><p className="mt-3 text-sm text-zinc-400">{s}</p></Card>)}
    <Card className="p-5 xl:col-span-2"><h2 className="text-xl font-semibold">Вывод недели</h2><p className="mt-4 leading-7 text-zinc-300">За последние 7 дней: {weekAnalytics.recent.length} тренировок, {weekAnalytics.sets} подходов и {Number(weekAnalytics.volume || 0).toLocaleString("ru-RU")} кг тоннажа. Норма опытного для общего недельного объёма — {volumeStandards.weeklyTotal} подходов.</p></Card>
  </PageGrid></>;
}
