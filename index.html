  const [seenVersion, setSeenVersion] = useState(() => {
    try { return localStorage.getItem("onlypump-seen-version") || ""; } catch { return ""; }
  });

  const currentVersion = "7.4.3";
  const showWhatsNew = seenVersion !== currentVersion;

  const selectedDate = parseDateKey(selectedDateKey);
  const weekStart = startOfWeek(selectedDate);
  const weekDays = Array.from({ length: 7 }, (_, index) => {
    const date = addLocalDays(weekStart, index);
    return { date, key: toDateKey(date) };
  });

  useEffect(() => {
    workoutsRef.current = workouts;
  }, [workouts]);

  useEffect(() => {
    if (!selectedWorkout) {
      setElapsedWorkoutTime(0);
      return;
    }

    if (normalizeWorkoutStatus(selectedWorkout.status) !== "active") {
      setElapsedWorkoutTime(getWorkoutDurationSeconds(selectedWorkout));
      return;
    }

    const tick = () => setElapsedWorkoutTime(getWorkoutElapsedSeconds(selectedWorkout));
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [selectedWorkout?.id, selectedWorkout?.status, selectedWorkout?.startedAt, selectedWorkout?.createdAt, selectedWorkout?.durationMinutes]);

  useEffect(() => {
    if (!restTimer || restTimer <= 0) return;
    const id = setInterval(() => {
      setRestTimer(prev => Math.max(0, Number(prev || 0) - 1));
    }, 1000);
    return () => clearInterval(id);
  }, [restTimer]);

  useEffect(() => {
    if (restTimer !== 0 || !restAdvanceRef.current) return;
    const target = restAdvanceRef.current;
    restAdvanceRef.current = null;
    if (target.workoutId && selectedWorkout?.id && target.workoutId !== selectedWorkout.id) return;
    setActiveExerciseIndex(target.exerciseIndex);
    setActiveSetId(target.setId || null);
    setOpenMenu(null);
  }, [restTimer, selectedWorkout?.id]);

  useEffect(() => {
    setWorkoutTitleDraft(selectedWorkout?.title || "");
  }, [selectedWorkout?.id]);

  useEffect(() => {
    const currentExercise = (selectedWorkout?.exercises || [])[activeExerciseIndex];
    setExerciseNameDraft(currentExercise?.name || "");
  }, [selectedWorkout?.id, activeExerciseIndex, selectedWorkout?.exercises?.[activeExerciseIndex]?.id]);

  useEffect(() => {
    const closeOpenSwipeRows = (event) => {
      if (event.target?.closest?.('[data-swipe-row="true"]')) return;
      setSwipedWorkoutId(null);
      setSwipedExerciseId(null);
      setSwipedSetId(null);
    };
    document.addEventListener("pointerdown", closeOpenSwipeRows, true);
    return () => document.removeEventListener("pointerdown", closeOpenSwipeRows, true);
  }, []);

  useEffect(() => {
    setSwipedWorkoutId(null);
    setSwipedExerciseId(null);
    setSwipedSetId(null);
  }, [activeTab, selectedWorkout?.id, workoutViewMode]);

  useEffect(() => {
    if (!activeSetInput) return;
    if (workoutViewMode !== "exercise" || !selectedWorkout || openMenu || detailMenuOpen || restMenuOpen || restEditor || isExerciseBaseOpen || exerciseMeasurementSheet || exerciseNotesSheet || exerciseStatsSheet || finishChoiceSheet || completionSummarySheet) {
      setActiveSetInput(null);
    }
  }, [activeSetInput, workoutViewMode, selectedWorkout?.id, openMenu, detailMenuOpen, restMenuOpen, restEditor, isExerciseBaseOpen, exerciseMeasurementSheet, exerciseNotesSheet, exerciseStatsSheet, finishChoiceSheet, completionSummarySheet]);

  useEffect(() => {
    document.documentElement.classList.toggle("onlypump-custom-keyboard-open", Boolean(activeSetInput));
    return () => document.documentElement.classList.remove("onlypump-custom-keyboard-open");
  }, [activeSetInput]);

  useEffect(() => {
    if (!activeSetInput) return;
    const closeKeyboardOnOutsideTap = (event) => {
      if (event.target?.closest?.('[data-custom-set-keyboard="true"], [data-custom-set-field="true"]')) return;
      setActiveSetInput(null);
    };
    document.addEventListener("pointerdown", closeKeyboardOnOutsideTap, true);
    return () => document.removeEventListener("pointerdown", closeKeyboardOnOutsideTap, true);
  }, [activeSetInput]);

  const sortedWorkouts = useMemo(() => {
    return [...workouts].sort((a, b) => parseDateKey(b.date) - parseDateKey(a.date));
  }, [workouts]);

  const workoutsBySelectedDate = useMemo(() => {
    return sortedWorkouts.filter(workout => workout.date === selectedDateKey);
  }, [sortedWorkouts, selectedDateKey]);

  const groupedWeeks = useMemo(() => {
    const groups = new Map();

    sortedWorkouts.forEach(workout => {
      const date = parseDateKey(workout.date);
      const weekStartDate = startOfWeek(date);
      const weekEndDate = addLocalDays(weekStartDate, 6);
      const key = toDateKey(weekStartDate);

      if (!groups.has(key)) {
        groups.set(key, {
          id: key,
          weekStart: key,
          weekEnd: toDateKey(weekEndDate),
          workouts: [],
          totalVolume: 0,
          totalDuration: 0,
          totalCalories: 0,
        });
      }

      const group = groups.get(key);
      group.workouts.push(workout);
      if (workout.status === "completed") group.totalVolume += Number(getWorkoutVolume(workout));
      group.totalDuration += Number(workout.durationMinutes || 0);
      group.totalCalories += Number(workout.calories || 0);
    });

    return [...groups.values()].sort((a, b) => parseDateKey(b.weekStart) - parseDateKey(a.weekStart));
  }, [sortedWorkouts]);

  const markedDateKeys = useMemo(() => workouts.map(workout => workout.date), [workouts]);

  const getWorkoutSetCount = (workout) => (workout?.exercises || []).reduce((sum, exercise) => sum + (exercise.sets || []).length, 0);

  const weeklyWorkouts = useMemo(() => {
    const start = weekStart.getTime();
    const end = addLocalDays(weekStart, 7).getTime();
    return workouts
      .filter(workout => {
        const time = parseDateKey(workout.date).getTime();
        return time >= start && time < end;
      });
  }, [workouts, selectedDateKey]);

  const weeklySetCount = useMemo(() => {
    return weeklyWorkouts.reduce((sum, workout) => sum + getWorkoutSetCount(workout), 0);
  }, [weeklyWorkouts]);

  const activeWorkout = useMemo(() => sortedWorkouts.find(workout => workout.status === "active") || null, [sortedWorkouts]);

  const getMuscleSetStats = (workout) => {
    const stats = {};
    (workout?.exercises || []).forEach(exercise => {
      if (!isStrengthStatsExercise(exercise)) return;
      const group = exercise.muscleGroup || "Другое";
      if (!stats[group]) stats[group] = { muscleGroup: group, sets: 0, volume: 0 };
      stats[group].sets += (exercise.sets || []).length;
      stats[group].volume += (exercise.sets || []).reduce((sum, set) => sum + getSetVolumeForExercise(set, exercise), 0);
    });
    return Object.values(stats).sort((a, b) => b.sets - a.sets);
  };

  const getMuscleSetStatsForWorkouts = (items = []) => {
    const stats = standardMuscleGroups.reduce((acc, group) => {
      acc[group] = { muscleGroup: group, sets: 0, volume: 0, workouts: new Set(), order: standardMuscleGroups.indexOf(group) };
      return acc;
    }, {});
    items.forEach(workout => {
      (workout?.exercises || []).forEach(exercise => {
        if (!isStrengthStatsExercise(exercise)) return;
        const group = exercise.muscleGroup || "Другое";
        if (!stats[group]) stats[group] = { muscleGroup: group, sets: 0, volume: 0, workouts: new Set(), order: standardMuscleGroups.length };
        stats[group].sets += (exercise.sets || []).length;
        stats[group].volume += (exercise.sets || []).reduce((sum, set) => sum + getSetVolumeForExercise(set, exercise), 0);
        stats[group].workouts.add(workout.id);
      });
    });
    return Object.values(stats)
      .map(stat => ({ ...stat, workoutCount: stat.workouts.size }))
      .sort((a, b) => b.sets - a.sets || b.volume - a.volume || a.order - b.order);
  };

  const weeklyMuscleStats = useMemo(() => getMuscleSetStatsForWorkouts(weeklyWorkouts), [weeklyWorkouts]);
  const weeklyVolume = useMemo(() => weeklyWorkouts.filter(workout => workout.status === "completed").reduce((sum, workout) => sum + Number(getWorkoutVolume(workout)), 0), [weeklyWorkouts]);

  const VolumeLoadBar = ({ count = 0, title = "Объем", subtitle = "подходы", experiencedAt = volumeStandards.workoutTotal, onClick, className = "" }) => {
    const level = getVolumeLoadLevel(count, experiencedAt);
    const max = Math.max(1, Number(experiencedAt || 1) * 2);
    const percent = Math.min(100, Math.round((Number(count || 0) / max) * 100));
    const Cmp = onClick ? "button" : "div";
    const gradientSize = percent > 0 ? `${10000 / percent}% 100%` : "100% 100%";
    const volumeGradient = "linear-gradient(90deg,#71717a 0%,#22c55e 25%,#facc15 50%,#f97316 75%,#ef4444 100%)";

    return <Cmp onClick={onClick} className={`w-full rounded-[24px] border border-white/10 bg-white/[0.035] p-4 text-left transition ${onClick ? 'active:scale-[0.99] hover:bg-white/[0.055]' : ''} ${className}`}>
      <div className="flex items-center justify-between gap-3">
        <div>
          <p className="text-xs font-bold uppercase tracking-[0.18em] text-zinc-500">{title}</p>
          <h3 className="mt-1 text-lg font-black tracking-[-0.03em]">{count} {subtitle}</h3>
        </div>
        <span className="rounded-full px-3 py-1 text-xs font-black text-black" style={{ backgroundColor: level.color }}>{level.label}</span>
      </div>
      <div className="relative mt-4 h-3 overflow-hidden rounded-full bg-zinc-900">
        <div className="absolute inset-y-0 left-0 rounded-full" style={{ width: `${percent}%`, background: volumeGradient, backgroundSize: gradientSize, backgroundPosition: "left center" }} />
      </div>
    </Cmp>;
  };

  const selectDate = (dateKey) => {
    setSelectedDateKey(dateKey);
  };

  const addWorkoutForDate = async (patch = {}) => {
    const targetDateKey = patch.dateKey || selectedDateKey;
    const targetDate = parseDateKey(targetDateKey);
    const workout = makeWorkout(targetDateKey, {
      title: patch.title || `Тренировка за ${targetDate.getDate()} ${months[targetDate.getMonth()]}`,
      durationMinutes: patch.durationMinutes ?? 0,
      totalVolumeKg: patch.totalVolumeKg ?? 0,
      calories: patch.calories ?? 0,
      estimatedCaloriesBurned: patch.estimatedCaloriesBurned ?? patch.estimated_calories_burned ?? patch.calories ?? 0,
      status: patch.status,
      workoutType: patch.workoutType ?? patch.workout_type,
      startedAt: patch.startedAt,
      templateId: patch.templateId,
      exercises: patch.exercises,
    });
    if (patch.finishedAt !== undefined) workout.finishedAt = patch.finishedAt;

    setIsAddMenuOpen(false);
    setWorkoutViewMode("overview");
    if (canUseWorkoutApi) {
      const pendingWorkout = { ...workout, pending: true, isSaving: true, isSyncing: true };
      setWorkouts(prev => [pendingWorkout, ...prev]);
      setSelectedWorkout(pendingWorkout);
      const id = await createWorkoutTreeViaApi(pendingWorkout);
      if (!id) {
        patchWorkoutInState(pendingWorkout.id, item => ({ ...item, isSaving: false, isSyncing: false, syncError: true }));
      }
      return;
    }

    setWorkouts(prev => [workout, ...prev]);
    setSelectedWorkout(workout);
  };

  const getProgramSetCount = (program) => program.days.reduce((sum, day) => {
    return sum + day.exercises.reduce((exerciseSum, exercise) => exerciseSum + exercise.sets.length, 0);
  }, 0);

  const getProgramExerciseAlternatives = (exercise = {}) => {
    const explicit = (exercise.alternatives || []).map(item => typeof item === "string" ? item : item.name).filter(Boolean);
    const groupItems = (exerciseLibrary[exercise.muscleGroup] || []).filter(name => name !== exercise.name).slice(0, 3);
    return Array.from(new Set([exercise.name, ...explicit, ...groupItems]));
  };

  const getProgramExerciseDefaultSettings = (program, dayIndex, exercise, exerciseIndex, difficulty = "intermediate") => {
    const key = makeProgramTemplateExerciseKey(program.id, dayIndex, exerciseIndex);
    const config = programDifficultyDefaults[difficulty] || programDifficultyDefaults.intermediate;
    const reps = getProgramExerciseRepRange(exercise);
    const muscle = exercise.muscleGroup || "Другое";
    const bigLift = /ног|спин|ягод|груд/i.test(muscle);
    const targetSets = Math.max(1, getProgramExerciseSetsCount(exercise) + config.setDelta);
    return {
      key,
      clientId: `program-setting-${key}-${Date.now()}-${Math.random().toString(16).slice(2)}`,
      templateExerciseKey: key,
      originalName: exercise.name,
      selectedExerciseName: exercise.name,
      selectedExerciseLibraryId: null,
      muscleGroup: muscle,
      alternatives: getProgramExerciseAlternatives(exercise),
      targetSets,
      repMin: reps.min,
      repMax: reps.max,
      progressionWeightStep: bigLift ? config.bigStep : config.smallStep,
      progressionRepStep: 1,
      progressionMode: "double_progression",
      deloadWeightSteps: 1,
      regressionThresholdSessions: config.regressionThreshold,
      measurementMode: normalizeMeasurementMode(exercise.measurementMode || "weight_reps"),
      targetWeight: Number((exercise.sets || [])[0]?.[0] || exercise.targetWeight || 0),
    };
  };

  const createProgramSettingsDraft = (program) => {
    const bounds = getProgramDurationBounds(program);
    const difficulty = program.defaultDifficulty || program.default_difficulty || "intermediate";
    const exerciseSettings = {};
    (program.days || []).forEach((day, dayIndex) => {
      (day.exercises || []).forEach((exercise, exerciseIndex) => {
        const setting = getProgramExerciseDefaultSettings(program, dayIndex, exercise, exerciseIndex, difficulty);
        exerciseSettings[setting.key] = setting;
      });
    });
    return {
      clientId: `program-client-${program.id}-${Date.now()}-${Math.random().toString(16).slice(2)}`,
      durationWeeks: clampProgramNumber(bounds.defaultValue, bounds.min, bounds.max),
      difficulty,
      planMode: "flexible",
      startedAt: selectedDateKey,
      exerciseSettings,
    };
  };

  const openProgramSettings = (program) => {
    setProgramSettingsSheet({ program, draft: createProgramSettingsDraft(program) });
  };

  const updateProgramSettingsDraft = (patcher) => {
    setProgramSettingsSheet(prev => {
      if (!prev) return prev;
      const nextDraft = typeof patcher === "function" ? patcher(prev.draft) : { ...prev.draft, ...patcher };
      return { ...prev, draft: nextDraft };
    });
  };

  const updateProgramExerciseSetting = (settingKey, patch) => {
    updateProgramSettingsDraft(draft => ({
      ...draft,
      exerciseSettings: {
        ...draft.exerciseSettings,
        [settingKey]: {
          ...draft.exerciseSettings[settingKey],
          ...patch,
        },
      },
    }));
  };

  const rebuildProgramExerciseSettingsForDifficulty = (program, draft, difficulty) => {
    const nextSettings = {};
    (program.days || []).forEach((day, dayIndex) => {
      (day.exercises || []).forEach((exercise, exerciseIndex) => {
        const defaults = getProgramExerciseDefaultSettings(program, dayIndex, exercise, exerciseIndex, difficulty);
        const previous = draft.exerciseSettings[defaults.key] || {};
        nextSettings[defaults.key] = {
          ...defaults,
          selectedExerciseName: previous.selectedExerciseName || defaults.selectedExerciseName,
          selectedExerciseLibraryId: previous.selectedExerciseLibraryId || defaults.selectedExerciseLibraryId,
          repMin: previous.repMin ?? defaults.repMin,
          repMax: previous.repMax ?? defaults.repMax,
          targetWeight: previous.targetWeight ?? defaults.targetWeight,
        };
      });
    });
    return nextSettings;
  };

  const setProgramDifficulty = (difficulty) => {
    setProgramSettingsSheet(prev => {
      if (!prev) return prev;
      return {
        ...prev,
        draft: {
          ...prev.draft,
          difficulty,
          exerciseSettings: rebuildProgramExerciseSettingsForDifficulty(prev.program, prev.draft, difficulty),
        },
      };
    });
  };

  const getProgramProgressionTarget = (setting, sequenceIndex = 0, seed = {}) => {
    const repMin = Number(setting.repMin || 8);
    const repMax = Math.max(repMin, Number(setting.repMax || 12));
    const repStep = Math.max(1, Number(setting.progressionRepStep || 1));
    const weightStep = Number(setting.progressionWeightStep || 0);
    const startReps = Number(seed.reps || repMin);
    const startWeight = Number(seed.weight ?? setting.targetWeight ?? 0);
    const rangeSize = Math.max(1, Math.floor((repMax - repMin) / repStep) + 1);
    const cycle = Math.floor((sequenceIndex + Math.max(0, startReps - repMin)) / rangeSize);
    const reps = repMin + ((sequenceIndex + Math.max(0, startReps - repMin)) % rangeSize) * repStep;
    return {
      weight: Math.max(0, startWeight + cycle * weightStep),
      reps: Math.min(repMax, reps),
    };
  };

  const buildProgramExercise = (program, dayIndex, exercise, exerciseIndex, draft, sequenceIndex) => {
    const settingKey = makeProgramTemplateExerciseKey(program.id, dayIndex, exerciseIndex);
    const setting = draft.exerciseSettings[settingKey] || getProgramExerciseDefaultSettings(program, dayIndex, exercise, exerciseIndex, draft.difficulty);
    const target = getProgramProgressionTarget(setting, sequenceIndex);
    const sets = Array.from({ length: Math.max(1, Number(setting.targetSets || 3)) }, () => [target.weight, target.reps]);
    const base = makeExercise(exerciseIndex + 1, setting.selectedExerciseName, setting.muscleGroup || exercise.muscleGroup, sets, false, {
      ...exercise,
      name: setting.selectedExerciseName,
      muscleGroup: setting.muscleGroup || exercise.muscleGroup,
      measurementMode: setting.measurementMode,
      primaryMuscles: [setting.muscleGroup || exercise.muscleGroup].filter(Boolean),
    });
    return {
      ...base,
      note: exercise.note || "Запиши фактический вес и повторы — следующая тренировка подстроится автоматически.",
      userProgramExerciseSettingId: null,
      userProgramExerciseSettingClientId: setting.clientId,
      programTemplateExerciseId: null,
      programTemplateExerciseKey: settingKey,
      plannedSets: setting.targetSets,
      plannedRepMin: setting.repMin,
      plannedRepMax: setting.repMax,
      plannedWeight: target.weight,
      plannedReps: target.reps,
      progressionState: {
        mode: setting.progressionMode,
        repMin: setting.repMin,
        repMax: setting.repMax,
        repStep: setting.progressionRepStep,
        weightStep: setting.progressionWeightStep,
        regressionThresholdSessions: setting.regressionThresholdSessions,
        sequenceIndex,
        planMode: draft.planMode,
        difficulty: draft.difficulty,
        missedSessions: 0,
      },
      sets: base.sets.map(set => ({
        ...set,
        weight: target.weight,
        reps: target.reps,
        weightValue: target.weight,
        repsValue: target.reps,
        status: "pending",
        isCompleted: false,
      })),
    };
  };

  const buildProgramPlanWorkouts = (program, draft) => {
    const occurrenceByKey = {};
    const workoutsToCreate = [];
    for (let weekIndex = 0; weekIndex < Number(draft.durationWeeks || 1); weekIndex += 1) {
      (program.days || []).forEach((day, dayIndex) => {
        const dateKey = toDateKey(addLocalDays(parseDateKey(draft.startedAt || selectedDateKey), weekIndex * 7 + (day.offsetDays ?? dayIndex * 2)));
        const exercises = (day.exercises || []).map((exercise, exerciseIndex) => {
          const settingKey = makeProgramTemplateExerciseKey(program.id, dayIndex, exerciseIndex);
          const setting = draft.exerciseSettings[settingKey];
          const progressionKey = `${setting?.selectedExerciseName || exercise.name}-${setting?.muscleGroup || exercise.muscleGroup}`.toLowerCase();
          const sequenceIndex = occurrenceByKey[progressionKey] || 0;
          occurrenceByKey[progressionKey] = sequenceIndex + 1;
          return buildProgramExercise(program, dayIndex, exercise, exerciseIndex, draft, sequenceIndex);
        });
        workoutsToCreate.push(makeWorkout(dateKey, {
          title: day.title,
          programDayNumber: dayIndex + 1,
          durationMinutes: 0,
          totalVolumeKg: 0,
          calories: 0,
          estimatedCaloriesBurned: 0,
          status: "planned",
          startedAt: null,
          exercises,
          notes: `${program.title}: ${program.description}`,
          templateId: program.id,
          userProgramId: null,
          userProgramClientId: draft.clientId,
          programTemplateWorkoutId: null,
          programTemplateWorkoutKey: makeProgramTemplateWorkoutKey(program.id, dayIndex),
          programWeekNumber: weekIndex + 1,
          programDayIndex: dayIndex + 1,
          programName: program.title,
          programPlanMode: draft.planMode,
          programDifficulty: draft.difficulty,
          isProgramGenerated: true,
        }));
      });
    }
    return workoutsToCreate;
  };

  const buildProgramExerciseSettingsPayload = (draft) => Object.values(draft.exerciseSettings || {}).map(setting => ({
    client_id: setting.clientId,
    template_exercise_key: setting.templateExerciseKey,
    selected_exercise_library_id: setting.selectedExerciseLibraryId,
    selected_exercise_name: setting.selectedExerciseName,
    target_sets: Number(setting.targetSets || 3),
    rep_min: Number(setting.repMin || 8),
    rep_max: Number(setting.repMax || 12),
    progression_weight_step: Number(setting.progressionWeightStep || 2.5),
    progression_rep_step: Number(setting.progressionRepStep || 1),
    progression_mode: setting.progressionMode || "double_progression",
    deload_weight_steps: Number(setting.deloadWeightSteps || 1),
    regression_threshold_sessions: Number(setting.regressionThresholdSessions || 2),
    measurement_mode: setting.measurementMode || "weight_reps",
  }));

  const buildProgramCreatePayload = (program, draft, workoutsToCreate) => ({
    client_id: draft.clientId,
    program: {
      id: program.id,
      title: program.title,
      name: program.title,
      description: program.description,
      goal: program.focus,
    },
    settings: {
      client_id: draft.clientId,
      template_key: program.id,
      name: program.title,
      started_at: draft.startedAt,
      duration_weeks: Number(draft.durationWeeks || 1),
      difficulty: draft.difficulty,
      plan_mode: draft.planMode,
      status: "active",
    },
    exercise_settings: buildProgramExerciseSettingsPayload(draft),
    workouts: workoutsToCreate.map(workout => {
      const { profile_id, ...workoutPayload } = buildWorkoutSupabasePayload(workout);
      return {
        client_id: workout.id,
        workout: { client_id: workout.id, ...workoutPayload },

      || result.data
      || null;
    return Array.isArray(record) ? (record[0] || null) : record;

      set: ["set_id", "workout_set_id", "setId", "workoutSetId"],
    }[key] || [];
    for (const idKey of idKeys) {
      if (result?.[idKey]) return result[idKey];
      if (result?.data?.[idKey]) return result.data[idKey];
      if (result?.payload?.[idKey]) return result.payload[idKey];
    }
    return record?.id
      || record?.[`${key}_id`]
      || record?.[`${key}Id`]
      || result?.id
      || result?.data?.id
      || null;

      result?.[key],
      result?.data?.[key],
      result?.payload?.[key],
      result?.records,

      for (const itemKey of keys) {

    if (!apiExercises.length && !apiSets.length) {
      const nestedTree = apiWorkouts.map(mapSupabaseWorkout);
      console.log("Built workout tree:", nestedTree);
      const nestedSupersetGroups = nestedTree.reduce((acc, workout) => {
        (workout.exercises || []).forEach(exercise => {
          const groupId = getExerciseSupersetGroupId(exercise);
          if (!groupId) return;
          if (!acc[groupId]) acc[groupId] = [];
          acc[groupId].push({ workoutId: workout.supabaseId || workout.id, exerciseId: exercise.supabaseId || exercise.id, order: exercise.supersetOrder });
        });
        return acc;
      }, {});
      console.log("Built superset groups:", nestedSupersetGroups);

      const exerciseId = set?.workout_exercise_id || set?.workoutExerciseId || set?.exercise_id || set?.exerciseId;
      if (!exerciseId) return map;
      const key = String(exerciseId);
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(set);
      return map;
    }, new Map());

    const exercisesByWorkoutId = apiExercises.reduce((map, exercise) => {
      const workoutId = exercise?.workout_id || exercise?.workoutId || exercise?.workout?.id;
      if (!workoutId) return map;
      const exerciseId = exercise?.id || exercise?.workout_exercise_id || exercise?.exercise_id;
      const key = String(workoutId);
      const setRows = exerciseId ? (setsByExerciseId.get(String(exerciseId)) || []) : [];
      if (!map.has(key)) map.set(key, []);
      map.get(key).push({
        ...exercise,
        workout_sets: setRows.length ? setRows : (exercise?.workout_sets || exercise?.sets || []),
      });
      return map;
    }, new Map());

    const tree = apiWorkouts.map((workout, index) => {
      const workoutId = workout?.id || workout?.workout_id || workout?.workoutId;
      const exerciseRows = workoutId ? (exercisesByWorkoutId.get(String(workoutId)) || []) : [];
      return mapSupabaseWorkout({
        ...workout,
        workout_exercises: exerciseRows.length ? exerciseRows : (workout?.workout_exercises || workout?.exercises || []),
      }, index);
    });

    console.log("Built workout tree:", tree);

        if (!groupId) return;
        if (!acc[groupId]) acc[groupId] = [];
        acc[groupId].push({ workoutId: workout.supabaseId || workout.id, exerciseId: exercise.supabaseId || exercise.id, order: exercise.supersetOrder });
