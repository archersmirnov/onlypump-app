const filterAnalyticsPoints = (points = [], period = "month", selectedDateKey = formatDateKey(new Date())) => {
  const days = analyticsPeriods.find(item => item.id === period)?.days || 30;
  const start = parseDateKeyLocal(dateKeyDaysAgo(selectedDateKey, days - 1)).getTime();
  const end = parseDateKeyLocal(selectedDateKey).getTime();
  return points.filter(point => {
    const time = parseDateKeyLocal(point.date).getTime();
    return time >= start && time <= end;
  });
};

const buildMeasurementSeries = (measurements = [], metricKey = "weight_kg") => measurements
  .map(item => ({ date: String(item.measurement_date || item.date || "").slice(0, 10), value: Number(item[metricKey]) }))
  .filter(item => item.date && Number.isFinite(item.value));

const buildHealthSeries = (logs = [], metricKey = "steps_count") => logs
  .map(item => ({ date: String(item.log_date || item.date || "").slice(0, 10), value: Number(item[metricKey]) }))
  .filter(item => item.date && Number.isFinite(item.value) && item.value >= 0);

const buildNutritionSeries = (days = [], metricKey = "calories_total") => days
  .map(item => ({ date: String(item.nutrition_date || item.date || "").slice(0, 10), value: Number(item[metricKey] ?? item.totals?.calories ?? item.calories ?? 0) }))
  .filter(item => item.date && Number.isFinite(item.value) && item.value >= 0);

const buildTrainingSeries = (workouts = [], metricKey = "sets") => {
  const map = new Map();
  workouts.filter(workout => workout.status === "completed").forEach(workout => {
    const date = workout.date || formatDateKey(new Date());
    const sets = getWorkoutSets(workout).filter(set => getSetStatusGlobal(set) === "completed");
    const current = map.get(date) || { date, sets: 0, volume: 0, workouts: 0 };
    current.sets += sets.length;
    current.volume += getWorkoutVolume(workout);
    current.workouts += 1;
    map.set(date, current);
  });
  return Array.from(map.values()).sort((a, b) => a.date.localeCompare(b.date)).map(item => ({ date: item.date, value: Number(item[metricKey] || 0) }));
};

const analyticsSummary = (points = []) => {
  const values = points.map(point => Number(point.value)).filter(Number.isFinite);
  if (!values.length) return { avg: 0, min: 0, max: 0, change: 0, trend: "нет данных" };
  const avg = values.reduce((sum, value) => sum + value, 0) / values.length;
  const change = values[values.length - 1] - values[0];
  return {
    avg,
    min: Math.min(...values),
    max: Math.max(...values),
    change,
    trend: change > 0 ? "рост" : change < 0 ? "снижение" : "ровно",
  };
};

const niceChartMax = (value, metricKey = "") => {
  const max = Math.max(1, Number(value || 0));
  const padded = max * (["weight_kg", "neck_cm", "shoulders_cm", "chest_cm", "biceps_cm", "waist_cm", "abdomen_cm", "glutes_cm", "thigh_cm", "calf_cm"].includes(metricKey) ? 1.08 : 1.18);
  let step = 10;
  if (metricKey === "steps_count") step = padded > 15000 ? 5000 : 1000;
  else if (["calories_total", "water_ml", "volume"].includes(metricKey)) step = padded > 4000 ? 1000 : 500;
  else if (["sleep_duration_minutes"].includes(metricKey)) step = 60;
  else if (["recovery_score", "body_fat_percent"].includes(metricKey)) step = padded > 60 ? 10 : 5;
  else if (["weight_kg", "neck_cm", "shoulders_cm", "chest_cm", "biceps_cm", "waist_cm", "abdomen_cm", "glutes_cm", "thigh_cm", "calf_cm"].includes(metricKey)) step = padded > 100 ? 10 : 5;
  else if (["sets", "workouts", "sleep_awakenings"].includes(metricKey)) step = padded > 25 ? 10 : 5;
  return Math.max(step, Math.ceil(padded / step) * step);
};

const formatAnalyticsValue = (value, unit = "", metricKey = "") => {
  const rounded = Number(value || 0) >= 100 ? Math.round(Number(value || 0)) : Math.round(Number(value || 0) * 10) / 10;
  const text = ["steps_count", "calories_total", "water_ml", "volume"].includes(metricKey)
    ? Math.round(rounded).toLocaleString("ru-RU")
    : String(rounded).replace(".", ",");
  return unit ? `${text} ${unit}` : text;
};

const formatAnalyticsDateTick = (dateKey, period = "month") => {
  const date = parseDateKeyLocal(dateKey);
  if (Number.isNaN(date.getTime())) return dateKey;
  if (period === "day" || period === "week") {
    return date.toLocaleDateString("ru-RU", { weekday: "short" }).replace(".", "");
  }
  return date.toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit" });
};

const analyticsLabelIndexes = (count) => {
  if (count <= 7) return Array.from({ length: count }, (_, index) => index);
  const step = Math.max(1, Math.ceil((count - 1) / 5));
  const values = new Set([0, count - 1]);
  for (let index = step; index < count - 1; index += step) values.add(index);
  return Array.from(values).sort((a, b) => a - b);
};

function AnalyticsChart({ points = [], type = "line", unit = "", metricKey = "", period = "month" }) {
  const [selected, setSelected] = useState(null);
  const safePoints = points.slice(-32);
  const values = safePoints.map(point => Number(point.value || 0));
  const max = Math.max(...values, 1);
  const scaleMax = niceChartMax(max, metricKey);
  const plot = { left: 18, right: 346, top: 18, bottom: 166 };
  const plotWidth = plot.right - plot.left;
  const plotHeight = plot.bottom - plot.top;
  const coords = safePoints.map((point, index) => ({
    ...point,
    x: safePoints.length === 1 ? plot.left + plotWidth / 2 : plot.left + (index / Math.max(1, safePoints.length - 1)) * plotWidth,
    y: plot.bottom - (Math.max(0, Number(point.value || 0)) / scaleMax) * plotHeight,
  }));
  const path = coords.map((point, index) => `${index ? "L" : "M"} ${point.x} ${point.y}`).join(" ");
  const yTicks = Array.from({ length: 5 }, (_, index) => {
    const ratio = index / 4;
    return {
      value: scaleMax * (1 - ratio),
      y: plot.top + plotHeight * ratio,
    };
  });
  const xLabelIndexes = analyticsLabelIndexes(safePoints.length);
  const barWidth = Math.max(6, Math.min(24, (plotWidth / Math.max(1, safePoints.length)) * 0.58));

  if (!safePoints.length) return <div className="mt-5 rounded-2xl bg-white/[0.04] p-8 text-center text-sm text-zinc-500">Недостаточно данных для графика.</div>;

  return <div className="mt-5 rounded-3xl bg-white/[0.035] p-4">
    <svg viewBox="0 0 430 218" className="h-56 w-full overflow-visible">
      {yTicks.map((tick, index) => <g key={`y-${index}`}>
        <line x1={plot.left} y1={tick.y} x2={plot.right} y2={tick.y} stroke="var(--chart-grid)" strokeWidth="1"/>
        <text x="360" y={tick.y + 4} fill="var(--chart-label)" fontSize="11" fontWeight="700">{formatAnalyticsValue(tick.value, "", metricKey)}</text>
      </g>)}
      {xLabelIndexes.map(index => {
        const point = coords[index];
        if (!point) return null;
        return <line key={`x-${index}`} x1={point.x} y1={plot.top} x2={point.x} y2={plot.bottom} stroke="var(--chart-grid)" strokeWidth="1"/>;
      })}
      <line x1={plot.left} y1={plot.bottom} x2={plot.right} y2={plot.bottom} stroke="var(--chart-axis)" strokeWidth="1.2"/>
      {type === "bar" ? coords.map((point, index) => {
        const height = plot.bottom - point.y;
        return <rect key={`${point.date}-${index}`} x={point.x - barWidth / 2} y={point.y} width={barWidth} height={height} rx="6" fill="#ef4444" opacity={selected?.date === point.date ? 1 : 0.78} onClick={() => setSelected(point)}/>;
      }) : <>
        <path d={path} fill="none" stroke="#ef4444" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
        {coords.map((point, index) => <circle key={`${point.date}-${index}`} cx={point.x} cy={point.y} r={selected?.date === point.date ? 6 : 4} fill="#ef4444" stroke="var(--onlypump-card-solid)" strokeWidth="2" onClick={() => setSelected(point)}/>)}
      </>}
      {xLabelIndexes.map(index => {
        const point = coords[index];
        if (!point) return null;
        return <text key={`label-${index}`} x={point.x} y="198" textAnchor="middle" fill="var(--chart-label)" fontSize="11" fontWeight="700">{formatAnalyticsDateTick(point.date, period)}</text>;
      })}
    </svg>
    {selected && <div className="mt-3 rounded-2xl bg-black/35 p-3 text-sm"><span className="text-zinc-500">{formatShortDateRu(selected.date)}</span><span className="float-right font-semibold text-zinc-100">{formatAnalyticsValue(selected.value, unit, metricKey)}</span></div>}
  </div>;
}

function AnalyticsDetailSheet({ type, title, measurements, healthLogs, nutritionDays = [], workouts, selectedDateKey, profile = DEFAULT_PROFILE, profileStatus = "local", telegramInitData = "", onClose, onOpenEditor }) {
  const typeConfig = analyticsTypeConfigs[type] || analyticsTypeConfigs.measurements;
  const metricOptions = typeConfig.metrics.length ? typeConfig.metrics : measurementAnalyticsMetrics;
  const [metric, setMetric] = useState(typeConfig.defaultMetric || metricOptions[0].key);
  const [period, setPeriod] = useState(typeConfig.source === "training" ? "week" : "month");
  const [remoteData, setRemoteData] = useState({ measurements: [], health_logs: [], nutrition_days: [] });
  const [loading, setLoading] = useState(false);
  const [loadError, setLoadError] = useState("");
  const metricConfig = metricOptions.find(item => item.key === metric) || metricOptions[0];
  const canLoadRemote = typeConfig.source !== "training" && profileStatus === "verified" && Boolean(telegramInitData && profile?.id);
  const sourceMeasurements = remoteData.measurements.length ? remoteData.measurements : measurements;
  const sourceHealthLogs = remoteData.health_logs.length ? remoteData.health_logs : healthLogs;
  const sourceNutritionDays = remoteData.nutrition_days.length ? remoteData.nutrition_days : nutritionDays;
  const allPoints = typeConfig.source === "training"
    ? buildTrainingSeries(workouts, metric)
    : typeConfig.source === "health"
      ? buildHealthSeries(sourceHealthLogs, metric)
      : typeConfig.source === "nutrition"
        ? buildNutritionSeries(sourceNutritionDays, metric)
        : buildMeasurementSeries(sourceMeasurements, metric);
  const points = filterAnalyticsPoints(allPoints, period, selectedDateKey);
  const summary = analyticsSummary(points);
  const chartType = metricConfig.type || (typeConfig.source === "health" || typeConfig.source === "nutrition" ? "bar" : "line");
  const sheetTitle = title || typeConfig.title;

  useEffect(() => {
    setMetric(typeConfig.defaultMetric || metricOptions[0].key);
    setPeriod(typeConfig.source === "training" ? "week" : "month");
  }, [type]);

  useEffect(() => {
    let cancelled = false;
    if (!canLoadRemote) {
      setRemoteData({ measurements: [], health_logs: [], nutrition_days: [] });
      setLoadError("");
      return () => {
        cancelled = true;
      };
    }

    const cached = readCachedAnalyticsForProfile(profile, type, metric, period, selectedDateKey);
    if (cached) {
      setRemoteData({
        measurements: Array.isArray(cached.measurements) ? cached.measurements : [],
        health_logs: Array.isArray(cached.health_logs) ? cached.health_logs.map(log => normalizeHealthLog(log, log.log_date || log.date)) : [],
        nutrition_days: Array.isArray(cached.nutrition_days) ? cached.nutrition_days : [],
      });
    }

    const load = async () => {
      setLoading(true);
      setLoadError("");
      const days = analyticsPeriods.find(item => item.id === period)?.days || 30;
      try {
        const result = await callOnlyPumpProfileApi(telegramInitData, "load_analytics", {
          date: selectedDateKey,
          start_date: dateKeyDaysAgo(selectedDateKey, days - 1),
          end_date: selectedDateKey,
          scope: type,
          metric,
        });
        if (cancelled) return;
        const next = {
          measurements: Array.isArray(result.measurements) ? result.measurements : [],
          health_logs: Array.isArray(result.health_logs) ? result.health_logs.map(log => normalizeHealthLog(log, log.log_date || log.date)) : [],
          nutrition_days: Array.isArray(result.nutrition_days) ? result.nutrition_days : [],
        };
        setRemoteData(next);
        writeCachedAnalyticsForProfile(profile, type, metric, period, selectedDateKey, next);
      } catch (error) {
        if (!cancelled) {
          console.error("onlypump-profile-api analytics error:", error);
          setLoadError("Не удалось обновить график. Показываю последние данные.");
        }
      } finally {
        if (!cancelled) setLoading(false);
      }
    };

    load();
    return () => {
      cancelled = true;
    };
  }, [canLoadRemote, metric, period, profile?.id, selectedDateKey, telegramInitData, type]);

  return <div onClick={onClose} className="onlypump-modal-layer fixed inset-0 z-[185] flex items-end justify-center bg-black/70 p-0 backdrop-blur-sm sm:items-center sm:p-4">
    <BottomSheetPanel onClose={onClose} onClick={(event) => event.stopPropagation()} className="onlypump-bottom-sheet w-full max-w-3xl overflow-y-auto rounded-t-[2rem] border border-white/10 bg-zinc-950/95 p-5 shadow-2xl shadow-black/70 backdrop-blur-2xl sm:rounded-[2rem]">
      <div className="mx-auto mb-4 h-1 w-12 rounded-full bg-white/20 sm:hidden"/>
      <div className="flex items-start justify-between gap-4">
        <div>
          <p className="text-xs uppercase tracking-wider text-red-500">Аналитика</p>
          <h2 className="mt-2 text-2xl font-black">{sheetTitle}</h2>
        </div>
        <div className="flex items-center gap-2">
          {onOpenEditor && <button type="button" onClick={() => onOpenEditor(metric)} className="flex h-8 w-8 items-center justify-center rounded-full bg-red-500 text-black"><Plus size={18}/></button>}
          <button type="button" onClick={onClose} className="flex h-8 w-8 items-center justify-center rounded-full bg-white/5 text-zinc-300">×</button>
        </div>
      </div>

      {metricOptions.length > 1 && <div className="mt-5 flex gap-2 overflow-x-auto pb-1 onlypump-scrollbar-none">
        {metricOptions.map(item => <button key={item.key} type="button" onClick={() => setMetric(item.key)} className={`shrink-0 rounded-full px-4 py-2 text-xs font-semibold ${metric === item.key ? "onlypump-chart-segment-active bg-red-500 text-black" : "bg-white/[0.06] text-zinc-300"}`}>{item.label}</button>)}
      </div>}
      <div className="mt-3 flex gap-2 overflow-x-auto pb-1 onlypump-scrollbar-none">
        {analyticsPeriods.filter(item => typeConfig.source !== "training" || ["day", "week", "month"].includes(item.id)).map(item => <button key={item.id} type="button" onClick={() => setPeriod(item.id)} className={`shrink-0 rounded-full px-4 py-2 text-xs font-semibold ${period === item.id ? "onlypump-chart-segment-active bg-red-500 text-black" : "bg-white/[0.06] text-zinc-300"}`}>{item.label}</button>)}
      </div>

      {(loading || loadError) && <p className={`mt-4 rounded-2xl p-3 text-sm ${loadError ? "bg-red-500/10 text-red-300" : "bg-white/[0.04] text-zinc-400"}`}>{loadError || "Обновляю график..."}</p>}
      <AnalyticsChart points={points} type={chartType} unit={metricConfig.unit} metricKey={metric} period={period}/>

      <div className="mt-5 grid grid-cols-2 gap-3 sm:grid-cols-5">
        <div className="rounded-2xl bg-white/[0.04] p-3"><p className="text-[10px] uppercase text-zinc-500">Среднее</p><b>{Math.round(summary.avg * 10) / 10}</b></div>
        <div className="rounded-2xl bg-white/[0.04] p-3"><p className="text-[10px] uppercase text-zinc-500">Минимум</p><b>{Math.round(summary.min * 10) / 10}</b></div>
        <div className="rounded-2xl bg-white/[0.04] p-3"><p className="text-[10px] uppercase text-zinc-500">Максимум</p><b>{Math.round(summary.max * 10) / 10}</b></div>
        <div className="rounded-2xl bg-white/[0.04] p-3"><p className="text-[10px] uppercase text-zinc-500">Изменение</p><b>{summary.change > 0 ? "+" : ""}{Math.round(summary.change * 10) / 10}</b></div>
        <div className="rounded-2xl bg-white/[0.04] p-3"><p className="text-[10px] uppercase text-zinc-500">Тренд</p><b>{summary.trend}</b></div>
      </div>
    </BottomSheetPanel>
  </div>;
}

function AnalyticsPage({ workouts = [], profile = DEFAULT_PROFILE, measurements, nutritionDay, healthLog = DEFAULT_HEALTH_LOG, healthLogs = [], healthSaving = false, healthRefreshing = false, profileSaving = false, selectedDateKey = formatDateKey(new Date()), telegramInitData = "", profileStatus = "local", analyticsIntent = null, onSaveHealthLog, onSaveWeightMeasurement, onOpenNutrition, onOpenProgress }) {
  const [detail, setDetail] = useState(null);
  const [editorType, setEditorType] = useState(null);
  const [editorMetric, setEditorMetric] = useState(null);
  const selectedHealthRecord = (healthLog?.log_date || healthLog?.date) === selectedDateKey
    ? healthLog
    : healthLogs.find(log => (log.log_date || log.date) === selectedDateKey);
  const currentHealthLog = normalizeHealthLog(selectedHealthRecord || {}, selectedDateKey);
  const selectedNutritionDayMatches = (nutritionDay?.date || nutritionDay?.nutrition_date) === selectedDateKey;
  const selectedNutritionCalories = selectedNutritionDayMatches ? Number(nutritionDay?.totals?.calories ?? nutritionDay?.calories_total ?? 0) : 0;
  const analyticsData = useMemo(() => ({
    measurements: [{
      measurement_date: selectedDateKey,
      weight_kg: measurements?.weight || profile?.weight_kg,
      body_fat_percent: measurements?.bodyFat || profile?.body_fat_percent,
      neck_cm: measurements?.neck || profile?.neck_cm,
      shoulders_cm: measurements?.shoulders || profile?.shoulders_cm,
      chest_cm: measurements?.chest || profile?.chest_cm,
      biceps_cm: measurements?.biceps || profile?.biceps_cm,
      waist_cm: measurements?.waist || profile?.waist_cm,
      abdomen_cm: measurements?.belly || profile?.abdomen_cm,
      glutes_cm: measurements?.glutes || profile?.glutes_cm,
      thigh_cm: measurements?.thigh || profile?.thigh_cm,
      calf_cm: measurements?.calf || profile?.calf_cm,
    }],
    health_logs: healthLogs.length ? healthLogs : [currentHealthLog],
    nutrition_days: selectedNutritionDayMatches ? [{
      nutrition_date: selectedDateKey,
      calories_total: selectedNutritionCalories,
    }] : [],
  }), [currentHealthLog, healthLogs, measurements, profile, selectedDateKey, selectedNutritionCalories, selectedNutritionDayMatches]);

  useEffect(() => {
    if (!analyticsIntent?.type) return;
    const config = analyticsTypeConfigs[analyticsIntent.type];
    if (!config) return;
    setDetail({ type: analyticsIntent.type, title: config.title });
  }, [analyticsIntent?.nonce, analyticsIntent?.type]);

  const weekAnalytics = useMemo(() => {
    const today = parseDateKeyLocal(selectedDateKey);
    const start = addLocalDaysToDate(today, -6).getTime();
    const recent = workouts.filter(workout => parseDateKeyLocal(workout.date).getTime() >= start);
    const completedRecent = recent.filter(workout => workout.status === "completed");
    const sets = completedRecent.flatMap(getWorkoutSets).filter(set => getSetStatusGlobal(set) === "completed").length;
    const volume = completedRecent.reduce((sum, workout) => sum + getWorkoutVolume(workout), 0);
    const loadLevel = getVolumeLoadLevel(sets, volumeStandards.weeklyTotal);
    return { recent: completedRecent, sets, volume, loadLevel };
  }, [workouts, selectedDateKey]);

  const nonStrengthAnalytics = useMemo(() => {
    const today = parseDateKeyLocal(selectedDateKey);
    const start = addLocalDaysToDate(today, -6).getTime();
    const rows = workoutTypeDefinitions
      .filter(type => type.id !== "strength")
      .map(type => ({ ...type, count: 0, durationMinutes: 0, distance: 0, calories: 0 }));
    const byType = Object.fromEntries(rows.map(row => [row.id, row]));
    workouts.filter(workout => workout.status === "completed" && parseDateKeyLocal(workout.date).getTime() >= start).forEach(workout => {
      const workoutType = normalizeWorkoutType(workout.workoutType);
      if (workoutType === "strength") return;
      const bucket = byType[workoutType];
      if (!bucket) return;
      bucket.count += 1;
      bucket.durationMinutes += safeWorkoutNumber(workout.durationMinutes, 0);
      bucket.distance += (workout.exercises || []).reduce((sum, exercise) => sum + safeWorkoutNumber((exercise.sets || [])[0]?.distanceValue ?? (exercise.sets || [])[0]?.distance_value, 0), 0);
      bucket.calories += safeWorkoutNumber(workout.calories ?? workout.estimatedCaloriesBurned, 0);
    });
    return rows;
  }, [workouts, selectedDateKey]);

  const latestMeasurement = analyticsData.measurements?.length ? analyticsData.measurements[analyticsData.measurements.length - 1] : {};
  const openEditorForDetail = (metricKey) => {
    if (!detail?.type) return;
    if (["steps", "sleep", "water", "weight"].includes(detail.type)) {
      setEditorType(detail.type);
      return;
    }
    if (detail.type === "calories") {

function formatBirthDateDisplay(dateKey) {
  if (!dateKey) return "Выбрать дату";
  const [year, month, day] = String(dateKey).slice(0, 10).split("-");
  if (!year || !month || !day) return "Выбрать дату";
  return `${day}/${month}/${year}`;
}

function BirthDatePickerSheet({ value, onSave, onClose }) {
  const currentYear = new Date().getFullYear();
  const fallbackDate = parseDateKeyLocal(value || `${currentYear - 30}-01-01`);
  const [day, setDay] = useState(Number.isNaN(fallbackDate.getTime()) ? 1 : fallbackDate.getDate());
  const [month, setMonth] = useState(Number.isNaN(fallbackDate.getTime()) ? 1 : fallbackDate.getMonth() + 1);
  const [year, setYear] = useState(Number.isNaN(fallbackDate.getTime()) ? currentYear - 30 : fallbackDate.getFullYear());
  const years = useMemo(() => Array.from({ length: 91 }, (_, index) => currentYear - 12 - index), [currentYear]);
  const maxDay = new Date(year, month, 0).getDate();
  const days = useMemo(() => Array.from({ length: maxDay }, (_, index) => index + 1), [maxDay]);

  useEffect(() => {
    if (day > maxDay) setDay(maxDay);
  }, [day, maxDay]);

  const save = () => {
    onSave(formatDateKey(new Date(year, month - 1, day)));
    onClose();
  };

  const columnClass = "onlypump-scrollbar-none max-h-72 min-w-0 flex-1 overflow-y-auto rounded-2xl bg-white/[0.035] p-2";
  const optionClass = (active) => `block w-full rounded-xl px-2 py-3 text-center text-sm font-semibold transition ${active ? "bg-red-500 text-black" : "text-zinc-300 hover:bg-white/[0.08]"}`;

  return <div onClick={onClose} className="onlypump-modal-layer fixed inset-0 z-[185] flex items-end justify-center bg-black/70 p-0 backdrop-blur-sm sm:items-center sm:p-4">
    <BottomSheetPanel onClose={onClose} onClick={(event) => event.stopPropagation()} className="onlypump-bottom-sheet w-full max-w-md overflow-hidden rounded-t-[2rem] border border-white/10 bg-zinc-950/95 p-5 shadow-2xl shadow-black/70 backdrop-blur-2xl sm:rounded-[2rem]">
      <div className="mx-auto mb-4 h-1 w-12 rounded-full bg-white/20 sm:hidden"/>
      <div className="flex items-start justify-between gap-4">
        <div>
          <p className="text-xs uppercase tracking-wider text-red-500">Профиль</p>
          <h2 className="mt-2 text-2xl font-black">Дата рождения</h2>
        </div>
        <button type="button" onClick={onClose} className="flex h-8 w-8 items-center justify-center rounded-full bg-white/5 text-zinc-300">×</button>
      </div>
      <div className="mt-5 flex min-w-0 gap-2" data-no-sheet-drag="true">
        <div className={columnClass}>
          {days.map(value => <button key={value} type="button" onClick={() => setDay(value)} className={optionClass(day === value)}>{String(value).padStart(2, "0")}</button>)}
        </div>
        <div className={columnClass}>
          {birthMonthLabels.map((label, index) => {
            const value = index + 1;
            return <button key={label} type="button" onClick={() => setMonth(value)} className={optionClass(month === value)}>{label}</button>;
          })}
        </div>
        <div className={columnClass}>
          {years.map(value => <button key={value} type="button" onClick={() => setYear(value)} className={optionClass(year === value)}>{value}</button>)}
        </div>
      </div>
      <Button onClick={save} className="mt-5 w-full bg-gradient-to-r from-red-700 to-red-500 text-black">Сохранить</Button>
    </BottomSheetPanel>
  </div>;
}

function OnboardingScreen({ profile = DEFAULT_PROFILE, onComplete, saving }) {
  const [draft, setDraft] = useState(() => ({
    ...profileDraftFromProfile(profile),
    calories_target: "",
    protein_target: "",
    fat_target: "",
    carbs_target: "",
  }));
  const [error, setError] = useState("");
  const canSubmit = draft.display_name && draft.sex && calculateProfileAge(draft.birth_date) && profileNumber(draft.height_cm) && profileNumber(draft.weight_kg) && draft.goal_type;

  const submit = async () => {
    if (!canSubmit) {
      setError("Заполни имя, пол, дату рождения, рост, вес и цель.");
      return;
    }
    const manualConflict = getManualNutritionConflict(draft);
    if (manualConflict) {
      setError(manualConflict);
      return;
    }
    setError("");
    const ok = await onComplete(profilePayloadFromDraft(draft));
    if (ok === false) setError("Не удалось сохранить профиль. Проверь подключение и попробуй еще раз.");
  };

  return <div className="onboarding-screen onlypump-app-shell overflow-y-auto bg-black px-4 py-6 text-zinc-100" style={{ paddingTop: "calc(var(--onlypump-safe-top) + var(--onlypump-telegram-main-top-offset) + 1.5rem)", paddingBottom: "calc(var(--onlypump-safe-bottom) + 1.5rem)" }}>
    <div className="mx-auto max-w-3xl">
      <div className="mb-6">
        <div className="text-3xl font-black tracking-tight">ONLY<span className="text-red-500">PUMP</span></div>

function ProfileEditSheet({ profile, onClose, onSave, saving }) {
  const [draft, setDraft] = useState(() => profileDraftFromProfile(profile));
  const [error, setError] = useState("");
  const submit = async () => {
    if (!draft.display_name || !calculateProfileAge(draft.birth_date) || !profileNumber(draft.height_cm) || !profileNumber(draft.weight_kg)) {
      setError("Заполни имя, дату рождения, рост и вес.");
      return false;
    }
    const manualConflict = getManualNutritionConflict(draft);
    if (manualConflict) {
      setError(manualConflict);
      return false;
    }
    setError("");
    const payload = profilePayloadFromDraft(draft);
    const ok = await onSave?.(payload);
    if (ok === false) setError("Не удалось сохранить профиль. Попробуй еще раз.");
    return ok;
  };

  const saveBirthDate = async (nextDraft) => {
    if (!nextDraft.display_name || !calculateProfileAge(nextDraft.birth_date) || !profileNumber(nextDraft.height_cm) || !profileNumber(nextDraft.weight_kg)) return;
    const manualConflict = getManualNutritionConflict(nextDraft);
    if (manualConflict) return;
    const ok = await onSave?.(profilePayloadFromDraft(nextDraft));
    if (ok === false) setError("Не удалось сохранить дату рождения. Попробуй еще раз.");
    else setError("");
  };

  return <div onClick={onClose} className="profile-screen onlypump-modal-layer fixed inset-0 z-[175] flex items-end justify-center bg-black/70 p-0 backdrop-blur-sm sm:items-center sm:p-4">
    <BottomSheetPanel onClose={onClose} onClick={(event) => event.stopPropagation()} className="onlypump-bottom-sheet w-full max-w-4xl overflow-y-auto rounded-t-[2rem] border border-white/10 bg-zinc-950/95 px-5 pb-5 shadow-2xl shadow-black/70 backdrop-blur-2xl sm:rounded-[2rem] sm:px-6 sm:pb-6" style={{ paddingTop: "calc(var(--onlypump-safe-top) + var(--onlypump-telegram-main-top-offset) + 1.25rem)" }}>
      <div className="mx-auto mb-4 h-1 w-12 rounded-full bg-white/20 sm:hidden"/>
      <div className="mb-5 flex items-start justify-between gap-4">
        <div>
          <p className="text-xs uppercase tracking-wider text-red-500">Личный кабинет</p>
          <h2 className="mt-2 text-2xl font-black">Профиль</h2>
        </div>
        <button onClick={onClose} className="flex h-8 w-8 items-center justify-center rounded-full bg-white/5 text-zinc-300">×</button>
      </div>
      <ProfileFormFields draft={draft} setDraft={setDraft} showManualTargets onBirthDateSaved={saveBirthDate}/>
      {error && <p className="mt-4 rounded-2xl bg-red-500/10 p-3 text-sm text-red-300">{error}</p>}
      <div className="mt-6 flex gap-3">
        <Button onClick={onClose} className="flex-1 bg-white/8">Отмена</Button>
        <Button onClick={async () => { const ok = await submit(); if (ok !== false) onClose(); }} disabled={saving} className="flex-1 bg-gradient-to-r from-red-700 to-red-500 text-black disabled:opacity-50">{saving ? "Сохраняю..." : "Сохранить"}</Button>
      </div>
    </BottomSheetPanel>
  </div>;
}

function ThemeTimePickerSheet({ title, value, onSave, onClose }) {
  const normalized = normalizeThemeTime(value, "06:00");
  const [hour, setHour] = useState(normalized.slice(0, 2));
  const [minute, setMinute] = useState(normalized.slice(3, 5));
  const hours = useMemo(() => Array.from({ length: 24 }, (_, index) => String(index).padStart(2, "0")), []);
  const minutes = useMemo(() => Array.from({ length: 60 }, (_, index) => String(index).padStart(2, "0")), []);
  const columnClass = "onlypump-scrollbar-none h-60 min-w-0 flex-1 overflow-y-auto rounded-[24px] bg-black/28 p-2";
  const optionClass = (active) => `block w-full rounded-2xl px-2 py-3 text-center text-sm font-black transition ${active ? "bg-red-500 text-black" : "text-zinc-300 hover:bg-white/[0.08]"}`;
  const save = () => {
    onSave?.(`${hour}:${minute}`);
    onClose();
  };

  return <div onClick={(event) => { event.stopPropagation(); onClose(); }} className="onlypump-modal-layer fixed inset-0 z-[210] flex items-end justify-center bg-black/70 p-0 backdrop-blur-sm sm:items-center sm:p-4">
    <BottomSheetPanel onClose={onClose} priority={210} onClick={(event) => event.stopPropagation()} className="onlypump-bottom-sheet w-full max-w-md overflow-hidden rounded-t-[2rem] border border-white/10 bg-zinc-950/96 p-5 shadow-2xl shadow-black/70 backdrop-blur-2xl sm:rounded-[2rem]">

          <p className="text-xs font-bold uppercase tracking-[0.18em] text-red-400">Тема</p>

          <div className="mb-2 text-center text-[10px] font-bold uppercase tracking-[0.16em] text-zinc-500">Час</div>

      <Button onClick={save} className="mt-5 w-full bg-gradient-to-r from-red-700 to-red-500 text-black">Сохранить</Button>
    </BottomSheetPanel>
  </div>;
}

  const setEnabled = (enabled) => setDraft(prev => buildThemeSettingsPayload({
    ...prev,
    light_theme_enabled: enabled,
    light_theme_always: enabled ? prev.light_theme_always : false,
  }));

  const setAlways = (enabled) => setDraft(prev => buildThemeSettingsPayload({
    ...prev,
    light_theme_enabled: enabled ? true : prev.light_theme_enabled,
    light_theme_always: enabled,
    light_theme_start_time: enabled ? "00:00" : normalizeThemeTime(profile.light_theme_start_time, DEFAULT_PROFILE.light_theme_start_time),

      <div className="space-y-3">

      <div className="mt-5 rounded-2xl border border-white/10 bg-white/[0.035] p-4">

        <div className="grid grid-cols-2 gap-3">
          <button type="button" onClick={() => setTimePicker("start")} className="rounded-2xl border border-white/10 bg-black/28 p-4 text-left transition hover:bg-white/[0.08]">
            <span className="block text-xs font-bold text-zinc-500">Начало</span>

            <span className="block text-xs font-bold text-zinc-500">Конец</span>
            <span className="mt-2 block text-2xl font-black">{draft.light_theme_end_time}</span>
          </button>
        </div>
        <p className="mt-3 text-xs leading-5 text-zinc-500">Если время окончания меньше начала, расписание продолжится после полуночи.</p>

        <Button onClick={onClose} className="flex-1 bg-white/8">Отмена</Button>

function ProfilePage({ profile = DEFAULT_PROFILE, profileStatus = "local", onSaveProfile, profileSaving = false, onSaveThemeSettings, themeSaving = false, onResetProfile }) {
  const displayName = getProfileDisplayName(profile);

  const profileSource = profileStatus === "verified" ? "Supabase: Telegram проверен" : profileStatus === "loaded" ? "Supabase: профиль загружен" : profileStatus === "created" ? "Supabase: профиль создан" : "Локальный fallback";
  const calculatedAge = calculateProfileAge(profile?.birth_date);
  const [editOpen, setEditOpen] = useState(false);
  const [themeOpen, setThemeOpen] = useState(false);
  const [themeError, setThemeError] = useState("");
  const [resetError, setResetError] = useState("");

    ? "всегда"

  const profileWeightLabel = formatOptionalMetric(profile?.weight_kg, "кг");

  const profileWorkouts = profileNonNegativeNumber(profile?.workouts_per_week, DEFAULT_PROFILE.workouts_per_week);
  const profileActivityLabel = `${profileSteps.toLocaleString("ru-RU")} шагов · ${profileWorkouts} тр/нед`;
  const hasNutritionTargets = Boolean(profile?.onboarding_completed) && [profile?.calories_target, profile?.protein_target, profile?.fat_target, profile?.carbs_target].every(hasPositiveMetric);
  const profileNutritionLabel = hasNutritionTargets

      light_theme_enabled: enabled,

    <Card className="p-5"><CreditCard className="text-red-500"/><h2 className="mt-5 text-xl font-semibold">Подписка</h2><p className="mt-2 text-zinc-400">Активна до {new Date(Date.now() + 1000 * 60 * 60 * 24 * 30).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' })}</p><Button className="mt-5 w-full bg-white/8">Управлять</Button></Card>

	        <Button onClick={resetProfileSettings} disabled={profileSaving} className="w-full bg-red-500/10 text-red-300 hover:bg-red-500/15 disabled:opacity-50">Сбросить настройки профиля</Button>
	        <p className="mt-2 text-xs leading-5 text-zinc-500">Откроет первичное заполнение заново. Тренировки, питание, замеры, доступ и имя не удаляются.</p>
	        {resetError && <p className="mt-3 rounded-2xl bg-red-500/10 p-3 text-sm text-red-300">{resetError}</p>}
	      </div>
	    </Card>
    {editOpen && <ProfileEditSheet profile={profile} saving={profileSaving} onClose={() => setEditOpen(false)} onSave={onSaveProfile}/>}
    {themeOpen && <ThemeSettingsSheet profile={profile} saving={themeSaving} onClose={() => setThemeOpen(false)} onSave={onSaveThemeSettings}/>}
  </PageGrid></div>;
}

function PageGrid({ children }) {
  return <MasonryGrid className="mt-8 grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">{children}</MasonryGrid>;
}

function MobilePreview({ active }) {
  return null;
}

function OnlyPumpPlatform() {
  const telegramBootInitData = telegramWebApp?.initData || window.Telegram?.WebApp?.initData || "";
  const isTelegramBootMode = Boolean(telegramBootInitData);
  const [active, setActiveState] = useState("home");
  const [navigationStack, setNavigationStack] = useState([]);
  const activeRef = useRef("home");
  const navigationStackRef = useRef([]);
  const canGoBackRef = useRef(false);
  const supabaseClientRef = useRef(null);
  const profileSaveReadyRef = useRef(false);
  const nutritionLoadingKeyRef = useRef("");
  const [supabaseClient, setSupabaseClient] = useState(null);
  const [telegramInitData, setTelegramInitData] = useState(telegramBootInitData);
  const [appLoading, setAppLoading] = useState(isTelegramBootMode);
  const [profileLoading, setProfileLoading] = useState(isTelegramBootMode);
  const [telegramRequired, setTelegramRequired] = useState(!isTelegramBootMode);
  const [accessGateStatus, setAccessGateStatus] = useState(null);
  const [accessRefreshing, setAccessRefreshing] = useState(false);
  const backLayerCount = useBackLayerCount();
  const [globalSelectedDateKey, setGlobalSelectedDateKey] = useState(formatDateKey(new Date()));
  const [workouts, setWorkouts] = useState(() => isTelegramBootMode ? [] : buildInitialWorkoutModels());
  const [workoutsRefreshing, setWorkoutsRefreshing] = useState(false);
  const [nutritionGoal, setNutritionGoal] = useState(initialNutritionGoal);
  const [nutritionDay, setNutritionDay] = useState(() => buildLocalNutritionDay(formatDateKey(new Date()), initialNutritionGoal));
  const [nutritionMarkedDateKeys, setNutritionMarkedDateKeys] = useState([]);
  const [nutritionRefreshing, setNutritionRefreshing] = useState(false);
  const [profileSaving, setProfileSaving] = useState(false);
  const [themeSaving, setThemeSaving] = useState(false);
  const [healthLog, setHealthLog] = useState(() => buildLocalHealthLog(formatDateKey(new Date())));
  const [healthLogs, setHealthLogs] = useState([]);
  const [healthSaving, setHealthSaving] = useState(false);
  const [healthRefreshing, setHealthRefreshing] = useState(false);
  const [analyticsIntent, setAnalyticsIntent] = useState(null);

  useEffect(() => {
    activeRef.current = active;
  }, [active]);

  useEffect(() => {
    navigationStackRef.current = navigationStack;
  }, [navigationStack]);

  const setActive = useCallback((target, options = {}) => {
    setActiveState(prev => {
      const next = typeof target === "function" ? target(prev) : target;
      if (!next || next === prev) return prev;
      if (next === "home") {
        setNavigationStack([]);
      } else if (!options.replace) {
        setNavigationStack(stack => [...stack, prev].slice(-24));
      }
      return next;
    });
  }, []);

  const openAnalyticsType = useCallback((type) => {
    const config = analyticsTypeConfigs[type];
    if (!config) return;
    setAnalyticsIntent({ type, nonce: Date.now() });
    setActive("analytics");
  }, [setActive]);

  const goBack = useCallback(() => {
    if (runOnlyPumpBackLayer()) return true;

    const stack = navigationStackRef.current;
    if (stack.length) {
      const previous = stack[stack.length - 1];
      setNavigationStack(stack.slice(0, -1));
      setActiveState(previous || "home");
      return true;
    }

    if (activeRef.current !== "home") {
      setActiveState("home");
      setNavigationStack([]);
      return true;
    }

    return false;
  }, []);

  const canGoBack = backLayerCount > 0 || navigationStack.length > 0 || active !== "home";

  useEffect(() => {
    canGoBackRef.current = canGoBack;
  }, [canGoBack]);

  useEffect(() => {
    const backButton = telegramWebApp?.BackButton;
    if (!backButton) return;

    const handleBack = () => {
      goBack();
    };

    try {
      if (canGoBack) backButton.show();
      else backButton.hide();
      backButton.onClick(handleBack);
    } catch (error) {}

    return () => {
      try { backButton.offClick?.(handleBack); } catch (error) {}
    };
  }, [canGoBack, goBack]);

  useEffect(() => {
    const shouldIgnoreEdgeBack = (target) => Boolean(target?.closest?.([
      'input',
      'textarea',
      'select',
      'button',
      '[contenteditable="true"]',
      '[data-no-edge-back="true"]',
      '[data-calendar-swipe="true"]',
      '.overflow-x-auto',
      '.onlypump-bottom-sheet',
      '.onlypump-sheet-panel'
    ].join(',')));

    const edge = {
      active: false,
      tracking: false,
      pointerId: null,
      startX: 0,
      startY: 0,
    };

    const onPointerDown = (event) => {
      if (event.pointerType === "mouse") return;
      if (event.clientX > 32) return;
      if (!canGoBackRef.current) return;
      if (shouldIgnoreEdgeBack(event.target)) return;

      edge.active = true;
      edge.tracking = false;
      edge.pointerId = event.pointerId;
      edge.startX = event.clientX;
      edge.startY = event.clientY;
    };

    const onPointerMove = (event) => {
      if (!edge.active || edge.pointerId !== event.pointerId) return;
      const dx = event.clientX - edge.startX;
      const dy = event.clientY - edge.startY;
      if (dx < -8 || Math.abs(dy) > 44) {
        edge.active = false;
        return;
      }
      if (dx > 12) {
        edge.tracking = true;
        event.preventDefault();
      }
    };

    const onPointerUp = (event) => {
      if (!edge.active || edge.pointerId !== event.pointerId) return;
      const dx = event.clientX - edge.startX;
      const dy = Math.abs(event.clientY - edge.startY);
      edge.active = false;
      if (dx > 72 && dy < 42) goBack();
    };

    window.addEventListener("pointerdown", onPointerDown, { passive: true });
    window.addEventListener("pointermove", onPointerMove, { passive: false });
    window.addEventListener("pointerup", onPointerUp, { passive: true });
    window.addEventListener("pointercancel", onPointerUp, { passive: true });

    return () => {
      window.removeEventListener("pointerdown", onPointerDown);
      window.removeEventListener("pointermove", onPointerMove);
      window.removeEventListener("pointerup", onPointerUp);
      window.removeEventListener("pointercancel", onPointerUp);
    };
  }, [goBack]);

  useEffect(() => {
    const handleNavigate = (event) => {
      if (typeof event.detail === "string") setActive(event.detail);
    };

    window.addEventListener("onlypump:navigate", handleNavigate);
    return () => window.removeEventListener("onlypump:navigate", handleNavigate);
  }, []);

  const loadWorkoutsForProfile = useCallback(async (activeProfile, initData, options = {}) => {
    if (!activeProfile) return [];
    const cached = readCachedWorkoutsForProfile(activeProfile);
    if (cached.length && options.useCache !== false) {
      console.log("Workouts cache loaded", { key: getWorkoutsCacheKey(activeProfile), count: cached.length });
      setWorkouts(cached);
    }

    if (!initData || !activeProfile.id) return cached;
    setWorkoutsRefreshing(true);
    try {
      const result = await callOnlyPumpWorkoutsApi(initData, "load", { profile_id: activeProfile.id });
      const loaded = buildWorkoutsTreeFromApiResponse(result, globalSelectedDateKey);
      console.log("Workouts loaded", loaded);
      setWorkouts(loaded);
      writeCachedWorkoutsForProfile(activeProfile, loaded);
      return loaded;
    } catch (error) {
      console.error("Supabase workout error", { action: "load", error });
      return cached;
    } finally {
      setWorkoutsRefreshing(false);
    }
  }, [globalSelectedDateKey]);

  const [progressGoal, setProgressGoal] = useState({
    title: "Рекомпозиция тела",
    goalType: "recomposition",
    targetWeight: null,
    targetWaist: null,
    targetStrength: null,
    goalIntensityPercent: 10,
    deficitPercent: 10,
  });
  const [measurements, setMeasurements] = useState({
    weight: "",
    bodyFat: "",
    neck: "",
    shoulders: "",
    chest: "",
    biceps: "",
    waist: "",
    belly: "",
    glutes: "",
    thigh: "",
    calf: "",
  });
  const [profile, setProfile] = useState(() => isTelegramBootMode ? null : buildFallbackProfile());
  const [themeTick, setThemeTick] = useState(() => Date.now());
  const [profileStatus, setProfileStatus] = useState("local");
  const [lectureItems, setLectureItems] = useState(initialLectures);
  const [homeWidgets, setHomeWidgets] = useState(() => {
    try {
      const saved = localStorage.getItem("onlypump-home-widgets");
      if (!saved) return defaultHomeWidgets;
      const parsed = JSON.parse(saved);
      if (!Array.isArray(parsed)) return defaultHomeWidgets;
      const validIds = homeWidgetCatalog.map(w => w.id);
      const cleaned = parsed.filter(id => validIds.includes(id));
      const missingDefaultWidgets = defaultHomeWidgets.filter(id => !cleaned.includes(id));
      return enforceHomeWidgetRules([...missingDefaultWidgets, ...cleaned]);
    } catch {
      return enforceHomeWidgetRules(defaultHomeWidgets);
    }
  });

  const activeTheme = useMemo(
    () => profileWantsLightTheme(profile || DEFAULT_PROFILE, new Date(themeTick)) ? "light" : "dark",
    [profile?.light_theme_enabled, profile?.light_theme_always, profile?.light_theme_start_time, profile?.light_theme_end_time, themeTick]
  );

  useEffect(() => {
    const root = document.documentElement;
    root.classList.toggle("theme-light", activeTheme === "light");
    root.classList.toggle("theme-dark", activeTheme !== "light");
    const telegramThemeColor = activeTheme === "light" ? "#f5f5f7" : "#000000";
    try { telegramWebApp?.setHeaderColor?.(telegramThemeColor); } catch (error) {}
    try { telegramWebApp?.setBackgroundColor?.(telegramThemeColor); } catch (error) {}
  }, [activeTheme]);

  useEffect(() => {
    const refreshThemeTime = () => setThemeTick(Date.now());
    const intervalId = window.setInterval(refreshThemeTime, 60 * 1000);
    window.addEventListener("focus", refreshThemeTime);
    document.addEventListener("visibilitychange", refreshThemeTime);
    return () => {
      window.clearInterval(intervalId);
      window.removeEventListener("focus", refreshThemeTime);
      document.removeEventListener("visibilitychange", refreshThemeTime);
    };
  }, []);

  const applyProfileState = useCallback((nextProfile, options = {}) => {
    const normalized = normalizeProfileRecord(nextProfile, profile || DEFAULT_PROFILE);
    const nextGoal = profileNutritionGoalFromProfile(normalized, nutritionGoal);
    setProfile(normalized);
    setThemeTick(Date.now());
    setMeasurements(prev => ({
      ...prev,
      weight: normalized.weight_kg || prev.weight,
      bodyFat: normalized.body_fat_percent || prev.bodyFat,
      neck: normalized.neck_cm || prev.neck,
      waist: normalized.waist_cm || prev.waist,
      shoulders: normalized.shoulders_cm || prev.shoulders,
      chest: normalized.chest_cm || prev.chest,
      biceps: normalized.biceps_cm || prev.biceps,
      belly: normalized.abdomen_cm || normalized.waist_cm || prev.belly,
      glutes: normalized.glutes_cm || normalized.hips_cm || prev.glutes,
      thigh: normalized.thigh_cm || prev.thigh,
      calf: normalized.calf_cm || prev.calf,
    }));
    setProgressGoal(prev => ({
      ...prev,
      title: profileGoalTypeLabels[normalized.goal_type] || normalized.goal || prev.title,
      goalType: normalized.goal_type || prev.goalType || "recomposition",
      targetWeight: normalized.target_weight_kg || prev.targetWeight,
      targetWaist: normalized.waist_cm || prev.targetWaist,
      goalIntensityPercent: normalizeGoalIntensityPercent(normalized.goal_type, normalized.goal_intensity_percent ?? normalized.deficit_percent, prev.goalIntensityPercent || prev.deficitPercent || 10),
      deficitPercent: normalizeDeficitPercent(normalized.deficit_percent, prev.deficitPercent || 10),
    }));
    setNutritionGoal(nextGoal);
    if (options.updateNutritionDay) {
      const targetsFromDate = options.nutritionTargetsFromDate || formatDateKey(new Date());
      setNutritionDay(prev => prev ? {
        ...prev,
        ...(isDateKeyOnOrAfter(prev.date || globalSelectedDateKey, targetsFromDate) ? {
          calories_target: nextGoal.calories,
          protein_target: nextGoal.protein,
          fat_target: nextGoal.fat,
          carbs_target: nextGoal.carbs,
          goal: nextGoal,
        } : {}),
      } : prev);
    }
    return normalized;
  }, [globalSelectedDateKey, nutritionGoal, profile]);

  const handleSaveProfile = useCallback(async (payload, action = "update_profile") => {
    const payloadWithDate = { ...payload, current_date: globalSelectedDateKey, measurement_date: payload.measurement_date || globalSelectedDateKey };
    const targetsFromDate = formatDateKey(new Date());
    if (profileStatus === "verified" && profileHasTestAccess(profile) && telegramInitData) {
      setProfileSaving(true);
      try {
        if (action === "update_profile" || action === "complete_onboarding") console.log("PROFILE MEASUREMENT SAVE", payloadWithDate);
        const result = await callOnlyPumpProfileApi(telegramInitData, action, payloadWithDate);
        if (action === "update_profile" || action === "complete_onboarding") console.log("PROFILE MEASUREMENT RESPONSE", result);
        const savedProfile = applyProfileState(result.profile, { updateNutritionDay: true, nutritionTargetsFromDate: targetsFromDate });
        clearCachedNutritionForProfileFromDate(savedProfile, targetsFromDate);
        setProfileStatus("verified");
        return Boolean(savedProfile);
      } catch (error) {
        console.error("onlypump-profile-api error:", error);
        if (action === "update_profile" || action === "complete_onboarding") console.log("PROFILE MEASUREMENT ERROR", error);
        return false;
      } finally {
        setProfileSaving(false);
      }
    }

    const calculatedTargets = calculateProfileNutritionTargets(payloadWithDate);
    const localTargets = {
      calories_target: safeProfileNumber(payloadWithDate.calories_target, calculatedTargets.calories_target),
      protein_target: safeProfileNumber(payloadWithDate.protein_target, calculatedTargets.protein_target),
      fat_target: safeProfileNumber(payloadWithDate.fat_target, calculatedTargets.fat_target),
      carbs_target: safeProfileNumber(payloadWithDate.carbs_target, calculatedTargets.carbs_target),
    };
    const localBodyFat = calculateProfileBodyFat(payloadWithDate);
    const localProfile = normalizeProfileRecord({
      ...profile,
      ...payloadWithDate,
      ...localTargets,
      body_fat_percent: localBodyFat,
      onboarding_completed: true,
      source: "fallback",
    }, profile || DEFAULT_PROFILE);
    applyProfileState(localProfile, { updateNutritionDay: true, nutritionTargetsFromDate: targetsFromDate });
    clearCachedNutritionForProfileFromDate(localProfile, targetsFromDate);
    return true;
  }, [applyProfileState, globalSelectedDateKey, profile, profileStatus, telegramInitData]);

  const handleSaveThemeSettings = useCallback(async (settings = {}) => {
    const payload = buildThemeSettingsPayload({ ...(profile || DEFAULT_PROFILE), ...settings });
    const optimisticProfile = normalizeProfileRecord({
      ...(profile || DEFAULT_PROFILE),
      ...payload,
      theme_updated_at: new Date().toISOString(),
      source: profile?.source || "fallback",
    }, profile || DEFAULT_PROFILE);
    applyProfileState(optimisticProfile);

    if (!(profileStatus === "verified" && profileHasTestAccess(profile) && telegramInitData && profile?.id)) return true;

    setThemeSaving(true);
    try {
      const result = await callOnlyPumpProfileApi(telegramInitData, "update_theme_settings", payload);
      const savedProfile = applyProfileState(result.profile || optimisticProfile);
      setProfileStatus("verified");
      return Boolean(savedProfile);
    } catch (error) {
      console.error("onlypump-profile-api theme error:", error);
      return false;
    } finally {
      setThemeSaving(false);
    }
  }, [applyProfileState, profile, profileStatus, telegramInitData]);

  const handleResetProfileSettings = useCallback(async () => {
    const resetLocalProfile = normalizeProfileRecord({
      ...(profile || DEFAULT_PROFILE),
      onboarding_completed: false,
      onboarding_completed_at: null,
      goal_type: "recomposition",
      goal_description: null,
      target_weight_kg: null,
      manual_nutrition_targets_enabled: false,
      high_protein_enabled: false,
      higher_fat_enabled: false,
      deficit_percent: 10,
      goal_intensity_percent: 10,
      profile_updated_at: new Date().toISOString(),
      source: profile?.source || "fallback",
    }, profile || DEFAULT_PROFILE);

    if (!(profileStatus === "verified" && profileHasTestAccess(profile) && telegramInitData && profile?.id)) {
      applyProfileState(resetLocalProfile);
      return true;
    }

    setProfileSaving(true);
    try {
      const result = await callOnlyPumpProfileApi(telegramInitData, "reset_profile", {});
      applyProfileState(result.profile || resetLocalProfile, { updateNutritionDay: true, nutritionTargetsFromDate: formatDateKey(new Date()) });
      setProfileStatus("verified");
      return true;
    } catch (error) {
      console.error("onlypump-profile-api reset profile error:", error);
      return false;
    } finally {
      setProfileSaving(false);
    }
  }, [applyProfileState, profile, profileStatus, telegramInitData]);

  const handleProgressProfileSaved = useCallback((nextProfile, options = {}) => {
    if (!nextProfile) return null;
    const targetsFromDate = options.nutritionTargetsFromDate || formatDateKey(new Date());
    const savedProfile = applyProfileState(nextProfile, {
      updateNutritionDay: Boolean(options.syncNutrition),
      nutritionTargetsFromDate: targetsFromDate,
    });
    if (options.syncNutrition) clearCachedNutritionForProfileFromDate(savedProfile, targetsFromDate);
    return savedProfile;
  }, [applyProfileState]);

  const handleSaveWeightMeasurement = useCallback(async (payload = {}) => {
    const dateKey = payload.date || payload.measurement_date || globalSelectedDateKey;
    const nextWeight = profileNumber(payload.weight_kg, profile?.weight_kg || measurements.weight || 0);
    const optimisticMeasurements = progressMeasurementsFromRecord(payload, { ...measurements, weight: nextWeight });
    setMeasurements(prev => ({ ...prev, ...optimisticMeasurements, weight: nextWeight }));

    if (!(profileStatus === "verified" && profileHasTestAccess(profile) && telegramInitData && profile?.id)) {
      const localProfile = normalizeProfileRecord({ ...(profile || DEFAULT_PROFILE), ...payload, weight_kg: nextWeight, source: profile?.source || "fallback" }, profile || DEFAULT_PROFILE);
      applyProfileState(localProfile);
      return true;
    }

    setProfileSaving(true);
    try {
      const result = await callOnlyPumpProfileApi(telegramInitData, "save_progress_measurement", {
        ...payload,
        date: dateKey,
        measurement_date: dateKey,
        weight_kg: nextWeight,
      });
      const savedProfile = handleProgressProfileSaved(result.profile, { syncNutrition: true, nutritionTargetsFromDate: formatDateKey(new Date()) });
      if (result.effective_measurement || result.measurement) {
        const measurement = result.effective_measurement || result.measurement;
        setMeasurements(prev => progressMeasurementsFromRecord(measurement, { ...prev, weight: nextWeight }));
      }
      return Boolean(savedProfile);
    } catch (error) {
      console.error("onlypump-profile-api weight save error:", error);
      return false;
    } finally {
      setProfileSaving(false);
    }
  }, [applyProfileState, globalSelectedDateKey, handleProgressProfileSaved, measurements, profile, profileStatus, telegramInitData]);

  const loadHealthForProfile = useCallback(async (activeProfile, initData, dateKey = globalSelectedDateKey) => {
    if (!activeProfile) return null;
    const cachedLog = readCachedHealthForProfile(activeProfile, dateKey);
    const cachedLogs = readCachedHealthLogsForProfile(activeProfile);
    if (cachedLog) setHealthLog(cachedLog);
    if (cachedLogs.length) setHealthLogs(cachedLogs);
    if (!initData || !activeProfile.id) {
      setHealthLog(prev => cachedLog || ((prev?.log_date === dateKey || prev?.date === dateKey) ? prev : buildLocalHealthLog(dateKey)));
      return cachedLog;
    }
    setHealthRefreshing(true);
    try {
      const result = await callOnlyPumpProfileApi(initData, "load_health_log", { date: dateKey });
      const nextLog = normalizeHealthLog(result.health_log || result.log || {}, dateKey);
      const nextLogs = Array.isArray(result.health_logs) ? result.health_logs.map(log => normalizeHealthLog(log, log.log_date || log.date)) : [];
      setHealthLog(nextLog);
      setHealthLogs(nextLogs.length ? nextLogs : upsertHealthLogList(healthLogs, nextLog));
      writeCachedHealthForProfile(activeProfile, dateKey, nextLog);
      writeCachedHealthLogsForProfile(activeProfile, nextLogs.length ? nextLogs : upsertHealthLogList(cachedLogs, nextLog));
      return nextLog;
    } catch (error) {
      console.error("onlypump-profile-api health error:", error);
      setHealthLog(prev => cachedLog || ((prev?.log_date === dateKey || prev?.date === dateKey) ? prev : buildLocalHealthLog(dateKey)));
      return cachedLog;
    } finally {
      setHealthRefreshing(false);
    }
  }, [globalSelectedDateKey, healthLogs]);

  const handleSaveHealthLog = useCallback(async (payload = {}) => {
    const dateKey = payload.date || payload.log_date || globalSelectedDateKey;
    const currentDateLog = (healthLog?.log_date || healthLog?.date) === dateKey
      ? healthLog
      : healthLogs.find(log => (log.log_date || log.date) === dateKey);
    const optimisticLog = normalizeHealthLog({ ...(currentDateLog || buildLocalHealthLog(dateKey)), ...payload, date: dateKey, log_date: dateKey }, dateKey);
    setHealthLog(optimisticLog);
    setHealthLogs(prev => upsertHealthLogList(prev, optimisticLog));
    if (profile) {
      writeCachedHealthForProfile(profile, dateKey, optimisticLog);
      writeCachedHealthLogsForProfile(profile, upsertHealthLogList(healthLogs, optimisticLog));
    }

    if (!(profileStatus === "verified" && profileHasTestAccess(profile) && telegramInitData && profile?.id)) return true;

    setHealthSaving(true);
    try {
      const result = await callOnlyPumpProfileApi(telegramInitData, "save_health_log", { ...payload, date: dateKey, log_date: dateKey });
      const savedLog = normalizeHealthLog(result.health_log || result.log || optimisticLog, dateKey);
      const logs = Array.isArray(result.health_logs) ? result.health_logs.map(log => normalizeHealthLog(log, log.log_date || log.date)) : null;
      setHealthLog(savedLog);
      setHealthLogs(prev => logs?.length ? logs : upsertHealthLogList(prev, savedLog));
      writeCachedHealthForProfile(profile, dateKey, savedLog);
      writeCachedHealthLogsForProfile(profile, logs?.length ? logs : upsertHealthLogList(healthLogs, savedLog));
      return true;
    } catch (error) {
      console.error("onlypump-profile-api health save error:", error);
      return false;
    } finally {
      setHealthSaving(false);
    }
  }, [globalSelectedDateKey, healthLog, healthLogs, profile, profileStatus, telegramInitData]);

  const loadNutritionForProfile = useCallback(async (activeProfile, initData, dateKey = globalSelectedDateKey, options = {}) => {
    if (!activeProfile) return null;
    const cachedMarkers = readCachedNutritionMarkersForProfile(activeProfile);
    if (cachedMarkers.length && options.useCache !== false) {
      setNutritionMarkedDateKeys(cachedMarkers);
    }
    const cached = readCachedNutritionForProfile(activeProfile, dateKey);
    if (cached && options.useCache !== false) {
      const cachedDay = normalizeNutritionDay(cached, dateKey, nutritionGoal);
      console.log("Nutrition cache loaded", { key: getNutritionCacheKey(activeProfile, dateKey), date: dateKey });
      setNutritionDay(cachedDay);
      setNutritionGoal(cachedDay.goal);
      setNutritionMarkedDateKeys(prev => {
        const baseMarkers = cachedMarkers.length ? cachedMarkers : getNutritionFilledDateKeys(cachedDay, prev);
        const next = nutritionDayHasFood(cachedDay)
          ? mergeNutritionMarkerKeys(baseMarkers, cachedDay.date || dateKey, true)
          : normalizeNutritionFilledDateKeys(baseMarkers);
        writeCachedNutritionMarkersForProfile(activeProfile, next);
        return next;
      });
    } else if (!cached && options.seedLocal !== false) {
      setNutritionDay(prev => prev?.date === dateKey ? prev : buildLocalNutritionDay(dateKey, nutritionGoal));
    }

    if (!initData || !activeProfile.id) return cached;
    const loadingKey = `${activeProfile.telegram_id || activeProfile.id || "local"}:${dateKey}:remote`;
    if (nutritionLoadingKeyRef.current === loadingKey) return cached;
    nutritionLoadingKeyRef.current = loadingKey;
    setNutritionRefreshing(true);
    try {
      const result = await callOnlyPumpNutritionApi(initData, "load", { date: dateKey });
      const loaded = normalizeNutritionDay(result, dateKey, nutritionGoal);
      console.log("Nutrition loaded", { date: loaded.date, totals: loaded.totals });
      setNutritionDay(loaded);
      setNutritionGoal(loaded.goal);
      setNutritionMarkedDateKeys(prev => {
        const fromServer = getNutritionFilledDateKeys(result, loaded.markedDateKeys?.length ? loaded.markedDateKeys : prev);
        const next = mergeNutritionMarkerKeys(fromServer, loaded.date || dateKey, nutritionDayHasFood(loaded));
        writeCachedNutritionMarkersForProfile(activeProfile, next);
        return next;
      });
      writeCachedNutritionForProfile(activeProfile, loaded.date || dateKey, loaded);
      return loaded;
    } catch (error) {
      console.error("Supabase nutrition error", { action: "load", error });
      return cached;
    } finally {
      if (nutritionLoadingKeyRef.current === loadingKey) nutritionLoadingKeyRef.current = "";
      setNutritionRefreshing(false);
    }
  }, [globalSelectedDateKey, nutritionGoal]);

  const handleNutritionAction = useCallback(async (action, payload = {}) => {
    const dateKey = payload.date || nutritionDay?.date || globalSelectedDateKey;
    const payloadWithDate = { ...payload, date: dateKey };
    const canUseRemoteNutrition = profileStatus === "verified" && profileHasTestAccess(profile) && Boolean(telegramInitData && profile?.id);
    const shouldOptimisticallyUpdate = ["add_item", "delete_item", "toggle_favorite", "save_manual_day_totals"].includes(action);
    const baseNutritionDay = nutritionDay?.date === dateKey ? nutritionDay : buildLocalNutritionDay(dateKey, nutritionGoal);
    const previousDay = baseNutritionDay;
    const previousMarkers = nutritionMarkedDateKeys;

    const applyNutritionDay = (nextDay, activeProfile = profile) => {
      const normalizedDay = recalculateNutritionDayLocal(nextDay);
      setNutritionDay(normalizedDay);
      setNutritionGoal(normalizedDay.goal);
      if (activeProfile) {
        writeCachedNutritionForProfile(activeProfile, normalizedDay.date || dateKey, normalizedDay);
        setNutritionMarkedDateKeys(prev => {
          const nextMarkers = mergeNutritionMarkerKeys(prev, normalizedDay.date || dateKey, nutritionDayHasFood(normalizedDay));
          writeCachedNutritionMarkersForProfile(activeProfile, nextMarkers);
          return nextMarkers;
        });
      }
      return normalizedDay;
    };

    if (canUseRemoteNutrition) {
      if (shouldOptimisticallyUpdate) {
        applyNutritionDay(applyLocalNutritionAction(baseNutritionDay, action, payloadWithDate));
      }
      setNutritionRefreshing(true);
      try {
        const result = await callOnlyPumpNutritionApi(telegramInitData, action, payloadWithDate);
        const updatedDay = normalizeNutritionDay(result, dateKey, nutritionGoal);
        console.log("Nutrition updated", { action, date: updatedDay.date, totals: updatedDay.totals });
        setNutritionDay(updatedDay);
        setNutritionGoal(updatedDay.goal);
        setNutritionMarkedDateKeys(prev => {
          const fromServer = getNutritionFilledDateKeys(result, updatedDay.markedDateKeys?.length ? updatedDay.markedDateKeys : prev);
          const nextMarkers = mergeNutritionMarkerKeys(fromServer, updatedDay.date || dateKey, nutritionDayHasFood(updatedDay));
          writeCachedNutritionMarkersForProfile(profile, nextMarkers);
          return nextMarkers;
        });
        writeCachedNutritionForProfile(profile, updatedDay.date || dateKey, updatedDay);
        return result;
      } catch (error) {
        console.error("Supabase nutrition error", { action, error });
        if (shouldOptimisticallyUpdate && previousDay) {
          setNutritionDay(previousDay);
          setNutritionGoal(previousDay.goal || nutritionGoal);
          setNutritionMarkedDateKeys(previousMarkers);
          writeCachedNutritionForProfile(profile, previousDay.date || dateKey, previousDay);
          writeCachedNutritionMarkersForProfile(profile, previousMarkers);
        }
        return { ok: false, error };
      } finally {
        setNutritionRefreshing(false);
      }
    }

    const localDay = applyLocalNutritionAction(baseNutritionDay, action, payloadWithDate);
    applyNutritionDay(localDay);
    return { ok: true, ...localDay };
  }, [globalSelectedDateKey, nutritionDay, nutritionGoal, nutritionMarkedDateKeys, profile, profileStatus, telegramInitData]);

  const nutritionMeals = useMemo(() => deriveHomeMealsFromNutritionDay(nutritionDay), [nutritionDay]);

  const refreshAccessStatus = useCallback(async () => {
    if (!telegramInitData) return false;
    setAccessRefreshing(true);
    try {
      const profileResult = await callOnlyPumpProfileApi(telegramInitData, "load_profile", {});
      const nextProfile = normalizeProfileRecord({ ...profileResult.profile, source: "supabase" }, profile || DEFAULT_PROFILE);
      const savedProfile = applyProfileState(nextProfile);
      setProfileStatus("verified");
      profileSaveReadyRef.current = Boolean(savedProfile?.id) && profileHasTestAccess(savedProfile);
      console.log("Access status refreshed", {
        access_status: getProfileAccessStatus(savedProfile),
        is_admin: parseProfileBoolean(savedProfile?.is_admin),
      });
      if (!profileHasTestAccess(savedProfile)) {
        setAccessGateStatus(getProfileAccessStatus(savedProfile));
        return false;
      }
      setAccessGateStatus(null);
      setNutritionMarkedDateKeys(readCachedNutritionMarkersForProfile(savedProfile));
      Promise.allSettled([
        loadWorkoutsForProfile(savedProfile, telegramInitData, { useCache: true }),
        loadNutritionForProfile(savedProfile, telegramInitData, globalSelectedDateKey, { useCache: true }),
        loadHealthForProfile(savedProfile, telegramInitData, globalSelectedDateKey),
      ]).then((results) => console.log("Access granted data refreshed", results.map(item => item.status)));
      return true;
    } catch (error) {
      console.error("onlypump-profile-api access refresh error:", error);
      setAccessGateStatus(prev => prev || "pending");
      return false;
    } finally {
      setAccessRefreshing(false);
      setProfileLoading(false);
      setAppLoading(false);
    }
  }, [applyProfileState, globalSelectedDateKey, loadHealthForProfile, loadNutritionForProfile, loadWorkoutsForProfile, profile, telegramInitData]);

  useEffect(() => {
    if (!profile) return;
    writeCachedWorkoutsForProfile(profile, workouts);
  }, [profile?.telegram_id, profile?.id, workouts]);

  useEffect(() => {
    let cancelled = false;

    const bootstrapProfile = async () => {
      console.log("Profile loading started");
      const localDefaults = buildFallbackProfile({
        weight_kg: measurements.weight,
        goal: progressGoal.title,
      });
      const initData = getTelegramInitData();
      console.log("App boot mode:", initData ? "telegram" : "web-fallback");
      console.log("Telegram initData present:", Boolean(initData));
      setTelegramInitData(initData || "");
      if (!initData) {
        const activeProfile = localDefaults;
        console.log("Using activeProfile:", activeProfile);
        supabaseClientRef.current = null;
        setSupabaseClient(null);
        setProfile(activeProfile);
        setProfileStatus("local");
        setTelegramRequired(true);
        setAccessGateStatus(null);
        profileSaveReadyRef.current = false;
        setProfileLoading(false);
        setAppLoading(false);
        console.log("Profile loaded", activeProfile);
        console.log("ONLYPUMP READY", { mode: "telegram-required" });
        return;
      }
      setTelegramRequired(false);

      const client = createOnlyPumpSupabaseClient();
      supabaseClientRef.current = client;
      setSupabaseClient(client);
      let result = { profile: localDefaults, status: "local" };
      let activeProfile = normalizeProfileRecord({ ...localDefaults, display_name: "Профиль", first_name: "", source: "fallback" }, { ...localDefaults, display_name: "Профиль", first_name: "" });
      let profileLoadError = null;

      try {
        console.log("Loading profile...");
        const profileResult = await callOnlyPumpProfileApi(initData, "load_profile", {});
        console.log("Profile response", profileResult);
        activeProfile = normalizeProfileRecord({ ...profileResult.profile, source: "supabase" }, localDefaults);
        result = { profile: activeProfile, status: "verified" };
        console.log("Extended profile loaded", activeProfile);
      } catch (profileError) {
        console.error("onlypump-profile-api error:", profileError);
        profileLoadError = profileError;
        result = { profile: activeProfile, status: "local" };
      }

      if (cancelled) return;
      console.log("Using activeProfile:", activeProfile);
      applyProfileState(activeProfile);
      setProfileStatus(result.status);
      console.log("Access status", getProfileAccessStatus(activeProfile), parseProfileBoolean(activeProfile?.is_admin));
      profileSaveReadyRef.current = result.status === "verified" && profileHasTestAccess(activeProfile) && Boolean(activeProfile?.id);
      if (profileLoadError) {
        setAccessGateStatus("pending");
        setProfileLoading(false);
        setAppLoading(false);
        console.log("Access gate:", { access_status: "pending", reason: "profile_load_failed" });
        return;
      }
      if (result.status === "verified" && !profileHasTestAccess(activeProfile)) {
        setAccessGateStatus(getProfileAccessStatus(activeProfile));
        setProfileLoading(false);
        setAppLoading(false);
        console.log("Access gate:", {
          access_status: getProfileAccessStatus(activeProfile),
          is_admin: parseProfileBoolean(activeProfile?.is_admin),
        });
        return;
      }
      setAccessGateStatus(null);
      setNutritionMarkedDateKeys(readCachedNutritionMarkersForProfile(activeProfile));
      console.log("Loading app data...");
      Promise.allSettled([
        loadWorkoutsForProfile(activeProfile, result.status === "verified" ? initData : "", { useCache: true }),
        loadNutritionForProfile(activeProfile, result.status === "verified" ? initData : "", globalSelectedDateKey, { useCache: true }),
        loadHealthForProfile(activeProfile, result.status === "verified" ? initData : "", globalSelectedDateKey),
      ]).then((results) => console.log("Initial app data refreshed", results.map(item => item.status)));
      setProfileLoading(false);
      setAppLoading(false);
      console.log("Profile loaded", activeProfile);
      console.log("ONLYPUMP READY", { mode: "app" });
    };

    bootstrapProfile();

    return () => {
      cancelled = true;
    };
  }, []);

  useEffect(() => {
    if (!profile) return;
    if (accessGateStatus) return;
    const canUseRemoteNutrition = profileStatus === "verified" && profileHasTestAccess(profile) && Boolean(telegramInitData && profile?.id);
    loadNutritionForProfile(profile, canUseRemoteNutrition ? telegramInitData : "", globalSelectedDateKey, { useCache: true });
  }, [accessGateStatus, globalSelectedDateKey, profile?.id, profile?.telegram_id, profileStatus, telegramInitData]);

  useEffect(() => {
    if (!profile) return;
    if (accessGateStatus) return;
    const canUseRemoteHealth = profileStatus === "verified" && profileHasTestAccess(profile) && Boolean(telegramInitData && profile?.id);
    loadHealthForProfile(profile, canUseRemoteHealth ? telegramInitData : "", globalSelectedDateKey);
  }, [accessGateStatus, globalSelectedDateKey, profile?.id, profile?.telegram_id, profileStatus, telegramInitData]);

  useEffect(() => {
    if (!profile || !nutritionDay?.date) return;
    writeCachedNutritionForProfile(profile, nutritionDay.date, nutritionDay);
    const nextMarkers = nutritionDayHasFood(nutritionDay)
      ? mergeNutritionMarkerKeys(nutritionMarkedDateKeys, nutritionDay.date, true)
      : normalizeNutritionFilledDateKeys(nutritionMarkedDateKeys);
    writeCachedNutritionMarkersForProfile(profile, nextMarkers);
  }, [profile?.id, profile?.telegram_id, nutritionDay, nutritionMarkedDateKeys]);

  useEffect(() => {
    localStorage.setItem("onlypump-home-widgets", JSON.stringify(homeWidgets));
  }, [homeWidgets]);

  const page = useMemo(() => ({
    home: <HomePage setActive={setActive} workouts={workouts} nutritionMeals={nutritionMeals} nutritionDay={nutritionDay} nutritionMarkedDateKeys={nutritionMarkedDateKeys} nutritionGoal={nutritionGoal} measurements={measurements} progressGoal={progressGoal} lectureItems={lectureItems} homeWidgets={homeWidgets} setHomeWidgets={setHomeWidgets} profile={profile} selectedDateKey={globalSelectedDateKey} setSelectedDateKey={setGlobalSelectedDateKey} healthLog={healthLog} healthLogs={healthLogs} healthSaving={healthSaving} profileSaving={profileSaving} onSaveHealthLog={handleSaveHealthLog} onSaveWeightMeasurement={handleSaveWeightMeasurement} onOpenAnalytics={openAnalyticsType}/>,
    workouts: <WorkoutsPage workouts={workouts} setWorkouts={setWorkouts} selectedDateKey={globalSelectedDateKey} setSelectedDateKey={setGlobalSelectedDateKey} profile={profile} telegramInitData={telegramInitData}/>,
    nutrition: <NutritionPage nutritionDay={nutritionDay} setNutritionDay={setNutritionDay} nutritionGoal={nutritionGoal} setNutritionGoal={setNutritionGoal} selectedDateKey={globalSelectedDateKey} setSelectedDateKey={setGlobalSelectedDateKey} markedDateKeys={nutritionMarkedDateKeys} profile={profile} telegramInitData={telegramInitData} onNutritionAction={handleNutritionAction} nutritionLoading={nutritionRefreshing}/>,
    calculators: <CalculatorsPage/>,
    education: <EducationPage/>,
    lectures: <LecturesPage lectureItems={lectureItems} setLectureItems={setLectureItems}/>,
    progress: <ProgressPage workouts={workouts} measurements={measurements} setMeasurements={setMeasurements} progressGoal={progressGoal} setProgressGoal={setProgressGoal} profile={profile} profileStatus={profileStatus} telegramInitData={telegramInitData} selectedDateKey={globalSelectedDateKey} setSelectedDateKey={setGlobalSelectedDateKey} onProgressProfileSaved={handleProgressProfileSaved}/>,
    analytics: <AnalyticsPage workouts={workouts} profile={profile} measurements={measurements} nutritionDay={nutritionDay} healthLog={healthLog} healthLogs={healthLogs} healthSaving={healthSaving} healthRefreshing={healthRefreshing} profileSaving={profileSaving} selectedDateKey={globalSelectedDateKey} telegramInitData={telegramInitData} profileStatus={profileStatus} analyticsIntent={analyticsIntent} onSaveHealthLog={handleSaveHealthLog} onSaveWeightMeasurement={handleSaveWeightMeasurement} onOpenNutrition={() => setActive("nutrition")} onOpenProgress={() => setActive("progress")}/>,
    community: <CommunityPage/>,
    profile: <ProfilePage profile={profile} profileStatus={profileStatus} onSaveProfile={(payload) => handleSaveProfile(payload, "update_profile")} profileSaving={profileSaving} onSaveThemeSettings={handleSaveThemeSettings} themeSaving={themeSaving} onResetProfile={handleResetProfileSettings}/>,
  }[active]), [active, workouts, nutritionMeals, nutritionDay, nutritionGoal, nutritionMarkedDateKeys, nutritionRefreshing, measurements, progressGoal, lectureItems, homeWidgets, globalSelectedDateKey, profile, profileStatus, supabaseClient, telegramInitData, analyticsIntent, handleNutritionAction, handleSaveProfile, handleSaveThemeSettings, handleResetProfileSettings, handleProgressProfileSaved, handleSaveWeightMeasurement, openAnalyticsType, profileSaving, themeSaving, healthLog, healthLogs, healthSaving, healthRefreshing, handleSaveHealthLog]);

  if (appLoading || profileLoading) {
    return <div className={`onlypump-app-shell theme-${activeTheme} flex items-center justify-center bg-black px-6 text-zinc-100`}>
      <div className="text-center">
        <div className="mx-auto h-12 w-12 animate-pulse rounded-full bg-red-500/70" />
        <h1 className="mt-5 text-2xl font-black tracking-[-0.04em]">ONLYPUMP</h1>
        <p className="mt-2 text-sm text-zinc-500">Загрузка...</p>
      </div>
    </div>;
  }

  if (telegramRequired) {
    return <TelegramRequiredScreen/>;
  }

  if (accessGateStatus && telegramInitData && !profileHasTestAccess(profile)) {
    return <AccessGateScreen profile={profile || DEFAULT_PROFILE} status={accessGateStatus} refreshing={accessRefreshing} onRefresh={refreshAccessStatus}/>;
  }

  if (profileStatus === "verified" && profile && profile.onboarding_completed !== true) {
    return <OnboardingScreen profile={profile} saving={profileSaving} onComplete={(payload) => handleSaveProfile(payload, "complete_onboarding")}/>;
  }

  return <div className={`onlypump-app-shell theme-${activeTheme} bg-black text-zinc-100 selection:bg-red-500/30`}>
    <div className="absolute inset-0 bg-[radial-gradient(circle_at_70%_5%,rgba(239,68,68,0.13),transparent_30%),radial-gradient(circle_at_30%_35%,rgba(255,255,255,0.05),transparent_30%)]"/>
    <div className="onlypump-app-frame relative mx-auto flex max-w-[1720px] rounded-3xl border border-white/10 bg-black/70">
      <DesktopSidebar active={active} setActive={setActive} profile={profile}/>
      <main className="onlypump-main-scroll min-w-0 w-full px-4 md:px-8 lg:px-12">{page}</main>
      <MobilePreview active={active}/>
    </div>
    <FloatingNavMenu active={active} setActive={setActive}/>
  </div>;
}

class OnlyPumpRuntimeBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }

  static getDerivedStateFromError(error) {
    return { error };
  }

  componentDidCatch(error, info) {
    console.error("ONLYPUMP APP CRASH", error, info);
  }

  render() {
    if (this.state.error) {
      return <div className="onlypump-app-shell flex items-center justify-center bg-black px-6 text-zinc-100">
        <div className="max-w-md rounded-2xl border border-red-500/25 bg-zinc-950 p-6 text-center shadow-2xl shadow-black/60">
          <h1 className="text-2xl font-black tracking-[-0.04em] text-red-500">ONLYPUMP</h1>
          <p className="mt-4 text-sm text-zinc-300">Приложение не смогло открыть экран.</p>
          <p className="mt-3 rounded-xl bg-black/40 p-3 text-left text-xs text-zinc-500">{String(this.state.error?.message || this.state.error)}</p>
          <button
            type="button"
            onClick={() => window.location.reload()}
            className="mt-5 w-full rounded-full bg-red-500 px-4 py-3 text-sm font-semibold text-black"
          >
            Перезагрузить
          </button>
        </div>
      </div>;
    }

    return this.props.children;
  }
}

try {
  const rootElement = document.getElementById("root");
  if (!rootElement) throw new Error("Root element is missing");
  const root = createRoot(rootElement);
  root.render(<OnlyPumpRuntimeBoundary><OnlyPumpPlatform /></OnlyPumpRuntimeBoundary>);
} catch (error) {
  console.error("ONLYPUMP STARTUP ERROR", error);
  window.__ONLYPUMP_SHOW_CRASH__?.(error);
}
  </script>
</body>
