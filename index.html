    <Card className="p-5 xl:col-span-2"><h2 className="text-xl font-semibold">Лента сообщества</h2>{["Антон закрыл неделю без пропусков", "Мария улучшила сон на 42 минуты", "Разбор техники: присед и румынская тяга"].map(x=><div key={x} className="mt-4 rounded-xl border border-white/10 bg-white/[0.03] p-4"><MessageCircle className="inline text-red-500" size={18}/> <span className="ml-2">{x}</span></div>)}</Card>
    <Card className="p-5"><Trophy className="text-red-500"/><h2 className="mt-5 text-xl font-semibold">Рейтинг</h2>{["Артур", "Антон", "Мария", "Илья"].map((x,i)=><div key={x} className="mt-4 flex justify-between"><span>{i+1}. {x}</span><span className="text-red-500">{2450-i*180}</span></div>)}</Card>
    <Card className="p-5"><h2 className="text-xl font-semibold">Челлендж</h2><p className="mt-3 text-zinc-400">14 дней без пропуска трекинга питания.</p><div className="mt-6"><Progress value={64}/></div></Card>
  </PageGrid></>;
}

function ProfilePage({ profile = DEFAULT_PROFILE, profileStatus = "local" }) {
  const displayName = profile?.display_name || DEFAULT_PROFILE.display_name;
  const telegramLabel = profile?.telegram_username ? `@${profile.telegram_username}` : profile?.telegram_id ? `ID ${profile.telegram_id}` : "Обычная web-версия";
  const profileSource = profileStatus === "verified" ? "Supabase: Telegram проверен" : profileStatus === "loaded" ? "Supabase: профиль загружен" : profileStatus === "created" ? "Supabase: профиль создан" : "Локальный fallback";

  return <><Header title="Личный кабинет" subtitle="Профиль, тариф, подписка, настройки, доступы и история платежей."/><PageGrid>
    <Card className="p-5"><User className="text-red-500"/><h2 className="mt-5 break-words text-xl font-semibold">{displayName}</h2><p className="mt-2 text-zinc-400">Тариф: PREMIUM</p><p className="mt-1 break-words text-zinc-500">{telegramLabel}</p><p className="mt-1 text-xs text-zinc-600">{profileSource}</p></Card>
    <Card className="p-5"><Scale className="text-red-500"/><h2 className="mt-5 text-xl font-semibold">Профиль</h2><div className="mt-4 space-y-3 text-sm"><div className="flex justify-between gap-3"><span className="text-zinc-500">Вес</span><span>{profile.weight_kg || DEFAULT_PROFILE.weight_kg} кг</span></div><div className="flex justify-between gap-3"><span className="text-zinc-500">Рост</span><span>{profile.height_cm || DEFAULT_PROFILE.height_cm} см</span></div><div className="flex justify-between gap-3"><span className="text-zinc-500">Цель</span><span className="text-right">{profile.goal || DEFAULT_PROFILE.goal}</span></div></div></Card>
    <Card className="p-5"><CreditCard className="text-red-500"/><h2 className="mt-5 text-xl font-semibold">Подписка</h2><p className="mt-2 text-zinc-400">Активна до {new Date(Date.now() + 1000 * 60 * 60 * 24 * 30).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' })}</p><Button className="mt-5 w-full bg-white/8">Управлять</Button></Card>
    <Card className="p-5"><ShieldCheck className="text-red-500"/><h2 className="mt-5 text-xl font-semibold">Доступы</h2><p className="mt-2 text-zinc-400">Все модули открыты</p><div className="mt-5 flex gap-2 text-xs text-zinc-500"><Lock size={14}/> 1PM bonus locked</div></Card>
    <Card className="p-5"><Settings className="text-red-500"/><h2 className="mt-5 text-xl font-semibold">Настройки</h2>{["Уведомления", "Единицы измерения", "Интеграции", "Безопасность"].map(x=><div key={x} className="mt-3 rounded-lg bg-white/[0.03] p-3 text-sm">{x}</div>)}</Card>
  </PageGrid></>;
}

function PageGrid({ children }) {
  return <MasonryGrid className="mt-8 grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">{children}</MasonryGrid>;
}

function MobilePreview({ active }) {
  return null;
}

function OnlyPumpPlatform() {
  const telegramBootInitData = telegramWebApp?.initData || window.Telegram?.WebApp?.initData || "";
  const isTelegramBootMode = Boolean(telegramBootInitData);
  const [active, setActiveState] = useState("home");
  const [navigationStack, setNavigationStack] = useState([]);
  const activeRef = useRef("home");
  const navigationStackRef = useRef([]);
  const canGoBackRef = useRef(false);
  const supabaseClientRef = useRef(null);
  const profileSaveReadyRef = useRef(false);
  const [supabaseClient, setSupabaseClient] = useState(null);
  const [telegramInitData, setTelegramInitData] = useState(telegramBootInitData);
  const [appLoading, setAppLoading] = useState(isTelegramBootMode);
  const [profileLoading, setProfileLoading] = useState(isTelegramBootMode);
  const backLayerCount = useBackLayerCount();
  const [globalSelectedDateKey, setGlobalSelectedDateKey] = useState(formatDateKey(new Date()));
  const [workouts, setWorkouts] = useState(() => isTelegramBootMode ? [] : buildInitialWorkoutModels());

  useEffect(() => {
    activeRef.current = active;
  }, [active]);

  useEffect(() => {
    navigationStackRef.current = navigationStack;
  }, [navigationStack]);

  const setActive = useCallback((target, options = {}) => {
    setActiveState(prev => {
      const next = typeof target === "function" ? target(prev) : target;
      if (!next || next === prev) return prev;
      if (next === "home") {
        setNavigationStack([]);
      } else if (!options.replace) {
        setNavigationStack(stack => [...stack, prev].slice(-24));
      }
      return next;
    });
  }, []);

  const goBack = useCallback(() => {
    if (runOnlyPumpBackLayer()) return true;

    const stack = navigationStackRef.current;
    if (stack.length) {
      const previous = stack[stack.length - 1];
      setNavigationStack(stack.slice(0, -1));
      setActiveState(previous || "home");
      return true;
    }

    if (activeRef.current !== "home") {
      setActiveState("home");
      setNavigationStack([]);
      return true;
    }

    return false;
  }, []);

  const canGoBack = backLayerCount > 0 || navigationStack.length > 0 || active !== "home";

  useEffect(() => {
    canGoBackRef.current = canGoBack;
  }, [canGoBack]);

  useEffect(() => {
    const backButton = telegramWebApp?.BackButton;
    if (!backButton) return;

    const handleBack = () => {
      goBack();
    };

    try {
      if (canGoBack) backButton.show();
      else backButton.hide();
      backButton.onClick(handleBack);
    } catch (error) {}

    return () => {
      try { backButton.offClick?.(handleBack); } catch (error) {}
    };
  }, [canGoBack, goBack]);

  useEffect(() => {
    const shouldIgnoreEdgeBack = (target) => Boolean(target?.closest?.([
      'input',
      'textarea',
      'select',
      'button',
      '[contenteditable="true"]',
      '[data-no-edge-back="true"]',
      '[data-calendar-swipe="true"]',
      '.overflow-x-auto',
      '.onlypump-bottom-sheet',
      '.onlypump-sheet-panel'
    ].join(',')));

    const edge = {
      active: false,
      tracking: false,
      pointerId: null,
      startX: 0,
      startY: 0,
    };

    const onPointerDown = (event) => {
      if (event.pointerType === "mouse") return;
      if (event.clientX > 32) return;
      if (!canGoBackRef.current) return;
      if (shouldIgnoreEdgeBack(event.target)) return;

      edge.active = true;
      edge.tracking = false;
      edge.pointerId = event.pointerId;
      edge.startX = event.clientX;
      edge.startY = event.clientY;
    };

    const onPointerMove = (event) => {
      if (!edge.active || edge.pointerId !== event.pointerId) return;
      const dx = event.clientX - edge.startX;
      const dy = event.clientY - edge.startY;
      if (dx < -8 || Math.abs(dy) > 44) {
        edge.active = false;
        return;
      }
      if (dx > 12) {
        edge.tracking = true;
        event.preventDefault();
      }
    };

    const onPointerUp = (event) => {
      if (!edge.active || edge.pointerId !== event.pointerId) return;
      const dx = event.clientX - edge.startX;
      const dy = Math.abs(event.clientY - edge.startY);
      edge.active = false;
      if (dx > 72 && dy < 42) goBack();
    };

    window.addEventListener("pointerdown", onPointerDown, { passive: true });
    window.addEventListener("pointermove", onPointerMove, { passive: false });
    window.addEventListener("pointerup", onPointerUp, { passive: true });
    window.addEventListener("pointercancel", onPointerUp, { passive: true });

    return () => {
      window.removeEventListener("pointerdown", onPointerDown);
      window.removeEventListener("pointermove", onPointerMove);
      window.removeEventListener("pointerup", onPointerUp);
      window.removeEventListener("pointercancel", onPointerUp);
    };
  }, [goBack]);

  useEffect(() => {
    const handleNavigate = (event) => {
      if (typeof event.detail === "string") setActive(event.detail);
    };

    window.addEventListener("onlypump:navigate", handleNavigate);
    return () => window.removeEventListener("onlypump:navigate", handleNavigate);
  }, []);
  const [nutritionMeals, setNutritionMeals] = useState(initialMeals);
  const [nutritionGoal, setNutritionGoal] = useState(initialNutritionGoal);
  const [progressGoal, setProgressGoal] = useState({
    title: "Рекомпозиция тела",
    targetWeight: 76,
    targetWaist: 74,
    targetStrength: 15,
  });
  const [measurements, setMeasurements] = useState({
    weight: 90,
    bodyFat: 12.9,
    neck: 39,
    shoulders: 124,
    chest: 108,
    biceps: 38,
    waist: 78,
    belly: 84,
    glutes: 104,
    thigh: 61,
    calf: 39,
  });
  const [profile, setProfile] = useState(() => isTelegramBootMode ? null : buildFallbackProfile());
  const [profileStatus, setProfileStatus] = useState("local");
  const [lectureItems, setLectureItems] = useState(initialLectures);
  const [homeWidgets, setHomeWidgets] = useState(() => {
    try {
      const saved = localStorage.getItem("onlypump-home-widgets");
      if (!saved) return defaultHomeWidgets;
      const parsed = JSON.parse(saved);
      if (!Array.isArray(parsed)) return defaultHomeWidgets;
      const validIds = homeWidgetCatalog.map(w => w.id);
      const cleaned = parsed.filter(id => validIds.includes(id));
      const missingDefaultWidgets = defaultHomeWidgets.filter(id => !cleaned.includes(id));
      return enforceHomeWidgetRules([...missingDefaultWidgets, ...cleaned]);
    } catch {
      return enforceHomeWidgetRules(defaultHomeWidgets);
    }
  });

  useEffect(() => {
    let cancelled = false;

    const bootstrapProfile = async () => {
      console.log("Profile loading started");
      const localDefaults = buildFallbackProfile({
        weight_kg: measurements.weight,
        goal: progressGoal.title,
      });
      const initData = getTelegramInitData();
      console.log("App boot mode:", initData ? "telegram" : "web-fallback");
      console.log("Telegram initData present:", Boolean(initData));
      setTelegramInitData(initData || "");
      if (!initData) {
        const activeProfile = localDefaults;
        console.log("Using activeProfile:", activeProfile);
        supabaseClientRef.current = null;
        setSupabaseClient(null);
        setProfile(activeProfile);
        setProfileStatus("local");
        profileSaveReadyRef.current = false;
        setProfileLoading(false);
        setAppLoading(false);
        console.log("Profile loaded", activeProfile);
        console.log("Initial app data loaded");
        return;
      }

      const client = createOnlyPumpSupabaseClient();
      supabaseClientRef.current = client;
      setSupabaseClient(client);
      const result = await verifyTelegramUserProfile(initData, localDefaults);

      if (cancelled) return;
      const activeProfile = initData && result.status !== "verified"
        ? normalizeProfileRecord({ ...result.profile, display_name: "Профиль", first_name: "", source: "fallback" }, { ...localDefaults, display_name: "Профиль", first_name: "" })
        : result.profile;
      console.log("Using activeProfile:", activeProfile);
      setProfile(activeProfile);
      setProfileStatus(result.status);
      profileSaveReadyRef.current = result.status === "verified" && Boolean(activeProfile?.id);
      setMeasurements(prev => ({ ...prev, weight: activeProfile.weight_kg || prev.weight }));
      setProgressGoal(prev => ({ ...prev, title: activeProfile.goal || prev.title }));
      setProfileLoading(false);
      setAppLoading(false);
      console.log("Profile loaded", activeProfile);
      console.log("Initial app data loaded");
    };

    bootstrapProfile();

    return () => {
      cancelled = true;
    };
  }, []);

  useEffect(() => {
    const client = supabaseClientRef.current;
    if (!profileSaveReadyRef.current || !client || !profile?.id || profileStatus !== "verified") return;

    const payload = {
      weight_kg: safeProfileNumber(measurements.weight, profile.weight_kg || DEFAULT_PROFILE.weight_kg),
      height_cm: safeProfileNumber(profile.height_cm, DEFAULT_PROFILE.height_cm),
      goal: progressGoal.title || profile.goal || DEFAULT_PROFILE.goal,
    };

    const timer = setTimeout(async () => {
      try {
        const { error } = await client
          .from("profiles")
          .update(payload)
          .eq("id", profile.id);
        if (error) {
          console.log("Supabase error", error);
          return;
        }
        setProfile(prev => normalizeProfileRecord({ ...prev, ...payload, source: "supabase" }, prev));
      } catch (error) {
        console.log("Supabase error", error);
      }
    }, 900);

    return () => clearTimeout(timer);
  }, [measurements.weight, progressGoal.title, profile?.id, profile?.height_cm, profileStatus]);

  useEffect(() => {
    localStorage.setItem("onlypump-home-widgets", JSON.stringify(homeWidgets));
  }, [homeWidgets]);

  const page = useMemo(() => ({
    home: <HomePage setActive={setActive} workouts={workouts} nutritionMeals={nutritionMeals} nutritionGoal={nutritionGoal} measurements={measurements} progressGoal={progressGoal} lectureItems={lectureItems} homeWidgets={homeWidgets} setHomeWidgets={setHomeWidgets} profile={profile}/>,
    workouts: <WorkoutsPage workouts={workouts} setWorkouts={setWorkouts} selectedDateKey={globalSelectedDateKey} setSelectedDateKey={setGlobalSelectedDateKey} profile={profile} telegramInitData={telegramInitData}/>,
    nutrition: <NutritionPage nutritionMeals={nutritionMeals} setNutritionMeals={setNutritionMeals} nutritionGoal={nutritionGoal} setNutritionGoal={setNutritionGoal}/>,
    calculators: <CalculatorsPage/>,
    education: <EducationPage/>,
    lectures: <LecturesPage lectureItems={lectureItems} setLectureItems={setLectureItems}/>,
    progress: <ProgressPage workouts={workouts} measurements={measurements} setMeasurements={setMeasurements} progressGoal={progressGoal} setProgressGoal={setProgressGoal}/>,
    analytics: <AnalyticsPage workouts={workouts}/>,
    community: <CommunityPage/>,
    profile: <ProfilePage profile={profile} profileStatus={profileStatus}/>,
  }[active]), [active, workouts, nutritionMeals, nutritionGoal, measurements, progressGoal, lectureItems, homeWidgets, globalSelectedDateKey, profile, profileStatus, supabaseClient, telegramInitData]);

  if (appLoading || profileLoading) {
    return <div className="onlypump-app-shell flex items-center justify-center bg-black px-6 text-zinc-100">
      <div className="text-center">
        <div className="mx-auto h-12 w-12 animate-pulse rounded-full bg-red-500/70" />
        <h1 className="mt-5 text-2xl font-black tracking-[-0.04em]">ONLYPUMP</h1>
        <p className="mt-2 text-sm text-zinc-500">Загрузка...</p>
      </div>
    </div>;
  }

  return <div className="onlypump-app-shell bg-black text-zinc-100 selection:bg-red-500/30">
    <div className="absolute inset-0 bg-[radial-gradient(circle_at_70%_5%,rgba(239,68,68,0.13),transparent_30%),radial-gradient(circle_at_30%_35%,rgba(255,255,255,0.05),transparent_30%)]"/>
    <div className="onlypump-app-frame relative mx-auto flex max-w-[1720px] rounded-3xl border border-white/10 bg-black/70">
      <DesktopSidebar active={active} setActive={setActive} profile={profile}/>
      <main className="onlypump-main-scroll min-w-0 w-full px-4 md:px-8 lg:px-12">{page}</main>
      <MobilePreview active={active}/>
    </div>
    <FloatingNavMenu active={active} setActive={setActive}/>
  </div>;
}

const root = createRoot(document.getElementById("root"));
root.render(<OnlyPumpPlatform />);
  </script>
</body>
</html>
